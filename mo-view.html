<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MO View v4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://js.zohostatic.com/creator/widgets/version/1.0/widgetsdk-min.js"></script>
<style>
:root{--pr:#1E3A8A;--ac:#3B82F6;--bg:#F1F5F9;--bd:#E2E8F0;--tx:#0F172A;--tm:#64748B;--cw:#FFF;--ok:#10B981;--wn:#F59E0B;--dg:#EF4444;--dr:#94A3B8}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans KR',-apple-system,sans-serif}
body{background:var(--bg);padding:16px;min-height:100vh}
.spinner{width:40px;height:40px;border:4px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;color:var(--tm);font-size:13px;font-weight:600}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:17px;font-weight:900;color:var(--tx);display:flex;align-items:center;gap:8px}
.hdr h1 .ic{width:28px;height:28px;background:var(--pr);border-radius:5px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:900}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.kpi{background:var(--cw);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;text-align:center;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;left:0;top:0;width:100%;height:3px}
.kpi-v{font-size:26px;font-weight:900;line-height:1}
.kpi-l{font-size:10px;font-weight:700;color:var(--tm);margin-top:4px}
.pipe-card{background:var(--cw);border:1px solid var(--bd);border-radius:8px;padding:14px 18px;margin-bottom:16px}
.pipe-title{font-size:12px;font-weight:800;color:var(--tm);text-transform:uppercase;margin-bottom:10px}
.pipe-row{display:flex;align-items:center;gap:4px;overflow-x:auto}
.pipe-step{flex:1;text-align:center;min-width:70px;padding:8px 4px;border-radius:8px}
.pipe-n{font-size:20px;font-weight:900;line-height:1}
.pipe-lb{font-size:9px;font-weight:700;margin-top:3px}
.pipe-lb2{font-size:8px;color:var(--tm);margin-top:1px}
.pipe-bar{height:3px;border-radius:2px;margin-top:4px}
.pipe-arr{color:#CBD5E1;font-size:10px;flex-shrink:0}
.filter-bar{display:flex;justify-content:flex-end;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.search-box{background:#fff;border:1px solid var(--bd);border-radius:6px;padding:5px 10px;font-size:11px;width:200px;outline:none;font-family:inherit}
.search-box:focus{border-color:var(--ac);box-shadow:0 0 0 2px rgba(59,130,246,.1)}
.fsel{background:#fff;border:1px solid var(--bd);border-radius:6px;padding:5px 8px;font-size:11px;outline:none;font-family:inherit;cursor:pointer}
.mt-sec{margin-bottom:20px}
.mt-card{background:var(--cw);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.mt-hd{padding:8px 16px;background:#F8FAFC;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.mt-title{font-size:13px;font-weight:800;color:var(--tx)}
.mt-cnt{font-size:11px;color:var(--tm);font-weight:600;background:#F1F5F9;padding:2px 8px;border-radius:10px;border:1px solid #CBD5E1}
.tbl-scroll{overflow-x:auto}
table.zt{width:100%;border-collapse:collapse;font-size:11px;text-align:left;table-layout:fixed}
.zt th{background:#F1F5F9;padding:7px 8px;color:var(--tm);font-weight:800;font-size:10px;border-bottom:1px solid var(--bd);white-space:nowrap;overflow:hidden}
.zt td{padding:7px 8px;border-bottom:1px solid #F1F5F9;color:var(--tx);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.zt tbody tr{cursor:pointer;transition:background .1s}
.zt tbody tr:hover td{background:#EFF6FF}
.zt .mo-num{font-weight:800;color:var(--pr)}
.tag{padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;display:inline-flex;align-items:center;white-space:nowrap}
.t-ok{background:#D1FAE5;color:#065F46;border:1px solid #A7F3D0}
.t-wn{background:#FEF3C7;color:#B45309;border:1px solid #FDE68A}
.t-dg{background:#FEF2F2;color:#B91C1C;border:1px solid #FECACA}
.t-dr{background:#F1F5F9;color:#475569;border:1px solid #CBD5E1}
.t-bl{background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE}
.dly-badge{display:inline-block;padding:1px 4px;border-radius:3px;font-size:7px;font-weight:700;background:#FEF2F2;color:#DC2626;margin-left:2px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
/* Timeline */
.tl-card{background:var(--cw);border:1px solid var(--bd);border-radius:0 0 8px 8px;border-top:2px dashed var(--bd);overflow:hidden}
.tl-hd{padding:8px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;background:#FAFBFC;border-bottom:1px solid var(--bd)}
.tl-title{font-size:12px;font-weight:800;color:var(--tx)}
.tl-legend{display:flex;gap:10px;font-size:9px;color:var(--tm);align-items:center}
.tl-legend span{display:flex;align-items:center;gap:3px}
.tl-dot{width:10px;height:10px;border-radius:3px;display:inline-block}
.tl-type-badge{padding:1px 6px;border-radius:3px;font-size:8px;font-weight:700}
.tl-scroll{overflow-x:auto;padding:0 0 8px}
.tl-tbl{width:100%;border-collapse:collapse;font-size:10px;table-layout:fixed;min-width:1000px}
.tl-tbl th,.tl-tbl td{border:1px solid #EEF2F6}
.tl-tbl th{background:#F8FAFC;color:var(--tm);font-weight:700;padding:4px 0;text-align:center;font-size:9px}
.tl-tbl th.wk{background:#FEF8F8;color:#E87979}
.tl-tbl th.today{background:var(--ac);color:#fff;font-weight:900}
.tl-tbl .info-cell{width:170px;min-width:170px;text-align:left;background:#FAFBFC;padding:4px 8px;position:sticky;left:0;z-index:2;border-right:2px solid var(--bd)}
.tl-tbl td{padding:0px;vertical-align:middle;height:18px;background:#FEFEFE}
.tl-tbl tr:nth-child(4n+3) td,.tl-tbl tr:nth-child(4n+4) td{background:#FAFBFC}
.tl-tbl tr.plan-row td{height:16px}
.tl-tbl tr.actual-row td{height:18px}
.tl-bar{height:100%;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;white-space:nowrap;overflow:hidden;min-height:14px}

/* ★★★ NEW: Plan = dashed border + transparent ★★★ */
.pb-fab{background:transparent;border:1.5px dashed #C4B5FD;color:#7C3AED}
.pb-cut{background:transparent;border:1.5px dashed #FDBA74;color:#D97706}
.pb-sew{background:transparent;border:1.5px dashed #FCA5A5;color:#DC2626}
.pb-pack{background:transparent;border:1.5px dashed #86EFAC;color:#16A34A}
.pb-ship{background:transparent;border:1.5px dashed #93C5FD;color:#2563EB}

/* ★★★ NEW: Actual = soft pastel fill (was dark, now gentle) ★★★ */
.ab-fab{background:#DDD6FE;color:#6D28D9}
.ab-cut{background:#FED7AA;color:#C2410C}
.ab-sew{background:#FECACA;color:#B91C1C}
.ab-pack{background:#BBF7D0;color:#15803D}
.ab-ship{background:#BFDBFE;color:#1D4ED8}

.tl-mo-info{cursor:pointer}
.tl-mo-info:hover{background:#EFF6FF !important}
.tl-mo-num{font-size:11px;font-weight:800;color:var(--pr)}
.tl-mo-name{font-size:9px;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.tl-mo-meta{font-size:8px;color:#94A3B8}
.tl-row-label{font-size:7px;font-weight:700;color:var(--tm);padding:1px 8px !important;background:#F8FAFC !important;position:sticky;left:0;z-index:2;border-right:2px solid var(--bd) !important}
/* Modal */
.modal-ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(2px)}
.modal-ov.active{display:flex}
.modal-box{background:#fff;border-radius:12px;width:92%;max-width:800px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .25s ease-out}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.m-hd{padding:20px 24px 16px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:#fff;z-index:10;border-radius:12px 12px 0 0}
.m-title{font-size:18px;font-weight:900;color:var(--pr)}
.m-sub{font-size:12px;color:var(--tm);margin-top:2px}
.m-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--bd);background:#F8FAFC;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--tm)}
.m-close:hover{background:#FEF2F2;color:var(--dg)}
.m-body{padding:20px 24px}
.m-sec{margin-bottom:24px}
.m-sec-t{font-size:12px;font-weight:800;color:var(--pr);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #EFF6FF}
.d-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.d-item{display:flex;flex-direction:column;gap:3px;padding:6px 8px;background:#FAFBFC;border-radius:6px;border:1px solid #F1F5F9}
.d-label{font-size:9px;font-weight:700;color:var(--tm)}
.d-val{font-size:13px;font-weight:600;color:var(--tx)}
.d-val.empty{color:#CBD5E1;font-style:italic}
.tl-modal{margin-top:8px}.tl-item{display:flex;align-items:flex-start;gap:12px;padding:6px 0;position:relative}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:11px;top:28px;width:2px;height:calc(100% - 14px);background:#E2E8F0}
.tl-dot-m{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;z-index:2}
.tl-dot-m.done{background:var(--ok)}.tl-dot-m.curr{background:var(--ac)}.tl-dot-m.wait{background:#CBD5E1}.tl-dot-m.late{background:var(--dg)}
.tl-info-m{flex:1}.tl-lb-m{font-size:12px;font-weight:700;color:var(--tx)}.tl-dt-m{font-size:10px;color:var(--tm);margin-top:1px}
.err-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:20px;text-align:center;color:#B91C1C}
@media(max-width:768px){.kpi-row{grid-template-columns:repeat(2,1fr)}.d-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="loadingScreen" class="loading"><div class="spinner"></div>MO 데이터를 불러오는 중...</div>
<div id="mainContent" style="display:none">
<div class="hdr"><h1><span class="ic">MO</span> MO View / 생산현황표 / 生产现况表</h1>
<button onclick="window.open('https://creatorapp.zoho.com/jeramoda/eom/#Form:Add_MO','_blank')" style="background:var(--pr);color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">+ New MO</button></div>
<div class="kpi-row" id="kpiRow"></div>
<div class="pipe-card"><div class="pipe-title">Production Pipeline / 생산 파이프라인 / 生产流水线</div><div class="pipe-row" id="pipeRow"></div></div>
<div class="filter-bar">
<input type="text" class="search-box" id="searchBox" placeholder="🔍 MO#, SKU, Style, Factory 검색...">
<select class="fsel" id="filterSeason"><option value="">All Season</option></select>
<select class="fsel" id="filterOrder"><option value="">All Order Status</option></select>
<select class="fsel" id="filterProd"><option value="">All Prod Status</option></select>
</div>
<div id="monthlyContent"></div>
</div>
<div id="errorScreen" style="display:none"><div class="err-box"><div style="font-weight:800;font-size:14px;margin-bottom:8px">데이터를 불러올 수 없습니다</div><div id="errorMsg" style="font-size:12px"></div></div></div>
<!-- Modal -->
<div class="modal-ov" id="modalOv"><div class="modal-box">
<div class="m-hd"><div><div class="m-title" id="mTitle">-</div><div class="m-sub" id="mSub">-</div></div>
<div style="display:flex;align-items:center;gap:8px">
<button onclick="window.open('https://creatorapp.zoho.com/jeramoda/eom/#Report:All_MO','_blank')" style="background:#EFF6FF;color:var(--pr);border:1px solid #BFDBFE;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">✏️ Edit</button>
<div class="m-close" id="mClose">✕</div></div></div>
<div class="m-body" id="mBody"></div>
</div></div>

<script>
/* ★★★ v4-fix: JS logic is IDENTICAL to v3 — only CSS changed ★★★ */
var APP="eom",REP="All_MO";
var allRec=[],filtered=[];
var today=new Date();var todayStr=today.toISOString().split("T")[0];

function pd(v){if(!v||v==="-")return null;
if(/^\d{4}-\d{2}-\d{2}/.test(v))return v.substring(0,10);
var m=v.match(/^(\d{1,2})-([A-Za-z]+)-(\d{4})/);
if(m){var mo={Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};
return m[3]+"-"+(mo[m[2]]||"01")+"-"+(m[1].length===1?"0"+m[1]:m[1])}return null}

ZOHO.CREATOR.init().then(function(){loadData()});
function loadData(){
ZOHO.CREATOR.API.getAllRecords({appName:APP,reportName:REP,page:1,pageSize:200}).then(function(r){
if(r&&r.code===3000&&r.data){allRec=r.data;filtered=allRec.slice();renderAll();hide("loadingScreen");show("mainContent")}
else showErr("로드 실패")}).catch(function(e){showErr(JSON.stringify(e))})}

function show(i){document.getElementById(i).style.display="block"}
function hide(i){document.getElementById(i).style.display="none"}
function showErr(m){hide("loadingScreen");show("errorScreen");document.getElementById("errorMsg").textContent=m}
function g(r,f){var v=r[f];if(v==null||v==="")return"-";if(typeof v==="object"&&v.display_value)return v.display_value;return String(v)}
function escH(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function tc(s){var l=(s||"").toLowerCase();if(l.indexOf("confirmed")>=0||l.indexOf("delivered")>=0||l.indexOf("complete")>=0||l.indexOf("shipped")>=0||l.indexOf("done")>=0)return"t-ok";if(l.indexOf("progress")>=0||l.indexOf("cutting")>=0||l.indexOf("sewing")>=0||l.indexOf("fabric")>=0||l.indexOf("packing")>=0)return"t-wn";if(l.indexOf("delay")>=0||l.indexOf("cancel")>=0)return"t-dg";if(l.indexOf("pending")>=0)return"t-bl";return"t-dr"}
function isDelayed(r){var ds=g(r,"Delivery_Status").toLowerCase();if(ds.indexOf("delay")>=0)return true;var ed=pd(g(r,"Expected_Delivery"));var ps=g(r,"Production_Status").toLowerCase();if(ed&&ps.indexOf("shipped")<0&&ps.indexOf("complete")<0&&ed<todayStr)return true;return false}
function getProdStage(r){var s=g(r,"Production_Status").toLowerCase();if(s.indexOf("shipped")>=0)return"Shipped";if(s.indexOf("complete")>=0||s.indexOf("done")>=0)return"Done";if(s.indexOf("packing")>=0)return"Packing";if(s.indexOf("sewing")>=0)return"Sewing";if(s.indexOf("cutting")>=0)return"Cutting";if(s.indexOf("fabric")>=0)return"Fabric";return"Not Started"}

function renderAll(){renderKPI();renderPipeline();buildFilters();renderMonthly()}

function renderKPI(){var t=allRec.length,ip=0,dl=0,dv=0,cf=0,tq=0;
allRec.forEach(function(r){var os=(g(r,"Order_Status")||"").toLowerCase();if(os.indexOf("progress")>=0)ip++;if(isDelayed(r))dl++;if(os.indexOf("delivered")>=0)dv++;if(os.indexOf("confirmed")>=0)cf++;tq+=parseInt(g(r,"Total_Quantity"))||0});
document.getElementById("kpiRow").innerHTML=
'<div class="kpi" style="border-top:3px solid var(--pr)"><div class="kpi-v" style="color:var(--pr)">'+t+'</div><div class="kpi-l">Total MO ('+tq.toLocaleString()+' pcs)</div></div>'+
'<div class="kpi" style="border-top:3px solid var(--wn)"><div class="kpi-v" style="color:var(--wn)">'+ip+'</div><div class="kpi-l">In Progress / 진행중</div></div>'+
'<div class="kpi" style="border-top:3px solid var(--dg)"><div class="kpi-v" style="color:var(--dg)">'+dl+'</div><div class="kpi-l">Delayed / 지연</div></div>'+
'<div class="kpi" style="border-top:3px solid #3B82F6"><div class="kpi-v" style="color:#3B82F6">'+cf+'</div><div class="kpi-l">Confirmed / 확정</div></div>'+
'<div class="kpi" style="border-top:3px solid var(--ok)"><div class="kpi-v" style="color:var(--ok)">'+dv+'</div><div class="kpi-l">Delivered / 출고완료</div></div>'}

function renderPipeline(){var st=["Not Started","Fabric","Cutting","Sewing","Packing","Done","Shipped"];
var co=["#94A3B8","#8B5CF6","#F97316","#EF4444","#22C55E","#3B82F6","#10B981"];
var lb=["미시작","원단","재단","봉제","포장","완료","출고"];var cn=[0,0,0,0,0,0,0];
allRec.forEach(function(r){var i=st.indexOf(getProdStage(r));if(i>=0)cn[i]++});
var h="";st.forEach(function(s,i){if(i>0)h+='<div class="pipe-arr">▶</div>';
h+='<div class="pipe-step"><div class="pipe-n" style="color:'+co[i]+'">'+cn[i]+'</div><div class="pipe-lb" style="color:'+co[i]+'">'+s+'</div><div class="pipe-lb2">'+lb[i]+'</div><div class="pipe-bar" style="background:'+co[i]+'"></div></div>'});
document.getElementById("pipeRow").innerHTML=h}

function buildFilters(){var se={},os={},ps={};
allRec.forEach(function(r){var s=g(r,"Season");if(s!=="-")se[s]=1;var o=g(r,"Order_Status");if(o!=="-")os[o]=1;var p=g(r,"Production_Status");if(p!=="-")ps[p]=1});
["filterSeason","filterOrder","filterProd"].forEach(function(id,i){var el=document.getElementById(id);var obj=[se,os,ps][i];Object.keys(obj).sort().forEach(function(k){el.innerHTML+='<option value="'+k+'">'+k+'</option>'})})}

["searchBox"].forEach(function(id){document.getElementById(id).addEventListener("input",af)});
["filterSeason","filterOrder","filterProd"].forEach(function(id){document.getElementById(id).addEventListener("change",af)});
function af(){var q=document.getElementById("searchBox").value.toLowerCase().trim();
var fs=document.getElementById("filterSeason").value,fo=document.getElementById("filterOrder").value,fp=document.getElementById("filterProd").value;
filtered=allRec.filter(function(r){if(q){var h=(g(r,"MO_Number")+" "+g(r,"Style_SKU")+" "+g(r,"Style_Name")+" "+g(r,"Factory")).toLowerCase();if(h.indexOf(q)<0)return false}
if(fs&&g(r,"Season")!==fs)return false;if(fo&&g(r,"Order_Status")!==fo)return false;if(fp&&g(r,"Production_Status")!==fp)return false;return true});renderMonthly()}

/* ★★★ Monthly Tables + Timeline — SAME AS v3 ★★★ */
function renderMonthly(){
var groups={};
filtered.forEach(function(r){var py=g(r,"Plan_Year"),pm=g(r,"Plan_Month");var key=(py!=="-"&&pm!=="-")?(py+"년 "+pm+"월"):"미지정";if(!groups[key])groups[key]=[];groups[key].push(r)});

var html="";
Object.keys(groups).sort().forEach(function(key){
var items=groups[key];
var ym=parseYM(key);

html+='<div class="mt-sec"><div class="mt-card"><div class="mt-hd"><div class="mt-title">📅 '+escH(key)+'</div><span class="mt-cnt">'+items.length+' MOs</span></div>';
html+='<div class="tbl-scroll"><table class="zt"><thead><tr><th style="width:7%">MO#</th><th style="width:12%">SKU</th><th style="width:14%">Style</th><th style="width:10%">Factory</th><th style="width:7%;text-align:center">Qty</th><th style="width:14%">Order</th><th style="width:14%">Production</th><th style="width:11%">Exp.Del</th><th style="width:11%">Ship</th></tr></thead><tbody>';
items.forEach(function(r){var dl=isDelayed(r);
html+='<tr data-id="'+r["ID"]+'"'+(dl?' style="background:#FEF2F2"':'')+'>';
html+='<td class="mo-num">'+escH(g(r,"MO_Number"))+'</td>';
html+='<td style="font-size:9px;font-weight:600">'+escH(g(r,"Style_SKU"))+'</td>';
html+='<td>'+escH(g(r,"Style_Name"))+'</td>';
html+='<td>'+escH(g(r,"Factory"))+'</td>';
html+='<td style="text-align:center;font-weight:700">'+escH(g(r,"Total_Quantity"))+'</td>';
html+='<td><span class="tag '+tc(g(r,"Order_Status"))+'">'+escH(g(r,"Order_Status"))+'</span></td>';
html+='<td><span class="tag '+tc(g(r,"Production_Status"))+'">'+escH(g(r,"Production_Status"))+'</span></td>';
var ed=g(r,"Expected_Delivery");html+='<td>'+escH(ed)+(dl?' <span class="dly-badge">DELAYED</span>':'')+'</td>';
html+='<td>'+escH(g(r,"Ship_Date"))+'</td></tr>'});
html+='</tbody></table></div>';

if(ym){html+=buildTimeline(items,ym.y,ym.m,key)}
html+='</div></div>'});

document.getElementById("monthlyContent").innerHTML=html;
document.querySelectorAll("#monthlyContent tr[data-id]").forEach(function(row){
row.addEventListener("click",function(){var id=this.getAttribute("data-id");var r=allRec.find(function(x){return x["ID"]===id});if(r)openModal(r)})});
document.querySelectorAll(".tl-mo-info").forEach(function(el){
el.addEventListener("click",function(){var id=this.getAttribute("data-id");var r=allRec.find(function(x){return x["ID"]===id});if(r)openModal(r)})})}

function parseYM(key){var m=key.match(/(\d+)년\s*(\d+)월/);if(!m)return null;var y=parseInt(m[1]);if(y<100)y+=2000;return{y:y,m:parseInt(m[2])}}

/* ★ buildTimeline — SAME logic as v3, only legend colors updated ★ */
function buildTimeline(items,yr,mo,label){
var daysInMonth=new Date(yr,mo,0).getDate();
var curMM=yr+"-"+(mo<10?"0":"")+mo;
var todayD=(today.getFullYear()===yr&&today.getMonth()+1===mo)?today.getDate():0;

var h='<div class="tl-card"><div class="tl-hd"><div class="tl-title">📊 '+escH(label)+' Production Timeline (Plan vs Actual)</div>';
h+='<div class="tl-legend">';
h+='<span class="tl-type-badge" style="background:#F5F3FF;color:#7C3AED;border:1px dashed #C4B5FD">P = Plan</span>';
h+='<span class="tl-type-badge" style="background:#FEF3C7;color:#B45309">A = Actual</span>';
h+='<span><span class="tl-dot" style="background:#DDD6FE"></span>Fab</span>';
h+='<span><span class="tl-dot" style="background:#FED7AA"></span>Cut</span>';
h+='<span><span class="tl-dot" style="background:#FECACA"></span>Sew</span>';
h+='<span><span class="tl-dot" style="background:#BBF7D0"></span>Pack</span>';
h+='<span><span class="tl-dot" style="background:#BFDBFE"></span>Ship</span>';
h+='</div></div>';
h+='<div class="tl-scroll"><table class="tl-tbl"><thead><tr><th class="info-cell">MO / Style</th>';
for(var d=1;d<=daysInMonth;d++){var dt=new Date(yr,mo-1,d);var dow=dt.getDay();var cls=(dow===0||dow===6)?"wk":"";if(d===todayD)cls="today";h+='<th class="'+cls+'">'+d+'</th>'}
h+='</tr></thead><tbody>';

var hasAny=false;
items.forEach(function(r){
var fields=["Plan_Fabric_Date","Plan_Cutting_Start","Plan_Cutting_End","Plan_Sewing_Start","Plan_Sewing_End","Plan_Packing_Start","Plan_Packing_End","Fabric_In_house_Date","Cutting_Start_Date","Cutting_End_Date","Sewing_Start_Date","Sewing_Completion_Date","Packing_Start_Date","Packing_End_Date","Ship_Date"];
var inMonth=false;fields.forEach(function(f){var p=pd(g(r,f));if(p&&p.substring(0,7)===curMM)inMonth=true});
var edp=pd(g(r,"Expected_Delivery"));if(edp&&edp.substring(0,7)===curMM)inMonth=true;
if(!inMonth)return;
hasAny=true;

h+='<tr><td class="info-cell tl-mo-info" rowspan="2" data-id="'+r["ID"]+'">';
h+='<div class="tl-mo-num">'+escH(g(r,"MO_Number"))+'</div>';
h+='<div class="tl-mo-name">'+escH(g(r,"Style_Name"))+'</div>';
h+='<div class="tl-mo-meta">'+escH(g(r,"Factory"))+' · '+(parseInt(g(r,"Total_Quantity"))||0).toLocaleString()+'pcs</div></td>';

// Plan row
var pFab=dayInMo(g(r,"Plan_Fabric_Date"),curMM);
var pCS=dayInMo(g(r,"Plan_Cutting_Start"),curMM);var pCE=dayInMo(g(r,"Plan_Cutting_End"),curMM);
var pSS=dayInMo(g(r,"Plan_Sewing_Start"),curMM);var pSE=dayInMo(g(r,"Plan_Sewing_End"),curMM);
var pPS=dayInMo(g(r,"Plan_Packing_Start"),curMM);var pPE=dayInMo(g(r,"Plan_Packing_End"),curMM);
var pShip=dayInMo(g(r,"Expected_Delivery"),curMM);
h+=buildBarRow(daysInMonth,pFab,pCS,pCE,pSS,pSE,pPS,pPE,pShip,true);
h+='</tr>';

// Actual row
var aFab=dayInMo(g(r,"Fabric_In_house_Date"),curMM);
var aCS=dayInMo(g(r,"Cutting_Start_Date"),curMM);var aCE=dayInMo(g(r,"Cutting_End_Date"),curMM);
var aSS=dayInMo(g(r,"Sewing_Start_Date"),curMM);var aSE=dayInMo(g(r,"Sewing_Completion_Date"),curMM);
var aPS=dayInMo(g(r,"Packing_Start_Date"),curMM);var aPE=dayInMo(g(r,"Packing_End_Date"),curMM);
var aSh=dayInMo(g(r,"Ship_Date"),curMM);
h+='<tr>'+buildBarRow(daysInMonth,aFab,aCS,aCE,aSS,aSE,aPS,aPE,aSh,false)+'</tr>'});

if(!hasAny)h+='<tr><td class="info-cell" colspan="'+(daysInMonth+1)+'" style="text-align:center;padding:16px;color:#94A3B8;font-size:10px">이 달에 해당하는 일정이 없습니다</td></tr>';
h+='</tbody></table></div></div>';
return h}

function dayInMo(v,curMM){var p=pd(v);if(!p||p.substring(0,7)!==curMM)return 0;return parseInt(p.substring(8,10))||0}

/* ★ buildBarRow — SAME signature as v3, ship now works for both plan+actual ★ */
function buildBarRow(daysInMonth,fab,cs,ce,ss,se,ps,pe,ship,isPlan){
var prefix=isPlan?"pb":"ab";
var h='';
var skip=0;
for(var d=1;d<=daysInMonth;d++){
if(skip>0){skip--;continue}
if(fab===d){h+='<td><div class="tl-bar '+prefix+'-fab">FAB</div></td>'}
else if(cs===d){var sp=ce?ce-cs+1:1;if(sp<1)sp=1;if(d+sp-1>daysInMonth)sp=daysInMonth-d+1;skip=sp-1;h+='<td colspan="'+sp+'"><div class="tl-bar '+prefix+'-cut">CUT</div></td>'}
else if(ss===d){var sp=se?se-ss+1:1;if(sp<1)sp=1;if(d+sp-1>daysInMonth)sp=daysInMonth-d+1;skip=sp-1;h+='<td colspan="'+sp+'"><div class="tl-bar '+prefix+'-sew">SEW</div></td>'}
else if(ps===d){var sp=pe?pe-ps+1:1;if(sp<1)sp=1;if(d+sp-1>daysInMonth)sp=daysInMonth-d+1;skip=sp-1;h+='<td colspan="'+sp+'"><div class="tl-bar '+prefix+'-pack">PACK</div></td>'}
else if(ship===d){h+='<td><div class="tl-bar '+prefix+'-ship">SHIP</div></td>'}
else{h+='<td></td>'}
}
return h}

/* ★ Modal — same as v3 ★ */
function openModal(r){
document.getElementById("mTitle").textContent=g(r,"MO_Number");
document.getElementById("mSub").textContent=g(r,"Style_Name")+" — "+g(r,"Style_SKU");
var h='';
function dv(v){return v==="-"?'<span class="d-val empty">미입력</span>':escH(v)}
function it(l,v){return'<div class="d-item"><span class="d-label">'+l+'</span><span class="d-val">'+v+'</span></div>'}

h+='<div class="m-sec"><div class="m-sec-t">📌 기본 정보 / Order Info / 订单信息</div><div class="d-grid">';
h+=it("MO Number / MO번호 / 订单编号",dv(g(r,"MO_Number")));
h+=it("Style SKU / 스타일SKU / 款式SKU",dv(g(r,"Style_SKU")));
h+=it("Style Name / 스타일명 / 款式名",dv(g(r,"Style_Name")));
h+=it("Season / 시즌 / 季节",dv(g(r,"Season")));
h+=it("Factory / 공장 / 工厂",dv(g(r,"Factory")));
h+=it("Order Date / 주문일 / 订单日期",dv(g(r,"Order_Date")));
h+=it("Order Status / 주문상태 / 订单状态",'<span class="tag '+tc(g(r,"Order_Status"))+'">'+escH(g(r,"Order_Status"))+'</span>');
h+=it("Expected Delivery / 예상배송 / 预计交货",dv(g(r,"Expected_Delivery")));
h+=it("Delivery Status / 납기상태 / 交期情况",isDelayed(r)?'<span class="tag t-dg">DELAYED</span>':dv(g(r,"Delivery_Status")));
h+='</div></div>';

h+='<div class="m-sec"><div class="m-sec-t">📦 수량 & 금액 / Quantity & Amount / 数量&金额</div><div class="d-grid">';
h+=it("Total Qty / 총수량 / 总数量",dv(g(r,"Total_Quantity")));
h+=it("Grand Total / 총금액 / 总金额",dv(g(r,"Grand_Total")));
h+=it("Notes / 메모 / 备注",dv(g(r,"Notes")));
h+='</div></div>';

h+='<div class="m-sec"><div class="m-sec-t">🏭 생산 추적 / Production / 生产跟踪</div><div class="d-grid">';
h+=it("Production Status / 생산상태 / 生产状态",'<span class="tag '+tc(g(r,"Production_Status"))+'">'+escH(g(r,"Production_Status"))+'</span>');
h+=it("Fabric Status / 원단상태 / 面料进度",dv(g(r,"Fabric_Status")));
h+=it("Progress / 진척률 / 生产进度",dv(g(r,"Progress")));
h+=it("Cut Qty / 재단수량 / 裁剪数量",dv(g(r,"Cut_Quantity")));
h+=it("Finished Qty / 완제품수량 / 成衣数量",dv(g(r,"Finished_Quantity")));
h+='</div></div>';

h+='<div class="m-sec"><div class="m-sec-t">📅 생산 일정 / Dates / 生产日期</div><div class="tl-modal">';
[{l:"Fabric In / 원단입고",k:"Fabric_In_house_Date"},{l:"Cutting Start / 재단시작",k:"Cutting_Start_Date"},{l:"Cutting End / 재단완성",k:"Cutting_End_Date"},
{l:"Sewing Start / 봉제시작",k:"Sewing_Start_Date"},{l:"Sewing End / 봉제완성",k:"Sewing_Completion_Date"},
{l:"Packing Start / 포장시작",k:"Packing_Start_Date"},{l:"Packing End / 포장완성",k:"Packing_End_Date"},
{l:"Ship Date / 선적일",k:"Ship_Date"}].forEach(function(t,i){
var v=g(r,t.k);var p=pd(v);var cls="wait";if(p){if(p<=todayStr)cls="done";else cls="curr"}
h+='<div class="tl-item"><div class="tl-dot-m '+cls+'">'+(i+1)+'</div><div class="tl-info-m"><div class="tl-lb-m">'+t.l+'</div><div class="tl-dt-m">'+escH(v)+'</div></div></div>'});
h+='</div></div>';

h+='<div class="m-sec"><div class="m-sec-t">🚢 출고 / Shipment / 出货信息</div><div class="d-grid">';
h+=it("Ready to Ship / 출고준비 / 待出货",dv(g(r,"Ready_to_Ship")));
h+=it("Final QC / 최종QC / 最终QC",dv(g(r,"Final_QC_Passed")));
h+=it("Shipped Qty / 선적수량 / 出货数量",dv(g(r,"Shipped_Quantity")));
h+='</div></div>';

document.getElementById("mBody").innerHTML=h;
document.getElementById("modalOv").classList.add("active")}

function closeModal(){document.getElementById("modalOv").classList.remove("active")}
document.getElementById("mClose").addEventListener("click",closeModal);
document.getElementById("modalOv").addEventListener("click",function(e){if(e.target===this)closeModal()});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal()});
</script>
</body>
</html>
