<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JERA ERP — MO View v33 / 생산현황 / 生产现况</title>
<script src="https://js.zohostatic.com/creator/widgets/version/1.0/widgetsdk-min.js"></script>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css');

:root{
  --bg:#FAFAF7;
  --card:#FFFFFF;
  --border:#EDE9E4;
  --border-hover:#D3D1C7;
  --text:#1C1917;
  --text-mute:#78716C;
  --text-soft:#44443F;
  --accent:#9B8A7A;
  --gold:#C9A86E;

  --mo-primary:#3E5795;
  --mo-accent-from:#5B7FBE;
  --mo-accent-to:#4A6FA5;

  --p-pink:#FBEAF0;    --p-pink-txt:#72243E;
  --p-peach:#FAECE7;   --p-peach-txt:#712B13;
  --p-butter:#FAEEDA;  --p-butter-txt:#633806;
  --p-mint:#E1F5EE;    --p-mint-txt:#085041;
  --p-sky:#E6F1FB;     --p-sky-txt:#0C447C;
  --p-lav:#EEEDFE;     --p-lav-txt:#3C3489;
  --p-sage:#EAF3DE;    --p-sage-txt:#173404;
  --p-blue:#DBEAFE;    --p-blue-txt:#1E3A8A;

  --st-ok-bg:#D1FAE5;    --st-ok-txt:#065F46;
  --st-warn-bg:#FEF3C7;  --st-warn-txt:#854F0B;
  --st-danger-bg:#FCEBEB; --st-danger-txt:#A32D2D;
  --st-draft-bg:#F1EFE8;  --st-draft-txt:#5F5E5A;
  --st-info-bg:#DBEAFE;   --st-info-txt:#1E40AF;

  --stage-notstart-bg:#F1EFE8;  --stage-notstart-txt:#5F5E5A;
  --stage-fabric-bg:#EEEDFE;    --stage-fabric-txt:#3C3489;
  --stage-cutting-bg:#FAEEDA;   --stage-cutting-txt:#633806;
  --stage-sewing-bg:#E6F1FB;    --stage-sewing-txt:#0C447C;
  --stage-packing-bg:#EAF3DE;   --stage-packing-txt:#173404;
  --stage-done-bg:#D1FAE5;      --stage-done-txt:#065F46;
  --stage-shipped-bg:#DBEAFE;   --stage-shipped-txt:#1E3A8A;

  --plan-bg:#EEEDFE;    --plan-txt:#3C3489;    --plan-border:#C4B5FD;
  --actual-bg:#D1FAE5;  --actual-txt:#065F46;  --actual-border:#6EE7B7;

  --radius:12px;
  --radius-card:10px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.04);
  --shadow:0 2px 8px rgba(0,0,0,.06);
  --shadow-md:0 4px 16px rgba(0,0,0,.08);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);
  font-family:'Pretendard Variable','Pretendard','Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:12px;-webkit-font-smoothing:antialiased;letter-spacing:-.008em}
body{padding:16px;min-height:100vh}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--border-hover)}

/* Header */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:15px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:10px;letter-spacing:-.01em}
.hdr h1 .ic{width:28px;height:28px;background:linear-gradient(135deg,var(--mo-accent-from),var(--mo-accent-to));
  border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:500;letter-spacing:.5px;
  box-shadow:0 1px 3px rgba(62,87,149,.25)}
.hdr-btns{display:flex;gap:8px}
.btn-primary{background:#1C1917;color:#fff;border:0;padding:7px 16px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;
  font-family:inherit;transition:background .15s,transform .15s}
.btn-primary:hover{background:#44443F;transform:translateY(-1px)}
.btn-cctv{background:#FFF;color:var(--mo-primary);border:1px solid var(--p-lav);padding:7px 14px;border-radius:7px;font-size:12px;
  font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-cctv:hover{background:var(--p-lav)}

/* KPI Row — 4 equal columns */
.mkpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.mkpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-card);padding:14px;position:relative;overflow:hidden;min-width:0;
  transition:border-color .15s,box-shadow .15s}
.mkpi-card:hover{border-color:var(--border-hover);box-shadow:var(--shadow)}
.mkpi-card::before{content:'';position:absolute;left:0;top:0;width:100%;height:3px;background:var(--stripe,#CDB4DB);
  border-radius:var(--radius-card) var(--radius-card) 0 0}
.mkpi-card-empty{visibility:hidden}
.mkpi-header{margin-bottom:10px}
.mkpi-title{font-size:13px;font-weight:500;color:var(--text);letter-spacing:-.01em}
.mkpi-body{display:flex;align-items:center;gap:14px}
.mkpi-ring{position:relative;width:64px;height:64px;flex-shrink:0}
.mkpi-ring svg{transform:rotate(-90deg)}
.mkpi-ring-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:13px;font-weight:500;color:var(--text)}
.mkpi-stats{display:grid;grid-template-columns:1fr 1fr;gap:5px;flex:1;min-width:0}
.mkpi-stat{text-align:center;padding:5px 4px;border-radius:6px;background:#FAFAF7;border:1px solid #F1EFE8;cursor:pointer;transition:background .15s,transform .12s}
.mkpi-stat:hover{background:var(--p-lav);transform:translateY(-1px)}
.mkpi-stat-n{font-size:16px;font-weight:500;line-height:1}
.mkpi-stat-l{font-size:9px;font-weight:400;color:var(--text-mute);margin-top:3px;line-height:1.3}
.mkpi-stat .dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:3px;vertical-align:middle}
.mkpi-footer{margin-top:10px;padding-top:8px;border-top:1px solid #F1EFE8;font-size:10px;color:var(--text-mute);
  display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.mkpi-footer .qty-plan,.mkpi-footer .qty-act{display:flex;align-items:center;gap:4px}
.mkpi-footer .qty-badge{font-size:8px;font-weight:500;padding:1px 5px;border-radius:3px;letter-spacing:.3px}
.mkpi-footer .qty-badge.plan{background:var(--plan-bg);color:var(--plan-txt)}
.mkpi-footer .qty-badge.act{background:var(--actual-bg);color:var(--actual-txt)}
.mkpi-footer b{font-size:11px;color:var(--text);font-weight:500}

/* Delay card (4th column) */
.delay-card{background:var(--st-danger-bg);border:1px solid #F7C1C1;border-radius:var(--radius-card);padding:14px;
  position:relative;overflow:hidden;display:flex;flex-direction:column}
.delay-card::before{content:'';position:absolute;left:0;top:0;width:100%;height:3px;background:#F09595;
  border-radius:var(--radius-card) var(--radius-card) 0 0}
.delay-card-title{font-size:12px;font-weight:500;color:var(--st-danger-txt);margin-bottom:4px;line-height:1.3}
.delay-total{font-size:22px;font-weight:500;color:var(--st-danger-txt);text-align:center;margin-bottom:8px;line-height:1}
.delay-total span{font-size:10px;font-weight:400;color:#A32D2D;display:block;margin-top:2px}
.delay-list{display:flex;flex-direction:column;gap:5px;flex:1;overflow-y:auto;max-height:120px}
.delay-item{background:#FFF;border:1px solid #F7C1C1;border-radius:5px;padding:5px 8px;cursor:pointer;transition:background .12s;text-align:center}
.delay-item:hover{background:var(--p-pink)}
.delay-mo{font-size:10px;font-weight:500;color:var(--st-danger-txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.delay-style{font-size:8px;color:var(--text-mute);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.delay-badge{display:inline-block;font-size:8px;font-weight:500;padding:1px 5px;border-radius:3px;background:#FEE2E2;color:#DC2626;margin-left:4px}

/* Month section */
.mt-sec{margin-bottom:40px}
.mt-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.mt-hd{padding:10px 14px;background:#FAFAF7;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px}
.mt-title{font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:6px;letter-spacing:-.01em}
.mt-cnt{font-size:11px;color:var(--text-mute);background:#F1EFE8;padding:2px 10px;border-radius:10px;flex-shrink:0;font-weight:400;white-space:nowrap}

/* Per-month filter — single-row nowrap */
.mf-bar{padding:10px 14px;background:#FDFCF9;border-bottom:1px solid var(--border);
  display:flex;gap:6px;align-items:center;flex-wrap:nowrap;overflow-x:auto;white-space:nowrap}
.mf-bar::-webkit-scrollbar{height:4px}
.mf-bar input,.mf-bar select{background:#FFF;border:1px solid var(--border);border-radius:5px;padding:5px 10px;
  font-size:11px;font-family:inherit;outline:none;color:var(--text);flex-shrink:0;transition:border-color .15s,box-shadow .15s}
.mf-bar input:focus,.mf-bar select:focus{border-color:var(--mo-primary);box-shadow:0 0 0 2px rgba(62,87,149,.12)}
.mf-bar input.mf-search{width:220px;flex-shrink:0}
.mf-bar input.mf-search::placeholder{color:var(--text-mute)}
.mf-bar select{min-width:110px;cursor:pointer}
.mf-count{font-size:10px;color:#B4B2A9;margin-left:auto;flex-shrink:0;white-space:nowrap;padding-left:8px}

/* Card scroll area */
.card-scroll{padding:14px;overflow-x:auto}
.cards-flex{display:flex;gap:10px;min-width:min-content}

/* MO Card — 175px fixed */
.mo-card{flex:0 0 175px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-card);
  overflow:hidden;cursor:pointer;display:flex;flex-direction:column;
  transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease}
.mo-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--border-hover)}
.mo-card.delayed{background:#FFF5F5;border-color:#FECACA}
.mo-card-img{aspect-ratio:1/1;background:var(--p-lav);display:flex;align-items:center;justify-content:center;
  border-bottom:1px solid var(--border);overflow:hidden;position:relative}
.mo-card-img img{width:100%;height:100%;object-fit:cover}
.mo-stage-badge{padding:6px 10px;border-bottom:1px solid var(--border);text-align:center;font-size:10px;font-weight:500;letter-spacing:.01em}
.mo-card-body{padding:10px;display:flex;flex-direction:column;flex:1}
.mo-card-identity{padding-bottom:8px;border-bottom:1px dashed var(--border);margin-bottom:8px}
.mo-card-label{font-size:9px;color:var(--text-mute);margin-top:6px;letter-spacing:.02em;font-weight:400}
.mo-card-label:first-child{margin-top:0}
.mo-card-value{font-size:10px;color:var(--text-soft);margin-top:1px;word-break:break-all;line-height:1.3;font-weight:500}
.mo-card-value.mo-num{font-size:13px;font-weight:500;color:var(--mo-primary);letter-spacing:-.01em}
.mo-card-value.delayed-num{color:#C66B6B}
.mo-card-meta{display:flex;flex-direction:column;gap:4px;font-size:10px}
.mo-card-meta-row{display:flex;justify-content:space-between;align-items:center;gap:6px}
.mo-card-meta-row > span:first-child{color:var(--text-mute);font-weight:400;font-size:9px;white-space:nowrap;flex-shrink:0}
.mo-card-meta-row > span:last-child{color:var(--text);font-weight:500;text-align:right;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mo-card-qty-row{display:flex;justify-content:space-between;padding:3px 7px;border-radius:4px;font-size:10px}
.mo-card-qty-row.plan{background:var(--plan-bg)}
.mo-card-qty-row.plan span{color:var(--plan-txt);font-weight:500}
.mo-card-qty-row.act{background:var(--actual-bg)}
.mo-card-qty-row.act span{color:var(--actual-txt);font-weight:500}
.mo-card-order-badge{margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);text-align:center}
.mo-card-dates{margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);display:flex;flex-direction:column;gap:3px;font-size:9px}
.mo-card-dates-row{display:flex;justify-content:space-between;gap:4px}
.mo-card-dates-row > span:first-child{color:var(--text-mute);white-space:nowrap}
.mo-card-dates-row > span:last-child{color:var(--text);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mo-card-dates-row.delayed > span:last-child{color:#C66B6B;font-weight:500}

/* Stage badge colors */
.stage-notstart{background:var(--stage-notstart-bg);color:var(--stage-notstart-txt)}
.stage-fabric  {background:var(--stage-fabric-bg);color:var(--stage-fabric-txt)}
.stage-cutting {background:var(--stage-cutting-bg);color:var(--stage-cutting-txt)}
.stage-sewing  {background:var(--stage-sewing-bg);color:var(--stage-sewing-txt)}
.stage-packing {background:var(--stage-packing-bg);color:var(--stage-packing-txt)}
.stage-done    {background:var(--stage-done-bg);color:var(--stage-done-txt)}
.stage-shipped {background:var(--stage-shipped-bg);color:var(--stage-shipped-txt)}

/* Order status badge */
.order-badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:9px;font-weight:500;border:1px solid;letter-spacing:.02em;white-space:nowrap}
.order-badge.confirmed{background:var(--st-ok-bg);color:var(--st-ok-txt);border-color:#A7F3D0}
.order-badge.pending  {background:var(--st-warn-bg);color:var(--st-warn-txt);border-color:#FAC775}
.order-badge.progress {background:var(--st-info-bg);color:var(--st-info-txt);border-color:#93C5FD}
.order-badge.delivered{background:var(--st-ok-bg);color:var(--st-ok-txt);border-color:#A7F3D0}
.order-badge.delayed  {background:var(--st-danger-bg);color:var(--st-danger-txt);border-color:#F7C1C1}
.order-badge.draft    {background:var(--st-draft-bg);color:var(--st-draft-txt);border-color:#D3D1C7}

/* Pipeline — elegant glass card w/ gold accent */
.pipe-card{background:linear-gradient(180deg,#FFFFFF 0%,#FDFCF9 100%);border:1px solid var(--border);border-radius:14px;
  padding:22px 24px;margin-top:0;position:relative;overflow:hidden;border-top:none}
.pipe-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,var(--gold) 30%,var(--gold) 70%,transparent 100%);opacity:.4}
.pipe-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;
  padding-bottom:12px;border-bottom:1px dashed var(--border)}
.pipe-title{font-size:12px;font-weight:500;color:var(--text-soft);display:flex;align-items:center;gap:8px;letter-spacing:.3px}
.pipe-title-icon{width:22px;height:22px;background:linear-gradient(135deg,var(--gold),#B8956A);border-radius:5px;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;
  box-shadow:0 2px 6px rgba(201,168,110,.25)}
.pipe-summary{font-size:10px;color:var(--text-mute);font-weight:400}
.pipe-row{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding:4px 0}
.pipe-step{flex:1;min-width:105px;background:#FFFFFF;border:1px solid var(--border);border-radius:10px;
  padding:14px 10px 12px;cursor:pointer;transition:all .2s ease;text-align:center;position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.pipe-step::after{content:'';position:absolute;left:8px;right:8px;bottom:0;height:3px;border-radius:0 0 8px 8px;transition:opacity .2s}
.pipe-step:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.06);border-color:var(--gold)}
.pipe-step.empty{opacity:.45;background:#FAFAF7}
.pipe-step.active{box-shadow:0 2px 10px rgba(0,0,0,.04)}
.pipe-n{font-size:24px;font-weight:500;line-height:1;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.pipe-lb{font-size:10px;font-weight:500;color:var(--text-soft);display:flex;align-items:center;gap:4px;margin-top:2px}
.pipe-emoji{font-size:1.1em}
.pipe-sublabel{font-size:8px;color:var(--text-mute);margin-top:1px;letter-spacing:.3px}
.pipe-step[data-stage="Not Started"]::after{background:var(--stage-notstart-txt)}
.pipe-step[data-stage="Fabric"]::after    {background:var(--stage-fabric-txt)}
.pipe-step[data-stage="Cutting"]::after   {background:var(--stage-cutting-txt)}
.pipe-step[data-stage="Sewing"]::after    {background:var(--stage-sewing-txt)}
.pipe-step[data-stage="Packing"]::after   {background:var(--stage-packing-txt)}
.pipe-step[data-stage="Done"]::after      {background:var(--stage-done-txt)}
.pipe-step[data-stage="Shipped"]::after   {background:var(--stage-shipped-txt)}
.pipe-step.empty::after{opacity:.3}
.pipe-connector{display:flex;align-items:center;justify-content:center;flex:0 0 24px;color:var(--border-hover);font-size:8px;position:relative}
.pipe-connector::before{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:var(--border)}
.pipe-connector-diamond{width:6px;height:6px;background:#FFFFFF;border:1px solid var(--border-hover);transform:rotate(45deg);position:relative;z-index:1}

/* Color × Size × Price Matrix */
.csm-section{margin-bottom:28px}
.csm-tabs{display:flex;gap:6px;margin-bottom:10px;border-bottom:1px solid var(--border)}
.csm-tab{padding:8px 16px;font-size:11px;font-weight:500;cursor:pointer;border:0;background:transparent;
  color:var(--text-mute);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;
  transition:color .15s,border-color .15s}
.csm-tab:hover{color:var(--text)}
.csm-tab.active.plan{color:var(--plan-txt);border-bottom-color:var(--plan-border)}
.csm-tab.active.actual{color:var(--actual-txt);border-bottom-color:var(--actual-border)}
.csm-pane{display:none}
.csm-pane.active{display:block}
.csm-tbl{width:100%;border-collapse:collapse;font-size:11px;background:#FFF;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.csm-tbl th{padding:10px 8px;font-weight:500;font-size:10px;background:#FAFAF7;color:var(--text-mute);
  text-align:center;border-bottom:1px solid var(--border);letter-spacing:.3px}
.csm-tbl .csm-th-color{text-align:left;padding-left:14px;width:18%}
.csm-tbl .csm-th-size{width:7%}
.csm-tbl .csm-th-total{width:10%;background:var(--p-lav);color:var(--p-lav-txt)}
.csm-tbl .csm-th-price{width:10%}
.csm-tbl .csm-th-amount{width:12%;background:var(--p-sage);color:var(--p-sage-txt)}
.csm-tbl td{padding:8px;border-bottom:1px solid #F1EFE8;text-align:center;color:var(--text);font-size:11px}
.csm-tbl .csm-td-color{text-align:left;padding-left:14px;font-weight:500;color:var(--text-soft);
  display:flex;align-items:center;gap:8px}
.csm-color-dot{width:12px;height:12px;border-radius:50%;display:inline-block;flex-shrink:0;
  border:1px solid rgba(0,0,0,.1);box-shadow:inset 0 1px 2px rgba(255,255,255,.25)}
.csm-tbl .csm-td-qty{font-variant-numeric:tabular-nums}
.csm-tbl .csm-td-total{font-weight:500;color:var(--p-lav-txt);background:#FAFAFD}
.csm-tbl .csm-td-price{font-weight:400;color:var(--text-mute);font-size:10px}
.csm-tbl .csm-td-amount{font-weight:500;color:var(--p-sage-txt);background:#FAFDF7}
.csm-zero{color:#CDC9C0}
.csm-tbl tr.csm-grand td{background:#FDFCF9 !important;border-top:2px solid var(--border);padding-top:10px;padding-bottom:10px;font-size:12px}
.csm-tbl tr.csm-grand .csm-td-color{color:var(--text)}
.csm-empty{text-align:center;padding:20px;color:#B4B2A9;font-size:11px;background:#FAFAF7;border-radius:8px;border:1px dashed var(--border)}

/* ── CSM Plan vs Actual Comparison KPI (v32: readonly, auto-computed) ── */
.csm-compare{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px;padding:12px;
  background:linear-gradient(180deg,#FFFFFF 0%,#FDFCF9 100%);border:1px solid var(--border);border-radius:10px}
.csm-cmp-box{padding:12px 14px;border-radius:8px;text-align:center;border:1px solid;position:relative;
  transition:transform .15s,box-shadow .15s;min-height:92px;display:flex;flex-direction:column;justify-content:center}
.csm-cmp-box:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.csm-cmp-box.plan{background:#F5F3FF;border-color:var(--plan-border)}
.csm-cmp-box.actual{background:#ECFDF5;border-color:var(--actual-border)}
.csm-cmp-box.actual.empty{background:#FAFAF7;border-color:var(--border)}
.csm-cmp-box.rate{background:#FFFBEA;border-color:#FBEAA1}
.csm-cmp-box.rate.empty{background:#FAFAF7;border-color:var(--border)}
.csm-cmp-label{font-size:9px;font-weight:500;margin-bottom:6px;letter-spacing:.3px;display:flex;align-items:center;justify-content:center;gap:4px}
.csm-cmp-box.plan .csm-cmp-label{color:#7C3AED}
.csm-cmp-box.actual .csm-cmp-label{color:#059669}
.csm-cmp-box.actual.empty .csm-cmp-label{color:var(--text-mute)}
.csm-cmp-box.rate .csm-cmp-label{color:#92400E}
.csm-cmp-box.rate.empty .csm-cmp-label{color:var(--text-mute)}
.csm-cmp-num{font-size:24px;font-weight:500;line-height:1.1;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.csm-cmp-box.plan .csm-cmp-num{color:#6D28D9}
.csm-cmp-box.actual .csm-cmp-num{color:#047857}
.csm-cmp-box.actual.empty .csm-cmp-num{color:#B4B2A9}
.csm-cmp-box.rate .csm-cmp-num{color:#92400E}
.csm-cmp-box.rate.empty .csm-cmp-num{color:#B4B2A9}
.csm-cmp-unit{font-size:10px;font-weight:400;color:var(--text-mute);margin-left:3px}
.csm-cmp-sub{font-size:9px;color:var(--text-mute);margin-top:5px;font-variant-numeric:tabular-nums}
.csm-cmp-src{font-size:8px;color:var(--text-mute);margin-top:5px;font-style:italic;letter-spacing:.02em;

}

/* ── Inner Pack & Bulto (NEW in v30) ── */
.pack-section{margin-bottom:28px}
.pack-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pack-card{background:linear-gradient(180deg,#FFFFFF 0%,#FDFCF9 100%);border:1px solid var(--border);
  border-radius:var(--radius-card);padding:16px;position:relative;overflow:hidden}
.pack-card.inner{border-left:3px solid var(--gold)}
.pack-card.bulto{border-left:3px solid #7C3AED}
.pack-card-hd{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px dashed var(--border)}
.pack-card-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.pack-card.inner .pack-card-icon{background:linear-gradient(135deg,var(--gold),#B8956A);color:#fff}
.pack-card.bulto .pack-card-icon{background:linear-gradient(135deg,#9F7AEA,#7C3AED);color:#fff}
.pack-card-title{font-size:12px;font-weight:500;color:var(--text-soft);line-height:1.3}
.pack-card-title-sub{font-size:9px;color:var(--text-mute);margin-top:1px;font-weight:400}
.pack-kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.pack-kpi{background:#FAFAF7;border:1px solid #F1EFE8;border-radius:6px;padding:8px 10px;text-align:center}
.pack-card.inner .pack-kpi{background:#FDFBF5;border-color:#F0E5C7}
.pack-card.bulto .pack-kpi{background:#F8F5FD;border-color:#E2D4F9}
.pack-kpi-num{font-size:17px;font-weight:500;line-height:1;font-variant-numeric:tabular-nums}
.pack-card.inner .pack-kpi-num{color:#8F6F2E}
.pack-card.bulto .pack-kpi-num{color:#6D28D9}
.pack-kpi-lb{font-size:9px;color:var(--text-mute);margin-top:4px;line-height:1.3}
.pack-composition{margin-top:10px}
.pack-composition-label{font-size:9px;color:var(--text-mute);font-weight:500;margin-bottom:6px;letter-spacing:.3px}
.pack-combo-list{display:flex;flex-direction:column;gap:4px;padding-right:4px}
.pack-combo-item{display:flex;align-items:center;gap:8px;padding:5px 8px;background:#FAFAF7;border:1px solid #F1EFE8;
  border-radius:5px;font-size:10px}
.pack-combo-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.1)}
.pack-combo-color{color:var(--text-soft);font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pack-combo-size{background:#FFF;border:1px solid var(--border);padding:1px 6px;border-radius:3px;font-size:9px;font-weight:500;color:var(--text);
  font-variant-numeric:tabular-nums;flex-shrink:0}
.pack-combo-qty{font-size:9px;color:var(--text-mute);font-variant-numeric:tabular-nums;flex-shrink:0;min-width:24px;text-align:right}
.pack-empty{text-align:center;padding:16px;color:#B4B2A9;font-size:10px;background:#FAFAF7;border-radius:6px;border:1px dashed var(--border)}
.pack-summary-bar{background:linear-gradient(90deg,#FFFBEA 0%,#FDF6D9 100%);border:1px solid #FBEAA1;border-radius:6px;
  padding:8px 10px;margin-bottom:12px;font-size:10px;color:#7C5A10;display:flex;align-items:center;gap:6px}
.pack-card.bulto .pack-summary-bar{background:linear-gradient(90deg,#F5F0FF 0%,#EAE1FB 100%);border-color:#CFBBF0;color:#5B2AA6}

/* Timeline */
.tl-card{background:var(--card);border-top:1px solid var(--border);padding:14px 20px}
.tl-hd{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.tl-title{font-size:11px;font-weight:500;color:var(--text-soft);letter-spacing:.02em}
.tl-legend{display:flex;gap:8px;font-size:9px;color:var(--text-mute);align-items:center;flex-wrap:wrap}
.tl-legend span{display:flex;align-items:center;gap:3px}
.tl-type-badge{padding:2px 6px;border-radius:3px;font-size:8px;font-weight:500}
.tl-dot{width:10px;height:10px;border-radius:3px;display:inline-block}
.tl-scroll{overflow-x:auto}
.tl-tbl{width:100%;border-collapse:collapse;font-size:10px;table-layout:fixed;min-width:1000px}
.tl-tbl th,.tl-tbl td{border:1px solid #EEF2F6}
.tl-tbl th{background:#F8F8F5;color:var(--text-mute);font-weight:500;padding:6px 0;text-align:center}
.tl-tbl th.wk{background:#FEF8F8;color:#E87979}
.tl-tbl th.today{background:#FFF;color:#DC2626;font-weight:500;position:relative}
.tl-tbl th.today::before{content:'';position:absolute;left:50%;top:0;width:2px;height:100%;
  background:#DC2626;transform:translateX(-50%);z-index:3}
.tl-tbl th.today::after{content:'▼';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);
  font-size:8px;color:#DC2626;z-index:4}
.tl-tbl .info-cell{width:200px;min-width:200px;text-align:left;background:#FAFAF7;padding:6px 10px;position:sticky;left:0;z-index:2;
  border-right:2px solid var(--border)}
.tl-tbl td{padding:0;vertical-align:middle;height:24px;background:#FEFEFC}
.tl-tbl td.today-col{background:#FEFEFC;position:relative}
.tl-tbl td.today-col::before{content:'';position:absolute;left:50%;top:0;width:2px;height:100%;
  background:rgba(220,38,38,.55);transform:translateX(-50%);z-index:1;pointer-events:none}
.tl-tbl tr.mo-gap td.today-col::before{background:rgba(220,38,38,.35)}
.tl-tbl td.today-col .tl-bar{position:relative;z-index:2}
.tl-tbl tr.mo-gap td{height:20px;background:#F8F8F5 !important;border-top:2px solid #E2E8F0}
.tl-tbl tr.mo-gap .info-cell{background:#F8F8F5 !important}
.tl-bar{height:100%;border-radius:3px;display:flex;align-items:center;justify-content:center;
  font-size:7px;font-weight:500;white-space:nowrap;overflow:hidden;min-height:16px}
.pb-fab{background:repeating-linear-gradient(45deg,var(--p-lav),var(--p-lav) 4px,transparent 4px,transparent 8px);border:1px dashed #C4B5FD;color:var(--p-lav-txt)}
.pb-cut{background:repeating-linear-gradient(45deg,var(--p-butter),var(--p-butter) 4px,transparent 4px,transparent 8px);border:1px dashed #FAC775;color:var(--p-butter-txt)}
.pb-sew{background:repeating-linear-gradient(45deg,var(--p-sky),var(--p-sky) 4px,transparent 4px,transparent 8px);border:1px dashed #93C5FD;color:var(--p-sky-txt)}
.pb-pack{background:repeating-linear-gradient(45deg,var(--p-sage),var(--p-sage) 4px,transparent 4px,transparent 8px);border:1px dashed #86EFAC;color:var(--p-sage-txt)}
.pb-ship{background:repeating-linear-gradient(45deg,var(--p-blue),var(--p-blue) 4px,transparent 4px,transparent 8px);border:1px dashed #93C5FD;color:var(--p-blue-txt)}
.ab-fab{background:var(--p-lav);color:var(--p-lav-txt)}
.ab-cut{background:var(--p-butter);color:var(--p-butter-txt)}
.ab-sew{background:var(--p-sky);color:var(--p-sky-txt)}
.ab-pack{background:var(--p-sage);color:var(--p-sage-txt)}
.ab-ship{background:var(--p-blue);color:var(--p-blue-txt)}
.tl-mo-info{cursor:pointer}
.tl-mo-info:hover{background:var(--p-lav) !important}
.tl-mo-wrap{display:flex;align-items:center;gap:8px}
.tl-mo-thumb{width:38px;height:38px;background:var(--p-lav);border:1px solid var(--border);border-radius:5px;
  display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-mute);flex-shrink:0;overflow:hidden;position:relative}
.tl-mo-thumb img{width:100%;height:100%;object-fit:cover}
.tl-mo-num{font-size:11px;font-weight:500;color:var(--mo-primary)}
.tl-mo-name{font-size:9px;color:var(--text-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.tl-mo-meta{font-size:8px;color:var(--text-mute);margin-top:1px}

/* Popups (KPI, Pipeline) */
.pop-ov{display:none;position:fixed;inset:0;background:rgba(20,19,17,.45);z-index:2000;
  justify-content:center;align-items:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);padding:20px}
.pop-ov.active{display:flex}
.pop-box{background:#fff;border-radius:var(--radius);width:100%;max-width:700px;max-height:82vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .2s ease-out}
@keyframes mIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.pop-hd{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;background:#fff;z-index:10}
.pop-title{font-size:14px;font-weight:500;color:var(--mo-primary);letter-spacing:-.01em}
.pop-sub{font-size:11px;color:var(--text-mute);margin-top:2px;font-weight:400}
.pop-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:#FAFAF7;
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--text-mute);transition:background .15s,color .15s}
.pop-close:hover{background:var(--st-danger-bg);color:var(--st-danger-txt)}
.pop-body{padding:16px 20px}
.pop-item{padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;gap:10px;transition:background .15s,border-color .15s}
.pop-item:hover{background:var(--p-lav);border-color:#C4B5FD}
.pop-item-left .pi-mo{font-size:12px;font-weight:500;color:var(--mo-primary)}
.pop-item-left .pi-name{font-size:10px;color:var(--text-mute);margin-top:2px}
.pop-item-left .pi-meta{font-size:9px;color:#94A3B8;margin-top:2px}
.pop-empty{text-align:center;padding:30px;color:var(--text-mute);font-size:13px}
.dly-badge{display:inline-block;font-size:7px;font-weight:500;padding:1px 5px;border-radius:3px;
  background:#FEE2E2;color:#DC2626;margin-left:5px;letter-spacing:.04em}

/* MO detail modal */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(20,19,17,.52);z-index:3000;
  justify-content:center;align-items:center;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);padding:20px}
.modal-ov.active{display:flex}
.modal-box{background:#fff;border-radius:var(--radius);width:100%;max-width:1050px;max-height:90vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.22);animation:mIn .25s ease-out}
.m-hd{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;
  position:sticky;top:0;background:#fff;z-index:10;gap:14px;flex-wrap:wrap}
.m-title{font-size:18px;font-weight:500;color:var(--mo-primary);letter-spacing:-.02em}
.m-sub{font-size:12px;color:var(--text-mute);margin-top:2px;font-weight:400}
.m-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:#FAFAF7;
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text-mute);transition:background .15s,color .15s}
.m-close:hover{background:var(--st-danger-bg);color:var(--st-danger-txt)}
.m-body{padding:20px 24px 24px}
.m-sec{margin-bottom:24px}
.m-sec-t{font-size:12px;font-weight:500;color:var(--mo-primary);margin-bottom:12px;padding-bottom:10px;
  border-bottom:2px solid var(--p-lav);display:flex;align-items:center;gap:8px;letter-spacing:.01em}
.d-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.d-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.d-item{display:flex;flex-direction:column;gap:3px;padding:8px 10px;background:#FAFAF7;border-radius:6px;border:1px solid var(--border)}
.d-label{font-size:9px;font-weight:500;color:var(--text-mute);letter-spacing:.02em}
.d-val{font-size:12px;font-weight:400;color:var(--text);word-break:break-all;line-height:1.35}
.d-val.empty{color:#B4B2A9;font-style:italic;font-weight:400}

/* ── Hero image gallery + QR (NEW in v30) ── */
.m-hero{display:grid;grid-template-columns:1fr auto;gap:16px;margin-bottom:22px;padding-bottom:18px;border-bottom:1px dashed var(--border);align-items:flex-start}
.m-hero-imgs{display:flex;gap:10px;flex-wrap:wrap;flex:1;min-width:0}
.m-hero-img-group{display:flex;flex-direction:column;gap:6px}
.m-hero-img-label{font-size:8px;font-weight:500;color:var(--text-mute);letter-spacing:.04em;text-transform:uppercase;text-align:center}
.m-hero-img-box{width:127px;height:127px;background:var(--p-lav);border:1px solid var(--border);border-radius:10px;
  overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;
  transition:transform .15s,box-shadow .15s}
.m-hero-img-box:hover{transform:scale(1.03);box-shadow:var(--shadow-md);border-color:var(--gold)}
.m-hero-img-box img{width:100%;height:100%;object-fit:cover}
.m-hero-img-box.empty{background:#FAFAF7;cursor:default}
.m-hero-img-box.empty:hover{transform:none;box-shadow:none;border-color:var(--border)}
.m-hero-img-box .empty-icon{font-size:24px;color:#CDC9C0}

.m-hero-qr{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px;background:#FAFAF7;
  border:1px dashed var(--border);border-radius:10px;flex-shrink:0}
.m-hero-qr-label{font-size:8px;font-weight:500;color:var(--text-mute);letter-spacing:.04em}
.m-hero-qr-box{width:85px;height:85px;background:#FFF;border:1px solid var(--border);border-radius:6px;
  display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;transition:transform .15s}
.m-hero-qr-box:hover{transform:scale(1.04);border-color:var(--gold)}
.m-hero-qr-box img{max-width:100%;max-height:100%;object-fit:contain;padding:4px}
.m-hero-qr-box.empty{cursor:default}
.m-hero-qr-box.empty:hover{transform:none;border-color:var(--border)}
.m-hero-qr-box.empty .empty-icon{font-size:24px;color:#CDC9C0}
.m-hero-qr-sku{font-size:9px;color:var(--text-mute);font-family:ui-monospace,monospace;word-break:break-all;
  text-align:center;max-width:85px;line-height:1.2}

/* Plan vs Actual compare (legacy — kept in CSS but section removed from modal) */
.pa-compare{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.pa-col{border-radius:var(--radius-card);padding:14px;border:2px solid}
.pa-col.plan{border-color:var(--plan-border);background:#FDFCFF}
.pa-col.actual{border-color:var(--actual-border);background:#F0FDF9}
.pa-col-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px dashed}
.pa-col.plan .pa-col-header{border-color:var(--plan-border)}
.pa-col.actual .pa-col-header{border-color:var(--actual-border)}
.pa-badge{font-size:9px;font-weight:500;padding:3px 8px;border-radius:4px;letter-spacing:.5px;color:#fff}
.pa-badge.plan{background:#7C3AED}
.pa-badge.actual{background:#059669}

/* Schedule compare — with status colors (UPDATED in v30) */
.schedule-compare{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.schedule-col{background:#FAFAF7;border-radius:8px;padding:14px;border:1px solid var(--border)}
.schedule-col-title{font-size:12px;font-weight:500;margin-bottom:12px;padding-bottom:8px;border-bottom:2px dashed var(--border)}
.schedule-col-title.plan{color:#7C3AED}
.schedule-col-title.actual{color:#059669}
.sch-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #F1EFE8}
.sch-item:last-child{border-bottom:none}
.sch-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:500;flex-shrink:0;transition:background .15s}
/* Plan colors: gray (not yet reached) / green (reached) */
.sch-dot.plan-wait{background:#E2E8F0;color:var(--text-mute)}
.sch-dot.plan-done{background:#86EFAC;color:#065F46}
/* Actual colors: gray (not yet reached), green (filled), red (overdue with empty) */
.sch-dot.actual-wait{background:#E2E8F0;color:var(--text-mute)}
.sch-dot.actual-done{background:#86EFAC;color:#065F46}
.sch-dot.actual-overdue{background:#FCA5A5;color:#7F1D1D;animation:pulse-red 1.6s ease-in-out infinite}
@keyframes pulse-red{
  0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.45)}
  50%{box-shadow:0 0 0 5px rgba(220,38,38,0)}
}
.sch-info{flex:1;min-width:0}
.sch-label{font-size:11px;font-weight:500;color:var(--text)}
.sch-date{font-size:10px;color:var(--text-mute);margin-top:1px}
.sch-date.overdue{color:#DC2626;font-weight:500}
.sch-warn{font-size:9px;color:#DC2626;font-weight:500;margin-left:auto;padding:2px 6px;background:#FEE2E2;border-radius:3px;flex-shrink:0}

/* Tag / badge */
.tag{padding:3px 8px;border-radius:4px;font-size:9px;font-weight:500;display:inline-flex;align-items:center;white-space:nowrap;border:1px solid;letter-spacing:.02em}
.t-ok{background:var(--st-ok-bg);color:var(--st-ok-txt);border-color:#A7F3D0}
.t-wn{background:var(--st-warn-bg);color:var(--st-warn-txt);border-color:#FAC775}
.t-dg{background:var(--st-danger-bg);color:var(--st-danger-txt);border-color:#F7C1C1}
.t-dr{background:var(--st-draft-bg);color:var(--st-draft-txt);border-color:#D3D1C7}
.t-bl{background:var(--st-info-bg);color:var(--st-info-txt);border-color:#93C5FD}

/* Lightbox */
#lightboxOv{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:5000;justify-content:center;align-items:center;cursor:pointer}
#lightboxOv.active{display:flex}
#lightboxOv img{max-width:90%;max-height:90%;object-fit:contain;border-radius:8px;box-shadow:0 20px 80px rgba(0,0,0,.5)}
#lightboxOv .lb-close{position:absolute;top:20px;right:24px;color:#fff;font-size:18px;cursor:pointer;width:40px;height:40px;
  display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.15);border-radius:50%;border:0;font-family:inherit}

/* Style info modal */
.style-modal-ov{display:none;position:fixed;inset:0;background:rgba(20,19,17,.5);z-index:4000;justify-content:center;align-items:center;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);padding:20px}
.style-modal-ov.active{display:flex}
.style-modal-box{background:#fff;border-radius:var(--radius);width:100%;max-width:820px;max-height:88vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .25s ease-out}

.m-img-gallery{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.m-img-box{width:100px;height:100px;background:var(--p-lav);border:1px solid var(--border);border-radius:8px;
  overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;
  transition:transform .15s,box-shadow .15s}
.m-img-box:hover{transform:scale(1.05);box-shadow:var(--shadow-md)}

function colorToHex(name){
  if(!name) return null;
  var key = String(name).trim().toUpperCase();
  if(COLOR_MAP[key]) return COLOR_MAP[key];
  // Try removing slashes/spaces variants
  var k2 = key.replace(/[\s\-_\/]/g,"");
  for(var k in COLOR_MAP){
    if(k.replace(/[\s\-_\/]/g,"") === k2) return COLOR_MAP[k];
  }
  // Try partial match (first word)
  var first = key.split(/[\s\/\-_]+/)[0];
  if(COLOR_MAP[first]) return COLOR_MAP[first];
  return null;
}
function colorDotStyle(name){
  var hex = colorToHex(name);
  if(hex){
    return 'background:'+hex;
  }
  // Fallback: gold gradient
  return 'background:linear-gradient(135deg,var(--gold),#B8956A)';
}

/* ── Utilities ── */
function catName(v){ return (!v||v==="-") ? "-" : (CAT_MAP[v]||v); }
function mv(f,v){ return (!v||v==="-") ? "-" : (S_MAP[f]&&S_MAP[f][v]) ? S_MAP[f][v] : v; }
function cleanFactory(v){ if(!v||v==="-") return "-"; return v.replace(/^[_\s]*\d+[_\s]*/,""); }
function pd(v){
  if(!v||v==="-") return null;
  if(/^\d{4}-\d{2}-\d{2}/.test(v)) return v.substring(0,10);
  var m = v.match(/^(\d{1,2})-([A-Za-z]+)-(\d{4})/);
  if(m){
    var mo = {Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};
    return m[3]+"-"+(mo[m[2]]||"01")+"-"+(m[1].length===1?"0"+m[1]:m[1]);
  }
  return null;
}
function getModDate(r){
  var v = r["Modified_Time"]||r["Modified_Time_field"]||"";
  if(!v||v==="-") return "알 수 없음";
  var m = v.match(/^(\d{1,2})-([A-Za-z]+)-(\d{4})/);
  if(m){
    var mo = {Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};
    var day = m[1].length===1 ? "0"+m[1] : m[1];
    return m[3]+"-"+(mo[m[2]]||"01")+"-"+day;
  }
  return v.split(" ")[0];
}
function g(r,f){ var v=r[f]; if(v==null||v==="") return "-"; if(typeof v==="object"&&v.display_value) return v.display_value; return String(v); }
function escH(s){ var d=document.createElement("div"); d.textContent=String(s==null?"":s); return d.innerHTML; }
function tc(s){
  var l = (s||"").toLowerCase();
  if(l.indexOf("confirmed")>=0||l.indexOf("delivered")>=0||l.indexOf("complete")>=0||l.indexOf("shipped")>=0||l.indexOf("done")>=0) return "t-ok";
  if(l.indexOf("progress")>=0||l.indexOf("cutting")>=0||l.indexOf("sewing")>=0||l.indexOf("fabric")>=0||l.indexOf("packing")>=0) return "t-wn";
  if(l.indexOf("delay")>=0||l.indexOf("cancel")>=0) return "t-dg";
  if(l.indexOf("pending")>=0) return "t-bl";
  return "t-dr";
}
function isDelayed(r){
  var os = (g(r,"Order_Status")||"").toLowerCase();
  if(os.indexOf("delivered")>=0||os.indexOf("shipped")>=0||os.indexOf("done")>=0) return false;
  var ds = g(r,"Delivery_Status");
  return ds.indexOf("Delay")>=0||ds.indexOf("지연")>=0;
}
function getProdStage(r){
  var s = g(r,"Production_Status").toLowerCase();
  if(s.indexOf("shipped")>=0) return "Shipped";
  if(s.indexOf("complete")>=0||s.indexOf("done")>=0) return "Done";
  if(s.indexOf("packing")>=0) return "Packing";
  if(s.indexOf("sewing")>=0) return "Sewing";
  if(s.indexOf("cutting")>=0) return "Cutting";
  if(s.indexOf("fabric")>=0) return "Fabric";
  return "Not Started";
}
function getAllImgs(r,field){
  var i = r[field]; if(!i) return [];
  if(Array.isArray(i)) return i.filter(function(x){ return x&&typeof x==="string"&&x.length>5; });
  if(typeof i==="object"&&!Array.isArray(i)){
    var u = [];
    Object.keys(i).forEach(function(k){ var v=i[k]; if(v&&typeof v==="string"&&v.length>5) u.push(v); });
    return u;
  }
  if(typeof i==="string"&&i.length>5) return [i];
  return [];
}

/* ── Color × Size × Price Matrix ── */
function buildColorSizePriceMatrix(r, prefix){
  var linesField = prefix + (prefix === "Plan_" ? "MO_Lines" : "Order_Lines");
  var notesField = prefix + "Notes";
  var lines = getSubformLines(r, linesField);
  var matrix = {}, colors = [], sizeSet = {};

  function addToMatrix(color, size, qty, price){
    color = (color==null ? "-" : color).toString().trim() || "-";
    size = (size==null ? "-" : size).toString().trim().toUpperCase() || "-";
    qty = parseInt(qty) || 0;
    price = parseFloat(price) || 0;
    if(!matrix[color]){
      matrix[color] = { sizes:{}, price:price, total:0, amount:0 };
      colors.push(color);
    }
    if(price > 0 && matrix[color].price === 0) matrix[color].price = price;
    if(!matrix[color].sizes[size]) matrix[color].sizes[size] = 0;
    matrix[color].sizes[size] += qty;
    matrix[color].total += qty;
    matrix[color].amount += qty * price;
    sizeSet[size] = true;
  }

  if(lines && lines.length > 0){
    lines.forEach(function(line){
      var c = line[prefix+'Color']   || line['Color']      || line['pColor'] || line['aColor'];
      var s = line[prefix+'Sizes']   || line['Sizes']      || line['pSizes'] || line['aSizes'];
      var q = line[prefix+'Quantity']|| line['Quantity'];
      var p = line[prefix+'Unit_Price'] || line['Unit_Price'];
      if(c || s || q) addToMatrix(c, s, q, p);
    });
  }

  if(colors.length === 0){
    var notes = g(r, notesField);
    if(notes && notes !== "-"){
      notes.split(/\n+/).forEach(function(line){
        var m = line.match(/Color:\s*([^|]+)\|\s*Size:\s*([^|]+)\|\s*Qty:\s*(\d+)(?:\s*\|\s*Unit Price:\s*\$?([\d.]+))?/i);
        if(m) addToMatrix(m[1], m[2], m[3], m[4]);
      });
    }
  }

  var sizeOrder = ["XS","S","M","L","XL","XXL","XXXL","FREE","F"];
  var sizes = Object.keys(sizeSet).sort(function(a,b){
    var ia = sizeOrder.indexOf(a), ib = sizeOrder.indexOf(b);
    if(ia < 0) ia = 99;
    if(ib < 0) ib = 99;
    if(ia !== ib) return ia - ib;
    return a < b ? -1 : (a > b ? 1 : 0);
  });

  return { colors:colors, sizes:sizes, matrix:matrix };
}

/* ── CSM Plan vs Actual comparison KPI (v32: auto-computed from multiple sources) ── 
   우선순위:
   1) Acture_Order_Lines 서브폼 합계 (가장 정확)
   2) Acture_Total_Quantity 필드값
   3) Acture_Notes 멀티라인 텍스트 파싱 (Plan_Notes 동일 포맷)
   → 공장 스캔 또는 사무실에서 All_MO 수정 시 자동 반영됨 (readonly 표시)
*/
function computeActualQtyFromRecord(r){
  // Source 1: Acture_Order_Lines subform sum
  var actLines = getSubformLines(r, "Acture_Order_Lines");
  if(actLines && actLines.length > 0){
    var sum1 = 0, hasData = false;
    actLines.forEach(function(line){
      var q = parseInt(line["Acture_Quantity"] || line["Quantity"] || line["aQuantity"]) || 0;
      if(q > 0) hasData = true;
      sum1 += q;
    });
    if(hasData) return { qty:sum1, source:"Subform" };
  }
  
  // Source 2: Acture_Total_Quantity field directly
  var totalField = parseInt(g(r,"Acture_Total_Quantity")) || 0;
  if(totalField > 0) return { qty:totalField, source:"Total field" };
  
  // Source 3: Parse Acture_Notes (same format as Plan_Notes)
  var notes = g(r, "Acture_Notes");
  if(notes && notes !== "-"){
    var sum3 = 0, matched = false;
    notes.split(/\n+/).forEach(function(line){
      var m = line.match(/Qty:\s*(\d+)/i);
      if(m){ sum3 += parseInt(m[1]) || 0; matched = true; }
    });
    if(matched && sum3 > 0) return { qty:sum3, source:"Notes" };
  }
  
  return { qty:0, source:"Empty" };
}

function renderCsmCompare(r){
  var planQty = parseInt(g(r,"Plan_Total_Quantity")) || 0;
  var actual = computeActualQtyFromRecord(r);
  var actQty = actual.qty;

  var sourceLabel = "";
  switch(actual.source){
    case "Subform":     sourceLabel = "서브폼 집계 / 子表汇总"; break;
    case "Total field": sourceLabel = "Acture_Total_Quantity"; break;
    case "Notes":       sourceLabel = "Acture_Notes 파싱 / 备注解析"; break;
    default:            sourceLabel = "데이터 없음 / 暂无数据";
  }

  var rate = planQty > 0 ? (actQty / planQty * 100) : 0;
  var rateStr = planQty > 0 ? rate.toFixed(1) + '%' : '-';
  var diff = actQty - planQty;
  var diffStr = planQty > 0 ? (diff > 0 ? '+' : '') + diff.toLocaleString() + ' pcs' : '-';

  var rateClass = '';
  if(planQty > 0 && actQty > 0){
    if(rate >= 100) rateClass = actQty > planQty ? 'over' : 'full';
    else rateClass = 'under';
  } else {
    rateClass = 'empty';
  }

  var actBoxClass = actQty === 0 ? 'actual empty' : 'actual';

  var h = '<div class="csm-compare">';

  // Plan (오더 수량)
  h += '<div class="csm-cmp-box plan">';
  h += '<div class="csm-cmp-label">📋 PLAN 오더 수량 / 订单数量</div>';
  h += '<div class="csm-cmp-num">'+planQty.toLocaleString()+'<span class="csm-cmp-unit">pcs</span></div>';
  h += '<div class="csm-cmp-src">Plan_Total_Quantity</div>';
  h += '</div>';

  // Actual (실출고 수량 - 자동 집계, readonly)
  h += '<div class="csm-cmp-box '+actBoxClass+'">';
  h += '<div class="csm-cmp-label">✅ ACTUAL 실출고 수량 / 实出货数量</div>';
  h += '<div class="csm-cmp-num">'+actQty.toLocaleString()+'<span class="csm-cmp-unit">pcs</span></div>';
  h += '<div class="csm-cmp-src">'+escH(sourceLabel)+'</div>';
  h += '</div>';

  // Rate (출고율)
  h += '<div class="csm-cmp-box rate '+rateClass+'">';
  h += '<div class="csm-cmp-label">📊 출고율 / 出货率</div>';
  h += '<div class="csm-cmp-num">'+rateStr+'</div>';
  h += '<div class="csm-cmp-sub">'+diffStr+'</div>';
  h += '</div>';

  h += '</div>';
  return h;
}

  if(!s.startsWith("[")) s = "[" + s + "]";
  try { return JSON.parse(s) || []; } catch(e){ console.warn("Assortment JSON parse failed", e); return []; }

/* ── Schedule status helpers (NEW in v30) ── */
function getPlanDotClass(dateStr){
  // Plan: gray if date not reached yet, green if reached
  var p = pd(dateStr);
  if(!p) return 'plan-wait';
  return p <= todayStr ? 'plan-done' : 'plan-wait';
}
function getActualDotClass(actualDate, planDate){
  // Actual:
  //   - If actual filled → green (done)
  //   - If actual empty AND plan date passed → red (overdue)
  //   - If actual empty AND plan not yet reached → gray (wait)
  var a = pd(actualDate);
  if(a) return 'actual-done';
  var p = pd(planDate);
  if(p && p < todayStr) return 'actual-overdue';
  return 'actual-wait';
}

/* ── Month helpers ── */
function parseYM(key){
  var m = key.match(/(\d+)년\s*(\d+)월/);
  if(!m) return null;
  var y = parseInt(m[1]);
  if(y<100) y += 2000;
  return { y:y, m:parseInt(m[2]) };
}
function sortMonthKeys(keys){
  return keys.slice().sort(function(a,b){
    var pa = parseYM(a), pb = parseYM(b);
    if(!pa && !pb) return a < b ? -1 : (a > b ? 1 : 0);
    if(!pa) return 1;
    if(!pb) return -1;
    if(pa.y !== pb.y) return pa.y - pb.y;
    return pa.m - pb.m;
  });
}
function buildMonthGroups(){
  monthGroups = {};
  monthFiltered = {};
  allRec.forEach(function(r){
    var py = g(r,"Plan_Year"), pm = g(r,"Plan_Month");
    var key = (py!=="-" && pm!=="-") ? (py+"년 "+pm+"월") : "미지정";
    if(!monthGroups[key]) monthGroups[key] = [];
    monthGroups[key].push(r);
  });
  Object.keys(monthGroups).forEach(function(k){ monthFiltered[k] = monthGroups[k].slice(); });
}

/* ── Safe image loader (Zoho SDK) ── */
var _safeQ = [], _safeBusy = false;
function _runSafeQ(){
  if(_safeQ.length===0){ _safeBusy=false; return; }
  _safeBusy = true;
  var task = _safeQ.shift();
  var el = task.id ? document.getElementById(task.id) : task.el;
  if(!el){ setTimeout(_runSafeQ,50); return; }
  var img = document.createElement("img");
  img.style.cssText = task.css || "width:100%;height:100%;object-fit:cover";
  if(task.clk) img.onclick = function(e){ e.stopPropagation(); openLightbox(this.src); };
  var done = false;
  function next(){ if(done) return; done=true; setTimeout(_runSafeQ,100); }
  try{
    ZOHO.CREATOR.UTIL.setImageData(img, task.url, function(){ el.innerHTML=""; el.appendChild(img); next(); });
    setTimeout(next, 4000);
  }catch(e){ next(); }
}
function qImg(elOrId, url, css, clk){
  _safeQ.push({
    id: typeof elOrId==="string" ? elOrId : null,
    el: typeof elOrId==="object" ? elOrId : null,
    url: url, css: css, clk: !!clk
  });
  if(!_safeBusy) _runSafeQ();
}
function loadTlImgs(){
  var els = document.querySelectorAll("[data-tlimg]");
  if(els.length===0) return;
  if("IntersectionObserver" in window){
    var obs = new IntersectionObserver(function(entries, o){
      entries.forEach(function(ent){
        if(ent.isIntersecting){
          var el = ent.target, url = el.getAttribute("data-tlimg");
          if(url) qImg(el, url, "width:100%;height:100%;object-fit:cover", false);
          el.removeAttribute("data-tlimg");
          o.unobserve(el);
        }
      });
    }, { rootMargin: "300px" });
    els.forEach(function(el){ obs.observe(el); });
  } else {
    els.forEach(function(el){
      var url = el.getAttribute("data-tlimg");
      if(url) qImg(el, url, "width:100%;height:100%;object-fit:cover", false);
      el.removeAttribute("data-tlimg");
    });
  }
}

function buildKpiCard(key, stripeIdx){
  var items = monthGroups[key];

  var title = ym ? (yy+"."+mm+" 생산 KPI / "+yy+"年 "+ym.m+"月 生产 KPI") : "생산 KPI";

  var tot = items.length, ip = 0, dl = 0, dv = 0, planQty = 0, actQty = 0;
  items.forEach(function(r){
    var os = (g(r,"Order_Status")||"").toLowerCase();
    if(os.indexOf("progress")>=0) ip++;
    if(isDelayed(r)) dl++;
    if(os.indexOf("delivered")>=0||os.indexOf("shipped")>=0) dv++;
    planQty += parseInt(g(r,"Plan_Total_Quantity")) || 0;
    actQty  += parseInt(g(r,"Acture_Total_Quantity")) || 0;
  });

  var pct = planQty > 0 ? Math.round((actQty / planQty) * 100) : 0;
  var color = KPI_RING_COLORS[stripeIdx % KPI_RING_COLORS.length];
  var stripe = KPI_TOP_STRIPE_COLORS[stripeIdx % KPI_TOP_STRIPE_COLORS.length];
  var r26 = 26, circ = 2 * Math.PI * r26;
  var offset = circ - (pct/100) * circ;
  var keyEnc = encodeURIComponent(key);

  var h = '<div class="mkpi-card" style="--stripe:'+stripe+'">';
  h += '<div class="mkpi-header"><div class="mkpi-title">📅 '+escH(title)+'</div></div>';
  h += '<div class="mkpi-body">';
  h += '<div class="mkpi-ring"><svg width="64" height="64" viewBox="0 0 64 64">';
  h += '<circle cx="32" cy="32" r="'+r26+'" fill="none" stroke="#F1EFE8" stroke-width="5"/>';
  h += '<circle cx="32" cy="32" r="'+r26+'" fill="none" stroke="'+color+'" stroke-width="5" stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'" stroke-linecap="round"/>';
  h += '</svg><div class="mkpi-ring-pct" style="color:'+color+'">'+pct+'%</div></div>';
  h += '<div class="mkpi-stats">';
  h += '<div class="mkpi-stat" onclick="openKpiPop(\''+keyEnc+'\',\'all\')"><div class="mkpi-stat-n" style="color:#6366F1">'+tot+'</div><div class="mkpi-stat-l"><span class="dot" style="background:#A5B4FC"></span>총 오더 / 总订单</div></div>';
  h += '<div class="mkpi-stat" onclick="openKpiPop(\''+keyEnc+'\',\'ip\')"><div class="mkpi-stat-n" style="color:#854F0B">'+ip+'</div><div class="mkpi-stat-l"><span class="dot" style="background:#FAC775"></span>진행중 / 进行中</div></div>';
  h += '<div class="mkpi-stat" onclick="openKpiPop(\''+keyEnc+'\',\'dv\')"><div class="mkpi-stat-n" style="color:#065F46">'+dv+'</div><div class="mkpi-stat-l"><span class="dot" style="background:#9FE1CB"></span>출고완료 / 已出货</div></div>';
  h += '<div class="mkpi-stat" onclick="openKpiPop(\''+keyEnc+'\',\'dl\')"><div class="mkpi-stat-n" style="color:#A32D2D">'+dl+'</div><div class="mkpi-stat-l"><span class="dot" style="background:#F7C1C1"></span>지연 / 延误</div></div>';
  h += '</div></div>';
  h += '<div class="mkpi-footer">';
  h += '<div class="qty-plan"><span class="qty-badge plan">PLAN</span> 오더수량 <b>'+planQty.toLocaleString()+' pcs</b></div>';
  h += '<div class="qty-act"><span class="qty-badge act">ACT</span> 출고수량 <b>'+actQty.toLocaleString()+' pcs</b></div>';
  h += '</div></div>';
  return h;
}

/* ── KPI popover ── */
function openKpiPop(keyEnc, type){
  var key = decodeURIComponent(keyEnc);
  var items = monthGroups[key] || [];
  var typeNames = { all:"총 오더 / 总订单", ip:"진행중 / 进行中", dl:"지연 / 延误", dv:"출고완료 / 已出货" };
  var filtered = items.filter(function(r){
    var os = (g(r,"Order_Status")||"").toLowerCase();
    if(type==="all") return true;
    if(type==="ip") return os.indexOf("progress")>=0;
    if(type==="dl") return isDelayed(r);
    if(type==="dv") return os.indexOf("delivered")>=0||os.indexOf("shipped")>=0;
    return true;
  });
  document.getElementById("kpiPopTitle").textContent = key + " — " + typeNames[type];
  document.getElementById("kpiPopSub").textContent = "총 " + filtered.length + "건 / 共 " + filtered.length + " 件";

    filtered.forEach(function(r){

/* ── Pipeline ── */
function renderLocalPipeline(idx, items){
  var stages = ["Not Started","Fabric","Cutting","Sewing","Packing","Done","Shipped"];
  var emojis = ["⏳","🧵","✂️","🪡","📦","✅","🚚"];
  var colors = {
    "Not Started":"var(--stage-notstart-txt)",
    "Fabric":"var(--stage-fabric-txt)",
    "Cutting":"var(--stage-cutting-txt)",
    "Sewing":"var(--stage-sewing-txt)",
    "Packing":"var(--stage-packing-txt)",
    "Done":"var(--stage-done-txt)",
    "Shipped":"var(--stage-shipped-txt)"
  };
  var labelsKR = ["미시작","원단","재단","봉제","포장","완료","출고"];
  var labelsCN = ["未开始","面料","裁剪","车缝","包装","完成","出货"];
  var counts = [0,0,0,0,0,0,0];
  items.forEach(function(r){ var i = stages.indexOf(getProdStage(r)); if(i>=0) counts[i]++; });
  var total = counts.reduce(function(s,n){ return s+n; }, 0);

  var h = "";
  stages.forEach(function(s, i){
    if(i>0){
      h += '<div class="pipe-connector"><div class="pipe-connector-diamond"></div></div>';
    }
    var isEmpty = counts[i] === 0;
    var stateClass = isEmpty ? "empty" : "active";
    h += '<div class="pipe-step '+stateClass+'" data-stage="'+s+'" onclick="openPipePop(\''+s+'\','+idx+')">';
    h += '<div class="pipe-n" style="color:'+colors[s]+'">'+counts[i]+'</div>';
    h += '<div class="pipe-lb"><span class="pipe-emoji">'+emojis[i]+'</span>'+labelsKR[i]+'</div>';
    h += '<div class="pipe-sublabel">'+labelsCN[i]+'</div>';
    h += '</div>';
  });

  var el = document.getElementById("pipeRow_"+idx);
  if(el) el.innerHTML = h;

  var summaryEl = document.querySelector('[data-pipe-summary="'+idx+'"]');
  if(summaryEl){
    var activeStages = counts.filter(function(n){ return n > 0; }).length;
    summaryEl.textContent = '총 '+total+'건 · '+activeStages+'개 단계 진행 / 共 '+total+'件 · '+activeStages+'个阶段';
  }
}

/* ── Filter binding ── */
function bindMonthFilters(){
  document.querySelectorAll('.mf-bar').forEach(function(bar){
    var mi = bar.getAttribute('data-m');
    var search = bar.querySelector('.mf-search');
    if(search) search.addEventListener('input', function(){ applyMonthFilter(mi); });
    ['.mf-category','.mf-factory','.mf-prod','.mf-order'].forEach(function(sel){
      var el = bar.querySelector(sel);
      if(el) el.addEventListener('change', function(){ applyMonthFilter(mi); });
    });
  });
}

function applyMonthFilter(mi){
  var bar = document.querySelector('.mf-bar[data-m="'+mi+'"]');
  if(!bar) return;
  var q  = bar.querySelector('.mf-search').value.toLowerCase().trim();
  var fc = bar.querySelector('.mf-category').value;
  var ff = bar.querySelector('.mf-factory').value;
  var fp = bar.querySelector('.mf-prod').value;
  var fo = bar.querySelector('.mf-order').value;

  var sec = document.getElementById('ms'+mi);
  var monthKey = sec ? sec.getAttribute('data-month') : null;
  if(!monthKey) return;
  var source = monthGroups[monthKey] || [];

  var filtered = source.filter(function(r){
    if(q){
      var hay = (g(r,"MO_Number")+" "+g(r,"Style_SKU")+" "+g(r,"Style_Name")+" "+g(r,"Factory")).toLowerCase();
      if(hay.indexOf(q) < 0) return false;
    }
    if(fc && g(r,"Category")          !== fc) return false;
    if(ff && g(r,"Factory")           !== ff) return false;
    if(fp && g(r,"Production_Status") !== fp) return false;
    if(fo && g(r,"Order_Status")      !== fo) return false;
    return true;
  });

  var wrap = document.querySelector('[data-cards-m="'+mi+'"]');
  if(wrap){
    var html = "";
    filtered.forEach(function(r){ html += buildMoCardHTML(r); });
    wrap.innerHTML = html;
  }

  var cntEl = document.querySelector('[data-mf-count="'+mi+'"]');
  if(cntEl) cntEl.textContent = filtered.length + ' / ' + source.length;
  var mcEl = document.getElementById('mc'+mi);
  if(mcEl) mcEl.textContent = filtered.length + ' MOs';

  window['visible_mo_'+mi] = filtered;
  renderLocalPipeline(mi, filtered);

  setTimeout(loadTlImgs, 100);
}

/* ── Timeline ── */
function buildTimeline(items, yr, mo, label, idx){
  var daysInMonth = new Date(yr, mo, 0).getDate();
  var curMM = yr + "-" + (mo<10?"0":"") + mo;
  var todayD = (today.getFullYear()===yr && today.getMonth()+1===mo) ? today.getDate() : 0;
  var yy = yr.toString().slice(-2);
  var mm = mo<10 ? "0"+mo : mo;
  var title = yy+"."+mm+" 생산 타임라인 / "+yy+"年 "+mo+"月 生产排期";
  var h = '<div class="tl-card"><div class="tl-hd"><div class="tl-title">📊 '+escH(title)+'</div>';
  h += '<div class="tl-legend">';
  h += '<span class="tl-type-badge" style="background:#F5F3FF;color:#7C3AED;border:1px dashed #C4B5FD">P = Plan</span>';
  h += '<span class="tl-type-badge" style="background:#ECFDF5;color:#047857">A = Actual</span>';
  h += '<span><span class="tl-dot" style="background:#DDD6FE"></span>Fab</span>';
  h += '<span><span class="tl-dot" style="background:#FEF3C7;border:1px solid #FDE68A"></span>Cut</span>';
  h += '<span><span class="tl-dot" style="background:#E0F2FE;border:1px solid #BAE6FD"></span>Sew</span>';
  h += '<span><span class="tl-dot" style="background:#D1FAE5;border:1px solid #A7F3D0"></span>Pack</span>';
  h += '<span><span class="tl-dot" style="background:#BFDBFE"></span>Ship</span>';
  h += '</div></div>';
  h += '<div class="tl-scroll"><table class="tl-tbl"><thead><tr><th class="info-cell">MO / Style</th>';
  for(var d=1; d<=daysInMonth; d++){
    var dt = new Date(yr, mo-1, d), dow = dt.getDay();
    var cls = (dow===0||dow===6) ? "wk" : "";
    if(d === todayD) cls = "today";
    h += '<th class="'+cls+'">'+d+'</th>';
  }
  h += '</tr></thead><tbody>';

  var hasAny = false, first = true;
  items.forEach(function(r){
    var fields = ["Plan_Fabric_Date","Plan_Cutting_Start","Plan_Cutting_End","Plan_Sewing_Start","Plan_Sewing_End","Plan_Packing_Start","Plan_Packing_End","Fabric_In_house_Date","Cutting_Start_Date","Cutting_End_Date","Sewing_Start_Date","Sewing_Completion_Date","Packing_Start_Date","Packing_End_Date","Ship_Date"];
    var inMonth = false;
    fields.forEach(function(f){ var p = pd(g(r,f)); if(p && p.substring(0,7) === curMM) inMonth = true; });
    var edp = pd(g(r,"Expected_Delivery"));
    if(edp && edp.substring(0,7) === curMM) inMonth = true;
    if(!inMonth) return;
    hasAny = true;

    var attr = ' data-m="'+idx+'" data-id="'+r["ID"]+'"';
    if(!first){
      h += '<tr class="mo-gap"'+attr+'><td class="info-cell"></td>';
      for(var gd=1; gd<=daysInMonth; gd++){ h += '<td'+((gd===todayD)?' class="today-col"':'')+'></td>'; }
      h += '</tr>';
    }
    first = false;

    var pq = parseInt(g(r,"Plan_Total_Quantity"))||0;
    var iu = getImg1(r);
    var ia = iu ? ' data-tlimg="'+escH(iu)+'"' : '';
    h += '<tr'+attr+'><td class="info-cell tl-mo-info" rowspan="2" data-id="'+r["ID"]+'">';
    h += '<div class="tl-mo-wrap"><div class="tl-mo-thumb"'+ia+'>👕</div>';
    h += '<div><div class="tl-mo-num">'+escH(g(r,"MO_Number"))+'</div>';
    h += '<div class="tl-mo-name">'+escH(g(r,"Style_Name"))+'</div>';
    h += '<div class="tl-mo-meta">'+escH(cleanFactory(g(r,"Factory")))+' · <span style="color:#6D28D9;font-weight:500">P:'+pq.toLocaleString()+'</span>pcs</div>';
    h += '</div></div></td>';

    var pF = dayInMo(g(r,"Plan_Fabric_Date"), curMM);
    var pCS = dayInMo(g(r,"Plan_Cutting_Start"), curMM);
    var pCE = dayInMo(g(r,"Plan_Cutting_End"), curMM);
    var pSS = dayInMo(g(r,"Plan_Sewing_Start"), curMM);
    var pSE = dayInMo(g(r,"Plan_Sewing_End"), curMM);
    var pPS = dayInMo(g(r,"Plan_Packing_Start"), curMM);
    var pPE = dayInMo(g(r,"Plan_Packing_End"), curMM);
    var pSh = dayInMo(g(r,"Expected_Delivery"), curMM);
    h += buildBarRow(daysInMonth, todayD, pF, pCS, pCE, pSS, pSE, pPS, pPE, pSh, true) + '</tr>';

    var aF = dayInMo(g(r,"Fabric_In_house_Date"), curMM);
    var aCS = dayInMo(g(r,"Cutting_Start_Date"), curMM);
    var aCE = dayInMo(g(r,"Cutting_End_Date"), curMM);
    var aSS = dayInMo(g(r,"Sewing_Start_Date"), curMM);
    var aSE = dayInMo(g(r,"Sewing_Completion_Date"), curMM);
    var aPS = dayInMo(g(r,"Packing_Start_Date"), curMM);
    var aPE = dayInMo(g(r,"Packing_End_Date"), curMM);
    var aSh = dayInMo(g(r,"Ship_Date"), curMM);
    h += '<tr'+attr+'>' + buildBarRow(daysInMonth, todayD, aF, aCS, aCE, aSS, aSE, aPS, aPE, aSh, false) + '</tr>';
  });
  if(!hasAny){
    h += '<tr><td class="info-cell" colspan="'+(daysInMonth+1)+'" style="text-align:center;padding:16px;color:#94A3B8;font-size:10px">이 달에 해당하는 일정이 없습니다 / 本月暂无日程</td></tr>';
  }
  h += '</tbody></table></div></div>';
  return h;
}

function dayInMo(v, curMM){
  var p = pd(v);
  if(!p || p.substring(0,7) !== curMM) return 0;
  return parseInt(p.substring(8,10)) || 0;
}

function buildBarRow(days, todayD, fab, cs, ce, ss, se, ps, pe, ship, isPlan){
  var pf = isPlan ? "pb" : "ab";
  var map = new Array(days+2);
  for(var i=0; i<=days+1; i++) map[i] = null;
  if(fab>0 && fab<=days) map[fab] = "fab";
  if(cs>0){ for(var i=cs; i<=(ce||cs) && i<=days; i++) map[i] = "cut"; }
  if(ss>0){ for(var i=ss; i<=(se||ss) && i<=days; i++) map[i] = "sew"; }
  if(ps>0){ for(var i=ps; i<=(pe||ps) && i<=days; i++) map[i] = "pack"; }
  if(ship>0 && ship<=days) map[ship] = "ship";
  var lb = {fab:"FAB",cut:"CUT",sew:"SEW",pack:"PACK",ship:"SHIP"};
  var h = "", d = 1;
  while(d <= days){
    var t = map[d];
    var tc2 = (d === todayD) ? ' class="today-col"' : '';
    if(!t){ h += '<td'+tc2+'></td>'; d++; }
    else {
      var sp = 1;
      while(d+sp <= days && map[d+sp] === t) sp++;
      h += '<td'+(sp>1?' colspan="'+sp+'"':'')+tc2+'><div class="tl-bar '+pf+'-'+t+'">'+lb[t]+'</div></td>';
      d += sp;
    }
  }
  return h;
}

/* ── Size Spec helpers (NEW in v33) ── */
function parseSpecJSON(r, field){
  var raw = r[field];
  if(!raw || typeof raw !== "string") return [];
  var s = raw.trim();
  if(!s) return [];
  if(!s.startsWith("[")) s = "[" + s + "]";
  try{ return JSON.parse(s) || []; }catch(e){ return []; }
}

function renderSpecTable(items){
  if(!items || items.length === 0)
    return '<div class="spec-empty">데이터 없음 / 无数据</div>';
  var sizeKeys = ['s','m','l','xl'];
  var sizeLabels = {s:'S', m:'M', l:'L', xl:'XL'};
  var activeSizes = sizeKeys.filter(function(k){
    return items.some(function(row){ return row[k] && row[k] !== ""; });
  });
  var hasNotes = items.some(function(row){ return row.notes && row.notes !== ""; });
  var h = '<table class="spec-tbl"><thead><tr>';
  h += '<th class="spec-th-pom">POM / 측정부위 / 测量部位</th>';
  activeSizes.forEach(function(k){ h += '<th>'+sizeLabels[k]+'</th>'; });
  if(hasNotes) h += '<th class="spec-th-notes">비고 / 备注</th>';
  h += '</tr></thead><tbody>';
  items.forEach(function(row){
    if(!row.pom) return;
    h += '<tr><td class="spec-td-pom">'+escH(row.pom)+'</td>';
    activeSizes.forEach(function(k){
      var v = row[k];
      h += '<td>'+(v && v !== '' ? escH(String(v)) : '<span style="color:#CDC9C0">-</span>')+'</td>';
    });
    if(hasNotes) h += '<td class="spec-td-notes">'+escH(row.notes||'')+'</td>';
    h += '</tr>';
  });
  h += '</tbody></table>';
  return h;
}

function renderSizeSpecs(r){
  var topItems = parseSpecJSON(r, "Top_Spec_JSON");
  var botItems = parseSpecJSON(r, "Bottom_Spec_JSON");
  if(topItems.length === 0 && botItems.length === 0)
    return '<div class="spec-empty">사이즈 스펙 없음 / 无尺寸规格</div>';
  var h = '';
  if(topItems.length > 0){
    h += '<div class="spec-group">';
    h += '<div class="spec-group-title">TOP / 상의 / 上衣</div>';
    h += renderSpecTable(topItems);
    h += '</div>';
  }
  if(botItems.length > 0){
    h += '<div class="spec-group">';
    h += '<div class="spec-group-title">BOTTOM / 하의 / 下衣</div>';
    h += renderSpecTable(botItems);
    h += '</div>';
  }
  return h;
}

function toggleSpec(el){
  var content = el.nextElementSibling;
  var icon = el.querySelector('.spec-toggle-icon');
  if(!content) return;
  var isOpen = content.classList.contains('open');
  content.classList.toggle('open', !isOpen);
  if(icon) icon.classList.toggle('open', !isOpen);
}
