<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MO View v38 (Final Subform & Fast Img)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://js.zohostatic.com/creator/widgets/version/1.0/widgetsdk-min.js"></script>
<style>
:root{--pr:#1E3A8A;--ac:#3B82F6;--bg:#F1F5F9;--bd:#E2E8F0;--tx:#0F172A;--tm:#64748B;--cw:#FFF;--ok:#10B981;--wn:#F59E0B;--dg:#EF4444;--dr:#94A3B8}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans KR',-apple-system,sans-serif}
body{background:var(--bg);min-height:100vh}
.main-app{padding:16px}
.spinner{width:40px;height:40px;border:4px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
.spinner-sm{width:20px;height:20px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;color:var(--tm);font-size:13px;font-weight:600}

.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:17px;font-weight:900;color:var(--tx);display:flex;align-items:center;gap:8px}
.hdr h1 .ic{width:28px;height:28px;background:var(--pr);border-radius:5px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:900}
.hdr-btns{display:flex;gap:8px;align-items:center}
.btn-primary{background:#A5B4FC;color:#1E1B4B;border:none;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer}
.btn-cctv{background:#C4B5FD;color:#4C1D95;border:none;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer}
.btn-cctv:hover{background:#A78BFA}
.btn-primary:hover{background:#818CF8}

.mkpi-row{display:grid;grid-template-columns:1fr 1fr 1fr 420px;gap:12px;margin-bottom:21px}
.mkpi-card{background:var(--cw);border:1px solid var(--bd);border-radius:10px;padding:14px;position:relative;overflow:hidden}
.mkpi-card::before{content:'';position:absolute;left:0;top:0;width:100%;height:3px}
.mkpi-card:nth-child(1)::before{background:#A5B4FC}
.mkpi-card:nth-child(2)::before{background:#FDE68A}
.mkpi-card:nth-child(3)::before{background:#A7F3D0}
.mkpi-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mkpi-title{font-size:15px;font-weight:800;color:var(--tx)}
.mkpi-body{display:flex;align-items:center;gap:16px}
.mkpi-ring{position:relative;width:80px;height:80px;flex-shrink:0}
.mkpi-ring svg{transform:rotate(-90deg)}
.mkpi-ring-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:16px;font-weight:900;color:var(--tx)}
.mkpi-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;flex:1}
.mkpi-stat{text-align:center;padding:6px 5px;border-radius:6px;background:#FAFBFC;border:1px solid #F1F5F9;cursor:pointer;transition:background .15s}
.mkpi-stat:hover{background:#EFF6FF;border-color:#BFDBFE}
.mkpi-stat-n{font-size:20px;font-weight:900;line-height:1}
.mkpi-stat-l{font-size:10px;font-weight:700;color:var(--tm);margin-top:4px;line-height:1.3}
.mkpi-stat .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.mkpi-footer{margin-top:12px;padding-top:10px;border-top:1px solid #F1F5F9;font-size:11px;color:var(--tm);display:flex;justify-content:center;gap:16px}
.mkpi-footer .qty-plan{display:flex;align-items:center;gap:5px}
.mkpi-footer .qty-act{display:flex;align-items:center;gap:5px}
.mkpi-footer .qty-badge{font-size:8px;font-weight:800;padding:1px 5px;border-radius:3px}
.mkpi-footer .qty-badge.plan{background:#EDE9FE;color:#6D28D9}
.mkpi-footer .qty-badge.act{background:#D1FAE5;color:#065F46}
.mkpi-footer b{font-size:12px;color:var(--tx);font-weight:800}

.delay-card{background:#FFF5F5;border:1px solid #FECACA;border-radius:10px;padding:14px;position:relative;overflow:hidden;display:flex;flex-direction:column}
.delay-card::before{content:'';position:absolute;left:0;top:0;width:100%;height:3px;background:#FCA5A5}
.delay-card-title{font-size:12px;font-weight:800;color:#DC2626;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.delay-total{font-size:22px;font-weight:900;color:#DC2626;text-align:center;margin-bottom:8px}
.delay-total span{font-size:10px;font-weight:600;color:#EF4444;display:block;margin-top:2px}
.delay-list{display:flex;flex-direction:column;gap:5px;flex:1;overflow-y:auto}
.delay-item{background:#fff;border:1px solid #FECACA;border-radius:6px;padding:6px 8px;cursor:pointer;transition:background .1s;text-align:center}
.delay-item:hover{background:#FEF2F2}
.delay-mo{font-size:10px;font-weight:800;color:#DC2626}
.delay-style{font-size:8px;color:#64748B;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.delay-badge{display:inline-block;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;background:#FEE2E2;color:#DC2626;margin-left:4px}

.pipe-card{background:var(--cw);border:1px solid var(--bd);border-radius:8px;padding:22px 20px;margin-bottom:21px}
.pipe-title{font-size:13px;font-weight:800;color:var(--tm);text-transform:uppercase;margin-bottom:14px;letter-spacing:.5px}
.pipe-row{display:flex;align-items:center;gap:4px;overflow-x:auto}
.pipe-step{flex:1;text-align:center;min-width:90px;padding:14px 6px;border-radius:8px;cursor:pointer;transition:transform .1s,box-shadow .1s}
.pipe-step:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.pipe-n{font-size:26px;font-weight:900;line-height:1}
.pipe-lb{font-size:12px;font-weight:800;margin-top:5px;line-height:1.3;display:flex;align-items:center;justify-content:center}
.pipe-emoji{font-size:1.3em;margin-right:4px}
.pipe-bar{height:5px;border-radius:2px;margin-top:8px}
.pipe-arr{color:#CBD5E1;font-size:12px;flex-shrink:0}

.search-box{background:#fff;border:1px solid var(--bd);border-radius:6px;padding:5px 10px;font-size:11px;outline:none;font-family:inherit;width:180px}
.search-box:focus{border-color:var(--ac);box-shadow:0 0 0 2px rgba(59,130,246,.1)}
.fsel{background:#fff;border:1px solid var(--bd);border-radius:6px;padding:5px 8px;font-size:11px;outline:none;font-family:inherit;cursor:pointer;max-width:200px}
.mt-sec{margin-bottom:83px}
.mt-card{background:var(--cw);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.mt-hd{padding:10px 16px;background:#F8FAFC;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.mt-title{font-size:16px;font-weight:800;color:var(--tx)}
.mt-cnt{font-size:11px;color:var(--tm);font-weight:600;background:#F1F5F9;padding:2px 8px;border-radius:10px;border:1px solid #CBD5E1}
.mf-bar{display:flex;justify-content:flex-end;align-items:center;padding:8px 16px;gap:8px;background:#FAFBFC;border-bottom:1px solid var(--bd);flex-wrap:wrap}
.tbl-scroll{overflow-x:auto}
table.zt{width:100%;border-collapse:collapse;font-size:11px;text-align:left;table-layout:fixed}
.zt th{background:#F1F5F9;padding:9px 8px;color:var(--tm);font-weight:800;font-size:10px;border-bottom:1px solid var(--bd);white-space:nowrap;text-align:center}
.zt th:nth-child(1),.zt th:nth-child(2),.zt th:nth-child(3){text-align:left}
.zt td{padding:10px 8px;border-bottom:1px solid #F1F5F9;color:var(--tx);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;height:40px;text-align:center}
.zt td:nth-child(1),.zt td:nth-child(2),.zt td:nth-child(3){text-align:left}
.zt tbody tr{cursor:pointer;transition:background .1s}
.zt tbody tr:hover td{background:#EFF6FF}
.zt .mo-num{font-weight:800;color:var(--pr)}
.qty-plan-cell{color:#6D28D9;font-weight:800;font-size:11px}
.qty-act-cell{color:#047857;font-weight:800;font-size:11px}
.tag{padding:3px 8px;border-radius:4px;font-size:9px;font-weight:700;display:inline-flex;align-items:center;white-space:nowrap}
.t-ok{background:#D1FAE5;color:#065F46;border:1px solid #A7F3D0}
.t-wn{background:#FEF3C7;color:#B45309;border:1px solid #FDE68A}
.t-dg{background:#FEF2F2;color:#B91C1C;border:1px solid #FECACA}
.t-dr{background:#F1F5F9;color:#475569;border:1px solid #CBD5E1}
.t-bl{background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE}
.dly-badge{display:inline-block;padding:1px 4px;border-radius:3px;font-size:7px;font-weight:700;background:#FEF2F2;color:#DC2626;margin-left:2px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

.tl-card{background:var(--cw);border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-top:16px}
.tl-hd{padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;background:#FAFBFC;border-bottom:1px solid var(--bd)}
.tl-title{font-size:14px;font-weight:800;color:var(--tx)}
.tl-legend{display:flex;gap:10px;font-size:9px;color:var(--tm);align-items:center}
.tl-legend span{display:flex;align-items:center;gap:3px}
.tl-dot{width:10px;height:10px;border-radius:3px;display:inline-block}
.tl-type-badge{padding:1px 6px;border-radius:3px;font-size:8px;font-weight:700}
.tl-scroll{overflow-x:auto;padding:0 0 8px}
.tl-tbl{width:100%;border-collapse:collapse;font-size:10px;table-layout:fixed;min-width:1000px}
.tl-tbl th,.tl-tbl td{border:1px solid #EEF2F6}
.tl-tbl th{background:#F8FAFC;color:var(--tm);font-weight:900;padding:6px 0;text-align:center;font-size:10px}
.tl-tbl th.wk{background:#FEF8F8;color:#E87979}
.tl-tbl th.today{background:#FEE2E2;color:#B91C1C;font-weight:900;position:relative}
.tl-tbl th.today::after{content:'▼';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);font-size:8px;color:#EF4444}
.tl-tbl .info-cell{width:200px;min-width:200px;text-align:left;background:#FAFBFC;padding:6px 10px;position:sticky;left:0;z-index:2;border-right:2px solid var(--bd)}
.tl-tbl td{padding:0;vertical-align:middle;height:24px;background:#FEFEFE}
.tl-tbl td.today-col{position:relative;background:#FEF2F2 !important}
.tl-tbl td.today-col::after{content:'';position:absolute;left:50%;top:0;width:2px;height:100%;background:rgba(239,68,68,.3);transform:translateX(-50%);pointer-events:none;z-index:1}
.tl-tbl tr.mo-gap td{height:20px;background:#F8FAFC !important;border-top:2px solid #E2E8F0;border-bottom:none}
.tl-tbl tr.mo-gap .info-cell{background:#F8FAFC !important}
.tl-bar{height:100%;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;white-space:nowrap;overflow:hidden;min-height:16px}
.pb-fab{border:1.5px dashed #C4B5FD;color:#7C3AED;background-image:linear-gradient(45deg,rgba(196,181,253,0.4) 25%,transparent 25%,transparent 50%,rgba(196,181,253,0.4) 50%,rgba(196,181,253,0.4) 75%,transparent 75%,transparent);background-size:8px 8px}
.pb-cut{border:1.5px dashed #FDE68A;color:#CA8A04;background-image:linear-gradient(45deg,rgba(253,230,138,0.4) 25%,transparent 25%,transparent 50%,rgba(253,230,138,0.4) 50%,rgba(253,230,138,0.4) 75%,transparent 75%,transparent);background-size:8px 8px}
.pb-sew{border:1.5px dashed #BAE6FD;color:#0284C7;background-image:linear-gradient(45deg,rgba(186,230,253,0.4) 25%,transparent 25%,transparent 50%,rgba(186,230,253,0.4) 50%,rgba(186,230,253,0.4) 75%,transparent 75%,transparent);background-size:8px 8px}
.pb-pack{border:1.5px dashed #86EFAC;color:#047857;background-image:linear-gradient(45deg,rgba(134,239,172,0.4) 25%,transparent 25%,transparent 50%,rgba(134,239,172,0.4) 50%,rgba(134,239,172,0.4) 75%,transparent 75%,transparent);background-size:8px 8px}
.pb-ship{border:1.5px dashed #3B82F6;color:#1D4ED8;background-image:linear-gradient(45deg,rgba(59,130,246,0.4) 25%,transparent 25%,transparent 50%,rgba(59,130,246,0.4) 50%,rgba(59,130,246,0.4) 75%,transparent 75%,transparent);background-size:8px 8px}
.ab-fab{background:#DDD6FE;color:#6D28D9}
.ab-cut{background:#FEF3C7;color:#A16207}
.ab-sew{background:#E0F2FE;color:#0369A1}
.ab-pack{background:#BBF7D0;color:#047857}
.ab-ship{background:#BFDBFE;color:#1D4ED8}
.tl-mo-info{cursor:pointer}.tl-mo-info:hover{background:#EFF6FF !important}
.tl-mo-wrap{display:flex;align-items:center;gap:8px}
.tl-mo-thumb{width:38px;height:38px;background:#F1F5F9;border:1px solid #E2E8F0;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#94A3B8;flex-shrink:0;overflow:hidden}
.tl-mo-thumb img{width:100%;height:100%;object-fit:cover}
.tl-mo-num{font-size:11px;font-weight:800;color:var(--pr)}.tl-mo-name{font-size:9px;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}.tl-mo-meta{font-size:8px;color:#94A3B8;margin-top:1px}

.pop-ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:2000;justify-content:center;align-items:center;backdrop-filter:blur(2px)}
.pop-ov.active{display:flex}
.pop-box{background:#fff;border-radius:12px;width:92%;max-width:700px;max-height:82vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .2s ease-out}
.pop-hd{padding:16px 20px 12px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:10;border-radius:12px 12px 0 0}
.pop-title{font-size:15px;font-weight:800;color:var(--pr)}
.pop-sub{font-size:11px;color:var(--tm);margin-top:2px}
.pop-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--bd);background:#F8FAFC;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--tm);flex-shrink:0}
.pop-close:hover{background:#FEF2F2;color:var(--dg)}
.pop-body{padding:16px 20px}
.pop-item{padding:10px 12px;border:1px solid var(--bd);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:background .1s;display:flex;justify-content:space-between;align-items:center}
.pop-item:hover{background:#EFF6FF;border-color:#BFDBFE}
.pop-item-left .pi-mo{font-size:12px;font-weight:800;color:var(--pr)}
.pop-item-left .pi-name{font-size:10px;color:var(--tm);margin-top:2px}
.pop-item-left .pi-meta{font-size:9px;color:#94A3B8;margin-top:2px}
.pop-empty{text-align:center;padding:30px;color:var(--tm);font-size:13px}

.modal-ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:3000;justify-content:center;align-items:center;backdrop-filter:blur(2px)}
.modal-ov.active{display:flex}
.modal-box{background:#fff;border-radius:12px;width:94%;max-width:1050px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .25s ease-out}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.m-hd{padding:20px 24px 16px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:#fff;z-index:10;border-radius:12px 12px 0 0}
.m-title{font-size:18px;font-weight:900;color:var(--pr)}.m-sub{font-size:12px;color:var(--tm);margin-top:2px}
.m-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--bd);background:#F8FAFC;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--tm)}.m-close:hover{background:#FEF2F2;color:var(--dg)}
.m-body{padding:20px 24px}
.m-sec{margin-bottom:28px}
.m-sec-t{font-size:13px;font-weight:800;color:var(--pr);margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #EFF6FF;display:flex;align-items:center;gap:8px}
.d-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.d-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.d-grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.d-item{display:flex;flex-direction:column;gap:3px;padding:8px 10px;background:#FAFBFC;border-radius:6px;border:1px solid #F1F5F9}
.d-label{font-size:9px;font-weight:700;color:var(--tm)}.d-val{font-size:13px;font-weight:600;color:var(--tx)}.d-val.empty{color:#CBD5E1;font-style:italic}
.m-img-gallery{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.m-img-box{width:100px;height:100px;background:#F1F5F9;border:1px solid #E2E8F0;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s,box-shadow .15s}
.m-img-box:hover{transform:scale(1.05);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.m-img-box img{width:100%;height:100%;object-fit:cover}
.m-img-box .spinner-sm{margin:auto}

.pa-compare{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.pa-col{border-radius:10px;padding:14px;border:2px solid}
.pa-col.plan{border-color:#C4B5FD;background:#FDFCFF}
.pa-col.actual{border-color:#6EE7B7;background:#F0FDF9}
.pa-col-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px dashed}
.pa-col.plan .pa-col-header{border-color:#C4B5FD}
.pa-col.actual .pa-col-header{border-color:#6EE7B7}
.pa-badge{font-size:9px;font-weight:800;padding:3px 8px;border-radius:4px;letter-spacing:.5px}
.pa-badge.plan{background:#7C3AED;color:#fff}
.pa-badge.actual{background:#059669;color:#fff}
.pa-col-title{font-size:12px;font-weight:800}
.pa-col.plan .pa-col-title{color:#6D28D9}
.pa-col.actual .pa-col-title{color:#047857}
.pa-summary{font-size:10px;color:var(--tm);margin-bottom:10px;padding:6px 8px;border-radius:5px;line-height:1.5}
.pa-col.plan .pa-summary{background:#EDE9FE}
.pa-col.actual .pa-summary{background:#D1FAE5}

.subform-tbl{width:100%;border-collapse:collapse;font-size:10px;margin-top:8px}
.subform-tbl th{padding:6px 8px;font-weight:800;font-size:9px;border-bottom:1px solid;text-align:center}
.pa-col.plan .subform-tbl th{background:#EDE9FE;color:#6D28D9;border-color:#C4B5FD}
.pa-col.actual .subform-tbl th{background:#D1FAE5;color:#047857;border-color:#6EE7B7}
.subform-tbl td{padding:6px 8px;border-bottom:1px solid #F1F5F9;text-align:center;color:var(--tx)}
.subform-tbl tbody tr:last-child td{border-bottom:none}
.subform-tbl tbody tr:hover td{background:#F8FAFC}
.subform-tbl .tfoot-row td{font-weight:800;border-top:2px solid;padding-top:8px}
.pa-col.plan .subform-tbl .tfoot-row td{border-color:#C4B5FD;color:#6D28D9;background:#F5F3FF}
.pa-col.actual .subform-tbl .tfoot-row td{border-color:#6EE7B7;color:#047857;background:#F0FDF9}
.subform-empty{text-align:center;padding:16px;color:#94A3B8;font-size:10px}

.pa-totals{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.pa-total-box{padding:10px;border-radius:8px;text-align:center}
.pa-total-box.plan{background:#F5F3FF;border:1px solid #C4B5FD}
.pa-total-box.actual{background:#ECFDF5;border:1px solid #6EE7B7}
.pa-total-label{font-size:9px;font-weight:700;margin-bottom:4px}
.pa-total-box.plan .pa-total-label{color:#7C3AED}
.pa-total-box.actual .pa-total-label{color:#059669}
.pa-total-qty{font-size:18px;font-weight:900}
.pa-total-box.plan .pa-total-qty{color:#6D28D9}
.pa-total-box.actual .pa-total-qty{color:#047857}
.pa-total-amt{font-size:11px;font-weight:700;margin-top:2px}

<script>

var APP="eom", REP="All_MO", STYLE_REP="All_Styles";
var allRec=[], allStyles=[], today=new Date(), todayStr=today.toISOString().split("T")[0];
var currentMO=null;

var CAT_MAP={"S":"Set / 세트 / 套装","I":"Individual / 단품 / 单品"};
var S_MAP={
  Gender:{"W":"Women / 여성 / 女","M":"Men / 남성 / 男","U":"Unisex / 남녀공용 / 男女通用"},
  Category:{"S":"Set / 세트 / 套装","I":"Individual / 단품 / 单品"},
  Top_Type:{"B":"Bra-top / 브라탑 / 运动内衣","C":"Crop / 크롭 / 露脐装","T":"Tank / 탱크 / 背心"},
  Sleeve:{"L":"Long / 긴팔 / 长袖","S":"Short / 반팔 / 짧은소매","N":"None / 민소매 / 무袖"},
  Fit:{"O":"Oversize / 루즈핏 / 宽松版","R":"Regular / 레귤러핏 / 标准版","S":"Slim / 슬림핏 / 修身版"},
  Details:{"Z":"Zip-up(Full) / 짚업 / 全开拉链","H":"Half-zip / 반짚업 / 半拉链","N":"Round-neck / 라운드넥 / 圆领","C":"Cami-strap / 끈나시 / 吊带","W":"Wide-strap / 와이드 / 宽肩带","D":"Hood / 후드 / 连帽"},
  Bottom_Type:{"L":"Leggings / 레깅스 / 紧身裤","W":"Wide / 와이드 / 宽腿裤","J":"Jogger / 조거 / 束脚裤","F":"Flare / 나팔 / 喇叭裤","P":"Pleats / 플리츠 / 褶皱","A":"A-line / A라인 / A字版","B":"Shorts / 반바지 / 短裤"},
  Bottom_Length:{"3":"3-Tier(Short) / 3부 / 三分","5":"5-Tier(Mid) / 5부 / 五分","7":"7-Tier(Mid-full) / 7부 / 七分","9":"9-Tier(Full) / 9부 / 九分"},
  Material_Type:{"P":"Polyester / 폴리에스터 / 涤纶","N":"Nylon / 나일론 / 尼龙","D":"Polyamide / 폴리아미드 / 聚酰胺","C":"Cotton / 코튼 / 棉","H":"Mesh / 메쉬 / 网布","M":"Modal / 모달 / 莫代尔","L":"Lycra / 라이크라 / 莱卡"},
  Lining_Type:{"B":"Brushed / 기모 / 磨毛","F":"Fur / 퍼 / 毛皮","N":"None / 없음 / 无"}
};

function catName(v){return(!v||v==="-")?"-":(CAT_MAP[v]||v)}
function mv(f,v){return(!v||v==="-")?"-":(S_MAP[f]&&S_MAP[f][v])?S_MAP[f][v]:v}
function cleanFactory(v){if(!v||v==="-")return"-";return v.replace(/^[_\s]*\d+[_\s]*/,"")}
function pd(v){if(!v||v==="-")return null;if(/^\d{4}-\d{2}-\d{2}/.test(v))return v.substring(0,10);var m=v.match(/^(\d{1,2})-([A-Za-z]+)-(\d{4})/);if(m){var mo={Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};return m[3]+"-"+(mo[m[2]]||"01")+"-"+(m[1].length===1?"0"+m[1]:m[1])}return null}
function getModDate(r){var v=r["Modified_Time"]||r["Modified_Time_field"]||"";if(!v||v==="-")return "알 수 없음";var m=v.match(/^(\d{1,2})-([A-Za-z]+)-(\d{4})/);if(m){var mo={Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};var day=m[1].length===1?"0"+m[1]:m[1];return m[3]+"-"+(mo[m[2]]||"01")+"-"+day}return v.split(" ")[0];}
function g(r,f){var v=r[f];if(v==null||v==="")return"-";if(typeof v==="object"&&v.display_value)return v.display_value;return String(v)}
function escH(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function tc(s){var l=(s||"").toLowerCase();if(l.indexOf("confirmed")>=0||l.indexOf("delivered")>=0||l.indexOf("complete")>=0||l.indexOf("shipped")>=0||l.indexOf("done")>=0)return"t-ok";if(l.indexOf("progress")>=0||l.indexOf("cutting")>=0||l.indexOf("sewing")>=0||l.indexOf("fabric")>=0||l.indexOf("packing")>=0)return"t-wn";if(l.indexOf("delay")>=0||l.indexOf("cancel")>=0)return"t-dg";if(l.indexOf("pending")>=0)return"t-bl";return"t-dr"}
function isDelayed(r){var os=(g(r,"Order_Status")||"").toLowerCase();if(os.indexOf("delivered")>=0||os.indexOf("shipped")>=0||os.indexOf("done")>=0)return false;var ds=g(r,"Delivery_Status");return ds.indexOf("Delay")>=0||ds.indexOf("지연")>=0}
function getProdStage(r){var s=g(r,"Production_Status").toLowerCase();if(s.indexOf("shipped")>=0)return"Shipped";if(s.indexOf("complete")>=0||s.indexOf("done")>=0)return"Done";if(s.indexOf("packing")>=0)return"Packing";if(s.indexOf("sewing")>=0)return"Sewing";if(s.indexOf("cutting")>=0)return"Cutting";if(s.indexOf("fabric")>=0)return"Fabric";return"Not Started"}
function getAllImgs(r,field){var i=r[field];if(!i)return[];if(Array.isArray(i))return i.filter(function(x){return x&&typeof x==="string"&&x.length>5});if(typeof i==="object"&&!Array.isArray(i)){var u=[];Object.keys(i).forEach(function(k){var v=i[k];if(v&&typeof v==="string"&&v.length>5)u.push(v)});return u}if(typeof i==="string"&&i.length>5)return[i];return[]}
function getImg1(r){var imgs=getAllImgs(r,"Style_Image");return imgs.length>0?imgs[0]:null}
function getImgUrl(r,field){var imgs=getAllImgs(r,field);return imgs.length>0?imgs[0]:null}
function getSubformLines(r, fieldName){var v=r[fieldName];if(!v)return[];if(Array.isArray(v))return v;if(typeof v==="object")return Object.values(v);return[];}

var _safeQ=[],_safeBusy=false;
function _runSafeQ(){if(_safeQ.length===0){_safeBusy=false;return}_safeBusy=true;var task=_safeQ.shift();var el=task.id?document.getElementById(task.id):task.el;if(!el){setTimeout(_runSafeQ,10);return}var img=document.createElement("img");img.style.cssText=task.css||"width:100%;height:100%;object-fit:cover";if(task.clk)img.onclick=function(){openLightbox(this.src)};var done=false;function next(){if(done)return;done=true;setTimeout(_runSafeQ,10)}try{ZOHO.CREATOR.UTIL.setImageData(img,task.url,function(){el.innerHTML="";el.appendChild(img);next()});setTimeout(next,500)}catch(e){next()}}
function qImg(elOrId,url,css,clk){_safeQ.push({id:typeof elOrId==="string"?elOrId:null,el:typeof elOrId==="object"?elOrId:null,url:url,css:css,clk:clk||false});if(!_safeBusy)_runSafeQ()}

    if(results[0]&&results[0].code===3000&&results[0].data)allRec=results[0].data;
    if(results[1]&&results[1].code===3000&&results[1].data)allStyles=results[1].data;

  }).catch(function(e){showErr(e.stack || e.message || JSON.stringify(e))})

function renderAll(){ renderMKPI(); renderMonthly(); }

// (중략) KPI 및 월별 렌더링
function renderMKPI(){
  var groups={};allRec.forEach(function(r){var py=g(r,"Plan_Year"),pm=g(r,"Plan_Month");var key=(py!=="-"&&pm!=="-")?(py+"년 "+pm+"월"):"미지정";if(!groups[key])groups[key]=[];groups[key].push(r)});
  var colors=["#818CF8","#F59E0B","#34D399"];var h="";var ci=0;
  Object.keys(groups).sort().forEach(function(key){
    var items=groups[key];var c=colors[ci%colors.length];ci++;
    var tot=items.length,ip=0,dl=0,dv=0,planQty=0,actQty=0;
    items.forEach(function(r){
      var os=(g(r,"Order_Status")||"").toLowerCase();
      if(os.indexOf("progress")>=0)ip++;
      if(isDelayed(r))dl++;
      if(os.indexOf("delivered")>=0||os.indexOf("shipped")>=0)dv++;
      planQty+=parseInt(g(r,"Plan_Total_Quantity"))||0;
      actQty+=parseInt(g(r,"Acture_Total_Quantity"))||0;
    });

function parseUniversalSpecs(lines) {
  var spObj = {};
  if(!Array.isArray(lines)) return spObj;
  
  lines.forEach(function(row) {
    var pom="-", size="-", spec="-", tol="-";
    Object.keys(row).forEach(function(k){
      var kl = k.toUpperCase();
      var val = typeof row[k] === "object" && row[k] !== null ? (row[k].display_value || "") : String(row[k] || "");
      if(val==="null" || val==="undefined") val="-";

      if(kl.indexOf("POM") >= 0 || kl === "MEASUREMENT_POINT") pom = val;
      else if(kl.indexOf("SELECT_SIZE") >= 0 || kl.indexOf("SELECT") >= 0 || k === "Size") size = val.toUpperCase();
      else if((kl.indexOf("SPEC") >= 0 || kl.indexOf("VALUE") >= 0 || kl === "CM") && kl.indexOf("SPECS") === -1 && kl.indexOf("SIZE") === -1) spec = val;
      else if(kl.indexOf("TOL") >= 0) tol = val;
    });

    if(pom === "-" || pom === "") return;
    if(!spObj[pom]) spObj[pom] = {tol:tol, S:"-", M:"-", L:"-", XL:"-", XXL:"-"};
    if(size && size !== "-" && spObj[pom][size] !== undefined) {
      spObj[pom][size] = spec;
    }
    if(tol !== "-" && tol !== "") spObj[pom].tol = tol;
  });
  return spObj;
}

// ★ (핵심) 서버 공격(DDoS) 차단을 피하는 순차 릴레이 호출 함수
function fetchSubformRowsSafely(reportName, ids) {
  return new Promise(function(resolve) {
    if (!ids || ids.length === 0) return resolve([]);
    var results = [];
    var i = 0;
    function next() {
      if (i >= ids.length) return resolve(results);
      ZOHO.CREATOR.API.getRecordById({appName: APP, reportName: reportName, id: ids[i]})
      .then(function(res) {
        if(res && res.data) results.push(res.data);
        i++;
        setTimeout(next, 20); // 0.02초 간격으로 한 줄씩 얌전하게 빼옵니다. (에러 방지)
      })
      .catch(function(err) {
        window["_err_" + reportName] = err; // 에러 기록
        i++;
        setTimeout(next, 20);
      });
    }
    next();
  });
}

document.getElementById("btnTechPack").addEventListener("click",function(){
  var id = this.getAttribute("data-moid");
  if(!id) return;

  var btn = this;
  var originalText = btn.innerHTML;
  btn.innerHTML = "⏳ DATA LOADING...";
  btn.disabled = true;

  var r = allRec.find(function(x) { return x["ID"] === id; });
  if (!r) { btn.disabled = false; btn.innerHTML = originalText; return; }

  var sku = g(r, "Style_SKU");
  var s = allStyles.find(function(st){return g(st,"Style_SKU")===sku || g(st,"SKU")===sku;}) || {};

  var topIds = (r.Top_Size_Specs || []).map(function(x){return x.ID;}).filter(Boolean);
  var btmIds = (r.Bottom_Size_Specs || []).map(function(x){return x.ID;}).filter(Boolean);

  if (topIds.length === 0 && s.Top_Size_Specs) topIds = s.Top_Size_Specs.map(function(x){return x.ID;}).filter(Boolean);
  if (btmIds.length === 0 && s.Bottom_Size_Specs) btmIds = s.Bottom_Size_Specs.map(function(x){return x.ID;}).filter(Boolean);

  window._err_All_Top_Specs = null;
  window._err_All_Bottom_Specs = null;

  // 1단계: 릴레이 호출 시작 (가장 안전하고 확실한 방법)
  fetchSubformRowsSafely("All_Top_Specs", topIds).then(function(topLines) {
    fetchSubformRowsSafely("All_Bottom_Specs", btmIds).then(function(btmLines) {
      
      var topSpecs = parseUniversalSpecs(topLines);
      if (Object.keys(topSpecs).length === 0) topSpecs = parseUniversalSpecs(r.Top_Size_Specs || s.Top_Size_Specs || []);
      
      var btmSpecs = parseUniversalSpecs(btmLines);
      if (Object.keys(btmSpecs).length === 0) btmSpecs = parseUniversalSpecs(r.Bottom_Size_Specs || s.Bottom_Size_Specs || []);

      renderTechPackHTML(r, s, topSpecs, btmSpecs, topIds.length, btmIds.length);

      btn.innerHTML = originalText;
      btn.disabled = false;
    });
  });
});

  var imgBtm = getImgUrl(s, "Bottom_Flat_Sketch") || getImgUrl(s, "Bottom_Sketch") || getImgUrl(r, "Bottom_Flat_Sketch") || getImgUrl(r, "Bottom_Sketch");

  var moNum = g(r, "MO_Number");
  var factory = cleanFactory(g(r, "Factory"));
  var tColor = g(r, "Top_Color"); if(tColor==="-") tColor = g(s, "Top_Color");
  var bColor = g(r, "Bottom_Color"); if(bColor==="-") bColor = g(s, "Bottom_Color");
  var colorwaysStr = [tColor !== "-" ? tColor : "", bColor !== "-" ? bColor : ""].filter(Boolean).join(" / ");
  if(!colorwaysStr) colorwaysStr = "-";

  var matType = g(s, "Material_Type"); if(matType==="-") matType = g(r, "Material_Type");
  var blend = g(s, "blended_percentage"); if(blend==="-") blend = g(r, "blended_percentage");
  var lining = g(s, "Lining_Type"); if(lining==="-") lining = g(r, "Lining_Type");

  var p = [];
  p.push("<div class='tp-head'>");
  p.push("<div class='tp-brand'><div class='logo-ic'></div> ZOHO <span>APPAREL</span></div>");
  p.push("<div class='doc-title'><h1>TECH PACK</h1><p>DATE: " + todayStr + " &nbsp;|&nbsp; REV: 1.0</p></div>");
  p.push("</div>");

  p.push("<div class='tp-grid'>"); 

  // ================= [좌측 열]: 정보, 사진, 원단 =================
  p.push("<div class='col-left'>");
  p.push("<table class='info-tbl'><tbody>");
  p.push("<tr><th>MO NO.</th><td style='color:#3B82F6;font-size:13px'>" + escH(moNum) + "</td></tr>");
  p.push("<tr><th>STYLE NO.</th><td>" + escH(sku) + "</td></tr>");
  p.push("<tr><th>STYLE NAME</th><td>" + escH(g(r, "Style_Name")) + "</td></tr>");
  p.push("<tr><th>FACTORY</th><td>" + escH(factory) + "</td></tr>");
  p.push("<tr><th>SEASON</th><td>" + escH(g(r, "Season")) + "</td></tr>");
  p.push("<tr><th>CATEGORY</th><td>" + escH(catName(g(r, "Category"))) + "</td></tr>");
  p.push("<tr><th>TARGET</th><td>" + escH(mv("Gender",g(r, "Gender"))) + "</td></tr>");
  p.push("<tr><th>COLORS (T/B)</th><td style='color:#059669'>" + escH(colorwaysStr) + "</td></tr>");
  p.push("<tr><th>SIZE RANGE</th><td>S, M, L, XL</td></tr>");
  p.push("</tbody></table>");
  
  p.push("<div class='tp-box'><div class='tp-box-title'>STYLE IMAGE</div><div class='img-wrap style-img' id='tpImgStyle'><div class='spinner-sm'></div></div></div>");
  
  p.push("<div class='tp-box'><div class='tp-box-title'>FABRIC & FIT DETAILS</div>");
  p.push("<div style='padding:10px;font-size:11px;line-height:1.6'>");
  p.push("<b>MAIN:</b> " + escH(mv("Material_Type",matType)) + "<br>");
  p.push("<b>LINING:</b> " + escH(mv("Lining_Type",lining)) + " (" + escH(blend) + ")<br><br>");
  p.push("<b>Top:</b> " + escH(mv("Top_Type",g(r,"Top_Type"))) + " / " + escH(mv("Sleeve",g(r,"Sleeve"))) + "<br>");
  p.push("<b>Btm:</b> " + escH(mv("Bottom_Type",g(r,"Bottom_Type"))) + " / " + escH(mv("Bottom_Length",g(r,"Bottom_Length"))) + "<br>");
  p.push("<b>Fit:</b> " + escH(mv("Fit",g(r,"Fit"))) + " | <b>Detail:</b> " + escH(mv("Details",g(r,"Details"))));
  p.push("</div></div>");
  p.push("</div>");

  // ================= [중앙 열]: 스펙표, 메모 =================
  p.push("<div class='col-mid'>");
  
  function drawSpec(title, spObj, rawData, idCount, errReportName) {
    var h = "<div class='tp-box'><div class='tp-box-title'>" + title + " <span>Unit: cm</span></div>";
    h += "<table class='spec-tbl'><thead><tr>";
    h += "<th style='width:45%'>Point of Measure (측정부위)</th><th style='width:15%'>TOL(±)</th>";
    h += "<th style='width:10%'>S</th><th style='width:10%'>M</th><th style='width:10%'>L</th><th style='width:10%'>XL</th>";
    h += "</tr></thead><tbody>";
    
    var keys = Object.keys(spObj);
    if(keys.length === 0) {
      // 에러 발생 시 정밀 추적 텍스트 출력
      var errInfo = window["_err_" + errReportName];
      var dbg = "<b>[데이터 없음]</b> 사이즈 정보를 불러오지 못했습니다.<br><br>";
      dbg += "- 감지된 ID 개수: " + idCount + "개<br>";
      if(errInfo) dbg += "⛔ <b>API 에러:</b> " + JSON.stringify(errInfo) + "<br>";
      dbg += "- 서브폼 이름 설정 권한을 다시 한 번 확인해주세요.<br>";
      dbg += "- Raw Data: " + escH(JSON.stringify(rawData).substring(0, 150)) + "...";
      h += "<tr><td colspan='6' style='color:#EF4444;padding:20px;font-size:10px;text-align:left;word-break:break-all'>" + dbg + "</td></tr>";
    } else {
      keys.forEach(function(pom) {
        var o = spObj[pom];
        h += "<tr>";
        h += "<td class='pom'>" + escH(pom) + "</td><td>" + escH(o.tol) + "</td>";
        h += "<td>" + escH(o.S) + "</td><td>" + escH(o.M) + "</td><td>" + escH(o.L) + "</td><td>" + escH(o.XL) + "</td>";
        h += "</tr>";
      });
    }
    h += "</tbody></table></div>";
    return h;
  }
  
  p.push(drawSpec("📏 TOP MEASUREMENTS", topSpecs, r.Top_Size_Specs || s.Top_Size_Specs, topIdCount, "All_Top_Specs"));
  p.push(drawSpec("📏 BOTTOM MEASUREMENTS", btmSpecs, r.Bottom_Size_Specs || s.Bottom_Size_Specs, btmIdCount, "All_Bottom_Specs"));
  
  p.push("<div class='tp-box memo-box'><div class='tp-box-title'>REMARKS / 비고란 (작업 지시사항)</div>");
  p.push("<div class='memo-content'>");
  var pNote = g(r, "Plan_Notes");
  if(pNote && pNote !== "-") p.push("<div style='color:#DC2626;font-weight:700;white-space:pre-wrap'>" + escH(pNote) + "</div>");
  p.push("</div></div>");
  p.push("</div>"); 

  // ================= [우측 열]: 도안 이미지 =================
  p.push("<div class='col-right'>");
  p.push("<div class='tp-box'><div class='tp-box-title'>TOP SKETCH</div><div class='img-wrap sketch-img' id='tpImgTop'><div class='spinner-sm'></div></div></div>");
  p.push("<div class='tp-box'><div class='tp-box-title'>BOTTOM SKETCH</div><div class='img-wrap sketch-img' id='tpImgBtm'><div class='spinner-sm'></div></div></div>");
  p.push("</div>");

  p.push("</div>"); // tp-grid 끝

  document.getElementById("tpBarTitle").textContent = "📋 TECH PACK — " + escH(sku);
  document.getElementById("tpContent").innerHTML = p.join("");
  document.getElementById("tpOv").classList.add("active");

  fastImgZoho("tpImgStyle", imgStyle);
  fastImgZoho("tpImgTop", imgTop);
  fastImgZoho("tpImgBtm", imgBtm);
}
</script>
</body>
</html>
