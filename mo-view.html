<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MO View Widget v1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://js.zohostatic.com/creator/widgets/version/1.0/widgetsdk-min.js"></script>
<style>
:root{--pr:#1E3A8A;--ac:#3B82F6;--bg:#F1F5F9;--bd:#E2E8F0;--tx:#0F172A;--tm:#64748B;--cw:#FFF;--ok:#10B981;--wn:#F59E0B;--dg:#EF4444;--dr:#94A3B8}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans KR',-apple-system,sans-serif}
body{background:var(--bg);padding:16px;min-height:100vh}
.spinner{width:40px;height:40px;border:4px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;color:var(--tm);font-size:13px;font-weight:600}

/* Header */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:17px;font-weight:900;color:var(--tx);display:flex;align-items:center;gap:8px}
.hdr h1 .ic{width:28px;height:28px;background:var(--pr);border-radius:5px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:900}
.hdr-btns{display:flex;gap:8px}
.hdr-btns button{padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:none}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.kpi{background:var(--cw);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;position:relative;overflow:hidden;text-align:center}
.kpi::before{content:'';position:absolute;left:0;top:0;width:100%;height:3px}
.kpi-v{font-size:26px;font-weight:900;line-height:1}
.kpi-l{font-size:10px;font-weight:700;color:var(--tm);margin-top:4px}

/* Pipeline */
.pipe-card{background:var(--cw);border:1px solid var(--bd);border-radius:8px;padding:14px 18px;margin-bottom:16px}
.pipe-title{font-size:12px;font-weight:800;color:var(--tm);text-transform:uppercase;margin-bottom:10px}
.pipe-row{display:flex;align-items:center;gap:4px;overflow-x:auto}
.pipe-step{flex:1;text-align:center;min-width:70px;padding:8px 4px;border-radius:8px;cursor:default}
.pipe-step:hover{background:#F8FAFC}
.pipe-n{font-size:20px;font-weight:900;line-height:1}
.pipe-lb{font-size:9px;font-weight:700;margin-top:3px}
.pipe-lb2{font-size:8px;color:var(--tm);margin-top:1px}
.pipe-bar{height:3px;border-radius:2px;margin-top:4px}
.pipe-arr{color:#CBD5E1;font-size:10px;flex-shrink:0}

/* Filter */
.filter-bar{display:flex;justify-content:flex-end;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.search-box{background:#fff;border:1px solid var(--bd);border-radius:6px;padding:5px 10px;font-size:11px;width:200px;outline:none;font-family:inherit}
.search-box:focus{border-color:var(--ac);box-shadow:0 0 0 2px rgba(59,130,246,.1)}
.fsel{background:#fff;border:1px solid var(--bd);border-radius:6px;padding:5px 8px;font-size:11px;outline:none;font-family:inherit;cursor:pointer}

/* Monthly tables */
.mt-sec{margin-bottom:16px}
.mt-card{background:var(--cw);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.mt-hd{padding:8px 16px;background:#F8FAFC;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.mt-title{font-size:13px;font-weight:800;color:var(--tx)}
.mt-cnt{font-size:11px;color:var(--tm);font-weight:600;background:#F1F5F9;padding:2px 8px;border-radius:10px;border:1px solid #CBD5E1}
.tbl-scroll{overflow-x:auto}
table.zt{width:100%;border-collapse:collapse;font-size:11px;text-align:left;table-layout:fixed}
.zt th{background:#F1F5F9;padding:7px 8px;color:var(--tm);font-weight:800;font-size:10px;border-bottom:1px solid var(--bd);white-space:nowrap;overflow:hidden}
.zt td{padding:7px 8px;border-bottom:1px solid #F1F5F9;color:var(--tx);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.zt tbody tr{cursor:pointer;transition:background .1s}
.zt tbody tr:hover td{background:#EFF6FF}
.zt .mo-num{font-weight:800;color:var(--pr)}
.tag{padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;display:inline-flex;align-items:center;white-space:nowrap}
.t-ok{background:#D1FAE5;color:#065F46;border:1px solid #A7F3D0}
.t-wn{background:#FEF3C7;color:#B45309;border:1px solid #FDE68A}
.t-dg{background:#FEF2F2;color:#B91C1C;border:1px solid #FECACA}
.t-dr{background:#F1F5F9;color:#475569;border:1px solid #CBD5E1}
.t-bl{background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE}
.dly-badge{display:inline-block;padding:1px 4px;border-radius:3px;font-size:7px;font-weight:700;background:#FEF2F2;color:#DC2626;margin-left:2px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* Timeline Calendar */
.cal-card{background:var(--cw);border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:16px}
.cal-hd{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.cal-title{font-size:14px;font-weight:800;color:var(--tx)}
.cal-month{font-size:14px;font-weight:700;color:var(--ac)}
.cal-legend{display:flex;gap:10px;font-size:9px;color:var(--tm)}
.cal-legend span{display:flex;align-items:center;gap:3px}
.cal-dot{width:10px;height:10px;border-radius:3px;display:inline-block}
.cal-scroll{overflow-x:auto;padding:0 4px 8px}
.cal-tbl{width:100%;border-collapse:collapse;font-size:10px;table-layout:fixed;min-width:1000px}
.cal-tbl th,.cal-tbl td{border:1px solid var(--bd)}
.cal-tbl th{background:#F8FAFC;color:var(--tm);font-weight:700;padding:5px 0;text-align:center;font-size:9px}
.cal-tbl th.wk{background:#FEF2F2;color:#DC2626}
.cal-tbl th.today{background:var(--ac);color:#fff;font-weight:900}
.cal-tbl .info-cell{width:160px;min-width:160px;text-align:left;background:#FAFBFC;padding:6px 8px;position:sticky;left:0;z-index:2;border-right:2px solid var(--bd)}
.cal-tbl td{padding:1px;vertical-align:middle;height:36px;background:#FAFAFA}
.cal-tbl tr:hover td{background:#F0F7FF}
.cal-bar{height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.cb-fab{background:#8B5CF6}.cb-cut{background:#F97316}.cb-sew{background:#EF4444}.cb-pack{background:#22C55E}.cb-ship{background:#2563EB}

/* Modal */
.modal-ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(2px)}
.modal-ov.active{display:flex}
.modal-box{background:#fff;border-radius:12px;width:92%;max-width:800px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .25s ease-out}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.m-hd{padding:20px 24px 16px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:#fff;z-index:10;border-radius:12px 12px 0 0}
.m-hd-left{display:flex;align-items:center;gap:12px}
.m-title{font-size:18px;font-weight:900;color:var(--pr)}
.m-sub{font-size:12px;color:var(--tm);margin-top:2px}
.m-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--bd);background:#F8FAFC;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--tm)}
.m-close:hover{background:#FEF2F2;color:var(--dg)}
.m-body{padding:20px 24px}
.m-sec{margin-bottom:24px}
.m-sec-t{font-size:12px;font-weight:800;color:var(--pr);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #EFF6FF}
.d-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.d-item{display:flex;flex-direction:column;gap:3px;padding:6px 8px;background:#FAFBFC;border-radius:6px;border:1px solid #F1F5F9}
.d-label{font-size:9px;font-weight:700;color:var(--tm)}
.d-val{font-size:13px;font-weight:600;color:var(--tx)}
.d-val.empty{color:#CBD5E1;font-style:italic}
/* Timeline in modal */
.tl{margin-top:8px}.tl-item{display:flex;align-items:flex-start;gap:12px;padding:6px 0;position:relative}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:11px;top:28px;width:2px;height:calc(100% - 14px);background:#E2E8F0}
.tl-dot{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;z-index:2}
.tl-dot.done{background:var(--ok)}.tl-dot.curr{background:var(--ac)}.tl-dot.wait{background:#CBD5E1}.tl-dot.late{background:var(--dg)}
.tl-info{flex:1}.tl-lb{font-size:12px;font-weight:700;color:var(--tx)}.tl-dt{font-size:10px;color:var(--tm);margin-top:1px}

.err-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:20px;text-align:center;color:#B91C1C}
@media(max-width:768px){.kpi-row{grid-template-columns:repeat(2,1fr)}.d-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="loadingScreen" class="loading"><div class="spinner"></div>MO 데이터를 불러오는 중...</div>
<div id="mainContent" style="display:none">

<div class="hdr">
<h1><span class="ic">MO</span> MO View / 생산현황표 / 生产现况表</h1>
<div class="hdr-btns">
<button onclick="window.open('https://creatorapp.zoho.com/jeramoda/eom/#Form:Add_MO','_blank')" style="background:var(--pr);color:#fff">+ New MO</button>
</div></div>

<div class="kpi-row" id="kpiRow"></div>

<!-- Pipeline -->
<div class="pipe-card">
<div class="pipe-title">Production Pipeline / 생산 파이프라인 / 生产流水线</div>
<div class="pipe-row" id="pipeRow"></div>
</div>

<!-- Filter -->
<div class="filter-bar">
<input type="text" class="search-box" id="searchBox" placeholder="🔍 MO#, SKU, Style, Factory 검색...">
<select class="fsel" id="filterSeason"><option value="">All Season</option></select>
<select class="fsel" id="filterOrder"><option value="">All Order Status</option></select>
<select class="fsel" id="filterProd"><option value="">All Prod Status</option></select>
</div>

<!-- Monthly Tables -->
<div id="monthlyTables"></div>

<!-- Timeline Calendar -->
<div id="calendarSection"></div>

</div>
<div id="errorScreen" style="display:none"><div class="err-box"><div style="font-weight:800;font-size:14px;margin-bottom:8px">데이터를 불러올 수 없습니다</div><div id="errorMsg" style="font-size:12px"></div></div></div>

<!-- Modal -->
<div class="modal-ov" id="modalOv"><div class="modal-box">
<div class="m-hd"><div class="m-hd-left"><div><div class="m-title" id="mTitle">-</div><div class="m-sub" id="mSub">-</div></div></div>
<div style="display:flex;align-items:center;gap:8px">
<button id="btnEditMO" style="background:#EFF6FF;color:var(--pr);border:1px solid #BFDBFE;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">✏️ Edit</button>
<div class="m-close" id="mClose">✕</div>
</div></div>
<div class="m-body" id="mBody"></div>
</div></div>

<script>
var APP="eom",REP="All_MO";
var allRec=[],filtered=[];
var today=new Date();var todayStr=today.toISOString().split("T")[0];

ZOHO.CREATOR.init().then(function(){loadData()});

function loadData(){
ZOHO.CREATOR.API.getAllRecords({appName:APP,reportName:REP,page:1,pageSize:200}).then(function(r){
if(r&&r.code===3000&&r.data){allRec=r.data;filtered=allRec.slice();renderAll();hide("loadingScreen");show("mainContent")}
else showErr("로드 실패")}).catch(function(e){showErr(JSON.stringify(e))})}

function show(i){document.getElementById(i).style.display="block"}
function hide(i){document.getElementById(i).style.display="none"}
function showErr(m){hide("loadingScreen");show("errorScreen");document.getElementById("errorMsg").textContent=m}
function g(r,f){var v=r[f];if(v==null||v==="")return"-";if(typeof v==="object"&&v.display_value)return v.display_value;return String(v)}
function escH(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}

// Date parsing helper (Zoho returns various formats)
function parseDate(v){
if(!v||v==="-")return null;
if(/^\d{4}-\d{2}-\d{2}/.test(v))return v.substring(0,10);
var m=v.match(/^(\d{1,2})-([A-Za-z]+)-(\d{4})/);
if(m){var months={Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};
var mm=months[m[2]]||"01";var dd=m[1].length===1?"0"+m[1]:m[1];return m[3]+"-"+mm+"-"+dd}
var m2=v.match(/([A-Za-z]+)\s+(\d{1,2}),?\s*(\d{4})/);
if(m2){var months2={Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};
var mm2=months2[m2[1].substring(0,3)]||"01";var dd2=m2[2].length===1?"0"+m2[2]:m2[2];return m2[3]+"-"+mm2+"-"+dd2}
return null}

function pSt(s){return(s||"").toLowerCase()}
function tc(s){var l=pSt(s);if(l.indexOf("confirmed")>=0||l.indexOf("delivered")>=0||l.indexOf("complete")>=0||l.indexOf("shipped")>=0||l.indexOf("done")>=0)return"t-ok";if(l.indexOf("progress")>=0||l.indexOf("cutting")>=0||l.indexOf("sewing")>=0||l.indexOf("fabric")>=0||l.indexOf("packing")>=0)return"t-wn";if(l.indexOf("delay")>=0||l.indexOf("cancel")>=0||l.indexOf("reject")>=0)return"t-dg";if(l.indexOf("pending")>=0)return"t-bl";return"t-dr"}

function isDelayed(r){
var ds=g(r,"Delivery_Status").toLowerCase();if(ds.indexOf("delay")>=0)return true;
var ed=parseDate(g(r,"Expected_Delivery"));var ps=g(r,"Production_Status").toLowerCase();
if(ed&&ps.indexOf("shipped")<0&&ps.indexOf("complete")<0){if(ed<todayStr)return true}
return false}

function getProdStage(r){
var s=g(r,"Production_Status").toLowerCase();
if(s.indexOf("shipped")>=0||s.indexOf("출고")>=0)return"Shipped";
if(s.indexOf("complete")>=0||s.indexOf("done")>=0||s.indexOf("완료")>=0)return"Done";
if(s.indexOf("packing")>=0||s.indexOf("포장")>=0)return"Packing";
if(s.indexOf("sewing")>=0||s.indexOf("봉제")>=0)return"Sewing";
if(s.indexOf("cutting")>=0||s.indexOf("재단")>=0)return"Cutting";
if(s.indexOf("fabric")>=0||s.indexOf("원단")>=0)return"Fabric";
return"Not Started"}

function renderAll(){renderKPI();renderPipeline();buildFilters();renderTables();renderCalendar()}

// KPI
function renderKPI(){
var t=allRec.length,ip=0,dl=0,dv=0,cf=0;
allRec.forEach(function(r){
var os=pSt(g(r,"Order_Status"));
if(os.indexOf("progress")>=0)ip++;
if(isDelayed(r))dl++;
if(os.indexOf("delivered")>=0)dv++;
if(os.indexOf("confirmed")>=0)cf++;
});
var tq=0;allRec.forEach(function(r){var q=parseInt(g(r,"Total_Quantity"))||0;tq+=q});
document.getElementById("kpiRow").innerHTML=
'<div class="kpi" style="border-top:3px solid var(--pr)"><div class="kpi-v" style="color:var(--pr)">'+t+'</div><div class="kpi-l">Total MO ('+tq.toLocaleString()+' pcs)</div></div>'+
'<div class="kpi" style="border-top:3px solid var(--wn)"><div class="kpi-v" style="color:var(--wn)">'+ip+'</div><div class="kpi-l">In Progress / 진행중</div></div>'+
'<div class="kpi" style="border-top:3px solid var(--dg)"><div class="kpi-v" style="color:var(--dg)">'+dl+'</div><div class="kpi-l">Delayed / 지연</div></div>'+
'<div class="kpi" style="border-top:3px solid #3B82F6"><div class="kpi-v" style="color:#3B82F6">'+cf+'</div><div class="kpi-l">Confirmed / 확정</div></div>'+
'<div class="kpi" style="border-top:3px solid var(--ok)"><div class="kpi-v" style="color:var(--ok)">'+dv+'</div><div class="kpi-l">Delivered / 출고완료</div></div>'}

// Pipeline
function renderPipeline(){
var stages=["Not Started","Fabric","Cutting","Sewing","Packing","Done","Shipped"];
var colors=["#94A3B8","#8B5CF6","#F97316","#EF4444","#22C55E","#3B82F6","#10B981"];
var labels=["미시작","원단","재단","봉제","포장","완료","출고"];
var counts=[0,0,0,0,0,0,0];
allRec.forEach(function(r){var st=getProdStage(r);var i=stages.indexOf(st);if(i>=0)counts[i]++});
var h="";
stages.forEach(function(s,i){
if(i>0)h+='<div class="pipe-arr">▶</div>';
h+='<div class="pipe-step"><div class="pipe-n" style="color:'+colors[i]+'">'+counts[i]+'</div><div class="pipe-lb" style="color:'+colors[i]+'">'+s+'</div><div class="pipe-lb2">'+labels[i]+'</div><div class="pipe-bar" style="background:'+colors[i]+'"></div></div>'});
document.getElementById("pipeRow").innerHTML=h}

// Filters
function buildFilters(){
var se={},os={},ps={};
allRec.forEach(function(r){var s=g(r,"Season");if(s!=="-")se[s]=1;var o=g(r,"Order_Status");if(o!=="-")os[o]=1;var p=g(r,"Production_Status");if(p!=="-")ps[p]=1});
var el;
el=document.getElementById("filterSeason");Object.keys(se).sort().forEach(function(k){el.innerHTML+='<option value="'+k+'">'+k+'</option>'});
el=document.getElementById("filterOrder");Object.keys(os).sort().forEach(function(k){el.innerHTML+='<option value="'+k+'">'+k+'</option>'});
el=document.getElementById("filterProd");Object.keys(ps).sort().forEach(function(k){el.innerHTML+='<option value="'+k+'">'+k+'</option>'})}

["searchBox"].forEach(function(id){document.getElementById(id).addEventListener("input",af)});
["filterSeason","filterOrder","filterProd"].forEach(function(id){document.getElementById(id).addEventListener("change",af)});
function af(){
var q=document.getElementById("searchBox").value.toLowerCase().trim();
var fs=document.getElementById("filterSeason").value;
var fo=document.getElementById("filterOrder").value;
var fp=document.getElementById("filterProd").value;
filtered=allRec.filter(function(r){
if(q){var h=(g(r,"MO_Number")+" "+g(r,"Style_SKU")+" "+g(r,"Style_Name")+" "+g(r,"Factory")).toLowerCase();if(h.indexOf(q)<0)return false}
if(fs&&g(r,"Season")!==fs)return false;
if(fo&&g(r,"Order_Status")!==fo)return false;
if(fp&&g(r,"Production_Status")!==fp)return false;return true});
renderTables();renderCalendar()}

// Monthly Tables
function renderTables(){
var groups={};
filtered.forEach(function(r){var py=g(r,"Plan_Year"),pm=g(r,"Plan_Month");var key=(py!=="-"&&pm!=="-")?(py+"년 "+pm+"월"):"미지정";if(!groups[key])groups[key]=[];groups[key].push(r)});
var html="";
Object.keys(groups).sort().forEach(function(key){
var items=groups[key];
html+='<div class="mt-sec"><div class="mt-card"><div class="mt-hd"><div class="mt-title">📅 '+escH(key)+'</div><span class="mt-cnt">'+items.length+' MOs</span></div>';
html+='<div class="tbl-scroll"><table class="zt"><thead><tr><th style="width:7%">MO#</th><th style="width:12%">SKU</th><th style="width:14%">Style</th><th style="width:10%">Factory</th><th style="width:7%;text-align:center">Qty</th><th style="width:14%">Order</th><th style="width:14%">Production</th><th style="width:11%">Exp.Del</th><th style="width:11%">Ship</th></tr></thead><tbody>';
items.forEach(function(r){
var delayed=isDelayed(r);
var trStyle=delayed?'style="background:#FEF2F2"':'';
html+='<tr data-id="'+r["ID"]+'" '+trStyle+'>';
html+='<td class="mo-num">'+escH(g(r,"MO_Number"))+'</td>';
html+='<td style="font-size:9px;font-weight:600">'+escH(g(r,"Style_SKU"))+'</td>';
html+='<td>'+escH(g(r,"Style_Name"))+'</td>';
html+='<td>'+escH(g(r,"Factory"))+'</td>';
html+='<td style="text-align:center;font-weight:700">'+escH(g(r,"Total_Quantity"))+'</td>';
html+='<td><span class="tag '+tc(g(r,"Order_Status"))+'">'+escH(g(r,"Order_Status"))+'</span></td>';
html+='<td><span class="tag '+tc(g(r,"Production_Status"))+'">'+escH(g(r,"Production_Status"))+'</span></td>';
var ed=g(r,"Expected_Delivery");
html+='<td>'+escH(ed)+(delayed?' <span class="dly-badge">DELAYED</span>':'')+'</td>';

// Calendar
// Date parsing helper (Zoho returns various formats)
function parseDate(v){
if(!v||v==="-")return null;
// Try ISO: 2026-03-25
if(/^\d{4}-\d{2}-\d{2}/.test(v))return v.substring(0,10);
// Try DD-Mon-YYYY: 25-Mar-2026
var m=v.match(/^(\d{1,2})-([A-Za-z]+)-(\d{4})/);
if(m){var months={Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};
var mm=months[m[2]]||"01";var dd=m[1].length===1?"0"+m[1]:m[1];return m[3]+"-"+mm+"-"+dd}
// Try Mon DD, YYYY
var m2=v.match(/([A-Za-z]+)\s+(\d{1,2}),?\s*(\d{4})/);
if(m2){var months2={Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};
var mm2=months2[m2[1].substring(0,3)]||"01";var dd2=m2[2].length===1?"0"+m2[2]:m2[2];return m2[3]+"-"+mm2+"-"+dd2}
return null}

var sewS=dayParse(g(r,"Sewing_Start_Date"),curMM);
var sewE=dayParse(g(r,"Sewing_Completion_Date"),curMM);

else if(sewS===d){var sp=sewE?sewE-sewS+1:1;if(sp<1)sp=1;if(d+sp-1>daysInMonth)sp=daysInMonth-d+1;skip=sp-1;h+='<td colspan="'+sp+'"><div class="cal-bar cb-sew">SEW</div></td>'}

else if(shD===d){h+='<td><div class="cal-bar cb-ship">SHIP</div></td>'}
else{h+='<td></td>'}
}
h+='</tr>'});

function dayParse(dateStr,curMM){
var p=parseDate(dateStr);
if(!p||p.substring(0,7)!==curMM)return 0;
return parseInt(p.substring(8,10))||0}
