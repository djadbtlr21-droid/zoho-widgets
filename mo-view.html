<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MO View v10</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://js.zohostatic.com/creator/widgets/version/1.0/widgetsdk-min.js"></script>
<style>
:root{--pr:#1E3A8A;--ac:#3B82F6;--bg:#F1F5F9;--bd:#E2E8F0;--tx:#0F172A;--tm:#64748B;--cw:#FFF;--ok:#10B981;--wn:#F59E0B;--dg:#EF4444;--dr:#94A3B8}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans KR',-apple-system,sans-serif}
body{background:var(--bg);padding:16px;min-height:100vh}
.spinner{width:40px;height:40px;border:4px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;color:var(--tm);font-size:13px;font-weight:600}

/* Header */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:17px;font-weight:900;color:var(--tx);display:flex;align-items:center;gap:8px}
.hdr h1 .ic{width:28px;height:28px;background:var(--pr);border-radius:5px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:900}
.hdr-btns{display:flex;gap:8px;align-items:center}
.btn-primary{background:#A5B4FC;color:#1E1B4B;border:none;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer}
.btn-cctv{background:#C4B5FD;color:#4C1D95;border:none;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer}
.btn-cctv:hover{background:#A78BFA}
.btn-primary:hover{background:#818CF8}

/* ★ KPI 상단 행 - 4컬럼 (월별 3 + 지연현황 1) */
.mkpi-row{display:grid;grid-template-columns:1fr 1fr 1fr 280px;gap:12px;margin-bottom:16px}

/* 월별 KPI 카드 */
.mkpi-card{background:var(--cw);border:1px solid var(--bd);border-radius:10px;padding:14px;position:relative;overflow:hidden}
.mkpi-card::before{content:'';position:absolute;left:0;top:0;width:100%;height:3px}
.mkpi-card:nth-child(1)::before{background:#A5B4FC}
.mkpi-card:nth-child(2)::before{background:#FDE68A}
.mkpi-card:nth-child(3)::before{background:#A7F3D0}
.mkpi-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mkpi-title{font-size:12px;font-weight:800;color:var(--tx)}
.mkpi-drop{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;background:#F1F5F9;color:var(--tm);border:1px solid #CBD5E1}
.mkpi-body{display:flex;align-items:center;gap:12px}
.mkpi-ring{position:relative;width:64px;height:64px;flex-shrink:0}
.mkpi-ring svg{transform:rotate(-90deg)}
.mkpi-ring-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:13px;font-weight:900;color:var(--tx)}
.mkpi-stats{display:grid;grid-template-columns:1fr 1fr;gap:5px;flex:1}
.mkpi-stat{text-align:center;padding:4px 5px;border-radius:6px;background:#FAFBFC;border:1px solid #F1F5F9;cursor:pointer;transition:background .15s}
.mkpi-stat:hover{background:#EFF6FF;border-color:#BFDBFE}
.mkpi-stat-n{font-size:16px;font-weight:900;line-height:1}
.mkpi-stat-l{font-size:7px;font-weight:700;color:var(--tm);margin-top:2px;line-height:1.3}
.mkpi-stat .dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:2px;vertical-align:middle}
.mkpi-footer{margin-top:8px;padding-top:6px;border-top:1px solid #F1F5F9;font-size:9px;color:var(--tm);display:flex;gap:12px}
.mkpi-footer span{font-weight:600}
.mkpi-footer b{color:var(--tx);font-weight:800}

/* ★ 생산 지연 현황 카드 */
.delay-card{background:#FFF5F5;border:1px solid #FECACA;border-radius:10px;padding:14px;position:relative;overflow:hidden}
.delay-card::before{content:'';position:absolute;left:0;top:0;width:100%;height:3px;background:#FCA5A5}
.delay-card-title{font-size:12px;font-weight:800;color:#DC2626;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.delay-card-sub{font-size:9px;color:#EF4444;margin-bottom:10px;font-weight:600}
.delay-total{font-size:22px;font-weight:900;color:#DC2626;text-align:center;margin-bottom:8px}
.delay-total span{font-size:10px;font-weight:600;color:#EF4444;display:block;margin-top:2px}
.delay-list{display:flex;flex-direction:column;gap:5px;max-height:160px;overflow-y:auto}
.delay-item{background:#fff;border:1px solid #FECACA;border-radius:6px;padding:6px 8px;cursor:pointer;transition:background .1s}
.delay-item:hover{background:#FEF2F2}
.delay-mo{font-size:10px;font-weight:800;color:#DC2626}
.delay-style{font-size:8px;color:#64748B;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.delay-badge{display:inline-block;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;background:#FEE2E2;color:#DC2626;margin-left:4px}

/* Pipeline - 파스텔톤 */
.pipe-card{background:var(--cw);border:1px solid var(--bd);border-radius:8px;padding:18px;margin-bottom:16px}
.pipe-title{font-size:11px;font-weight:800;color:var(--tm);text-transform:uppercase;margin-bottom:12px;letter-spacing:.5px}
.pipe-row{display:flex;align-items:center;gap:4px;overflow-x:auto}
.pipe-step{flex:1;text-align:center;min-width:80px;padding:10px 4px;border-radius:8px;cursor:pointer;transition:transform .1s,box-shadow .1s}
.pipe-step:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.pipe-n{font-size:22px;font-weight:900;line-height:1}
.pipe-lb{font-size:9px;font-weight:700;margin-top:4px}
.pipe-lb2{font-size:7px;color:var(--tm);margin-top:2px}
.pipe-bar{height:4px;border-radius:2px;margin-top:6px}
.pipe-arr{color:#CBD5E1;font-size:10px;flex-shrink:0}

/* Filters & Tables */
.search-box{background:#fff;border:1px solid var(--bd);border-radius:6px;padding:5px 10px;font-size:11px;outline:none;font-family:inherit}
.search-box:focus{border-color:var(--ac);box-shadow:0 0 0 2px rgba(59,130,246,.1)}
.fsel{background:#fff;border:1px solid var(--bd);border-radius:6px;padding:5px 8px;font-size:11px;outline:none;font-family:inherit;cursor:pointer}
.mt-sec{margin-bottom:32px}
.mt-card{background:var(--cw);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.mt-hd{padding:10px 16px;background:#F8FAFC;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.mt-title{font-size:13px;font-weight:800;color:var(--tx)}
.mt-cnt{font-size:11px;color:var(--tm);font-weight:600;background:#F1F5F9;padding:2px 8px;border-radius:10px;border:1px solid #CBD5E1}
.mf-bar{display:flex;justify-content:flex-end;align-items:center;padding:8px 16px;gap:8px;background:#FAFBFC;border-bottom:1px solid var(--bd);flex-wrap:wrap}
.tbl-scroll{overflow-x:auto}
table.zt{width:100%;border-collapse:collapse;font-size:11px;text-align:left;table-layout:fixed}
.zt th{background:#F1F5F9;padding:9px 8px;color:var(--tm);font-weight:800;font-size:10px;border-bottom:1px solid var(--bd);white-space:nowrap}
.zt td{padding:10px 8px;border-bottom:1px solid #F1F5F9;color:var(--tx);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;height:40px}
.zt tbody tr{cursor:pointer;transition:background .1s}.zt tbody tr:hover td{background:#EFF6FF}
.zt .mo-num{font-weight:800;color:var(--pr)}
.tag{padding:3px 8px;border-radius:4px;font-size:9px;font-weight:700;display:inline-flex;align-items:center;white-space:nowrap}
.t-ok{background:#D1FAE5;color:#065F46;border:1px solid #A7F3D0}
.t-wn{background:#FEF3C7;color:#B45309;border:1px solid #FDE68A}
.t-dg{background:#FEF2F2;color:#B91C1C;border:1px solid #FECACA}
.t-dr{background:#F1F5F9;color:#475569;border:1px solid #CBD5E1}
.t-bl{background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE}
.dly-badge{display:inline-block;padding:1px 4px;border-radius:3px;font-size:7px;font-weight:700;background:#FEF2F2;color:#DC2626;margin-left:2px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* Timeline */
.tl-card{background:var(--cw);border:1px solid var(--bd);border-radius:0 0 8px 8px;border-top:2px dashed var(--bd);overflow:hidden}
.tl-hd{padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;background:#FAFBFC;border-bottom:1px solid var(--bd)}
.tl-title{font-size:12px;font-weight:800;color:var(--tx)}
.tl-legend{display:flex;gap:10px;font-size:9px;color:var(--tm);align-items:center}
.tl-legend span{display:flex;align-items:center;gap:3px}
.tl-dot{width:10px;height:10px;border-radius:3px;display:inline-block}
.tl-type-badge{padding:1px 6px;border-radius:3px;font-size:8px;font-weight:700}
.tl-scroll{overflow-x:auto;padding:0 0 8px}
.tl-tbl{width:100%;border-collapse:collapse;font-size:10px;table-layout:fixed;min-width:1000px}
.tl-tbl th,.tl-tbl td{border:1px solid #EEF2F6}
.tl-tbl th{background:#F8FAFC;color:var(--tm);font-weight:700;padding:6px 0;text-align:center;font-size:9px}
.tl-tbl th.wk{background:#FEF8F8;color:#E87979}
.tl-tbl th.today{background:#BFDBFE;color:#1D4ED8;font-weight:900;position:relative}
.tl-tbl th.today::after{content:'▼';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);font-size:8px;color:#3B82F6}
.tl-tbl .info-cell{width:200px;min-width:200px;text-align:left;background:#FAFBFC;padding:6px 10px;position:sticky;left:0;z-index:2;border-right:2px solid var(--bd)}
.tl-tbl td{padding:0;vertical-align:middle;height:24px;background:#FEFEFE}
.tl-tbl td.today-col{position:relative;background:#EFF6FF !important}
.tl-tbl td.today-col::after{content:'';position:absolute;left:50%;top:0;width:2px;height:100%;background:rgba(59,130,246,.4);transform:translateX(-50%);pointer-events:none;z-index:1}
.tl-tbl tr.mo-gap td{height:20px;background:#F8FAFC !important;border-top:2px solid #E2E8F0;border-bottom:none}
.tl-tbl tr.mo-gap .info-cell{background:#F8FAFC !important}
.tl-bar{height:100%;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;white-space:nowrap;overflow:hidden;min-height:16px}
.pb-fab{background:transparent;border:1.5px dashed #C4B5FD;color:#7C3AED}
.pb-cut{background:transparent;border:1.5px dashed #FDE68A;color:#CA8A04}
.pb-sew{background:transparent;border:1.5px dashed #BAE6FD;color:#0284C7}
.pb-pack{background:transparent;border:1.5px dashed #A7F3D0;color:#059669}
.pb-ship{background:transparent;border:1.5px dashed #93C5FD;color:#2563EB}
.ab-fab{background:#DDD6FE;color:#6D28D9}
.ab-cut{background:#FEF3C7;color:#A16207}
.ab-sew{background:#E0F2FE;color:#0369A1}
.ab-pack{background:#D1FAE5;color:#047857}
.ab-ship{background:#BFDBFE;color:#1D4ED8}
.tl-mo-info{cursor:pointer}.tl-mo-info:hover{background:#EFF6FF !important}
.tl-mo-wrap{display:flex;align-items:center;gap:8px}
.tl-mo-thumb{width:38px;height:38px;background:#F1F5F9;border:1px solid #E2E8F0;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#94A3B8;flex-shrink:0;overflow:hidden}
.tl-mo-thumb img{width:100%;height:100%;object-fit:cover}
.tl-mo-num{font-size:11px;font-weight:800;color:var(--pr)}.tl-mo-name{font-size:9px;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}.tl-mo-meta{font-size:8px;color:#94A3B8;margin-top:1px}

/* ★★★ 팝업 모달 (KPI 탭 & 파이프라인 & 상세) */
.pop-ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:2000;justify-content:center;align-items:center;backdrop-filter:blur(2px)}
.pop-ov.active{display:flex}
.pop-box{background:#fff;border-radius:12px;width:92%;max-width:700px;max-height:82vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .2s ease-out}
.pop-hd{padding:16px 20px 12px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:10;border-radius:12px 12px 0 0}
.pop-title{font-size:15px;font-weight:800;color:var(--pr)}
.pop-sub{font-size:11px;color:var(--tm);margin-top:2px}
.pop-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--bd);background:#F8FAFC;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--tm);flex-shrink:0}
.pop-close:hover{background:#FEF2F2;color:var(--dg)}
.pop-body{padding:16px 20px}
.pop-item{padding:10px 12px;border:1px solid var(--bd);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:background .1s;display:flex;justify-content:space-between;align-items:center}
.pop-item:hover{background:#EFF6FF;border-color:#BFDBFE}
.pop-item-left .pi-mo{font-size:12px;font-weight:800;color:var(--pr)}
.pop-item-left .pi-name{font-size:10px;color:var(--tm);margin-top:2px}
.pop-item-left .pi-meta{font-size:9px;color:#94A3B8;margin-top:2px}
.pop-empty{text-align:center;padding:30px;color:var(--tm);font-size:13px}

/* 상세 모달 (기존 openModal용) */
.modal-ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:3000;justify-content:center;align-items:center;backdrop-filter:blur(2px)}
.modal-ov.active{display:flex}
.modal-box{background:#fff;border-radius:12px;width:92%;max-width:800px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .25s ease-out}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.m-hd{padding:20px 24px 16px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:#fff;z-index:10;border-radius:12px 12px 0 0}
.m-title{font-size:18px;font-weight:900;color:var(--pr)}.m-sub{font-size:12px;color:var(--tm);margin-top:2px}
.m-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--bd);background:#F8FAFC;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--tm)}.m-close:hover{background:#FEF2F2;color:var(--dg)}
.m-body{padding:20px 24px}.m-sec{margin-bottom:24px}
.m-sec-t{font-size:12px;font-weight:800;color:var(--pr);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #EFF6FF}
.d-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.d-item{display:flex;flex-direction:column;gap:3px;padding:6px 8px;background:#FAFBFC;border-radius:6px;border:1px solid #F1F5F9}
.d-label{font-size:9px;font-weight:700;color:var(--tm)}.d-val{font-size:13px;font-weight:600;color:var(--tx)}.d-val.empty{color:#CBD5E1;font-style:italic}
.tl-modal{margin-top:8px}.tl-item{display:flex;align-items:flex-start;gap:12px;padding:6px 0;position:relative}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:11px;top:28px;width:2px;height:calc(100% - 14px);background:#E2E8F0}
.tl-dot-m{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;z-index:2}
.tl-dot-m.done{background:#86EFAC;color:#065F46}.tl-dot-m.curr{background:#93C5FD;color:#1E40AF}.tl-dot-m.wait{background:#CBD5E1;color:#64748B}
.tl-info-m{flex:1}.tl-lb-m{font-size:12px;font-weight:700;color:var(--tx)}.tl-dt-m{font-size:10px;color:var(--tm);margin-top:1px}
.err-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:20px;text-align:center;color:#B91C1C}
@media(max-width:900px){.mkpi-row{grid-template-columns:1fr 1fr}.d-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.mkpi-row{grid-template-columns:1fr}.d-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="loadingScreen" class="loading"><div class="spinner"></div>MO 데이터를 불러오는 중...</div>
<div id="mainContent" style="display:none">
<div class="hdr">
  <h1><span class="ic">MO</span> MO View / 생산현황표 / 生产现况表</h1>
  <div class="hdr-btns">
    <button class="btn-cctv" onclick="window.open('https://www.google.com','_blank')">📹 CCTV</button>
    <button class="btn-primary" onclick="window.open('https://creatorapp.zoho.com/jeramoda/eom/#Form:Add_MO','_blank')">+ New MO</button>
  </div>
</div>
<div class="mkpi-row" id="mkpiRow"></div>
<div class="pipe-card">
  <div class="pipe-title">PRODUCTION PIPELINE / 생산 파이프라인 / 生产流水线</div>
  <div class="pipe-row" id="pipeRow"></div>
</div>
<div id="monthlyContent"></div>
</div>
<div id="errorScreen" style="display:none"><div class="err-box"><div style="font-weight:800;font-size:14px;margin-bottom:8px">데이터를 불러올 수 없습니다</div><div id="errorMsg" style="font-size:12px"></div></div></div>

<!-- ★ KPI 탭 팝업 -->
<div class="pop-ov" id="kpiPopOv">
  <div class="pop-box">
    <div class="pop-hd">
      <div><div class="pop-title" id="kpiPopTitle">-</div><div class="pop-sub" id="kpiPopSub">-</div></div>
      <div class="pop-close" id="kpiPopClose">✕</div>
    </div>
    <div class="pop-body" id="kpiPopBody"></div>
  </div>
</div>

<!-- ★ 파이프라인 팝업 -->
<div class="pop-ov" id="pipePopOv">
  <div class="pop-box">
    <div class="pop-hd">
      <div><div class="pop-title" id="pipePopTitle">-</div><div class="pop-sub" id="pipePopSub">-</div></div>
      <div class="pop-close" id="pipePopClose">✕</div>
    </div>
    <div class="pop-body" id="pipePopBody"></div>
  </div>
</div>

<!-- 상세 모달 -->
<div class="modal-ov" id="modalOv"><div class="modal-box">
  <div class="m-hd"><div><div class="m-title" id="mTitle">-</div><div class="m-sub" id="mSub">-</div></div>
  <div style="display:flex;align-items:center;gap:8px">
    <button onclick="window.open('https://creatorapp.zoho.com/jeramoda/eom/#Report:All_MO','_blank')" style="background:#EFF6FF;color:var(--pr);border:1px solid #BFDBFE;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">✏️ Edit</button>
    <div class="m-close" id="mClose">✕</div>
  </div></div>
  <div class="m-body" id="mBody"></div>
</div></div>

<script>
var APP="eom",REP="All_MO",allRec=[],today=new Date(),todayStr=today.toISOString().split("T")[0];
var CAT_MAP={"S":"Set / 세트 / 套装","I":"Individual / 단품 / 单品"};
function catName(v){return(!v||v==="-")?"-":(CAT_MAP[v]||v)}
function cleanFactory(v){if(!v||v==="-")return"-";return v.replace(/^[_\s]*\d+[_\s]*/,"")}
function pd(v){
  if(!v||v==="-")return null;
  if(/^\d{4}-\d{2}-\d{2}/.test(v))return v.substring(0,10);
  var m=v.match(/^(\d{1,2})-([A-Za-z]+)-(\d{4})/);
  if(m){var mo={Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};
  return m[3]+"-"+(mo[m[2]]||"01")+"-"+(m[1].length===1?"0"+m[1]:m[1])}return null}

ZOHO.CREATOR.init().then(function(){
  ZOHO.CREATOR.API.getAllRecords({appName:APP,reportName:REP,page:1,pageSize:200}).then(function(r){
    if(r&&r.code===3000&&r.data){allRec=r.data;renderAll();hide("loadingScreen");show("mainContent")}
    else showErr("로드 실패")}).catch(function(e){showErr(JSON.stringify(e))})});

function show(i){document.getElementById(i).style.display="block"}
function hide(i){document.getElementById(i).style.display="none"}
function showErr(m){hide("loadingScreen");show("errorScreen");document.getElementById("errorMsg").textContent=m}
function g(r,f){var v=r[f];if(v==null||v==="")return"-";if(typeof v==="object"&&v.display_value)return v.display_value;return String(v)}
function escH(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function tc(s){var l=(s||"").toLowerCase();
  if(l.indexOf("confirmed")>=0||l.indexOf("delivered")>=0||l.indexOf("complete")>=0||l.indexOf("shipped")>=0||l.indexOf("done")>=0)return"t-ok";
  if(l.indexOf("progress")>=0||l.indexOf("cutting")>=0||l.indexOf("sewing")>=0||l.indexOf("fabric")>=0||l.indexOf("packing")>=0)return"t-wn";
  if(l.indexOf("delay")>=0||l.indexOf("cancel")>=0)return"t-dg";
  if(l.indexOf("pending")>=0)return"t-bl";return"t-dr"}
function isDelayed(r){var ds=g(r,"Delivery_Status");return ds.indexOf("Delay")>=0||ds.indexOf("지연")>=0}
function getProdStage(r){var s=g(r,"Production_Status").toLowerCase();
  if(s.indexOf("shipped")>=0)return"Shipped";if(s.indexOf("complete")>=0||s.indexOf("done")>=0)return"Done";
  if(s.indexOf("packing")>=0)return"Packing";if(s.indexOf("sewing")>=0)return"Sewing";
  if(s.indexOf("cutting")>=0)return"Cutting";if(s.indexOf("fabric")>=0)return"Fabric";return"Not Started"}
function getImg1(r){var i=r["Style_Image"];if(!i)return null;if(Array.isArray(i)&&i.length>0)return i[0];if(typeof i==="string"&&i.length>5)return i;if(typeof i==="object"&&i.display_value)return i.display_value;return null}

function parseYM(key){var m=key.match(/(\d+)년\s*(\d+)월/);if(!m)return null;var y=parseInt(m[1]);if(y<100)y+=2000;return{y:y,m:parseInt(m[2])}}

function buildTimeline(items,yr,mo,label){
  var daysInMonth=new Date(yr,mo,0).getDate(),curMM=yr+"-"+(mo<10?"0":"")+mo,todayD=(today.getFullYear()===yr&&today.getMonth()+1===mo)?today.getDate():0;
  var h='<div class="tl-card"><div class="tl-hd"><div class="tl-title">📊 '+escH(label)+' Production Timeline / 生产时间线</div>';
  h+='<div class="tl-legend"><span class="tl-type-badge" style="background:#F5F3FF;color:#7C3AED;border:1px dashed #C4B5FD">P = Plan</span><span class="tl-type-badge" style="background:#FEF3C7;color:#B45309">A = Actual</span>';
  h+='<span><span class="tl-dot" style="background:#DDD6FE"></span>Fab</span><span><span class="tl-dot" style="background:#FEF3C7;border:1px solid #FDE68A"></span>Cut</span><span><span class="tl-dot" style="background:#E0F2FE;border:1px solid #BAE6FD"></span>Sew</span><span><span class="tl-dot" style="background:#D1FAE5;border:1px solid #A7F3D0"></span>Pack</span><span><span class="tl-dot" style="background:#BFDBFE"></span>Ship</span></div></div>';
  h+='<div class="tl-scroll"><table class="tl-tbl"><thead><tr><th class="info-cell">MO / Style</th>';
  for(var d=1;d<=daysInMonth;d++){var dt=new Date(yr,mo-1,d),dow=dt.getDay(),cls=(dow===0||dow===6)?"wk":"";if(d===todayD)cls="today";h+='<th class="'+cls+'">'+d+'</th>'}
  h+='</tr></thead><tbody>';
  var hasAny=false,first=true;
  items.forEach(function(r){
    var fields=["Plan_Fabric_Date","Plan_Cutting_Start","Plan_Cutting_End","Plan_Sewing_Start","Plan_Sewing_End","Plan_Packing_Start","Plan_Packing_End","Fabric_In_house_Date","Cutting_Start_Date","Cutting_End_Date","Sewing_Start_Date","Sewing_Completion_Date","Packing_Start_Date","Packing_End_Date","Ship_Date"];
    var inMonth=false;fields.forEach(function(f){var p=pd(g(r,f));if(p&&p.substring(0,7)===curMM)inMonth=true});
    var edp=pd(g(r,"Expected_Delivery"));if(edp&&edp.substring(0,7)===curMM)inMonth=true;
    if(!inMonth)return;hasAny=true;
    if(!first){h+='<tr class="mo-gap"><td class="info-cell"></td>';for(var gd=1;gd<=daysInMonth;gd++){h+='<td'+((gd===todayD)?' class="today-col"':'')+'></td>'}h+='</tr>'}first=false;
    var iu=getImg1(r),ia=iu?' data-tlimg="'+iu+'"':'';
    h+='<tr><td class="info-cell tl-mo-info" rowspan="2" data-id="'+r["ID"]+'"><div class="tl-mo-wrap"><div class="tl-mo-thumb"'+ia+'>👕</div><div><div class="tl-mo-num">'+escH(g(r,"MO_Number"))+'</div><div class="tl-mo-name">'+escH(g(r,"Style_Name"))+'</div><div class="tl-mo-meta">'+escH(cleanFactory(g(r,"Factory")))+' · '+(parseInt(g(r,"Total_Quantity"))||0).toLocaleString()+'pcs</div></div></div></td>';
    var pF=dayInMo(g(r,"Plan_Fabric_Date"),curMM),pCS=dayInMo(g(r,"Plan_Cutting_Start"),curMM),pCE=dayInMo(g(r,"Plan_Cutting_End"),curMM),pSS=dayInMo(g(r,"Plan_Sewing_Start"),curMM),pSE=dayInMo(g(r,"Plan_Sewing_End"),curMM),pPS=dayInMo(g(r,"Plan_Packing_Start"),curMM),pPE=dayInMo(g(r,"Plan_Packing_End"),curMM),pSh=dayInMo(g(r,"Expected_Delivery"),curMM);
    h+=buildBarRow(daysInMonth,todayD,pF,pCS,pCE,pSS,pSE,pPS,pPE,pSh,true)+'</tr>';
    var aF=dayInMo(g(r,"Fabric_In_house_Date"),curMM),aCS=dayInMo(g(r,"Cutting_Start_Date"),curMM),aCE=dayInMo(g(r,"Cutting_End_Date"),curMM),aSS=dayInMo(g(r,"Sewing_Start_Date"),curMM),aSE=dayInMo(g(r,"Sewing_Completion_Date"),curMM),aPS=dayInMo(g(r,"Packing_Start_Date"),curMM),aPE=dayInMo(g(r,"Packing_End_Date"),curMM),aSh=dayInMo(g(r,"Ship_Date"),curMM);
    h+='<tr>'+buildBarRow(daysInMonth,todayD,aF,aCS,aCE,aSS,aSE,aPS,aPE,aSh,false)+'</tr>'});
  if(!hasAny)h+='<tr><td class="info-cell" colspan="'+(daysInMonth+1)+'" style="text-align:center;padding:16px;color:#94A3B8;font-size:10px">이 달에 해당하는 일정이 없습니다 / 本月无生产计划</td></tr>';
  h+='</tbody></table></div></div>';return h}

function dayInMo(v,curMM){var p=pd(v);if(!p||p.substring(0,7)!==curMM)return 0;return parseInt(p.substring(8,10))||0}
function buildBarRow(days,todayD,fab,cs,ce,ss,se,ps,pe,ship,isPlan){
  var pf=isPlan?"pb":"ab",map=new Array(days+2);for(var i=0;i<=days+1;i++)map[i]=null;
  if(fab>0&&fab<=days)map[fab]="fab";
  if(cs>0){for(var i=cs;i<=(ce||cs)&&i<=days;i++)map[i]="cut"}
  if(ss>0){for(var i=ss;i<=(se||ss)&&i<=days;i++)map[i]="sew"}
  if(ps>0){for(var i=ps;i<=(pe||ps)&&i<=days;i++)map[i]="pack"}
  if(ship>0&&ship<=days)map[ship]="ship";
  var lb={fab:"FAB",cut:"CUT",sew:"SEW",pack:"PACK",ship:"SHIP"},h="",d=1;
  while(d<=days){var t=map[d],tc2=(d===todayD)?' class="today-col"':'';
    if(!t){h+='<td'+tc2+'></td>';d++}
    else{var sp=1;while(d+sp<=days&&map[d+sp]===t)sp++;
      h+='<td'+(sp>1?' colspan="'+sp+'"':'')+tc2+'><div class="tl-bar '+pf+'-'+t+'">'+lb[t]+'</div></td>';d+=sp}}
  return h}

/* 상세 모달 */
function openModal(r){
  document.getElementById("mTitle").textContent=g(r,"MO_Number");
  document.getElementById("mSub").textContent=g(r,"Style_Name")+" — "+g(r,"Style_SKU");
  var h='';
  function dv(v){return v==="-"?'<span class="d-val empty">미입력</span>':escH(v)}
  function it(l,v){return'<div class="d-item"><span class="d-label">'+l+'</span><span class="d-val">'+v+'</span></div>'}
  h+='<div class="m-sec"><div class="m-sec-t">📌 기본 정보 / 订单信息</div><div class="d-grid">';
  h+=it("MO Number / MO번호",dv(g(r,"MO_Number")));h+=it("Style SKU",dv(g(r,"Style_SKU")));h+=it("Style Name / 스타일명",dv(g(r,"Style_Name")));
  h+=it("Season / 시즌",dv(g(r,"Season")));h+=it("Category / 구분",dv(catName(g(r,"Category"))));h+=it("Factory / 공장",dv(cleanFactory(g(r,"Factory"))));
  h+=it("Order Date / 주문일",dv(g(r,"Order_Date")));h+=it("Order Status / 주문상태",'<span class="tag '+tc(g(r,"Order_Status"))+'">'+escH(g(r,"Order_Status"))+'</span>');
  h+=it("Expected Delivery / 예상납기",dv(g(r,"Expected_Delivery")));h+=it("Delivery Status / 납기상태",isDelayed(r)?'<span class="tag t-dg">DELAYED / 지연 / 延误</span>':dv(g(r,"Delivery_Status")));
  h+='</div></div>';
  h+='<div class="m-sec"><div class="m-sec-t">📦 수량 & 금액 / 数量&金额</div><div class="d-grid">';
  h+=it("Total Qty / 총수량 / 总数量",dv(g(r,"Total_Quantity")));h+=it("Grand Total / 총금액 / 总金额",dv(g(r,"Grand_Total")));h+=it("Notes / 메모 / 备注",dv(g(r,"Notes")));h+='</div></div>';
  h+='<div class="m-sec"><div class="m-sec-t">🏭 생산 추적 / 生产跟踪</div><div class="d-grid">';
  h+=it("Production Status / 생산상태",'<span class="tag '+tc(g(r,"Production_Status"))+'">'+escH(g(r,"Production_Status"))+'</span>');
  h+=it("Fabric Status / 원단상태 / 面料进度",dv(g(r,"Fabric_Status")));h+=it("Progress / 진척률 / 进度",dv(g(r,"Progress")));
  h+=it("Cut Qty / 재단수량 / 裁剪数量",dv(g(r,"Cut_Quantity")));h+=it("Finished Qty / 완제품 / 成衣数量",dv(g(r,"Finished_Quantity")));h+='</div></div>';
  h+='<div class="m-sec"><div class="m-sec-t">📅 생산 일정 / 生产日期</div><div class="tl-modal">';
  [{l:"Fabric In / 원단입고 / 面料入库",k:"Fabric_In_house_Date"},{l:"Cutting Start / 재단시작 / 开始裁剪",k:"Cutting_Start_Date"},{l:"Cutting End / 재단완성 / 裁剪完成",k:"Cutting_End_Date"},
   {l:"Sewing Start / 봉제시작 / 车缝开始",k:"Sewing_Start_Date"},{l:"Sewing End / 봉제완성 / 车缝完成",k:"Sewing_Completion_Date"},
   {l:"Packing Start / 포장시작 / 包装开始",k:"Packing_Start_Date"},{l:"Packing End / 포장완성 / 包装完成",k:"Packing_End_Date"},
   {l:"Ship Date / 선적일 / 出货日期",k:"Ship_Date"}].forEach(function(t,i){
    var v=g(r,t.k),p=pd(v),cls="wait";if(p){cls=p<=todayStr?"done":"curr"}
    h+='<div class="tl-item"><div class="tl-dot-m '+cls+'">'+(i+1)+'</div><div class="tl-info-m"><div class="tl-lb-m">'+t.l+'</div><div class="tl-dt-m">'+escH(v)+'</div></div></div>'});
  h+='</div></div>';
  h+='<div class="m-sec"><div class="m-sec-t">🚢 출고 / 出货信息</div><div class="d-grid">';
  h+=it("Ready to Ship / 출고준비 / 待出货",dv(g(r,"Ready_to_Ship")));h+=it("Final QC / 최종QC / 最终QC",dv(g(r,"Final_QC_Passed")));
  h+=it("Shipped Qty / 출고수량 / 出货数量",dv(g(r,"Shipped_Quantity")));h+=it("Ship Date / 선적일 / 出货日期",dv(g(r,"Ship_Date")));
  h+=it("Expected Delivery / 예상납기 / 预计交货",dv(g(r,"Expected_Delivery")));h+=it("Delivery Status / 납기상태 / 交期状态",isDelayed(r)?'<span class="tag t-dg">DELAYED</span>':dv(g(r,"Delivery_Status")));
  h+='</div></div>';
  document.getElementById("mBody").innerHTML=h;
  document.getElementById("modalOv").classList.add("active")}

function closeModal(){document.getElementById("modalOv").classList.remove("active")}
document.getElementById("mClose").addEventListener("click",closeModal);
document.getElementById("modalOv").addEventListener("click",function(e){if(e.target===this)closeModal()});
document.addEventListener("keydown",function(e){if(e.key==="Escape"){closeModal();document.getElementById("kpiPopOv").classList.remove("active");document.getElementById("pipePopOv").classList.remove("active")}});
</script>
