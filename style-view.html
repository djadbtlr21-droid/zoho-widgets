<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style View Widget v5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://js.zohostatic.com/creator/widgets/version/1.0/widgetsdk-min.js"></script>
<style>
:root{--z-primary:#1E3A8A;--z-accent:#3B82F6;--z-bg:#F1F5F9;--z-border:#E2E8F0;--z-text-main:#0F172A;--z-text-muted:#64748B;--z-card-bg:#FFF;--st-draft:#94A3B8;--st-prog:#F59E0B;--st-appr:#10B981;--st-danger:#EF4444}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans KR',-apple-system,sans-serif}
body{background:var(--z-bg);padding:16px;min-height:100vh}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:16px}
.spinner{width:40px;height:40px;border:4px solid var(--z-border);border-top-color:var(--z-accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--z-text-muted);font-weight:600}
.spinner-sm{width:20px;height:20px;border:3px solid var(--z-border);border-top-color:var(--z-accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.page-header h1{font-size:17px;font-weight:900;color:var(--z-text-main);display:flex;align-items:center;gap:8px}
.page-header h1 .icon-s{width:26px;height:26px;background:var(--z-primary);border-radius:5px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:900}
.season-badge{background:#EFF6FF;color:var(--z-primary);border:1px solid #BFDBFE;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi-card{background:var(--z-card-bg);border:1px solid var(--z-border);border-radius:8px;padding:14px 16px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;left:0;top:0;width:100%;height:3px}
.kpi-total::before{background:var(--z-primary)}.kpi-active::before{background:var(--st-appr)}.kpi-sampling::before{background:var(--st-prog)}.kpi-inactive::before{background:var(--st-draft)}
.kpi-label{font-size:11px;font-weight:700;color:var(--z-text-muted);margin-bottom:4px}
.kpi-val{font-size:28px;font-weight:900;letter-spacing:-.5px}
.kpi-total .kpi-val{color:var(--z-primary)}.kpi-active .kpi-val{color:var(--st-appr)}.kpi-sampling .kpi-val{color:var(--st-prog)}.kpi-inactive .kpi-val{color:var(--st-draft)}
.table-card{background:var(--z-card-bg);border:1px solid var(--z-border);border-radius:8px;overflow:hidden}
.table-toolbar{padding:10px 16px;background:#F8FAFC;border-bottom:1px solid var(--z-border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.toolbar-left{display:flex;align-items:center;gap:8px}
.toolbar-title{font-size:13px;font-weight:800;color:var(--z-text-main)}
.rec-count{font-size:11px;color:var(--z-text-muted);font-weight:600;background:#F1F5F9;padding:2px 8px;border-radius:10px;border:1px solid #CBD5E1}
.toolbar-right{display:flex;align-items:center;gap:8px}
.search-box{background:#fff;border:1px solid var(--z-border);border-radius:6px;padding:5px 10px;font-size:11px;width:220px;outline:none;font-family:inherit}
.search-box:focus{border-color:var(--z-accent);box-shadow:0 0 0 2px rgba(59,130,246,.1)}
.filter-select{background:#fff;border:1px solid var(--z-border);border-radius:6px;padding:5px 8px;font-size:11px;outline:none;font-family:inherit;cursor:pointer}
.table-scroll{max-height:520px;overflow-y:auto}
.z-table{width:100%;border-collapse:collapse;font-size:12px;text-align:left}
.z-table th{background:#F1F5F9;padding:10px 12px;color:var(--z-text-muted);font-weight:800;font-size:11px;border-bottom:1px solid var(--z-border);white-space:nowrap;position:sticky;top:0;z-index:5;cursor:pointer;user-select:none}
.z-table th:hover{background:#E8EEF4}
.z-table th .sort-icon{font-size:9px;margin-left:3px;opacity:.4}
.z-table th.sorted .sort-icon{opacity:1;color:var(--z-accent)}
.z-table td{padding:10px 12px;border-bottom:1px solid #F1F5F9;color:var(--z-text-main);vertical-align:middle}
.z-table tr{cursor:pointer;transition:background .1s}
.z-table tbody tr:hover td{background:#EFF6FF}
.style-info{display:flex;align-items:center;gap:10px}
.style-thumb{width:40px;height:40px;background:#F1F5F9;border:1px solid #E2E8F0;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#94A3B8;flex-shrink:0;overflow:hidden}
.style-thumb img{width:100%;height:100%;object-fit:cover}
.style-code{font-weight:800;color:var(--z-primary);font-size:12px;display:block}
.style-name{font-size:10px;color:var(--z-text-muted);display:block;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag{padding:3px 10px;border-radius:4px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;min-width:60px;white-space:nowrap}
.tag-draft{background:#F1F5F9;color:#475569;border:1px solid #CBD5E1}
.tag-prog{background:#FEF3C7;color:#B45309;border:1px solid #FDE68A}
.tag-appr{background:#D1FAE5;color:#065F46;border:1px solid #A7F3D0}
.tag-fail{background:#FEF2F2;color:#B91C1C;border:1px solid #FECACA}
.vendor-tag{font-size:10px;font-weight:700;color:var(--z-text-muted);background:#F8FAFC;padding:2px 8px;border-radius:4px;border:1px solid var(--z-border)}
.no-data{text-align:center;padding:40px;color:var(--z-text-muted);font-size:13px}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(2px)}
.modal-overlay.active{display:flex}
.modal-box{background:#fff;border-radius:12px;width:92%;max-width:720px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:modalIn .25s ease-out}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--z-border);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:#fff;z-index:10;border-radius:12px 12px 0 0}
.modal-header-left{display:flex;align-items:center;gap:14px}
.modal-thumb-lg{width:56px;height:56px;background:#F1F5F9;border:1px solid #E2E8F0;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.modal-thumb-lg img{width:100%;height:100%;object-fit:cover}
.modal-title{font-size:18px;font-weight:900;color:var(--z-primary)}
.modal-subtitle{font-size:12px;color:var(--z-text-muted);margin-top:2px}
.modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--z-border);background:#F8FAFC;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--z-text-muted)}
.modal-close:hover{background:#FEF2F2;color:var(--st-danger);border-color:#FECACA}
.modal-body{padding:20px 24px}
.modal-loading{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--z-text-muted);font-size:13px}
.modal-section{margin-bottom:20px}
.modal-section-title{font-size:11px;font-weight:800;color:var(--z-text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px dashed var(--z-border)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.detail-item{display:flex;flex-direction:column;gap:3px}
.detail-label{font-size:10px;font-weight:700;color:var(--z-text-muted)}
.detail-value{font-size:13px;font-weight:600;color:var(--z-text-main)}
.detail-value.empty{color:#CBD5E1;font-weight:400}
.modal-images{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.modal-img-box{width:140px;height:140px;background:#F8FAFC;border:1px solid var(--z-border);border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.modal-img-box img{width:100%;height:100%;object-fit:contain}
.modal-img-label{font-size:9px;color:var(--z-text-muted);text-align:center;margin-top:4px;font-weight:600}
.error-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:20px;text-align:center;color:#B91C1C;margin:20px 0}
@media(max-width:768px){.kpi-row{grid-template-columns:repeat(2,1fr)}.detail-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="loadingScreen" class="loading-screen"><div class="spinner"></div><div class="loading-text">스타일 데이터를 불러오는 중...</div></div>
<div id="mainContent" style="display:none">
<div class="page-header"><h1><span class="icon-s">S</span> 시즌 기획 및 스타일 라이프사이클 관리</h1><span class="season-badge">All Seasons</span></div>
<div class="kpi-row" id="kpiRow"></div>
<div class="table-card">
<div class="table-toolbar">
<div class="toolbar-left"><span class="toolbar-title">📋 Style Lifecycle Matrix</span><span class="rec-count" id="recCount">0</span></div>
<div class="toolbar-right">
<input type="text" class="search-box" id="searchBox" placeholder="🔍 SKU, 스타일명, 공장 검색...">
<select class="filter-select" id="filterSeason"><option value="">All Season</option></select>
<select class="filter-select" id="filterStatus"><option value="">All Status</option></select>
</div>
</div>
<div class="table-scroll">
<table class="z-table">
<thead><tr>
<th data-sort="Style_SKU" width="28%">Style Info <span class="sort-icon">▼</span></th>
<th data-sort="Season" width="12%">Season <span class="sort-icon">▼</span></th>
<th data-sort="Plan_Month" width="12%">Plan <span class="sort-icon">▼</span></th>
<th data-sort="Style_Status" width="16%">Status <span class="sort-icon">▼</span></th>
<th data-sort="Business_Entity" width="12%">Vendor <span class="sort-icon">▼</span></th>
<th data-sort="Final_Cost" width="12%">Cost <span class="sort-icon">▼</span></th>
</tr></thead>
<tbody id="styleTableBody"></tbody>
</table>
</div>
</div>
</div>
<div id="errorScreen" style="display:none"><div class="error-box"><div style="font-weight:800;font-size:14px;margin-bottom:8px">데이터를 불러올 수 없습니다</div><div id="errorMsg" style="font-size:12px"></div></div></div>
<div class="modal-overlay" id="modalOverlay"><div class="modal-box">
<div class="modal-header"><div class="modal-header-left"><div class="modal-thumb-lg" id="modalThumb">👕</div><div><div class="modal-title" id="modalTitle">-</div><div class="modal-subtitle" id="modalSubtitle">-</div></div></div><div class="modal-close" id="modalClose">✕</div></div>
<div class="modal-body" id="modalBody"></div>
</div></div>

<script>
var APP_NAME="eom",REPORT_NAME="All_Styles";
var allRecords=[],filteredRecords=[],sortField="",sortAsc=true;
ZOHO.CREATOR.init().then(function(){loadData()});

function loadData(){
ZOHO.CREATOR.API.getAllRecords({appName:APP_NAME,reportName:REPORT_NAME,page:1,pageSize:200}).then(function(r){
if(r&&r.code===3000&&r.data){allRecords=r.data;filteredRecords=allRecords.slice();renderKPI();buildFilters();renderTable();loadImages();hide("loadingScreen");show("mainContent")}
else showError("데이터 로드 실패")}).catch(function(e){showError("API 에러: "+JSON.stringify(e))});}

function show(id){document.getElementById(id).style.display="block"}
function hide(id){document.getElementById(id).style.display="none"}
function showError(m){hide("loadingScreen");show("errorScreen");document.getElementById("errorMsg").textContent=m}
function g(r,f){var v=r[f];if(v===undefined||v===null||v==="")return"-";if(typeof v==="object"&&v.display_value)return v.display_value;return String(v)}
function escHtml(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function getTagClass(s){s=(s||"").toLowerCase();if(s.indexOf("active")>=0||s.indexOf("approved")>=0||s.indexOf("완성")>=0)return"tag-appr";if(s.indexOf("progress")>=0||s.indexOf("sampling")>=0||s.indexOf("샘플")>=0||s.indexOf("진행")>=0)return"tag-prog";if(s.indexOf("rejected")>=0||s.indexOf("cancel")>=0)return"tag-fail";return"tag-draft"}
function getImgUrl(r){var i=r["Style_Image"];return(i&&typeof i==="string"&&i.length>5)?i:null}

function loadImages(){
document.querySelectorAll(".style-thumb[data-img]").forEach(function(el){
var u=el.getAttribute("data-img");if(!u)return;
var img=document.createElement("img");
try{ZOHO.CREATOR.UTIL.setImageData(img,u,function(){el.innerHTML="";el.appendChild(img)})}
catch(e){img.src=u;img.onerror=function(){el.innerHTML="👕"};el.innerHTML="";el.appendChild(img)}
})}

// ── KPI ──
function renderKPI(){
var t=allRecords.length;
var a=allRecords.filter(function(r){var s=g(r,"Style_Status").toLowerCase();return s.indexOf("active")>=0||s.indexOf("활성")>=0}).length;
var sm=allRecords.filter(function(r){var s=(g(r,"Sample_Status")+" "+g(r,"Style_Status")).toLowerCase();return s.indexOf("sampling")>=0||s.indexOf("샘플")>=0}).length;
document.getElementById("kpiRow").innerHTML=
'<div class="kpi-card kpi-total"><div class="kpi-label">총 스타일</div><div class="kpi-val">'+t+'</div></div>'+
'<div class="kpi-card kpi-active"><div class="kpi-label">Active</div><div class="kpi-val">'+a+'</div></div>'+
'<div class="kpi-card kpi-sampling"><div class="kpi-label">Sampling</div><div class="kpi-val">'+sm+'</div></div>'+
'<div class="kpi-card kpi-inactive"><div class="kpi-label">기타</div><div class="kpi-val">'+(t-a)+'</div></div>'}

function buildFilters(){
var se={},st={};
allRecords.forEach(function(r){var s=g(r,"Season");if(s!=="-")se[s]=1;var t=g(r,"Style_Status");if(t!=="-")st[t]=1});
var s1=document.getElementById("filterSeason");Object.keys(se).sort().forEach(function(k){s1.innerHTML+='<option value="'+k+'">'+k+'</option>'});
var s2=document.getElementById("filterStatus");Object.keys(st).sort().forEach(function(k){s2.innerHTML+='<option value="'+k+'">'+k+'</option>'});}

// ── Table ──
function renderTable(){
var h="";
if(!filteredRecords.length){h='<tr><td colspan="6" class="no-data">조건에 맞는 스타일이 없습니다.</td></tr>'}
else{filteredRecords.forEach(function(r,i){
var sku=g(r,"Style_SKU"),name=g(r,"Style_Name"),season=g(r,"Season");
var plan=g(r,"Plan_Year")!=="-"?g(r,"Plan_Year")+"년 "+g(r,"Plan_Month")+"월":g(r,"Plan_Month");
var status=g(r,"Style_Status");
var vendor=g(r,"Business_Entity"),cost=g(r,"Final_Cost");
var iu=getImgUrl(r),ia=iu?' data-img="'+iu+'"':'';
h+='<tr data-i="'+i+'">';
h+='<td><div class="style-info"><div class="style-thumb"'+ia+'>👕</div><div><span class="style-code">'+escHtml(sku)+'</span><span class="style-name">'+escHtml(name)+'</span></div></div></td>';
h+='<td>'+escHtml(season)+'</td>';
h+='<td>'+escHtml(plan)+'</td>';
h+='<td><span class="tag '+getTagClass(status)+'">'+escHtml(status)+'</span></td>';
h+='<td><span class="vendor-tag">'+escHtml(vendor)+'</span></td>';
h+='<td style="text-align:right;font-weight:700">'+escHtml(cost)+'</td>';
h+='</tr>'})}
document.getElementById("styleTableBody").innerHTML=h;
document.getElementById("recCount").textContent=filteredRecords.length+" styles";
setTimeout(loadImages,100);
document.querySelectorAll("#styleTableBody tr[data-i]").forEach(function(row){
row.addEventListener("click",function(){openModal(filteredRecords[parseInt(this.getAttribute("data-i"))])})});}

// ── Filter ──
document.getElementById("searchBox").addEventListener("input",applyFilters);
document.getElementById("filterSeason").addEventListener("change",applyFilters);
document.getElementById("filterStatus").addEventListener("change",applyFilters);
function applyFilters(){
var q=document.getElementById("searchBox").value.toLowerCase().trim();
var fs=document.getElementById("filterSeason").value;
var ft=document.getElementById("filterStatus").value;
filteredRecords=allRecords.filter(function(r){
if(q){var h=(g(r,"Style_SKU")+" "+g(r,"Style_Name")+" "+g(r,"Business_Entity")).toLowerCase();if(h.indexOf(q)<0)return false}
if(fs&&g(r,"Season")!==fs)return false;
if(ft&&g(r,"Style_Status")!==ft)return false;
return true});
if(sortField)doSort(sortField,false);renderTable()}

// ── Sort ──
document.querySelectorAll(".z-table th[data-sort]").forEach(function(th){
th.addEventListener("click",function(){doSort(this.getAttribute("data-sort"),true);renderTable();
document.querySelectorAll(".z-table th").forEach(function(h){h.classList.remove("sorted")});
this.classList.add("sorted");this.querySelector(".sort-icon").textContent=sortAsc?"▲":"▼"})});
function doSort(f,t){if(t){if(sortField===f)sortAsc=!sortAsc;else{sortField=f;sortAsc=true}}
filteredRecords.sort(function(a,b){return sortAsc?g(a,f).localeCompare(g(b,f)):g(b,f).localeCompare(g(a,f))})}

// ══════════════════════════════════════════
// ★ MODAL — getRecordById (Detail View 전체)
// ══════════════════════════════════════════
function openModal(rec){
var sku=g(rec,"Style_SKU"),name=g(rec,"Style_Name"),recId=rec["ID"];
document.getElementById("modalTitle").textContent=sku;
document.getElementById("modalSubtitle").textContent=name;
// 이미지
var te=document.getElementById("modalThumb"),iu=getImgUrl(rec);
if(iu){var im=document.createElement("img");try{ZOHO.CREATOR.UTIL.setImageData(im,iu,function(){te.innerHTML="";te.appendChild(im)})}catch(e){im.src=iu;te.innerHTML="";te.appendChild(im)}}else{te.innerHTML="👕"}
// 로딩
document.getElementById("modalBody").innerHTML='<div class="modal-loading"><div class="spinner-sm"></div> 상세 정보를 불러오는 중...</div>';
document.getElementById("modalOverlay").classList.add("active");
// API
ZOHO.CREATOR.API.getRecordById({appName:APP_NAME,reportName:REPORT_NAME,id:recId}).then(function(r){
if(r&&r.code===3000&&r.data)renderDetail(r.data);
else document.getElementById("modalBody").innerHTML='<div class="error-box">상세 데이터를 불러올 수 없습니다.</div>'
}).catch(function(e){document.getElementById("modalBody").innerHTML='<div class="error-box">에러: '+JSON.stringify(e)+'</div>'})}

function renderDetail(d){
var h='';
// Identity
h+='<div class="modal-section"><div class="modal-section-title">기본 정보 / Identity</div><div class="detail-grid">';
[["Style SKU","Style_SKU"],["Style Name","Style_Name"],["Style Number","Style_Number"],["Business Entity","Business_Entity"],["Season","Season"],["Plan Year","Plan_Year"],["Plan Month","Plan_Month"],["Style Status","Style_Status"],["Category","Category"]].forEach(function(x){
var v=g(d,x[1]),isT=x[0].indexOf("Status")>=0;
h+='<div class="detail-item"><span class="detail-label">'+x[0]+'</span><span class="detail-value">'+(isT?'<span class="tag '+getTagClass(v)+'">'+escHtml(v)+'</span>':(v==="-"?'<span class="empty">-</span>':escHtml(v)))+'</span></div>'});
h+='</div></div>';
// Product
h+='<div class="modal-section"><div class="modal-section-title">제품 상세 / Product Definition</div><div class="detail-grid">';
[["Gender","Gender"],["Fit","Fit"],["Top Type","Top_Type"],["Bottom Type","Bottom_Type"],["Bottom Length","Bottom_Length"],["Sleeve","Sleeve"],["Lining Type","Lining_Type"],["Details","Details"],["Material Type","Material_Type"],["Available Colors","Available_Colors"],["Available Sizes","Available_Sizes"]].forEach(function(x){
var v=g(d,x[1]);h+='<div class="detail-item"><span class="detail-label">'+x[0]+'</span><span class="detail-value">'+(v==="-"?'<span class="empty">-</span>':escHtml(v))+'</span></div>'});
h+='</div></div>';
// Sample & Cost
h+='<div class="modal-section"><div class="modal-section-title">샘플 & 원가 / Sample & Costing</div><div class="detail-grid">';
[["Sample Status","Sample_Status"],["Sample Date","Sample_Date"],["Target Cost","Target_Cost"],["Final Cost","Final_Cost"],["Total BOM Cost","Total_BOM_Cost"],["blended %","blended_percentage"],["Cost Notes","Cost_Notes"]].forEach(function(x){
var v=g(d,x[1]),isT=x[0].indexOf("Status")>=0;
h+='<div class="detail-item"><span class="detail-label">'+x[0]+'</span><span class="detail-value">'+(isT?'<span class="tag '+getTagClass(v)+'">'+escHtml(v)+'</span>':(v==="-"?'<span class="empty">-</span>':escHtml(v)))+'</span></div>'});
h+='</div></div>';
// Images
var si=getImgUrl(d),fi=d["Flat_Sketch"],smi=d["Sample_Images"];
if(si||fi||smi){
h+='<div class="modal-section"><div class="modal-section-title">이미지 / Images</div><div class="modal-images">';
if(si)h+='<div><div class="modal-img-box" id="mImg1"></div><div class="modal-img-label">Style Image</div></div>';
if(fi&&typeof fi==="string"&&fi.length>5)h+='<div><div class="modal-img-box" id="mImg2"></div><div class="modal-img-label">Flat Sketch</div></div>';

function loadImg(id,url){var el=document.getElementById(id);if(!el)return;var img=document.createElement("img");
try{ZOHO.CREATOR.UTIL.setImageData(img,url,function(){el.innerHTML="";el.appendChild(img)})}
catch(e){img.src=url;img.onerror=function(){el.innerHTML="📷"};el.innerHTML="";el.appendChild(img)}}

function closeModal(){document.getElementById("modalOverlay").classList.remove("active")}
document.getElementById("modalClose").addEventListener("click",closeModal);
document.getElementById("modalOverlay").addEventListener("click",function(e){if(e.target===this)closeModal()});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal()});
