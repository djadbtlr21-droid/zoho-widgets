<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style View vFinal (Bug Free)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://js.zohostatic.com/creator/widgets/version/1.0/widgetsdk-min.js"></script>
<style>
:root{--z-primary:#1E3A8A;--z-accent:#3B82F6;--z-bg:#F1F5F9;--z-border:#E2E8F0;--z-text-main:#0F172A;--z-text-muted:#64748B;--z-card-bg:#FFF;--st-appr:#10B981;--st-prog:#F59E0B;--st-danger:#EF4444;--st-draft:#94A3B8}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans KR',-apple-system,sans-serif}
body{background:var(--z-bg);padding:16px;min-height:100vh}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:16px}
.spinner{width:40px;height:40px;border:4px solid var(--z-border);border-top-color:var(--z-accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-sm{width:18px;height:18px;border:3px solid var(--z-border);border-top-color:var(--z-accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.loading-text{font-size:13px;color:var(--z-text-muted);font-weight:600}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.page-header h1{font-size:17px;font-weight:900;color:var(--z-text-main);display:flex;align-items:center;gap:8px}
.page-header h1 .icon-s{width:26px;height:26px;background:var(--z-primary);border-radius:5px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:900}
.mkpi-row{display:grid;grid-template-columns:1fr 1fr 1fr 420px;gap:12px;margin-bottom:21px}
.mkpi-card{background:var(--z-card-bg);border:1px solid var(--z-border);border-radius:10px;padding:14px;position:relative;overflow:hidden}
.mkpi-card::before{content:'';position:absolute;left:0;top:0;width:100%;height:3px}
.mkpi-card:nth-child(1)::before{background:#A5B4FC}
.mkpi-card:nth-child(2)::before{background:#FDE68A}
.mkpi-card:nth-child(3)::before{background:#A7F3D0}
.mkpi-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mkpi-title{font-size:15px;font-weight:800;color:var(--z-text-main)}
.mkpi-body{display:flex;align-items:center;gap:16px}
.mkpi-ring{position:relative;width:80px;height:80px;flex-shrink:0}
.mkpi-ring svg{transform:rotate(-90deg)}
.mkpi-ring-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:16px;font-weight:900;color:var(--z-text-main)}
.mkpi-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;flex:1}
.mkpi-stat{text-align:center;padding:6px 5px;border-radius:6px;background:#FAFBFC;border:1px solid #F1F5F9;cursor:pointer;transition:background .15s}
.mkpi-stat:hover{background:#EFF6FF;border-color:#BFDBFE}
.mkpi-stat-n{font-size:20px;font-weight:900;line-height:1}
.mkpi-stat-l{font-size:10px;font-weight:700;color:var(--z-text-muted);margin-top:4px;line-height:1.3}
.mkpi-stat .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.delay-card{background:#FFF5F5;border:1px solid #FECACA;border-radius:10px;padding:14px;position:relative;overflow:hidden;display:flex;flex-direction:column}
.delay-card::before{content:'';position:absolute;left:0;top:0;width:100%;height:3px;background:#FCA5A5}
.delay-card-title{font-size:12px;font-weight:800;color:#DC2626;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.delay-total{font-size:22px;font-weight:900;color:#DC2626;text-align:center;margin-bottom:8px}
.delay-total span{font-size:10px;font-weight:600;color:#EF4444;display:block;margin-top:2px}
.delay-list{display:flex;flex-direction:column;gap:5px;flex:1;overflow-y:auto}
.delay-item{background:#fff;border:1px solid #FECACA;border-radius:6px;padding:6px 8px;cursor:pointer;transition:background .1s;text-align:center}
.delay-item:hover{background:#FEF2F2}
.delay-mo{font-size:10px;font-weight:800;color:#DC2626}
.delay-style{font-size:8px;color:#64748B;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.filter-bar{display:flex;justify-content:flex-end;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.search-box{background:#fff;border:1px solid var(--z-border);border-radius:6px;padding:5px 10px;font-size:11px;width:200px;outline:none;font-family:inherit}
.search-box:focus{border-color:var(--z-accent);box-shadow:0 0 0 2px rgba(59,130,246,.1)}
.filter-select{background:#fff;border:1px solid var(--z-border);border-radius:6px;padding:5px 8px;font-size:11px;outline:none;font-family:inherit;cursor:pointer}
.month-section{margin-bottom:16px}
.month-card{background:var(--z-card-bg);border:1px solid var(--z-border);border-radius:8px;overflow:hidden}
.month-header{padding:8px 16px;background:#F8FAFC;border-bottom:1px solid var(--z-border);display:flex;justify-content:space-between;align-items:center}
.month-title{font-size:13px;font-weight:800;color:var(--z-text-main)}
.month-count{font-size:11px;color:var(--z-text-muted);font-weight:600;background:#F1F5F9;padding:2px 8px;border-radius:10px;border:1px solid #CBD5E1}
.table-scroll{overflow-x:auto}
.z-table{width:100%;border-collapse:collapse;font-size:11px;text-align:left;table-layout:fixed}
.z-table th{background:#F1F5F9;padding:7px 8px;color:var(--z-text-muted);font-weight:800;font-size:10px;border-bottom:1px solid var(--z-border);white-space:nowrap;text-align:left}
.z-table td{padding:7px 8px;border-bottom:1px solid #F1F5F9;color:var(--z-text-main);vertical-align:middle;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.z-table tr{cursor:pointer;transition:background .1s}
.z-table tbody tr:hover td{background:#EFF6FF}
.z-table tbody tr.not-ordered:hover td{background:#FEE2E2}
.style-info{display:flex;align-items:center;gap:8px}
.style-thumb{width:34px;height:34px;background:#F1F5F9;border:1px solid #E2E8F0;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#94A3B8;flex-shrink:0;overflow:hidden;position:relative}
.style-thumb img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.style-code{font-weight:800;color:var(--z-primary);font-size:11px;display:block}
.style-name{font-size:9px;color:var(--z-text-muted);display:block;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag{padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;display:inline-flex;align-items:center;white-space:nowrap}
.tag-draft{background:#F1F5F9;color:#475569;border:1px solid #CBD5E1}
.tag-prog{background:#FEF3C7;color:#B45309;border:1px solid #FDE68A}
.tag-appr{background:#D1FAE5;color:#065F46;border:1px solid #A7F3D0}
.tag-fail{background:#FEF2F2;color:#B91C1C;border:1px solid #FECACA}
.pop-ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:2000;justify-content:center;align-items:center;backdrop-filter:blur(2px)}
.pop-ov.active{display:flex}
.pop-box{background:#fff;border-radius:12px;width:92%;max-width:700px;max-height:82vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:modalIn .2s ease-out}
.pop-hd{padding:16px 20px 12px;border-bottom:1px solid var(--z-border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:10;border-radius:12px 12px 0 0}
.pop-title{font-size:15px;font-weight:800;color:var(--z-primary)}
.pop-sub{font-size:11px;color:var(--z-text-muted);margin-top:2px}
.pop-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--z-border);background:#F8FAFC;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--z-text-muted);flex-shrink:0}
.pop-close:hover{background:#FEF2F2;color:var(--st-danger)}
.pop-body{padding:16px 20px}
.pop-item{padding:10px 12px;border:1px solid var(--z-border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:background .1s;display:flex;justify-content:space-between;align-items:center}
.pop-item:hover{background:#EFF6FF;border-color:#BFDBFE}
.pop-item-left .pi-mo{font-size:12px;font-weight:800;color:var(--z-primary)}
.pop-item-left .pi-name{font-size:10px;color:var(--z-text-muted);margin-top:2px}
.pop-item-left .pi-meta{font-size:9px;color:#94A3B8;margin-top:2px}
.pop-empty{text-align:center;padding:30px;color:var(--z-text-muted);font-size:13px}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:3000;justify-content:center;align-items:center;backdrop-filter:blur(2px)}
.modal-overlay.active{display:flex}
.modal-box-lg{background:#fff;border-radius:12px;width:92%;max-width:760px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:modalIn .25s ease-out}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--z-border);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:#fff;z-index:10;border-radius:12px 12px 0 0}
.modal-header-left{display:flex;align-items:center;gap:14px}
.modal-thumb-lg{width:64px;height:64px;background:#F1F5F9;border:1px solid #E2E8F0;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;position:relative}
.modal-thumb-lg img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.modal-title{font-size:18px;font-weight:900;color:var(--z-primary)}
.modal-subtitle{font-size:12px;color:var(--z-text-muted);margin-top:2px}
.modal-close-lg{width:32px;height:32px;border-radius:8px;border:1px solid var(--z-border);background:#F8FAFC;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--z-text-muted)}
.modal-close-lg:hover{background:#FEF2F2;color:var(--st-danger);border-color:#FECACA}
.modal-body{padding:20px 24px}
.modal-section{margin-bottom:24px}
.modal-section-title{font-size:12px;font-weight:800;color:var(--z-primary);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #EFF6FF}
.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.detail-item{display:flex;flex-direction:column;gap:3px;padding:6px 8px;background:#FAFBFC;border-radius:6px;border:1px solid #F1F5F9}
.detail-label{font-size:9px;font-weight:700;color:var(--z-text-muted);line-height:1.4}
.detail-value{font-size:13px;font-weight:600;color:var(--z-text-main)}
.detail-value.empty{color:#CBD5E1;font-weight:400;font-style:italic}
.modal-images{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.modal-img-wrap{text-align:center}
.modal-img-box{width:120px;height:120px;background:#F8FAFC;border:1px solid var(--z-border);border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:28px;color:#CBD5E1;position:relative}
.modal-img-box img{width:100%;height:100%;object-fit:contain;cursor:pointer;transition:transform .2s;position:absolute;top:0;left:0}
.modal-img-box:hover{border-color:var(--z-accent);box-shadow:0 2px 8px rgba(59,130,246,.15)}
.modal-img-label{font-size:9px;color:var(--z-text-muted);margin-top:4px;font-weight:700}
.chart-card{background:#fff;border:1px solid var(--z-border);border-radius:8px;padding:16px;margin-top:20px}
.chart-title{font-size:13px;font-weight:800;color:var(--z-text-main);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.bar-label{font-size:10px;font-weight:600;color:var(--z-text-main);min-width:420px;max-width:420px;text-align:right;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{width:180px;height:20px;background:#F1F5F9;border-radius:4px;overflow:hidden;flex-shrink:0}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px;font-size:9px;font-weight:800;color:#fff;min-width:22px;transition:width .5s ease}
.bar-count{font-size:11px;font-weight:800;color:var(--z-text-main);min-width:24px}
.error-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:20px;text-align:center;color:#B91C1C;white-space:pre-wrap;}
@media(max-width:1100px){.mkpi-row{grid-template-columns:1fr 1fr}.detail-grid{grid-template-columns:1fr 1fr}}
@media(max-width:768px){.mkpi-row{grid-template-columns:1fr}.detail-grid{grid-template-columns:1fr 1fr}.bar-label{min-width:200px;max-width:200px}}
</style>
</head>
<body>

<div id="mainApp" class="main-app">
  <div id="loadingScreen" class="loading-screen"><div class="spinner"></div><div class="loading-text">데이터를 불러오는 중...</div></div>
  <div id="mainContent" style="display:none">
    <div class="page-header">
      <h1><span class="icon-s">S</span> Style View / 스타일 현황표 / 款式现况表</h1>
      <button onclick="goTo('https://creatorapp.zoho.com/jeramoda/eom/#Form:Add_Styles')" style="background:var(--z-primary);color:#fff;border:none;padding:6px 16px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px">+ New Style</button>
    </div>
    <div class="mkpi-row" id="kpiRow"></div>
    <div class="filter-bar">
      <input type="text" class="search-box" id="searchBox" placeholder="🔍 SKU, 스타일명, Brand 검색...">
      <select class="filter-select" id="filterCategory"><option value="">All Category</option></select>
      <select class="filter-select" id="filterGender"><option value="">All Gender</option></select>
      <select class="filter-select" id="filterSeason"><option value="">All Season</option></select>
      <select class="filter-select" id="filterStatus"><option value="">All Status</option></select>
    </div>
    <div id="monthlyTables"></div>
    <div id="chartSection" class="chart-card" style="display:none">
      <div class="chart-title">📊 Style Type Distribution / 스타일 유형 분포 / 款式类型分布</div>
      <div id="barChart"></div>
    </div>
  </div>
  <div id="errorScreen" style="display:none"><div class="error-box"><div style="font-weight:800;font-size:14px;margin-bottom:8px">데이터를 불러올 수 없습니다</div><div id="errorMsg" style="font-size:12px"></div></div></div>
</div>

<div class="pop-ov" id="kpiPopOv">
  <div class="pop-box">
    <div class="pop-hd">
      <div><div class="pop-title" id="kpiPopTitle">-</div><div class="pop-sub" id="kpiPopSub">-</div></div>
      <!-- ★ onclick 인라인 -->
      <div class="pop-close" id="kpiPopClose" onclick="document.getElementById('kpiPopOv').classList.remove('active')">✕</div>
    </div>
    <div class="pop-body" id="kpiPopBody"></div>
  </div>
</div>

<div id="lightboxOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:4000;justify-content:center;align-items:center;cursor:pointer;backdrop-filter:blur(4px)" onclick="closeLightbox()">
  <img id="lightboxImg" style="max-width:90%;max-height:90%;object-fit:contain;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,.5)" onclick="event.stopPropagation()">
  <div style="position:absolute;top:20px;right:24px;color:#fff;font-size:28px;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.15);border-radius:50%" onclick="closeLightbox()">✕</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box-lg">
    <div class="modal-header">
      <div class="modal-header-left">
        <div class="modal-thumb-lg" id="modalThumb">👕</div>
        <div><div class="modal-title" id="modalTitle">-</div><div class="modal-subtitle" id="modalSubtitle">-</div></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <!-- ★ Tech Pack 버튼: 파스텔톤, 옆 버튼과 동일 크기, onclick 인라인 -->
        <button id="btnTechPack" onclick="openTechPack()" style="background:#EDE9FE;color:#6D28D9;border:1px solid #C4B5FD;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">📋 Tech Pack</button>
        <!-- ★ Edit, New MO, Close 모두 onclick 인라인 -->
        <button id="btnEdit" onclick="editStyle()" style="background:#EFF6FF;color:var(--z-primary);border:1px solid #BFDBFE;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">✏️ Edit</button>
        <button id="btnNewMO" onclick="newMO()" style="background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">+ New MO</button>
        <div class="modal-close-lg" id="modalClose" onclick="closeModal()">✕</div>
      </div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
/* ════════════════════════════════════════
   Style View vFinal
   Tech Pack → Zoho record-print URL 방식
   버튼: 파스텔 보라색 (Edit/NewMO와 동일 크기)
════════════════════════════════════════ */
var APP="eom", REP="All_Styles", MO_REP="All_MO";
var allRec=[], filtered=[], moSkus=new Set(), allMOs=[];
var today=new Date(), todayStr=today.toISOString().split("T")[0];
var _currentRec = null;

var MAP={
  Gender:{"W":"Women / 여성 / 女","M":"Men / 남성 / 男","U":"Unisex / 남녀공용 / 男女通用"},
  Category:{"S":"Set / 세트 / 套装","I":"Individual / 단품 / 单品"},
  Top_Type:{"B":"Bra-top / 브라탑 / 运动内衣","C":"Crop / 크롭 / 露脐装","T":"Tank / 탱크 / 背心"},
  Sleeve:{"L":"Long / 긴팔 / 长袖","S":"Short / 반팔 / 짧은소매","N":"None / 민소매 / 无袖"},
  Fit:{"O":"Oversize / 루즈핏 / 宽松版","R":"Regular / 레귤러핏 / 标准版","S":"Slim / 슬림핏 / 修身版"},
  Details:{"Z":"Zip-up(Full) / 짚업 / 全开拉链","H":"Half-zip / 반짚업 / 半拉链","N":"Round-neck / 라운드넥 / 圆领","C":"Cami-strap / 끈나시 / 吊带","W":"Wide-strap / 와이드 / 宽肩带","D":"Hood / 후드 / 连帽"},
  Bottom_Type:{"L":"Leggings / 레깅스 / 紧身裤","W":"Wide / 와이드 / 宽腿裤","J":"Jogger / 조거 / 束脚裤","F":"Flare / 나팔 / 喇叭裤","P":"Pleats / 플리츠 / 褶皱","A":"A-line / A라인 / A字版","B":"Shorts / 반바지 / 短裤"},
  Bottom_Length:{"3":"3-Tier(Short) / 3부 / 三分","5":"5-Tier(Mid) / 5부 / 五分","7":"7-Tier(Mid-full) / 7부 / 七分","9":"9-Tier(Full) / 9부 / 九分"},
  Material_Type:{"P":"Polyester / 폴리에스터 / 涤纶","N":"Nylon / 나일론 / 尼龙","D":"Polyamide / 폴리아미드 / 聚酰胺","C":"Cotton / 코튼 / 棉","H":"Mesh / 메쉬 / 网布","M":"Modal / 모달 / 莫代尔","L":"Lycra / 라이크라 / 莱卡","PS":"Poly+Spandex","NS":"Nylon+Spandex","DS":"Polyamide+Spandex","CS":"Cotton+Spandex"},
  Lining_Type:{"B":"Brushed / 기모 / 磨毛","F":"Fur / 퍼 / 毛皮","N":"None / 없음 / 无"}
};
var SHORT={
  Category:{"S":"Set","I":"Individual"},
  Top_Type:{"B":"Bra-top","C":"Crop","T":"Tank"},
  Sleeve:{"L":"Long","S":"Short","N":"None"},
  Fit:{"O":"Oversize","R":"Regular","S":"Slim"},
  Details:{"Z":"Zip-up(Full)","H":"Half-zip","N":"Round-neck","C":"Cami-strap","W":"Wide-strap","D":"Hood"},
  Bottom_Type:{"L":"Leggings","W":"Wide","J":"Jogger","F":"Flare","P":"Pleats","A":"A-line","B":"Shorts"},

var _safeQ = [], _safeBusy = false;
function _runSafeQ() {
  if(_safeQ.length === 0) { _safeBusy = false; return; }
  _safeBusy = true;
  var task = _safeQ.shift();
  var el = task.id ? document.getElementById(task.id) : task.el;
  if(!el) { setTimeout(_runSafeQ, 50); return; }
  var img = document.createElement("img");
  img.style.cssText = task.css || "width:100%;height:100%;object-fit:cover";
  if (task.clk) { img.onclick = function() { openLightbox(this.src); }; }
  var done = false;
  function next() { if(done) return; done = true; setTimeout(_runSafeQ, 80); }
  try {
    ZOHO.CREATOR.UTIL.setImageData(img, task.url, function() { el.innerHTML = ""; el.appendChild(img); next(); });
    setTimeout(next, 3000);
  } catch(e) { next(); }
}
function qImgFast(elOrId, url) {
  var el = typeof elOrId === "string" ? document.getElementById(elOrId) : elOrId;
  if(!el) return;
  var u = Array.isArray(url) ? url[0] : url;
  if(typeof u === "object" && u !== null) u = u.url || u.display_value || "";
  if(!u || u === "-") return;
  var img = document.createElement("img");
  img.style.cssText = "width:100%;height:100%;object-fit:cover";
  ZOHO.CREATOR.UTIL.setImageData(img, u, function() { el.innerHTML = ""; el.appendChild(img); });
}
function loadTableImgs() {
  var els = document.querySelectorAll("[data-img]");
  if(els.length === 0) return;
  if("IntersectionObserver" in window) {
    var obs = new IntersectionObserver(function(entries, observer){
      entries.forEach(function(ent){
        if(ent.isIntersecting){
          var el = ent.target;
          var url = el.getAttribute("data-img");
          if(url && url !== "null" && url !== "undefined" && url.length > 10) {
            qImgFast(el, url);
            el.removeAttribute("data-img");
          }
          observer.unobserve(el);
        }
      });
    }, {rootMargin:"300px"});
    els.forEach(function(el){ obs.observe(el); });
  } else {
    els.forEach(function(el){ var url = el.getAttribute("data-img"); if(url) qImgFast(el, url); });
  }
}

    if(si.length){h+='<div style="font-size:10px;font-weight:700;color:var(--z-text-muted);margin-bottom:6px">Style Image</div><div class="modal-images">';si.forEach(function(u,i){h+='<div class="modal-img-wrap"><div class="modal-img-box" id="mdl_si_'+i+'"><div class="spinner-sm"></div></div></div>'});h+='</div><div style="height:10px"></div>'}
    if(tfs.length){h+='<div style="font-size:10px;font-weight:700;color:var(--z-text-muted);margin-bottom:6px">Top Flat Sketch</div><div class="modal-images">';tfs.forEach(function(u,i){h+='<div class="modal-img-wrap"><div class="modal-img-box" id="mdl_tfs_'+i+'"><div class="spinner-sm"></div></div></div>'});h+='</div><div style="height:10px"></div>'}
    if(bfs.length){h+='<div style="font-size:10px;font-weight:700;color:var(--z-text-muted);margin-bottom:6px">Bottom Flat Sketch</div><div class="modal-images">';bfs.forEach(function(u,i){h+='<div class="modal-img-wrap"><div class="modal-img-box" id="mdl_bfs_'+i+'"><div class="spinner-sm"></div></div></div>'});h+='</div>'}
    h+='</div>';
  }
  h+='<div class="modal-section"><div class="modal-section-title">📌 기본 정보 / Identity / 基本信息</div><div class="detail-grid">';
  h+=it("Style SKU",dv(g(d,"Style_SKU")));h+=it("Style Name",dv(g(d,"Style_Name")));h+=it("Style Number",dv(g(d,"Style_Number")));
  h+=it("Season",dv(g(d,"Season")));h+=it("Plan Year",dv(g(d,"Plan_Year")));h+=it("Plan Month",dv(g(d,"Plan_Month")));
  h+=it("Brand",dv(g(d,"Business_Entity")));h+=it("Style Status",dt(g(d,"Style_Status")));h+=it("Order Status",ordered?'<span class="tag tag-appr">Ordered</span>':'<span class="tag tag-fail">Not Ordered</span>');
  h+='</div></div>';
  h+='<div class="modal-section"><div class="modal-section-title">👗 제품 정의 / Product Definition / 产品定义</div><div class="detail-grid">';
  h+=it("Gender",dv(mv("Gender",g(d,"Gender"))));h+=it("Category",dv(mv("Category",g(d,"Category"))));
  h+=it("Top Type",dv(mv("Top_Type",g(d,"Top_Type"))));h+=it("Sleeve",dv(mv("Sleeve",g(d,"Sleeve"))));
  h+=it("Fit",dv(mv("Fit",g(d,"Fit"))));h+=it("Details",dv(mv("Details",g(d,"Details"))));
  h+=it("Bottom Type",dv(mv("Bottom_Type",g(d,"Bottom_Type"))));h+=it("Bottom Length",dv(mv("Bottom_Length",g(d,"Bottom_Length"))));
  h+='</div></div>';
  h+='<div class="modal-section"><div class="modal-section-title">🧵 원단 정보 / Material / 面料</div><div class="detail-grid">';
  h+=it("Material Type",dv(mv("Material_Type",g(d,"Material_Type"))));h+=it("blended %",dv(g(d,"blended_percentage")));h+=it("Lining Type",dv(mv("Lining_Type",g(d,"Lining_Type"))));
  h+='</div></div>';
  h+='<div class="modal-section"><div class="modal-section-title">🎨 색상 & 사이즈 / Variants / 尺寸颜色</div><div class="detail-grid">';
  h+=it("Available Sizes",dv(g(d,"Available_Sizes")));h+=it("Available Colors",dv(g(d,"Available_Colors")));
  h+='</div></div>';
  h+='<div class="modal-section"><div class="modal-section-title">✂️ 샘플 정보 / Sample / 样品</div><div class="detail-grid">';
  h+=it("Sample Status",dt(g(d,"Sample_Status")));h+=it("Sample Date",dv(g(d,"Sample_Date")));h+=it("Sample Notes",dv(g(d,"Sample_Notes")));
  h+='</div></div>';
  h+='<div class="modal-section"><div class="modal-section-title">💰 원가 정보 / Costing / 成本</div><div class="detail-grid">';
  h+=it("Target Cost",dv(g(d,"Target_Cost")));h+=it("Final Cost",dv(g(d,"Final_Cost")));h+=it("Total BOM Cost",dv(g(d,"Total_BOM_Cost")));h+=it("Cost Notes",dv(g(d,"Cost_Notes")));
  h+='</div></div>';
  return h;
}

function closeLightbox(){document.getElementById("lightboxOverlay").style.display="none";document.getElementById("lightboxImg").src=""}
function closeModal(){document.getElementById("modalOverlay").classList.remove("active");_currentRec=null}

/* ESC — 모달/팝업 닫기 */
document.addEventListener("keydown",function(e){
  if(e.key!=="Escape")return;
  if(document.getElementById("lightboxOverlay").style.display==="flex"){closeLightbox();return}
  if(document.getElementById("kpiPopOv").classList.contains("active")){document.getElementById("kpiPopOv").classList.remove("active");return}
  closeModal();
});

/* ══════════════════════════════════════
   ★ Tech Pack 버튼 — Zoho record-print URL
   record-print/Tech_Pack/{레코드ID} 로 새 탭 오픈
   서브폼 데이터는 Zoho 내부에서 직접 렌더링
══════════════════════════════════════ */
function openTechPack() {
  if(!_currentRec) return;
  var id = _currentRec["ID"] || _currentRec["id"] || "";
  if(!id) { alert("레코드 ID를 찾을 수 없습니다."); return; }
  var url = "https://creatorapp.zoho.com/jeramoda/eom/record-print/Tech_Pack/" + id + "/";
  window.open(url, "_blank");
}
</script>
