<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style View - Field Debug</title>
<script src="https://js.zohostatic.com/creator/widgets/version/1.0/widgetsdk-min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
body { background: #F1F5F9; padding: 20px; }
h1 { font-size: 18px; margin-bottom: 16px; color: #1E3A8A; }
.debug-box { background: white; border: 2px solid #3B82F6; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
.debug-title { font-size: 14px; font-weight: 800; color: #1E3A8A; margin-bottom: 12px; border-bottom: 2px solid #E2E8F0; padding-bottom: 8px; }
.field-list { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.field-item { font-size: 12px; padding: 6px 10px; background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 4px; }
.field-name { font-weight: 800; color: #1E3A8A; }
.field-value { color: #64748B; font-size: 11px; margin-top: 2px; word-break: break-all; }
.loading { text-align: center; padding: 40px; color: #64748B; }
.error { background: #FEF2F2; border-color: #EF4444; color: #B91C1C; }
</style>
</head>
<body>

<h1>🔍 Style View — 필드명 디버그</h1>

<div class="debug-box">
    <div class="debug-title">설정 정보</div>
    <p style="font-size:12px; color:#64748B;">App: <strong id="appName">eom</strong> | Report: <strong id="reportName">All_Styles</strong></p>
    <p style="font-size:11px; color:#94A3B8; margin-top:4px;">※ Report 이름이 틀리면 에러가 납니다. 실제 리포트 이름에 맞게 수정하세요.</p>
</div>

<div id="output" class="loading">데이터를 불러오는 중...</div>

<script>
var APP_NAME = "eom";
var REPORT_NAME = "All_Styles";

ZOHO.CREATOR.init().then(function() {
    var config = {
        appName: APP_NAME,
        reportName: REPORT_NAME,
        page: 1,
        pageSize: 5
    };

    ZOHO.CREATOR.API.getAllRecords(config).then(function(response) {
        var html = "";

        if (response && response.code === 3000 && response.data && response.data.length > 0) {
            var records = response.data;

            // 1. 전체 필드명 목록
            html += '<div class="debug-box">';
            html += '<div class="debug-title">📋 발견된 필드명 (총 ' + Object.keys(records[0]).length + '개)</div>';
            html += '<div class="field-list">';
            
            var keys = Object.keys(records[0]).sort();
            keys.forEach(function(key) {
                var val = records[0][key];
                var displayVal = "";
                if (val === null || val === undefined) {
                    displayVal = "(빈값)";
                } else if (typeof val === "object") {
                    if (val.display_value) displayVal = val.display_value;
                    else displayVal = JSON.stringify(val).substring(0, 80);
                } else {
                    displayVal = String(val).substring(0, 80);
                }
                html += '<div class="field-item"><div class="field-name">' + key + '</div><div class="field-value">' + displayVal + '</div></div>';
            });
            
            html += '</div></div>';

            // 2. 처음 3개 레코드 전체 데이터
            html += '<div class="debug-box">';
            html += '<div class="debug-title">📊 처음 3개 레코드 데이터</div>';
            
            var showCount = Math.min(3, records.length);
            for (var i = 0; i < showCount; i++) {
                html += '<div style="margin-bottom:12px; padding:10px; background:#F8FAFC; border-radius:6px; border:1px solid #E2E8F0;">';
                html += '<div style="font-weight:800; font-size:12px; color:#1E3A8A; margin-bottom:6px;">Record ' + (i+1) + '</div>';
                
                keys.forEach(function(key) {
                    var val = records[i][key];
                    var displayVal = "";
                    if (val === null || val === undefined || val === "") {
                        displayVal = '<span style="color:#CBD5E1;">(빈값)</span>';
                    } else if (typeof val === "object") {
                        if (val.display_value) displayVal = val.display_value;
                        else displayVal = JSON.stringify(val).substring(0, 100);
                    } else {
                        displayVal = String(val);
                    }
                    html += '<div style="font-size:11px; padding:2px 0; border-bottom:1px solid #F1F5F9;"><strong style="color:#475569;">' + key + ':</strong> ' + displayVal + '</div>';
                });
                
                html += '</div>';
            }
            html += '</div>';

            // 3. 총 레코드 수
            html += '<div class="debug-box"><div class="debug-title">ℹ️ 요약</div>';
            html += '<p style="font-size:13px;">총 레코드 수: <strong>' + records.length + '</strong>개 (최대 5개만 조회)</p>';
            html += '<p style="font-size:13px;">총 필드 수: <strong>' + keys.length + '</strong>개</p>';
            html += '</div>';

        } else {
            html = '<div class="debug-box error"><div class="debug-title">❌ 에러</div>';
            html += '<p>리포트에서 데이터를 가져올 수 없습니다.</p>';
            html += '<p style="margin-top:8px;">Response: ' + JSON.stringify(response) + '</p>';
            html += '<p style="margin-top:8px;">확인사항: App 이름이 "' + APP_NAME + '"이고 리포트 이름이 "' + REPORT_NAME + '"인지 확인하세요.</p>';
            html += '</div>';
        }

        document.getElementById("output").innerHTML = html;

    }).catch(function(err) {
        document.getElementById("output").innerHTML = '<div class="debug-box error"><div class="debug-title">❌ API 에러</div><p>' + JSON.stringify(err) + '</p></div>';
    });
});
</script>
</body>
</html>
