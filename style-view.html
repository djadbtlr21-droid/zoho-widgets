<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style View v17</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://js.zohostatic.com/creator/widgets/version/1.0/widgetsdk-min.js"></script>
<style>
:root{--z-primary:#1E3A8A;--z-accent:#3B82F6;--z-bg:#F1F5F9;--z-border:#E2E8F0;--z-text-main:#0F172A;--z-text-muted:#64748B;--z-card-bg:#FFF;--st-appr:#10B981;--st-prog:#F59E0B;--st-danger:#EF4444;--st-draft:#94A3B8}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans KR',-apple-system,sans-serif}
body{background:var(--z-bg);padding:16px;min-height:100vh}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:16px}
.spinner{width:40px;height:40px;border:4px solid var(--z-border);border-top-color:var(--z-accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-sm{width:18px;height:18px;border:3px solid var(--z-border);border-top-color:var(--z-accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.loading-text{font-size:13px;color:var(--z-text-muted);font-weight:600}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.page-header h1{font-size:17px;font-weight:900;color:var(--z-text-main);display:flex;align-items:center;gap:8px}
.page-header h1 .icon-s{width:26px;height:26px;background:var(--z-primary);border-radius:5px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:900}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi-card{background:var(--z-card-bg);border:1px solid var(--z-border);border-radius:8px;padding:14px 16px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;left:0;top:0;width:100%;height:3px}
.kpi-total::before{background:var(--z-primary)}.kpi-active::before{background:var(--st-appr)}.kpi-sampling::before{background:var(--st-prog)}.kpi-inactive::before{background:var(--st-draft)}
.kpi-label{font-size:11px;font-weight:700;color:var(--z-text-muted);margin-bottom:4px}
.kpi-val{font-size:28px;font-weight:900;letter-spacing:-.5px}
.kpi-total .kpi-val{color:var(--z-primary)}.kpi-active .kpi-val{color:var(--st-appr)}.kpi-sampling .kpi-val{color:var(--st-prog)}.kpi-inactive .kpi-val{color:var(--st-draft)}
.filter-bar{display:flex;justify-content:flex-end;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.search-box{background:#fff;border:1px solid var(--z-border);border-radius:6px;padding:5px 10px;font-size:11px;width:200px;outline:none;font-family:inherit}
.search-box:focus{border-color:var(--z-accent);box-shadow:0 0 0 2px rgba(59,130,246,.1)}
.filter-select{background:#fff;border:1px solid var(--z-border);border-radius:6px;padding:5px 8px;font-size:11px;outline:none;font-family:inherit;cursor:pointer}
.month-section{margin-bottom:16px}
.month-card{background:var(--z-card-bg);border:1px solid var(--z-border);border-radius:8px;overflow:hidden}
.month-header{padding:8px 16px;background:#F8FAFC;border-bottom:1px solid var(--z-border);display:flex;justify-content:space-between;align-items:center}
.month-title{font-size:13px;font-weight:800;color:var(--z-text-main)}
.month-count{font-size:11px;color:var(--z-text-muted);font-weight:600;background:#F1F5F9;padding:2px 8px;border-radius:10px;border:1px solid #CBD5E1}
.table-scroll{overflow-x:auto}
.z-table{width:100%;border-collapse:collapse;font-size:11px;text-align:left;table-layout:fixed}
.z-table th{background:#F1F5F9;padding:7px 8px;color:var(--z-text-muted);font-weight:800;font-size:10px;border-bottom:1px solid var(--z-border);white-space:nowrap;text-align:left}
.z-table td{padding:7px 8px;border-bottom:1px solid #F1F5F9;color:var(--z-text-main);vertical-align:middle;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.z-table tr{cursor:pointer;transition:background .1s}
.z-table tbody tr:hover td{background:#EFF6FF}
.style-info{display:flex;align-items:center;gap:8px}
.style-thumb{width:34px;height:34px;background:#F1F5F9;border:1px solid #E2E8F0;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#94A3B8;flex-shrink:0;overflow:hidden}
.style-thumb img{width:100%;height:100%;object-fit:cover}
.style-code{font-weight:800;color:var(--z-primary);font-size:11px;display:block}
.style-name{font-size:9px;color:var(--z-text-muted);display:block;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag{padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;display:inline-flex;align-items:center;white-space:nowrap}
.tag-draft{background:#F1F5F9;color:#475569;border:1px solid #CBD5E1}
.tag-prog{background:#FEF3C7;color:#B45309;border:1px solid #FDE68A}
.tag-appr{background:#D1FAE5;color:#065F46;border:1px solid #A7F3D0}
.tag-fail{background:#FEF2F2;color:#B91C1C;border:1px solid #FECACA}
.no-data{text-align:center;padding:20px;color:var(--z-text-muted);font-size:12px}
/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(2px)}
.modal-overlay.active{display:flex}
.modal-box{background:#fff;border-radius:12px;width:92%;max-width:760px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:modalIn .25s ease-out}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--z-border);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:#fff;z-index:10;border-radius:12px 12px 0 0}
.modal-header-left{display:flex;align-items:center;gap:14px}
.modal-thumb-lg{width:64px;height:64px;background:#F1F5F9;border:1px solid #E2E8F0;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.modal-thumb-lg img{width:100%;height:100%;object-fit:cover}
.modal-title{font-size:18px;font-weight:900;color:var(--z-primary)}
.modal-subtitle{font-size:12px;color:var(--z-text-muted);margin-top:2px}
.modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--z-border);background:#F8FAFC;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--z-text-muted)}
.modal-close:hover{background:#FEF2F2;color:var(--st-danger);border-color:#FECACA}
.modal-body{padding:20px 24px}
.modal-section{margin-bottom:24px}
.modal-section-title{font-size:12px;font-weight:800;color:var(--z-primary);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #EFF6FF}
.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.detail-item{display:flex;flex-direction:column;gap:3px;padding:6px 8px;background:#FAFBFC;border-radius:6px;border:1px solid #F1F5F9}
.detail-label{font-size:9px;font-weight:700;color:var(--z-text-muted);line-height:1.4}
.detail-value{font-size:13px;font-weight:600;color:var(--z-text-main)}
.detail-value.empty{color:#CBD5E1;font-weight:400;font-style:italic}
.modal-images{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.modal-img-wrap{text-align:center}
.modal-img-box{width:120px;height:120px;background:#F8FAFC;border:1px solid var(--z-border);border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:28px;color:#CBD5E1}
.modal-img-box img{width:100%;height:100%;object-fit:contain;cursor:pointer;transition:transform .2s}
.modal-img-box:hover{border-color:var(--z-accent);box-shadow:0 2px 8px rgba(59,130,246,.15)}
.modal-img-label{font-size:8px;color:var(--z-text-muted);margin-top:3px;font-weight:600}
/* Bar Chart */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{font-size:9px;font-weight:600;color:var(--z-text-main);min-width:320px;max-width:320px;text-align:right;line-height:1.3;overflow:hidden}
.bar-wrap{flex:1;height:22px;background:#F1F5F9;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:800;color:#fff;min-width:24px;transition:width .5s ease}
.bar-count{font-size:11px;font-weight:800;color:var(--z-text-main);min-width:30px;text-align:center}
.error-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:20px;text-align:center;color:#B91C1C}
@media(max-width:768px){.kpi-row{grid-template-columns:repeat(2,1fr)}.detail-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="loadingScreen" class="loading-screen"><div class="spinner"></div><div class="loading-text">데이터를 불러오는 중...</div></div>
<div id="mainContent" style="display:none">
<div class="page-header"><h1><span class="icon-s">S</span> Style View / 스타일 현황표 / 款式现况表</h1>
<button onclick="goTo('https://creatorapp.zoho.com/jeramoda/eom/#Form:Add_Styles')" style="background:var(--z-primary);color:#fff;border:none;padding:6px 16px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px">+ New Style</button>
</div>
<div class="kpi-row" id="kpiRow"></div>

<!-- Style Combination Chart -->
<div id="chartSection" style="background:#fff;border:1px solid var(--z-border);border-radius:8px;padding:16px;margin-bottom:16px;display:none">
<div style="font-size:13px;font-weight:800;color:var(--z-text-main);margin-bottom:12px;display:flex;align-items:center;gap:6px">📊 Style Type Distribution / 스타일 유형 분포 / 款式类型分布</div>
<div id="barChart"></div>
</div>

<div class="filter-bar">
<input type="text" class="search-box" id="searchBox" placeholder="🔍 SKU, 스타일명, Brand 검색...">
<select class="filter-select" id="filterCategory"><option value="">All Category</option></select>
<select class="filter-select" id="filterGender"><option value="">All Gender</option></select>
<select class="filter-select" id="filterSeason"><option value="">All Season</option></select>
<select class="filter-select" id="filterStatus"><option value="">All Status</option></select>
</div>
<div id="monthlyTables"></div>
</div>
<div id="errorScreen" style="display:none"><div class="error-box"><div style="font-weight:800;font-size:14px;margin-bottom:8px">데이터를 불러올 수 없습니다</div><div id="errorMsg" style="font-size:12px"></div></div></div>

<!-- Lightbox -->
<div id="lightboxOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:2000;justify-content:center;align-items:center;cursor:pointer;backdrop-filter:blur(4px)" onclick="closeLightbox()">
<img id="lightboxImg" style="max-width:90%;max-height:90%;object-fit:contain;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,.5)" onclick="event.stopPropagation()">
<div style="position:absolute;top:20px;right:24px;color:#fff;font-size:28px;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.15);border-radius:50%" onclick="closeLightbox()">✕</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay"><div class="modal-box">
<div class="modal-header"><div class="modal-header-left"><div class="modal-thumb-lg" id="modalThumb">👕</div><div><div class="modal-title" id="modalTitle">-</div><div class="modal-subtitle" id="modalSubtitle">-</div></div></div>
<div style="display:flex;align-items:center;gap:8px">
<button id="btnEdit" onclick="editStyle()" style="background:#EFF6FF;color:var(--z-primary);border:1px solid #BFDBFE;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">✏️ Edit</button>
<button id="btnNewMO" onclick="newMO()" style="background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">+ New MO</button>
<div class="modal-close" id="modalClose">✕</div>
</div></div>
<div class="modal-body" id="modalBody"></div>
</div></div>

<script>
var APP="eom",REP="All_Styles",MO_REP="All_MO";
var allRec=[],filtered=[],moSkus=new Set();

var MAP={
Gender:{"W":"Women / 여성 / 女","M":"Men / 남성 / 男","U":"Unisex / 남녀공용 / 男女通用"},
Category:{"S":"Set / 세트 / 套装","I":"Individual / 단품 / 单品"},
Top_Type:{"B":"Bra-top / 브라탑 / 运动内衣","C":"Crop / 크롭 / 露脐装","T":"Tank / 탱크 / 背心"},
Sleeve:{"L":"Long / 긴팔 / 长袖","S":"Short / 반팔 / 短袖","N":"None / 민소매 / 无袖"},
Fit:{"O":"Oversize / 루즈핏 / 宽松版","R":"Regular / 레귤러핏 / 标准版","S":"Slim / 슬림핏 / 修身版"},
Details:{"Z":"Zip-up(Full) / 짚업 / 全开拉链","H":"Half-zip / 반짚업 / 半拉链","N":"Round-neck / 라운드넥 / 圆领","C":"Cami-strap / 끈나시 / 吊带","W":"Wide-strap / 와이드 / 宽肩带","D":"Hood / 후드 / 连帽"},
Bottom_Type:{"L":"Leggings / 레깅스 / 紧身裤","W":"Wide / 와이드 / 宽腿裤","J":"Jogger / 조거 / 束脚裤","F":"Flare / 나팔 / 喇叭裤","P":"Pleats / 플리츠 / 褶皱","A":"A-line / A라인 / A字版","B":"Shorts / 반바지 / 短裤"},
Bottom_Length:{"3":"3-Tier(Short) / 3부 / 三分","5":"5-Tier(Mid) / 5부 / 五分","7":"7-Tier(Mid-full) / 7부 / 七分","9":"9-Tier(Full) / 9부 / 九分"},
Material_Type:{"P":"Polyester / 폴리에스터 / 涤纶","N":"Nylon / 나일론 / 尼龙","D":"Polyamide / 폴리아미드 / 聚酰胺","C":"Cotton / 코튼 / 棉","H":"Mesh / 메쉬 / 网布","M":"Modal / 모달 / 莫代尔","L":"Lycra / 라이크라 / 莱卡","PS":"Poly+Spandex","NS":"Nylon+Spandex","DS":"Polyamide+Spandex","CS":"Cotton+Spandex"},
Lining_Type:{"B":"Brushed / 기모 / 磨毛","F":"Fur / 퍼 / 毛皮","N":"None / 없음 / 无"}
};
function mv(f,v){return(!v||v==="-")?"-":(MAP[f]&&MAP[f][v])?MAP[f][v]:v}

ZOHO.CREATOR.init().then(function(){
ZOHO.CREATOR.API.getAllRecords({appName:APP,reportName:MO_REP,page:1,pageSize:200}).then(function(r){
if(r&&r.code===3000&&r.data)r.data.forEach(function(m){var s=g(m,"Style_SKU");if(s==="-")s=g(m,"SKU");if(s!=="-")moSkus.add(s)});
loadStyles()}).catch(function(){loadStyles()})});

function loadStyles(){
ZOHO.CREATOR.API.getAllRecords({appName:APP,reportName:REP,page:1,pageSize:200}).then(function(r){
if(r&&r.code===3000&&r.data){allRec=r.data;filtered=allRec.slice();renderKPI();buildFilters();renderChart();renderTables();hide("loadingScreen");show("mainContent");setTimeout(loadTableImgs,500)}
else showErr("로드 실패")}).catch(function(e){showErr(JSON.stringify(e))})}

function show(i){document.getElementById(i).style.display="block"}
function hide(i){document.getElementById(i).style.display="none"}
function showErr(m){hide("loadingScreen");show("errorScreen");document.getElementById("errorMsg").textContent=m}
function g(r,f){var v=r[f];if(v==null||v==="")return"-";if(typeof v==="object"&&v.display_value)return v.display_value;return String(v)}
function escH(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function tc(s){s=(s||"").toLowerCase();if(s.indexOf("active")>=0||s.indexOf("approved")>=0||s.indexOf("완성")>=0||s.indexOf("승인")>=0)return"tag-appr";if(s.indexOf("progress")>=0||s.indexOf("sampling")>=0||s.indexOf("샘플")>=0||s.indexOf("진행")>=0)return"tag-prog";if(s.indexOf("rejected")>=0||s.indexOf("cancel")>=0)return"tag-fail";return"tag-draft"}

function getImg1(r){var i=r["Style_Image"];if(!i)return null;if(Array.isArray(i)&&i.length>0)return i[0];if(typeof i==="string"&&i.length>5)return i;if(typeof i==="object"&&i.display_value)return i.display_value;return null}

function getAllImgs(r,field){
var i=r[field];if(!i)return[];
if(Array.isArray(i))return i.filter(function(x){return x&&typeof x==="string"&&x.length>5});
if(typeof i==="object"&&!Array.isArray(i)){var u=[];Object.keys(i).forEach(function(k){var v=i[k];if(v&&typeof v==="string"&&v.length>5)u.push(v)});return u}
if(typeof i==="string"&&i.length>5)return[i];return[]}

// ★ Table thumbnails (one per row - SDK works fine for single calls)
function loadTableImgs(){
document.querySelectorAll("[data-img]").forEach(function(el){
var url=el.getAttribute("data-img");if(!url)return;
var img=document.createElement("img");img.style.cssText="width:100%;height:100%;object-fit:cover";
try{ZOHO.CREATOR.UTIL.setImageData(img,url,function(){el.innerHTML="";el.appendChild(img)})}catch(e){}})}

// ★★★ SEQUENTIAL IMAGE LOADING — One at a time, 30s timeout ★★★
var _imgQ=[];
var _imgBusy=false;

function queueImg(id,url){
_imgQ.push({id:id,url:url});
if(!_imgBusy)_processNext()}

function _processNext(){
if(_imgQ.length===0){_imgBusy=false;return}
_imgBusy=true;
var task=_imgQ.shift();
var el=document.getElementById(task.id);
if(!el){_imgBusy=false;setTimeout(_processNext,100);return}

var img=document.createElement("img");
img.style.cssText="width:100%;height:100%;object-fit:contain;cursor:pointer";
img.onclick=function(){openLightbox(this.src)};
var done=false;

function finish(success){
    if(done)return;done=true;
    if(success){el.innerHTML="";el.appendChild(img)}
    // Wait 1s then process next
    setTimeout(_processNext,1000);
}

try{
ZOHO.CREATOR.UTIL.setImageData(img,url,function(){
    if(img.src&&img.src.length>20&&img.src!=="about:blank"){finish(true)}
    else{finish(false)}
});
}catch(e){finish(false)}
// 30 second timeout
setTimeout(function(){if(!done){done=true;setTimeout(_processNext,1000)}},30000);
}

function loadAllModalImgs(rec){
_imgQ=[];_imgBusy=false;
var si=getAllImgs(rec,"Style_Image");
var fi=getAllImgs(rec,"Flat_Sketch");
var smi=getAllImgs(rec,"Sample_Images");
si.forEach(function(u,i){queueImg("sImg"+i,u)});
fi.forEach(function(u,i){queueImg("fImg"+i,u)});
smi.forEach(function(u,i){queueImg("smImg"+i,u)});
}

// ★ Navigation — simple window.open to top frame
function goTo(url){
    window.open(url,"_top");
}

var _currentRecId=null;

function editStyle(){
    if(!_currentRecId)return;
    goTo("https://creatorapp.zoho.com/jeramoda/eom/#Report:All_Styles");
}

function newMO(){
    goTo("https://creatorapp.zoho.com/jeramoda/eom/#Form:Add_MO");
}

// KPI
// ★ Style Type Distribution Chart
var COLORS=["#3B82F6","#8B5CF6","#EC4899","#F97316","#10B981","#06B6D4","#EF4444","#F59E0B","#6366F1","#14B8A6","#E11D48","#84CC16","#0EA5E9","#A855F7","#F43F5E"];
function renderChart(){
var combos={};
allRec.forEach(function(r){
var cat=g(r,"Category"),top=g(r,"Top_Type"),sl=g(r,"Sleeve"),fit=g(r,"Fit"),det=g(r,"Details"),bot=g(r,"Bottom_Type"),bl=g(r,"Bottom_Length");
// Build key from non-empty values
var parts=[];
if(cat!=="-")parts.push({f:"Category",v:cat});
if(top!=="-")parts.push({f:"Top_Type",v:top});
if(sl!=="-")parts.push({f:"Sleeve",v:sl});
if(fit!=="-")parts.push({f:"Fit",v:fit});
if(det!=="-")parts.push({f:"Details",v:det});
if(bot!=="-")parts.push({f:"Bottom_Type",v:bot});
if(bl!=="-")parts.push({f:"Bottom_Length",v:bl});
if(parts.length===0)return;
var key=parts.map(function(p){return p.f+":"+p.v}).join("|");
var label=parts.map(function(p){return mv(p.f,p.v)}).join(" + ");
if(!combos[key])combos[key]={label:label,count:0};
combos[key].count++});

var arr=Object.values(combos).sort(function(a,b){return b.count-a.count});
if(arr.length===0){document.getElementById("chartSection").style.display="none";return}
document.getElementById("chartSection").style.display="block";
var max=arr[0].count;
var h='';
arr.forEach(function(item,i){
var pct=Math.max(5,Math.round(item.count/max*100));
var color=COLORS[i%COLORS.length];
h+='<div class="bar-row">';
h+='<div class="bar-label" title="'+escH(item.label)+'">'+escH(item.label)+'</div>';
h+='<div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%;background:'+color+'">'+item.count+'</div></div>';
h+='<div class="bar-count">'+item.count+'</div>';
h+='</div>'});
document.getElementById("barChart").innerHTML=h}

function renderKPI(){
var t=filtered.length;
var a=filtered.filter(function(r){return tc(g(r,"Style_Status"))==="tag-appr"}).length;
var sm=filtered.filter(function(r){var s=(g(r,"Sample_Status")+" "+g(r,"Style_Status")).toLowerCase();return s.indexOf("sampling")>=0||s.indexOf("샘플")>=0}).length;
document.getElementById("kpiRow").innerHTML=
'<div class="kpi-card kpi-total"><div class="kpi-label">총 스타일 / Total</div><div class="kpi-val">'+t+'</div></div>'+
'<div class="kpi-card kpi-active"><div class="kpi-label">Active / 활성화</div><div class="kpi-val">'+a+'</div></div>'+
'<div class="kpi-card kpi-sampling"><div class="kpi-label">Sampling / 샘플진행</div><div class="kpi-val">'+sm+'</div></div>'+
'<div class="kpi-card kpi-inactive"><div class="kpi-label">기타 / Other</div><div class="kpi-val">'+(t-a)+'</div></div>'}

// ★ Filters: Category, Gender, Season, Status
function buildFilters(){
var cat={},gen={},se={},st={};
allRec.forEach(function(r){
var c=g(r,"Category");if(c!=="-")cat[c]=mv("Category",c);
var ge=g(r,"Gender");if(ge!=="-")gen[ge]=mv("Gender",ge);
var s=g(r,"Season");if(s!=="-")se[s]=1;
var t=g(r,"Style_Status");if(t!=="-")st[t]=1});
var el;
el=document.getElementById("filterCategory");Object.keys(cat).sort().forEach(function(k){el.innerHTML+='<option value="'+k+'">'+escH(cat[k])+'</option>'});
el=document.getElementById("filterGender");Object.keys(gen).sort().forEach(function(k){el.innerHTML+='<option value="'+k+'">'+escH(gen[k])+'</option>'});
el=document.getElementById("filterSeason");Object.keys(se).sort().forEach(function(k){el.innerHTML+='<option value="'+k+'">'+k+'</option>'});
el=document.getElementById("filterStatus");Object.keys(st).sort().forEach(function(k){el.innerHTML+='<option value="'+k+'">'+k+'</option>'})}

// ★ Table: columns center-aligned, matching user's image 2
function renderTables(){
var groups={};
filtered.forEach(function(r){var py=g(r,"Plan_Year"),pm=g(r,"Plan_Month");var key=(py!=="-"&&pm!=="-")?(py+"년 "+pm+"월"):"미지정";if(!groups[key])groups[key]=[];groups[key].push(r)});

var html="";
Object.keys(groups).sort().forEach(function(key){
var items=groups[key];
html+='<div class="month-section"><div class="month-card">';
html+='<div class="month-header"><div class="month-title">📅 '+escH(key)+'</div><span class="month-count">'+items.length+' styles</span></div>';
html+='<div class="table-scroll"><table class="z-table"><thead><tr>';
html+='<th style="width:18%">Style Info</th><th style="width:7%">Brand</th><th style="width:7%">Season</th><th style="width:12%">Gender</th><th style="width:12%">Category</th><th style="width:14%">Material_Type</th><th style="width:8%">Target_Cost</th><th style="width:10%">Status</th><th style="width:6%">Sample</th><th style="width:8%">Order</th>';
html+='</tr></thead><tbody>';
items.forEach(function(r){
var sku=g(r,"Style_SKU"),name=g(r,"Style_Name");
var iu=getImg1(r),ia=iu?' data-img="'+iu+'"':'';
var ordered=moSkus.has(sku);
html+='<tr data-id="'+r["ID"]+'">';
html+='<td><div class="style-info"><div class="style-thumb"'+ia+'>👕</div><div><span class="style-code">'+escH(sku)+'</span><span class="style-name">'+escH(name)+'</span></div></div></td>';
html+='<td>'+escH(g(r,"Business_Entity"))+'</td>';
html+='<td>'+escH(g(r,"Season"))+'</td>';
html+='<td>'+escH(mv("Gender",g(r,"Gender")))+'</td>';
html+='<td>'+escH(mv("Category",g(r,"Category")))+'</td>';
html+='<td>'+escH(mv("Material_Type",g(r,"Material_Type")))+'</td>';
html+='<td>'+escH(g(r,"Target_Cost"))+'</td>';
html+='<td><span class="tag '+tc(g(r,"Style_Status"))+'">'+escH(g(r,"Style_Status"))+'</span></td>';
html+='<td><span class="tag '+tc(g(r,"Sample_Status"))+'">'+escH(g(r,"Sample_Status"))+'</span></td>';
html+='<td>'+(ordered?'<span class="tag tag-appr">Ordered</span>':'<span class="tag tag-fail">Not Ordered</span>')+'</td>';
html+='</tr>'});
html+='</tbody></table></div></div></div>'});
document.getElementById("monthlyTables").innerHTML=html;
setTimeout(loadTableImgs,500);
document.querySelectorAll("#monthlyTables tr[data-id]").forEach(function(row){
row.addEventListener("click",function(){var id=this.getAttribute("data-id");var r=allRec.find(function(x){return x["ID"]===id});if(r)openModal(r)})})}

// Filters
["searchBox","filterCategory","filterGender","filterSeason","filterStatus"].forEach(function(id){
document.getElementById(id).addEventListener(id==="searchBox"?"input":"change",af)});
function af(){
var q=document.getElementById("searchBox").value.toLowerCase().trim();
var fc=document.getElementById("filterCategory").value;
var fg=document.getElementById("filterGender").value;
var fs=document.getElementById("filterSeason").value;
var ft=document.getElementById("filterStatus").value;
filtered=allRec.filter(function(r){
if(q){var h=(g(r,"Style_SKU")+" "+g(r,"Style_Name")+" "+g(r,"Business_Entity")).toLowerCase();if(h.indexOf(q)<0)return false}
if(fc&&g(r,"Category")!==fc)return false;
if(fg&&g(r,"Gender")!==fg)return false;
if(fs&&g(r,"Season")!==fs)return false;
if(ft&&g(r,"Style_Status")!==ft)return false;return true});
renderKPI();renderTables()}

// ★ MODAL
function openModal(rec){
_currentRecId=rec["ID"];
document.getElementById("modalTitle").textContent=g(rec,"Style_SKU");
document.getElementById("modalSubtitle").textContent=g(rec,"Style_Name");
var te=document.getElementById("modalThumb");te.innerHTML="👕";
var iu=getImg1(rec);
if(iu){var hi=document.createElement("img");hi.style.cssText="width:100%;height:100%;object-fit:cover";
try{ZOHO.CREATOR.UTIL.setImageData(hi,iu,function(){te.innerHTML="";te.appendChild(hi)})}catch(e){}}
document.getElementById("modalBody").innerHTML=buildDetail(rec);
document.getElementById("modalOverlay").classList.add("active");
setTimeout(function(){loadAllModalImgs(rec)},500)}

function buildDetail(d){
var h='';
function dv(v){return v==="-"?'<span class="detail-value empty">미입력</span>':escH(v)}
function dt(v){return'<span class="tag '+tc(v)+'">'+escH(v)+'</span>'}
function it(l,v){return'<div class="detail-item"><span class="detail-label">'+l+'</span><span class="detail-value">'+v+'</span></div>'}
var ordered=moSkus.has(g(d,"Style_SKU"));

// ── 1. 기본 정보 ──
h+='<div class="modal-section"><div class="modal-section-title">📌 기본 정보 / Identity / 基本信息</div><div class="detail-grid">';
h+=it("Style SKU / 스타일SKU / 款式SKU",dv(g(d,"Style_SKU")));
h+=it("Style Name / 스타일명 / 款式名",dv(g(d,"Style_Name")));
h+=it("Style Number / 스타일번호 / 款式序号",dv(g(d,"Style_Number")));
h+=it("Season / 시즌 / 季节",dv(g(d,"Season")));
h+=it("Plan Year / 진행년도 / 进行年度",dv(g(d,"Plan_Year")));
h+=it("Plan Month / 진행월 / 进行月度",dv(g(d,"Plan_Month")));
h+=it("Brand / 사업주체 / 业务主体",dv(g(d,"Business_Entity")));
h+=it("Style Status / 스타일상태 / 款式状态",dt(g(d,"Style_Status")));
h+=it("Order Status / 오더상태 / 订单状态",ordered?'<span class="tag tag-appr">Ordered</span>':'<span class="tag tag-fail">Not Ordered</span>');
h+='</div></div>';

// ── 2. 제품 정의 ──
h+='<div class="modal-section"><div class="modal-section-title">👗 제품 정의 / Product Definition / 产品定义</div><div class="detail-grid">';
h+=it("Gender / 성별 / 性别",dv(mv("Gender",g(d,"Gender"))));
h+=it("Category / 구분 / 大类",dv(mv("Category",g(d,"Category"))));
h+=it("Top Type / 상의유형 / 上衣类型",dv(mv("Top_Type",g(d,"Top_Type"))));
h+=it("Sleeve / 소매유형 / 衣袖类型",dv(mv("Sleeve",g(d,"Sleeve"))));
h+=it("Fit / 핏 / 版型",dv(mv("Fit",g(d,"Fit"))));
h+=it("Details / 디테일 / 类型详情",dv(mv("Details",g(d,"Details"))));
h+=it("Bottom Type / 하의유형 / 下装类型",dv(mv("Bottom_Type",g(d,"Bottom_Type"))));
h+=it("Bottom Length / 하의기장 / 下装长短",dv(mv("Bottom_Length",g(d,"Bottom_Length"))));
h+='</div></div>';

// ── 3. 원단 ──
h+='<div class="modal-section"><div class="modal-section-title">🧵 원단 정보 / Material Info / 面料</div><div class="detail-grid">';
h+=it("Material Type / 원단종류 / 面料种类",dv(mv("Material_Type",g(d,"Material_Type"))));
h+=it("blended % / 혼방% / 混纺%",dv(g(d,"blended_percentage")));
h+=it("Lining Type / 안감유형 / 里料类型",dv(mv("Lining_Type",g(d,"Lining_Type"))));
h+='</div></div>';

// ── 4. 색상 & 사이즈 ──
h+='<div class="modal-section"><div class="modal-section-title">🎨 색상 & 사이즈 / Variants / 尺寸颜色</div><div class="detail-grid">';
h+=it("Available Sizes / 사이즈 / 尺寸",dv(g(d,"Available_Sizes")));
h+=it("Available Colors / 색상 / 颜色",dv(g(d,"Available_Colors")));
h+='</div></div>';

// ── 5. 샘플 ──
h+='<div class="modal-section"><div class="modal-section-title">✂️ 샘플 정보 / Sample Info / 样品信息</div><div class="detail-grid">';
h+=it("Sample Status / 샘플상태 / 样品状态",dt(g(d,"Sample_Status")));
h+=it("Sample Date / 샘플날짜 / 样品日期",dv(g(d,"Sample_Date")));
h+=it("Sample Notes / 샘플메모 / 样品备注",dv(g(d,"Sample_Notes")));
h+='</div></div>';

// ── 6. 원가 ──
h+='<div class="modal-section"><div class="modal-section-title">💰 원가 정보 / Costing / 成本信息</div><div class="detail-grid">';
h+=it("Target Cost / 목표원가 / 目标成本",dv(g(d,"Target_Cost")));
h+=it("Final Cost / 최종원가 / 最终成本",dv(g(d,"Final_Cost")));
h+=it("Total BOM Cost / 총BOM원가 / BOM总成本",dv(g(d,"Total_BOM_Cost")));
h+=it("Cost Notes / 원가메모 / 成本备注",dv(g(d,"Cost_Notes")));
h+='</div></div>';

// ── 7. 이미지 ──
var si=getAllImgs(d,"Style_Image"),fi=getAllImgs(d,"Flat_Sketch"),smi=getAllImgs(d,"Sample_Images");
if(si.length||fi.length||smi.length){
h+='<div class="modal-section"><div class="modal-section-title">📸 이미지 / Images / 图片</div>';
if(si.length){h+='<div style="font-size:10px;font-weight:700;color:var(--z-text-muted);margin-bottom:6px">Style Images / 스타일이미지 / 款式图片 ('+si.length+')</div><div class="modal-images">';
si.forEach(function(u,i){h+='<div class="modal-img-wrap"><div class="modal-img-box" id="sImg'+i+'"><div class="spinner-sm"></div></div><div class="modal-img-label">Style '+(i+1)+'</div></div>'});h+='</div>'}
if(fi.length){h+='<div style="font-size:10px;font-weight:700;color:var(--z-text-muted);margin:10px 0 6px">Flat Sketch / 도안이미지 / 工艺图 ('+fi.length+')</div><div class="modal-images">';
fi.forEach(function(u,i){h+='<div class="modal-img-wrap"><div class="modal-img-box" id="fImg'+i+'"><div class="spinner-sm"></div></div><div class="modal-img-label">Sketch '+(i+1)+'</div></div>'});h+='</div>'}
if(smi.length){h+='<div style="font-size:10px;font-weight:700;color:var(--z-text-muted);margin:10px 0 6px">Sample Images / 샘플이미지 / 样品图片 ('+smi.length+')</div><div class="modal-images">';
smi.forEach(function(u,i){h+='<div class="modal-img-wrap"><div class="modal-img-box" id="smImg'+i+'"><div class="spinner-sm"></div></div><div class="modal-img-label">Sample '+(i+1)+'</div></div>'});h+='</div>'}
h+='</div>'}
return h}

function openLightbox(src){if(!src)return;document.getElementById("lightboxImg").src=src;document.getElementById("lightboxOverlay").style.display="flex"}
function closeLightbox(){document.getElementById("lightboxOverlay").style.display="none";document.getElementById("lightboxImg").src=""}
function closeModal(){document.getElementById("modalOverlay").classList.remove("active");_imgQ=[];_imgBusy=false;_currentRecId=null}
document.getElementById("modalClose").addEventListener("click",closeModal);
document.getElementById("modalOverlay").addEventListener("click",function(e){if(e.target===this)closeModal()});
document.addEventListener("keydown",function(e){if(e.key==="Escape"){if(document.getElementById("lightboxOverlay").style.display==="flex")closeLightbox();else closeModal()}});
</script>
