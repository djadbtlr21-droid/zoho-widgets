<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipment View v9</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://js.zohostatic.com/creator/widgets/version/1.0/widgetsdk-min.js"></script>
<style>
:root{--pr:#1E3A8A;--ac:#3B82F6;--bg:#F1F5F9;--bd:#E2E8F0;--tx:#0F172A;--tm:#64748B;--cw:#FFF;--ok:#10B981;--wn:#F59E0B;--dg:#EF4444;--dr:#94A3B8}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans KR',-apple-system,sans-serif}
body{background:var(--bg);padding:16px;min-height:100vh}

.spinner{width:40px;height:40px;border:4px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
.spinner-sm{width:16px;height:16px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;color:var(--tm);font-size:13px;font-weight:600}

/* 헤더 */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.hdr-ic{width:30px;height:30px;background:var(--pr);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.hdr-title{font-size:17px;font-weight:900;color:var(--tx)}
.hdr-sub{font-size:11px;color:var(--tm);font-weight:500;margin-top:2px}
.btn-new{background:#A5B4FC;color:#1E1B4B;border:none;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer}
.btn-new:hover{background:#818CF8}

/* 알림 배너 */
.alert-bar{margin-bottom:14px}
.al-item{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:8px;margin-bottom:5px;font-size:11px;font-weight:700;cursor:pointer}
.al-hold{background:#FEE2E2;color:#B91C1C;border:1px solid #FECACA}
.al-eta{background:#FEF9C3;color:#A16207;border:1px solid #FDE68A}
.al-x{width:16px;height:16px;border-radius:3px;background:rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer;flex-shrink:0;margin-left:auto}

/* KPI 카드 */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.kpi-card{background:var(--cw);border:1px solid var(--bd);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;left:0;top:0;width:100%;height:4px}
.kc0::before{background:linear-gradient(90deg,#A5B4FC,#818CF8)}
.kc1::before{background:linear-gradient(90deg,#FDE68A,#F59E0B)}
.kc2::before{background:linear-gradient(90deg,#A7F3D0,#34D399)}
.kpi-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.kpi-month{font-size:20px;font-weight:900;color:var(--tx)}
.kpi-month-en{font-size:12px;color:var(--tm);font-weight:600;margin-left:5px}
.kpi-badge{font-size:9px;font-weight:800;padding:3px 10px;border-radius:20px}
.kb-done{background:#D1FAE5;color:#065F46}
.kb-transit{background:#E0F2FE;color:#0369A1}
.kb-planned{background:#FEF9C3;color:#A16207}
.kpi-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.kpi-m{text-align:center;padding:8px 4px;background:#FAFBFC;border-radius:8px;border:1px solid #F1F5F9}
.kpi-m-val{font-size:15px;font-weight:900;line-height:1.2;margin-bottom:4px}
.kpi-m-lbl{font-size:9px;font-weight:700;color:var(--tm)}
.kpi-modes{display:flex;gap:5px;flex-wrap:wrap;padding-top:10px;border-top:1px solid #F1F5F9;margin-bottom:10px}
.mt{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px}
.mt-ocean{background:#BAE6FD;color:#0284C7}
.mt-air{background:#DDD6FE;color:#7C3AED}
.mt-courier{background:#BBF7D0;color:#047857}
.mt-other{background:#F1F5F9;color:#475569}

/* KPI 파이프라인 */
.kpi-pipe{display:flex;align-items:center;padding-top:10px;border-top:1px solid #F1F5F9}
.kpi-pipe-title{font-size:9px;font-weight:700;color:var(--tm);margin-bottom:6px}
.kpb{flex:1;text-align:center;cursor:pointer}
.kpb-dot{width:22px;height:22px;border-radius:50%;margin:0 auto 3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#fff}
.kpb-lbl{font-size:7px;font-weight:700;color:var(--tm)}
.kpb-lbl2{font-size:6px;color:var(--tm)}
.kpb-line{flex:0;height:2px;width:4px}

/* 요약 바 */
.sum-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.sum-card{background:var(--cw);border:1px solid var(--bd);border-radius:10px;padding:12px;text-align:center}
.sum-val{font-size:18px;font-weight:900;line-height:1}
.sum-lbl{font-size:9px;font-weight:700;color:var(--tm);margin-top:4px;line-height:1.4}

/* 월별 섹션 */
.month-sec{margin-bottom:24px}
.month-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--bd)}
.month-title{font-size:15px;font-weight:900;color:var(--tx);display:flex;align-items:center;gap:8px}
.month-cnt{font-size:11px;color:var(--tm);font-weight:600;background:#F1F5F9;padding:2px 10px;border-radius:10px;border:1px solid #CBD5E1}
.filter-bar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.f-search{background:#fff;border:1px solid var(--bd);border-radius:6px;padding:5px 10px;font-size:11px;outline:none;font-family:inherit;width:160px}
.f-sel{background:#fff;border:1px solid var(--bd);border-radius:6px;padding:5px 8px;font-size:11px;outline:none;font-family:inherit;cursor:pointer}

/* 컨테이너 카드 */
.ship-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(442px,1fr));gap:12px}
.ship-card{background:var(--cw);border:1px solid var(--bd);border-radius:10px;padding:14px;cursor:pointer;transition:box-shadow .15s,transform .1s;position:relative}
.ship-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-1px)}
.ship-card.is-hold{border-color:#FECACA;background:#FFF8F8}
.ship-card.is-hold::after{content:'HOLD';position:absolute;top:10px;right:10px;background:#EF4444;color:#fff;font-size:8px;font-weight:900;padding:2px 6px;border-radius:3px}
.sc-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.sc-id{font-size:13px;font-weight:900;color:var(--pr)}
.sc-type{font-size:10px;color:var(--tm);font-weight:600;margin-top:2px}
.sc-route{display:flex;align-items:center;gap:6px;margin-bottom:10px;font-size:11px;font-weight:700}
.sc-port{padding:3px 8px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:5px;font-size:10px}
.sc-arr{color:#94A3B8}
.sc-mode{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:2px}
.sc-nums{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
.sc-nb{background:#FAFBFC;border:1px solid #F1F5F9;border-radius:6px;padding:5px;text-align:center}
.sc-nv{font-size:11px;font-weight:800;color:var(--tx)}
.sc-nl{font-size:8px;color:var(--tm);font-weight:600;margin-top:1px}
.sc-mos{margin-bottom:10px}
.sc-mo-row{display:flex;align-items:center;gap:6px;font-size:10px;padding:3px 0;border-bottom:1px solid #F8FAFC}
.sc-mo-row:last-child{border-bottom:none}
.sc-mo-num{font-weight:800;color:var(--pr);font-size:10px;flex-shrink:0}
.sc-mo-style{color:var(--tm);font-size:9px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-mo-qty{font-weight:700;color:var(--tx);font-size:10px;flex-shrink:0}
.sc-tracker{display:flex;align-items:center}
.sct-w{flex:1;text-align:center}
.sct-dot{width:18px;height:18px;border-radius:50%;margin:0 auto 2px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:900;color:#fff}
.sct-done{background:#34D399}
.sct-curr{background:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.2)}
.sct-wait{background:#E2E8F0;color:#94A3B8}
.sct-hold{background:#EF4444;box-shadow:0 0 0 3px rgba(239,68,68,.2)}
.sct-lbl{font-size:7px;font-weight:700;color:var(--tm)}
.sct-line{flex:0;height:2px;width:4px}
.sc-dates{display:flex;justify-content:space-between;font-size:9px;color:var(--tm);padding-top:8px;border-top:1px solid #F1F5F9;flex-wrap:wrap;gap:4px}
.sc-dates b{color:var(--tx);font-weight:700}
.delayed{color:#EF4444!important;font-weight:700!important}

/* 태그 */
.tag{padding:3px 8px;border-radius:4px;font-size:9px;font-weight:700;display:inline-flex;align-items:center;white-space:nowrap}
.t-ok{background:#D1FAE5;color:#065F46;border:1px solid #A7F3D0}
.t-wn{background:#FEF3C7;color:#B45309;border:1px solid #FDE68A}
.t-dg{background:#FEF2F2;color:#B91C1C;border:1px solid #FECACA}
.t-bl{background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE}
.t-pu{background:#F5F3FF;color:#6D28D9;border:1px solid #C4B5FD}
.t-dr{background:#F1F5F9;color:#475569;border:1px solid #CBD5E1}

/* 모달 공통 */
.modal-ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:3000;justify-content:center;align-items:center;backdrop-filter:blur(2px)}
.modal-ov.active{display:flex}
.modal-box{background:#fff;border-radius:12px;width:94%;max-width:950px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .25s ease-out}
.modal-box-sm{max-width:620px}
.modal-box-mo{max-width:1000px}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.m-hd{padding:18px 22px 14px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:#fff;z-index:10;border-radius:12px 12px 0 0}
.m-title{font-size:16px;font-weight:900;color:var(--pr)}
.m-sub{font-size:11px;color:var(--tm);margin-top:2px}
.m-close{width:30px;height:30px;border-radius:7px;border:1px solid var(--bd);background:#F8FAFC;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--tm)}
.m-close:hover{background:#FEF2F2;color:var(--dg)}
.m-body{padding:18px 22px}
.m-sec{margin-bottom:22px}
.m-sec-t{font-size:12px;font-weight:800;color:var(--pr);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #EFF6FF;display:flex;align-items:center;gap:6px}
.d-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.d-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.d-grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.d-item{display:flex;flex-direction:column;gap:3px;padding:8px 10px;background:#FAFBFC;border-radius:6px;border:1px solid #F1F5F9}
.d-label{font-size:9px;font-weight:700;color:var(--tm)}
.d-val{font-size:12px;font-weight:700;color:var(--tx)}
.d-val.empty{color:#CBD5E1;font-style:italic;font-weight:400;font-size:11px}

/* 모달 트래커 */
.big-track{display:flex;align-items:flex-start;padding:16px;background:#FAFBFC;border-radius:10px;border:1px solid #E2E8F0}
.bt-w{flex:1;text-align:center}
.bt-dot{width:30px;height:30px;border-radius:50%;margin:0 auto 5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#fff}
.bt-done{background:#34D399}
.bt-curr{background:#3B82F6;box-shadow:0 0 0 5px rgba(59,130,246,.15)}
.bt-wait{background:#E2E8F0;color:#94A3B8}
.bt-hold{background:#EF4444;box-shadow:0 0 0 5px rgba(239,68,68,.12)}
.bt-lbl{font-size:10px;font-weight:800;color:var(--tm)}
.bt-lbl.done-lbl{color:#059669}
.bt-lbl.curr-lbl{color:#2563EB}
.bt-lbl.hold-lbl{color:#DC2626}
.bt-lbl2{font-size:8px;color:#94A3B8}

/* 날짜 비교 */
.dt-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.dt-col{background:#FAFBFC;border-radius:8px;padding:12px;border:1px solid #E2E8F0}
.dt-col-t{font-size:11px;font-weight:800;margin-bottom:10px;padding-bottom:8px;border-bottom:2px dashed #E2E8F0}
.dt-col-t.plan{color:#7C3AED}
.dt-col-t.actual{color:#059669}
.dt-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #F1F5F9}
.dt-row:last-child{border-bottom:none}
.dt-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:#fff;flex-shrink:0}
.dt-done{background:#86EFAC;color:#065F46}
.dt-curr{background:#93C5FD;color:#1E40AF}
.dt-wait{background:#E2E8F0;color:#64748B}
.dt-lbl{font-size:10px;font-weight:700;color:var(--tx)}
.dt-val{font-size:10px;color:var(--tm);margin-top:1px}

/* Container Lines 테이블 */
.cl-wrap{overflow-x:auto}
.cl-tbl{width:100%;border-collapse:collapse;font-size:11px;min-width:700px}
.cl-tbl th{background:#F1F5F9;padding:7px 8px;color:var(--tm);font-weight:800;font-size:9px;border-bottom:1px solid var(--bd);text-align:center;white-space:nowrap}
.cl-tbl td{padding:8px;border-bottom:1px solid #F8FAFC;text-align:center;color:var(--tx)}
.cl-tbl tbody tr:hover td{background:#EFF6FF}
.cl-mo-btn{color:var(--pr);font-weight:800;cursor:pointer;text-decoration:underline;text-underline-offset:2px;background:none;border:none;font-family:inherit;font-size:11px;padding:0}
.cl-mo-btn:hover{color:#3B82F6}
.cl-tfoot td{font-weight:900;background:#F1F5F9;border-top:2px solid var(--bd)}

/* 팝업 리스트 */
.pop-item{padding:12px 14px;border:1px solid var(--bd);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:background .1s}
.pop-item:hover{background:#EFF6FF;border-color:#BFDBFE}
.pop-item.is-hold{border-color:#FECACA;background:#FFF8F8}
.pop-item.is-hold:hover{background:#FEF2F2}

/* MO 모달 내부 */
.pa-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.pa-box{padding:10px 12px;border-radius:8px;text-align:center}
.pa-box.plan{background:#F5F3FF;border:2px solid #C4B5FD}
.pa-box.actual{background:#ECFDF5;border:2px solid #6EE7B7}
.pa-box-lbl{font-size:9px;font-weight:800;margin-bottom:4px}
.pa-box.plan .pa-box-lbl{color:#7C3AED}
.pa-box.actual .pa-box-lbl{color:#059669}
.pa-box-qty{font-size:20px;font-weight:900}
.pa-box.plan .pa-box-qty{color:#6D28D9}
.pa-box.actual .pa-box-qty{color:#047857}
.pa-box-amt{font-size:10px;margin-top:2px}
.pa-box.plan .pa-box-amt{color:#7C3AED}
.pa-box.actual .pa-box-amt{color:#059669}
.mo-sub-tbl{width:100%;border-collapse:collapse;font-size:10px}
.mo-sub-tbl th{background:#F1F5F9;padding:5px 7px;color:var(--tm);font-weight:800;font-size:9px;border-bottom:1px solid var(--bd);text-align:center}
.mo-sub-tbl td{padding:5px 7px;border-bottom:1px solid #F8FAFC;text-align:center;color:var(--tx)}
.mo-sub-tbl tfoot td{background:#F1F5F9;font-weight:800;border-top:2px solid var(--bd)}

/* 빈 상태 */
.empty-st{text-align:center;padding:40px;color:var(--tm);font-size:12px}

/* hover */
.pipe-list-item:hover{background:#EFF6FF!important;border-color:#BFDBFE!important}

@media(max-width:900px){.kpi-row{grid-template-columns:1fr 1fr}.sum-row{grid-template-columns:repeat(3,1fr)}.ship-grid{grid-template-columns:1fr}.d-grid{grid-template-columns:1fr 1fr}.dt-cols{grid-template-columns:1fr}.pa-cols{grid-template-columns:1fr}}
@media(max-width:600px){.kpi-row{grid-template-columns:1fr}.sum-row{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div id="loadingScreen" class="loading">
  <div class="spinner"></div>
  <span>선적 데이터를 불러오는 중 / 加载出货数据...</span>
</div>

<div id="mainContent" style="display:none">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="hdr-ic">🚢</div>
      <div>
        <div class="hdr-title">Shipment View / 선적 현황표 / 集装箱现况表</div>
        <div class="hdr-sub" id="hdrSub">로딩 중...</div>
      </div>
    </div>
    <button class="btn-new" onclick="window.open('https://creatorapp.zoho.com/jeramoda/eom/#Form:Add_Shipment','_blank')">+ New Shipment</button>
  </div>
  <div class="alert-bar" id="alertBar"></div>
  <div class="kpi-row" id="kpiRow"></div>
  <div class="sum-row" id="sumRow"></div>
  <div id="monthlyContent"></div>
</div>

<!-- 컨테이너 상세 모달 -->
<div class="modal-ov" id="shipModalOv">
  <div class="modal-box">
    <div class="m-hd">
      <div><div class="m-title" id="smTitle">-</div><div class="m-sub" id="smSub">-</div></div>
      <div style="display:flex;align-items:center;gap:8px">
        <button onclick="window.open('https://creatorapp.zoho.com/jeramoda/eom/#Report:All_Shipment','_blank')" style="background:#EFF6FF;color:var(--pr);border:1px solid #BFDBFE;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">✏️ Edit</button>
        <button id="invoiceBtn" style="background:#FEF9C3;color:#A16207;border:1px solid #FDE68A;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">🧾 Invoice</button>
        <div class="m-close" id="smClose">✕</div>
      </div>
    </div>
    <div class="m-body" id="smBody"></div>
  </div>
</div>

<!-- 파이프라인 리스트 팝업 -->
<div class="modal-ov" id="pipePopOv" style="z-index:3500">
  <div class="modal-box modal-box-sm">
    <div class="m-hd">
      <div><div class="m-title" id="ppTitle">-</div><div class="m-sub" id="ppSub">-</div></div>
      <div class="m-close" id="ppClose">✕</div>
    </div>
    <div class="m-body" id="ppBody"></div>
  </div>
</div>

<!-- MO 상세 모달 -->
<div class="modal-ov" id="moModalOv" style="z-index:4000">
  <div class="modal-box modal-box-mo">
    <div class="m-hd">
      <div><div class="m-title" id="moTitle">-</div><div class="m-sub" id="moSub">-</div></div>
      <div style="display:flex;align-items:center;gap:8px">
        <button onclick="window.open('https://creatorapp.zoho.com/jeramoda/eom/#Report:All_MO','_blank')" style="background:#EFF6FF;color:var(--pr);border:1px solid #BFDBFE;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">✏️ Edit MO</button>
        <div class="m-close" id="moClose">✕</div>
      </div>
    </div>
    <div class="m-body" id="moBody">
      <div style="text-align:center;padding:40px"><div class="spinner"></div><div style="margin-top:12px;color:var(--tm);font-size:12px">MO 데이터 불러오는 중...</div></div>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════
   Shipment View v9
   Report : All_Shipment
   Form   : Add_Shipment
════════════════════════════════════════ */
var APP = "eom";
var SHIP_REP = "All_Shipment";
var MO_REP = "All_MO";
var allShip = [];
var today = new Date();
var todayStr = today.toISOString().split("T")[0];

/* 6단계 프로세스 */
var STEPS    = ["Booking","Loaded","Boarded","In Transit","Customs","Delivered"];
var STEP_KO  = ["부킹","적재","선적","운송","통관","완료"];
var STEP_ZH  = ["预订","装载","装船","运输","清关","完成"];
var STEP_MAP = {
  /* 부킹 단계 */
  "Booking Pending":0,"Booked":0,"Booking Confirmed":0,"Booking":0,
  /* 적재 단계 */
  "Loaded":1,"Loading":1,"Loaded/적재":1,
  /* 선적(탑승) 단계 */
  "On Board":2,"Boarded":2,"Board":2,
  /* 운송 단계 */
  "In Transit":3,"Transit":3,"In transit":3,
  /* 통관 단계 */
  "Customs":4,"Customs Hold":4,"Customs Cleared":4,"Customs Hold/통관보류":4,
  /* 완료 단계 */
  "Delivered":5,"Completed":5,"Done":5,"delivered":5
};

/* 통화 심볼 */
var CUR_SYM = {"USD":"$","CNY":"¥","MXN":"MX$","KRW":"₩","EUR":"€"};

/* ── 유틸 ── */
function gv(r, f) {
  var v = r[f];
  if (v == null || v === "") return "-";
  if (typeof v === "object" && v.display_value) return v.display_value;
  return String(v);
}
function esc(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
function pd(v) {
  if (!v || v === "-") return null;
  if (/^\d{4}-\d{2}-\d{2}/.test(v)) return v.substring(0, 10);
  var m = v.match(/^(\d{1,2})-([A-Za-z]+)-(\d{4})/);
  if (m) {
    var mo = {Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};
    return m[3] + "-" + (mo[m[2]] || "01") + "-" + (m[1].length === 1 ? "0" + m[1] : m[1]);
  }
  return null;
}
function fmtD(v) {
  var p = pd(v);
  if (!p) return "-";
  var a = p.split("-");
  return a[1] + "/" + a[2] + "/" + a[0].slice(2);
}
function getYM(r) {
  var etd = pd(gv(r, "ETD"));
  if (!etd) return null;
  var a = etd.split("-");
  return { y: parseInt(a[0]), m: parseInt(a[1]), key: a[0] + "년 " + parseInt(a[1]) + "월" };
}
function getStep(r) {
  var s = (gv(r, "Container_Status") || "").trim();
  /* 정확한 매칭 */
  if (STEP_MAP[s] !== undefined) return STEP_MAP[s];
  /* 대소문자 무시 매칭 */
  var sl = s.toLowerCase();
  for (var k in STEP_MAP) {
    if (k.toLowerCase() === sl) return STEP_MAP[k];
  }
  /* 부분 매칭 fallback */
  if (sl.indexOf("booking") >= 0 || sl.indexOf("booked") >= 0) return 0;
  if (sl.indexOf("loaded") >= 0 || sl.indexOf("loading") >= 0) return 1;
  if (sl.indexOf("board") >= 0) return 2;
  if (sl.indexOf("transit") >= 0) return 3;
  if (sl.indexOf("customs") >= 0) return 4;
  if (sl.indexOf("deliver") >= 0 || sl.indexOf("done") >= 0 || sl.indexOf("complet") >= 0) return 5;
  return -1;
}
function isHold(r) { return (gv(r, "Container_Status") || "").toLowerCase().indexOf("hold") >= 0; }
function isDelayed(r) {
  var st = (gv(r, "Container_Status") || "").toLowerCase();
  if (st.indexOf("delivered") >= 0 || st.indexOf("done") >= 0 || st.indexOf("complet") >= 0) return false;
  var eta = pd(gv(r, "ETA"));
  var dd = parseInt(gv(r, "Delay_Days")) || 0;
  return (eta && eta < todayStr) || dd > 0;
}
function modeInfo(m) {
  var l = (m || "").toLowerCase();
  if (l.indexOf("air") >= 0) return { cls:"mt-air", icon:"✈️", label: m };
  if (l.indexOf("courier") >= 0 || l.indexOf("express") >= 0) return { cls:"mt-courier", icon:"📦", label: m };
  if (l.indexOf("ocean") >= 0 || l.indexOf("sea") >= 0 || l.indexOf("해운") >= 0) return { cls:"mt-ocean", icon:"🚢", label: m };
  return { cls:"mt-other", icon:"🚛", label: m || "Sea" };
}
function stTag(s) {
  var l = (s || "").toLowerCase();
  if (l.indexOf("delivered") >= 0 || l.indexOf("done") >= 0 || l.indexOf("complet") >= 0) return '<span class="tag t-ok">' + esc(s) + '</span>';
  if (l.indexOf("transit") >= 0) return '<span class="tag t-bl">' + esc(s) + '</span>';
  if (l.indexOf("hold") >= 0) return '<span class="tag t-dg">' + esc(s) + '</span>';
  if (l.indexOf("customs") >= 0) return '<span class="tag t-wn">' + esc(s) + '</span>';
  if (l.indexOf("board") >= 0 || l.indexOf("booking") >= 0) return '<span class="tag t-pu">' + esc(s) + '</span>';
  return '<span class="tag t-dr">' + esc(s || "미입력") + '</span>';
}
function getLines(r) {
  var v = r["Container_Lines"];
  if (!v) return [];
  if (Array.isArray(v)) return v;
  if (typeof v === "object") return Object.values(v);
  return [];
}
function lineVal(line, key) {
  var v = line[key];
  if (v == null || v === "") return "-";
  if (typeof v === "object" && v.display_value) return v.display_value;
  return String(v);
}
/* Zoho Image 필드 URL 추출 */
function getImgUrl(line, field) {
  var v = line[field];
  if (!v) return null;
  /* 문자열 URL */
  if (typeof v === "string" && v.length > 5) return v;
  /* 배열 형태 [{url:...}] */
  if (Array.isArray(v) && v.length > 0) {
    var first = v[0];
    if (typeof first === "string") return first;
    if (first && first.url) return first.url;
    if (first && first.download_url) return first.download_url;
  }
  /* 객체 형태 */
  if (typeof v === "object") {
    if (v.url) return v.url;
    if (v.download_url) return v.download_url;
    if (v.display_value) return v.display_value;
  }
  return null;
}

function groupByMonth() {
  var g = {};
  allShip.forEach(function(r) {
    var ym = getYM(r);
    var key = ym ? ym.key : "미지정";
    if (!g[key]) g[key] = [];
    g[key].push(r);
  });
  return g;
}
function freightStr(items) {
  var byCur = {};
  items.forEach(function(r) {
    var fc = parseFloat(gv(r, "Freight_Cost")) || 0;
    /* Currency 필드에서 통화코드만 추출 (USD / 미국달러 / 美元 → USD) */
    var rawCur = gv(r, "Currency") || "USD";
    var cur = rawCur.split("/")[0].trim().toUpperCase();
    /* 알려진 통화만 허용 */
    if (cur !== "USD" && cur !== "CNY" && cur !== "MXN") cur = "USD";
    if (fc > 0) { if (!byCur[cur]) byCur[cur] = 0; byCur[cur] += fc; }
  });
  var ORDER = ["USD","CNY","MXN"];
  var parts = [];
  ORDER.forEach(function(cur) {
    if (!byCur[cur]) return;
    var amt = byCur[cur];
    var sym = CUR_SYM[cur];
    parts.push(sym + (amt >= 1000 ? (amt / 1000).toFixed(1) + "k" : amt.toFixed(0)));
  });
  return { str: parts.length ? parts.join(" + ") : "—", multi: parts.length > 1 };
}

/* ── 데이터 로드 ── */
ZOHO.CREATOR.init().then(function() {
  ZOHO.CREATOR.API.getAllRecords({ appName: APP, reportName: SHIP_REP, page: 1, pageSize: 200 })
  .then(function(res) {
    if (res && res.code === 3000 && res.data) allShip = res.data;
    renderAll();
    document.getElementById("loadingScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
  }).catch(function(e) {
    console.warn("load:", e);
    renderAll();
    document.getElementById("loadingScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
  });
}).catch(function(e) {
  console.warn("init:", e);
  renderAll();
  document.getElementById("loadingScreen").style.display = "none";
  document.getElementById("mainContent").style.display = "block";
});

/* ── 전체 렌더 ── */
function renderAll() {
  if (allShip.length === 0) {
    document.getElementById("hdrSub").textContent = "데이터 없음 — Add Shipment에서 데이터를 입력해주세요";
    document.getElementById("alertBar").innerHTML = "";
    document.getElementById("kpiRow").innerHTML = '<div class="empty-st" style="grid-column:1/-1">📭 선적 데이터가 없습니다<br><span style="font-size:10px;color:#94A3B8;display:block;margin-top:6px">Add Shipment 폼에서 데이터를 추가하면 여기에 표시됩니다</span></div>';
    document.getElementById("sumRow").innerHTML = "";
    document.getElementById("monthlyContent").innerHTML = "";
    return;
  }
  var groups = groupByMonth();
  var keys = Object.keys(groups).filter(function(k) { return k !== "미지정"; }).sort();
  document.getElementById("hdrSub").textContent = "총 " + allShip.length + "건 · " + keys.length + "개월 데이터";
  renderAlerts();
  renderKPI(groups, keys);
  renderSum();
  renderMonthly(groups, keys);
}

/* ── 이슈 알림 ── */
function renderAlerts() {
  var h = "";
  allShip.forEach(function(r) {
    var cid = gv(r, "Container_ID");
    var rid = r["ID"];
    if (isHold(r)) {
      h += '<div class="al-item al-hold" data-open="' + rid + '">⚠️ <b>' + esc(cid) + '</b> — 통관 보류 (Customs Hold) · 즉시 확인 요망<span class="al-x">✕</span></div>';
    } else if (isDelayed(r)) {
      var dd = gv(r, "Delay_Days");
      h += '<div class="al-item al-eta" data-open="' + rid + '">🕐 <b>' + esc(cid) + '</b> — ETA 지연' + (dd !== "-" ? " " + dd + "일" : "") + ' · ' + esc(gv(r, "Origin_Port")) + ' → ' + esc(gv(r, "Destination_Port")) + '<span class="al-x">✕</span></div>';
    }
  });
  document.getElementById("alertBar").innerHTML = h;
}

/* ── KPI 카드 ── */
function renderKPI(groups, keys) {
  var recent = keys.slice(-3);
  var colors = ["kc0", "kc1", "kc2"];
  var MO_EN = ["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var h = "";

  recent.forEach(function(key, ki) {
    var items = groups[key];
    var ym = getYM(items[0]) || { m: 0, y: 0 };
    var totalKG = 0;
    var cntO = 0, cntA = 0, cntC = 0, cntX = 0;
    var cntDone = 0, cntTransit = 0, cntHold = 0;
    var otifOk = 0;
    var stepCounts = [0, 0, 0, 0, 0, 0];

    items.forEach(function(r) {
      totalKG += parseFloat(gv(r, "Total_Weight_KG")) || 0;
      var ml = (gv(r, "Shipment_Mode") || "").toLowerCase();
      if (ml.indexOf("air") >= 0) cntA++;
      else if (ml.indexOf("courier") >= 0 || ml.indexOf("express") >= 0) cntC++;
      else if (ml.indexOf("ocean") >= 0 || ml.indexOf("sea") >= 0 || ml.indexOf("해운") >= 0) cntO++;
      else cntX++;
      var si = getStep(r);
      if (si >= 0 && si < 6) stepCounts[si]++;
      var st = (gv(r, "Container_Status") || "").toLowerCase();
      if (st.indexOf("delivered") >= 0 || st.indexOf("done") >= 0) cntDone++;
      else if (st.indexOf("transit") >= 0) cntTransit++;
      if (isHold(r)) cntHold++;
      var eta = pd(gv(r, "ETA")), ata = pd(gv(r, "ATA"));
      var dd = parseInt(gv(r, "Delay_Days")) || 0;
      if (eta && ata && ata <= eta) otifOk++;
      else if (eta && !ata && eta >= todayStr && dd === 0) otifOk++;
    });

    var otif = items.length > 0 ? Math.round((otifOk / items.length) * 100) : 0;
    var otifColor = otif >= 95 ? "#10B981" : otif >= 85 ? "#F59E0B" : "#EF4444";
    var allDone = items.every(function(r) { var st = (gv(r,"Container_Status")||"").toLowerCase(); return st.indexOf("delivered")>=0||st.indexOf("done")>=0||st.indexOf("complet")>=0; });
    var hasTrans = items.some(function(r) { return (gv(r,"Container_Status")||"").toLowerCase().indexOf("transit")>=0; });
    var statusTxt = allDone ? "Closed" : hasTrans ? "In Transit" : "Planned";
    var statusCls = allDone ? "kb-done" : hasTrans ? "kb-transit" : "kb-planned";
    var maxStep = 0; for (var x = 5; x >= 0; x--) { if (stepCounts[x] > 0) { maxStep = x; break; } }
    var fInfo = freightStr(items);
    var fColor = fInfo.multi ? "#7C3AED" : "#10B981";
    var keyEnc = encodeURIComponent(key);

    h += '<div class="kpi-card ' + colors[ki] + '">';
    h += '<div class="kpi-hd"><div><span class="kpi-month">' + ym.m + '월</span><span class="kpi-month-en">' + (MO_EN[ym.m] || "") + '</span></div><span class="kpi-badge ' + statusCls + '">' + statusTxt + '</span></div>';
    h += '<div class="kpi-metrics">';
    h += '<div class="kpi-m"><div class="kpi-m-val" style="color:#3B82F6">' + items.length + '</div><div class="kpi-m-lbl">컨테이너/CNTR</div></div>';
    h += '<div class="kpi-m"><div class="kpi-m-val" style="color:' + fColor + ';font-size:13px">' + fInfo.str + '</div><div class="kpi-m-lbl">운임/运费</div></div>';
    h += '<div class="kpi-m"><div class="kpi-m-val" style="color:' + otifColor + '">' + otif + '%</div><div class="kpi-m-lbl">OTIF</div></div>';
    h += '</div>';
    h += '<div class="kpi-modes">';
    if (cntO > 0) h += '<span class="mt mt-ocean">🚢 Ocean ' + cntO + '</span>';
    if (cntA > 0) h += '<span class="mt mt-air">✈️ Air ' + cntA + '</span>';
    if (cntC > 0) h += '<span class="mt mt-courier">📦 Courier ' + cntC + '</span>';
    if (cntX > 0) h += '<span class="mt mt-other">🚛 기타 ' + cntX + '</span>';
    h += '</div>';
    /* 파이프라인 */
    h += '<div><div class="kpi-pipe-title">선적 파이프라인 / 出货流水</div>';
    h += '<div class="kpi-pipe">';
    for (var i = 0; i < STEPS.length; i++) {
      var cnt = stepCounts[i];
      var bg = cnt > 0 ? (i < maxStep ? "#34D399" : i === maxStep ? "#3B82F6" : "#E2E8F0") : "#E2E8F0";
      var tc = (bg === "#E2E8F0") ? "#94A3B8" : "#fff";
      var lc = bg === "#34D399" ? "#059669" : bg === "#3B82F6" ? "#2563EB" : "#94A3B8";
      if (i > 0) h += '<div class="kpb-line" style="background:' + (stepCounts[i-1] > 0 ? "#34D399" : "#E2E8F0") + '"></div>';
      h += '<div class="kpb" data-pipebubble="1" data-key="' + keyEnc + '" data-step="' + i + '" data-cnt="' + cnt + '">';
      h += '<div class="kpb-dot" style="background:' + bg + ';color:' + tc + '">' + cnt + '</div>';
      h += '<div class="kpb-lbl" style="color:' + lc + '">' + STEP_KO[i] + '</div>';
      h += '<div class="kpb-lbl2" style="color:' + lc + '">' + STEP_ZH[i] + '</div>';
      h += '</div>';
    }
    h += '</div></div></div>';
  });

  document.getElementById("kpiRow").innerHTML = h || '<div class="empty-st" style="grid-column:1/-1">데이터 없음</div>';
}

/* ── 요약 바 ── */

  var counts = [0, 0, 0, 0, 0, 0];
  allShip.forEach(function(r) { var si = getStep(r); if (si >= 0 && si < 6) counts[si]++; });
  var G_LABELS = [
    {ko:"부킹 / 预订",ic:"📝",c:"#A855F7"},{ko:"적재 / 装载",ic:"📦",c:"#F59E0B"},
    {ko:"선적 / 装船",ic:"🗃️",c:"#3B82F6"},{ko:"운송 / 运输",ic:"🚢",c:"#14B8A6"},
    {ko:"통관 / 清关",ic:"🏢",c:"#10B981"},{ko:"완료 / 完成",ic:"✅",c:"#2563EB"}
  ];
  var h = '<div style="background:#fff;border:1px solid var(--bd);border-radius:10px;padding:18px;margin-bottom:24px;box-shadow:0 2px 4px rgba(0,0,0,.02)">';
  h += '<div style="font-size:12px;font-weight:800;color:var(--tx);margin-bottom:16px;display:flex;align-items:center;gap:6px">📊 글로벌 파이프라인 / 整体出货流水表</div>';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;overflow-x:auto;padding-bottom:4px">';
  for (var i = 0; i < 6; i++) {
    h += '<div class="g-pipe-card" data-gstep="' + i + '" style="flex:1;min-width:110px;display:flex;flex-direction:column;align-items:center;padding:12px 0;border-radius:8px;cursor:pointer;transition:background .15s">';
    h += '<div style="font-size:26px;font-weight:900;margin-bottom:8px;line-height:1;color:' + G_LABELS[i].c + '">' + counts[i] + '</div>';
    h += '<div style="display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--tm)"><span style="font-size:14px">' + G_LABELS[i].ic + '</span>' + G_LABELS[i].ko + '</div>';
    h += '<div style="width:90%;height:5px;border-radius:3px;margin-top:14px;background:' + G_LABELS[i].c + '"></div>';
    h += '</div>';
    if (i < 5) h += '<div style="color:#CBD5E1;font-size:14px;flex-shrink:0">▶</div>';
  }
  h += '</div></div>';
  document.getElementById("sumRow").innerHTML = h;
}
/* ── 월별 목록 ── */
function renderMonthly(groups, keys) {
  var html = "";
  var reversed = keys.slice().reverse();
  reversed.forEach(function(key, mi) {
    var items = groups[key];
    var ym = getYM(items[0]) || { y: 0, m: 0 };
    var yy = String(ym.y).slice(-2);
    var mm = ym.m < 10 ? "0" + ym.m : "" + ym.m;
    var title = yy + "." + mm + " 선적 현황 / " + yy + "年 " + ym.m + "月 出货现况";
    var mMode = {}, mStat = {};
    items.forEach(function(r) {
      var md = gv(r, "Shipment_Mode"); if (md !== "-") mMode[md] = 1;
      var st = gv(r, "Container_Status"); if (st !== "-") mStat[st] = 1;
    });

    html += '<div class="month-sec" id="ms' + mi + '">';
    html += '<div class="month-hd"><div class="month-title">🚢 ' + title + '</div><span class="month-cnt" id="mc' + mi + '">' + items.length + ' Containers</span></div>';
    html += '<div class="filter-bar">';
    html += '<input type="text" class="f-search sf" data-m="' + mi + '" data-t="q" placeholder="🔍 검색...">';
    html += '<select class="f-sel sf" data-m="' + mi + '" data-t="md"><option value="">All Mode</option>';
    Object.keys(mMode).sort().forEach(function(k) { html += '<option value="' + esc(k) + '">' + esc(k) + '</option>'; });
    html += '</select>';
    html += '<select class="f-sel sf" data-m="' + mi + '" data-t="st"><option value="">All Status</option>';
    Object.keys(mStat).sort().forEach(function(k) { html += '<option value="' + esc(k) + '">' + esc(k) + '</option>'; });
    html += '</select></div>';
    html += '<div class="ship-grid" id="sg' + mi + '">';
    items.forEach(function(r) { html += buildCard(r, mi); });
    html += '</div></div>';
  });
  document.getElementById("monthlyContent").innerHTML = html;
}

/* ── 카드 빌드 ── */
function buildCard(r, mi) {
  var cid = gv(r, "Container_ID");
  var ctype = gv(r, "Container_Type");
  var mode = gv(r, "Shipment_Mode");
  var status = gv(r, "Container_Status");
  var from = gv(r, "Origin_Port");
  var to = gv(r, "Destination_Port");
  var qty = parseInt(gv(r, "Total_Quantity")) || 0;
  var kg = parseFloat(gv(r, "Total_Weight_KG")) || 0;
  var ctn = parseInt(gv(r, "Total_Cartons")) || 0;
  var etd = gv(r, "ETD"), eta = gv(r, "ETA"), ata = gv(r, "ATA");
  var dd = gv(r, "Delay_Days");
  var hold = isHold(r), delayed = isDelayed(r);
  var si = getStep(r);
  var mi_info = modeInfo(mode);
  var lines = getLines(r);
  var srch = (cid + " " + ctype + " " + mode + " " + status + " " + from + " " + to + " " + gv(r, "BL_Number") + " " + gv(r, "Vessel_Name")).toLowerCase();

  var h = '<div class="ship-card' + (hold ? " is-hold" : "") + '" data-id="' + r["ID"] + '" data-m="' + mi + '" data-md="' + esc(mode) + '" data-st="' + esc(status) + '" data-sr="' + esc(srch) + '">';

  /* 헤더 */
  h += '<div class="sc-hd"><div>';
  h += '<div class="sc-id">' + (cid !== "-" ? esc(cid) : '<span style="color:#94A3B8">ID 미입력</span>') + '</div>';
  h += '<div class="sc-type">' + (ctype !== "-" ? esc(ctype) : "-") + '</div>';
  h += '</div>' + stTag(status) + '</div>';

  /* 루트 */
  h += '<div class="sc-route">';
  h += '<span class="sc-port">' + esc(from !== "-" ? from : "?") + '</span>';
  h += '<span class="sc-arr">→</span>';
  h += '<span class="sc-port">' + esc(to !== "-" ? to : "?") + '</span>';
  h += '<span class="mt ' + mi_info.cls + ' sc-mode">' + mi_info.icon + ' ' + esc(mi_info.label !== "-" ? mi_info.label : "Sea") + '</span>';
  h += '</div>';

  /* 수치 */
  h += '<div class="sc-nums">';

function doFilter(mi) {
  var sec = document.getElementById("ms" + mi); if (!sec) return;
  var q = "", md = "", st = "";
  sec.querySelectorAll(".sf").forEach(function(el) {
    var t = el.getAttribute("data-t"), v = el.value;
    if (t === "q") q = v.toLowerCase().trim();
    else if (t === "md") md = v;
    else if (t === "st") st = v;
  });
  var cards = sec.querySelectorAll('.ship-card[data-m="' + mi + '"]');
  var cnt = 0;
  cards.forEach(function(c) {
    var ok = true;
    if (q && c.getAttribute("data-sr").indexOf(q) < 0) ok = false;
    if (md && c.getAttribute("data-md") !== md) ok = false;
    if (st && c.getAttribute("data-st") !== st) ok = false;
    c.style.display = ok ? "" : "none";
    if (ok) cnt++;
  });
  var el = document.getElementById("mc" + mi); if (el) el.textContent = cnt + " Containers";
}

  Material_Type:{"P":"Polyester","N":"Nylon","D":"Polyamide","C":"Cotton","H":"Mesh","M":"Modal","L":"Lycra"},
  Lining_Type:{"B":"Brushed/기모","F":"Fur/퍼","N":"None/없음"}
};
function mv(f, v) { return (!v || v === "-") ? "-" : (S_MAP[f] && S_MAP[f][v]) ? S_MAP[f][v] : v; }
function cln(v) { if (!v || v === "-") return "-"; return v.replace(/^[_\s]*\d+[_\s]*/, ""); }
function moTc(s) {
  var l = (s || "").toLowerCase();
  if (l.indexOf("confirmed") >= 0 || l.indexOf("delivered") >= 0 || l.indexOf("done") >= 0 || l.indexOf("shipped") >= 0) return "t-ok";
  if (l.indexOf("progress") >= 0 || l.indexOf("cutting") >= 0 || l.indexOf("sewing") >= 0 || l.indexOf("fabric") >= 0) return "t-wn";
  if (l.indexOf("delay") >= 0 || l.indexOf("cancel") >= 0) return "t-dg";
  return "t-dr";
}
function getMOLines(r, field) { var v = r[field]; if (!v) return []; if (Array.isArray(v)) return v; if (typeof v === "object") return Object.values(v); return []; }

function buildMODetail(r) {
  var h = "";

  h += '<div class="m-sec"><div class="m-sec-t">📌 기본 정보 / 订单信息</div><div class="d-grid">';
  h += it("MO Number", dv(gv(r, "MO_Number")));

  h += it("Production Status", '<span class="tag ' + moTc(gv(r, "Production_Status")) + '">' + esc(gv(r, "Production_Status")) + '</span>');

  h += '<div class="pa-box actual"><div class="pa-box-lbl">✅ ACTUAL 출고수량 / 出货数量</div><div class="pa-box-qty">' + actQty.toLocaleString() + ' <span style="font-size:11px">pcs</span></div><div class="pa-box-amt">총금액: ' + esc(actGrand) + '</div></div>';

  var planLines = getMOLines(r, "Plan_MO_Lines");
  var actLines  = getMOLines(r, "Acture_Order_Lines");
  [{ lines: planLines, prefix: "Plan_", label: "PLAN", color: "#7C3AED", bg: "#7C3AED" },
   { lines: actLines,  prefix: "Acture_", label: "ACTUAL", color: "#059669", bg: "#059669" }].forEach(function(col) {
    h += '<div>';
    h += '<div style="font-size:11px;font-weight:800;color:' + col.color + ';margin-bottom:6px;display:flex;align-items:center;gap:5px"><span style="background:' + col.bg + ';color:#fff;font-size:8px;font-weight:800;padding:2px 6px;border-radius:3px">' + col.label + '</span>' + (col.label === "PLAN" ? "주문 내용" : "실출고 내역") + '</div>';
    if (col.lines.length === 0) {
      h += '<div style="text-align:center;padding:12px;color:#94A3B8;font-size:10px;border:1px dashed #E2E8F0;border-radius:6px">입력된 내역 없음</div>';
    } else {
      h += '<table class="mo-sub-tbl"><thead><tr><th>Color</th><th>Sizes</th><th>Qty</th><th>Unit Price</th></tr></thead><tbody>';
      var tot = 0;
      col.lines.forEach(function(line) {
        var c2  = line[col.prefix + "Color"] || line["Color"] || "-";

        var lq  = parseInt(line[col.prefix + "Quantity"] || line["Quantity"]) || 0;
        var lp  = parseFloat(line[col.prefix + "Unit_Price"] || line["Unit_Price"]) || 0;
        tot += lq;
        h += '<tr><td>' + esc(String(c2)) + '</td><td>' + esc(String(sz)) + '</td><td style="font-weight:700">' + lq.toLocaleString() + '</td><td>' + (lp > 0 ? lp.toLocaleString() : "-") + '</td></tr>';

    }
    h += '</div>';

  h += '</div></div>';

  /* 생산 일정 */
  h += '<div class="m-sec"><div class="m-sec-t">📅 생산 일정 / 生产日期</div><div class="dt-cols">';

    var v = gv(r, t.k), p = pd(v), cls = "dt-wait";
    if (p) cls = p <= todayStr ? "dt-done" : "dt-curr";

  h += '<div class="dt-col"><div class="dt-col-t actual">✅ Actual 일정</div>';
  [{l:"Fabric In",k:"Fabric_In_house_Date"},{l:"Cutting Start",k:"Cutting_Start_Date"},{l:"Cutting End",k:"Cutting_End_Date"},{l:"Sewing Start",k:"Sewing_Start_Date"},{l:"Sewing End",k:"Sewing_Completion_Date"},{l:"Packing Start",k:"Packing_Start_Date"},{l:"Packing End",k:"Packing_End_Date"},{l:"Ship Date",k:"Ship_Date"}].forEach(function(t, i) {

  });
  h += '</div></div></div>';
  return h;

  }
  parts.push("<div style='text-align:center;margin-top:10px;font-size:9px;color:#999'>Auto-generated by EOM Shipment System · " + new Date().toLocaleString() + "</div>");
  parts.push("</div>"); /* .page */

  /* 이벤트 리스너 스크립트 (문자열 분리로 안전하게) */
  var scriptOpen  = "<" + "script>";
  var scriptClose = "<" + "/script>";
  parts.push(scriptOpen);
  parts.push("document.getElementById('btn-print').addEventListener('click',function(){window.print();});");
  parts.push("document.getElementById('btn-pdf').addEventListener('click',function(){window.print();});");
  parts.push("document.getElementById('btn-close').addEventListener('click',function(){window.close();});");
  parts.push("document.addEventListener('keydown',function(e){if(e.ctrlKey&&e.key==='p'){e.preventDefault();window.print();}});");
  parts.push(scriptClose);
  parts.push("</body></html>");

  var invoiceHTML = parts.join("");

  /* 새 창 열기 */
  var w = window.open("", "_blank", "width=900,height=1100,scrollbars=yes,resizable=yes");
  if (!w) { alert("팝업이 차단되었습니다. 팝업 허용 후 다시 시도해주세요."); return; }
  w.document.open();
  w.document.write(invoiceHTML);
  w.document.close();
  w.focus();
}

/* ══════════════════════════════════════
   이벤트 위임 (모든 클릭 처리)
══════════════════════════════════════ */
document.addEventListener("click", function(e) {
  /* 알림 배너 닫기 */
  if (e.target.classList.contains("al-x")) {
    e.stopPropagation();
    e.target.closest(".al-item").remove();
    return;
  }
  /* 알림 배너 클릭 → 컨테이너 모달 */
  var alItem = e.target.closest(".al-item");
  if (alItem && !e.target.classList.contains("al-x")) {
    var rid = alItem.getAttribute("data-open");
    if (rid) { openShipModal(rid); return; }
  }
  /* 글로벌 파이프라인 카드 클릭 */
  var gCard = e.target.closest(".g-pipe-card");
  if (gCard) { var step = parseInt(gCard.getAttribute("data-gstep")); if (!isNaN(step)) openGlobalPipeList(step); return; }
  /* 파이프라인 버블 클릭 */
  var bubble = e.target.closest("[data-pipebubble]");
  if (bubble) {
    var cnt = parseInt(bubble.getAttribute("data-cnt")) || 0;
    if (cnt > 0) {
      openPipeList(bubble.getAttribute("data-key"), parseInt(bubble.getAttribute("data-step")));
    }
    return;
  }
  /* 파이프 팝업 리스트 아이템 */
  var pItem = e.target.closest("[data-pipeid]");
  if (pItem) {
    document.getElementById("pipePopOv").classList.remove("active");
    openShipModal(pItem.getAttribute("data-pipeid"));
    return;
  }
  /* 컨테이너 카드 클릭 */
  var card = e.target.closest(".ship-card");
  if (card && !e.target.closest(".cl-mo-btn") && !e.target.closest(".sf")) {
    openShipModal(card.getAttribute("data-id"));
    return;
  }
  /* Invoice 버튼 클릭 */
  if (e.target.id === "invoiceBtn" || e.target.closest("#invoiceBtn")) {
    var invId = document.getElementById("invoiceBtn").getAttribute("data-invoiceid");
    if (invId) { openInvoice(invId); }
    return;
  }
  /* MO 번호 버튼 클릭 */
  var moBtn = e.target.closest(".cl-mo-btn");
  if (moBtn) {
    e.stopPropagation();
    openMOModal(moBtn.getAttribute("data-monum"));
    return;
  }
  /* 필터 셀렉트/인풋 */
  var sf = e.target.closest(".sf");
  if (sf) return;
});

/* 필터 이벤트 (input/change) */
document.addEventListener("input", function(e) {
  if (e.target.classList.contains("sf")) doFilter(e.target.getAttribute("data-m"));
});
document.addEventListener("change", function(e) {
  if (e.target.classList.contains("sf")) doFilter(e.target.getAttribute("data-m"));
});

/* 모달 닫기 */
document.getElementById("smClose").addEventListener("click", function() { document.getElementById("shipModalOv").classList.remove("active"); });
document.getElementById("shipModalOv").addEventListener("click", function(e) { if (e.target === this) this.classList.remove("active"); });
document.getElementById("ppClose").addEventListener("click", function() { document.getElementById("pipePopOv").classList.remove("active"); });
document.getElementById("pipePopOv").addEventListener("click", function(e) { if (e.target === this) this.classList.remove("active"); });
document.getElementById("moClose").addEventListener("click", function() { document.getElementById("moModalOv").classList.remove("active"); });
document.getElementById("moModalOv").addEventListener("click", function(e) { if (e.target === this) this.classList.remove("active"); });
document.addEventListener("keydown", function(e) {
  if (e.key !== "Escape") return;
  if (document.getElementById("moModalOv").classList.contains("active")) { document.getElementById("moModalOv").classList.remove("active"); return; }
  if (document.getElementById("pipePopOv").classList.contains("active")) { document.getElementById("pipePopOv").classList.remove("active"); return; }
  document.getElementById("shipModalOv").classList.remove("active");
});
