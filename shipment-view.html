<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipment View v1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://js.zohostatic.com/creator/widgets/version/1.0/widgetsdk-min.js"></script>
<style>
/* ═══════════════════════════════════════════
   SHIPMENT VIEW v1 — 파스텔 계열 디자인
   Overview / MO View 동일 톤 유지
═══════════════════════════════════════════ */
:root{
  --pr:#1E3A8A;--ac:#3B82F6;--bg:#F1F5F9;--bd:#E2E8F0;
  --tx:#0F172A;--tm:#64748B;--cw:#FFF;
  --ok:#10B981;--wn:#F59E0B;--dg:#EF4444;--dr:#94A3B8;
  /* Shipment 전용 */
  --sh-ocean:#BAE6FD;  --sh-ocean-t:#0284C7;
  --sh-air:#DDD6FE;    --sh-air-t:#7C3AED;
  --sh-courier:#BBF7D0;--sh-courier-t:#047857;
  --sh-planned:#FEF9C3;--sh-planned-t:#A16207;
  --sh-transit:#E0F2FE;--sh-transit-t:#0369A1;
  --sh-delivered:#D1FAE5;--sh-delivered-t:#065F46;
  --sh-hold:#FEE2E2;   --sh-hold-t:#B91C1C;
  --sh-booked:#EDE9FE; --sh-booked-t:#6D28D9;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans KR',-apple-system,sans-serif}
body{background:var(--bg);padding:16px;min-height:100vh}

/* 로딩 */
.spinner{width:40px;height:40px;border:4px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
.spinner-sm{width:16px;height:16px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;color:var(--tm);font-size:13px;font-weight:600}
.err-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:20px;text-align:center;color:#B91C1C;font-size:13px}

/* ── 헤더 ── */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-icon{width:32px;height:32px;background:var(--pr);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px}
.hdr-title{font-size:18px;font-weight:900;color:var(--tx)}
.hdr-sub{font-size:11px;color:var(--tm);font-weight:500;margin-top:1px}
.hdr-btns{display:flex;gap:8px;align-items:center}
.btn-new{background:#A5B4FC;color:#1E1B4B;border:none;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;transition:background .15s}
.btn-new:hover{background:#818CF8}

/* ══ 월별 KPI 카드 3종 ══ */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
.kpi-card{background:var(--cw);border:1px solid var(--bd);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;transition:box-shadow .15s}
.kpi-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.kpi-card::before{content:'';position:absolute;left:0;top:0;width:100%;height:4px}
.kpi-mar::before{background:linear-gradient(90deg,#A5B4FC,#818CF8)}
.kpi-apr::before{background:linear-gradient(90deg,#FDE68A,#F59E0B)}
.kpi-may::before{background:linear-gradient(90deg,#A7F3D0,#34D399)}

.kpi-card-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.kpi-month{display:flex;align-items:baseline;gap:7px}
.kpi-month-num{font-size:22px;font-weight:900;color:var(--tx)}
.kpi-month-en{font-size:13px;font-weight:700;color:var(--tm)}
.kpi-status{font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px}
.st-closed{background:#D1FAE5;color:#065F46}
.st-transit{background:#E0F2FE;color:#0369A1}
.st-planned{background:#FEF9C3;color:#A16207}

.kpi-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.kpi-metric{text-align:center;padding:8px 6px;background:#FAFBFC;border-radius:8px;border:1px solid #F1F5F9;cursor:pointer;transition:background .15s}
.kpi-metric:hover{background:#EFF6FF;border-color:#BFDBFE}
.kpi-metric-val{font-size:18px;font-weight:900;line-height:1;margin-bottom:4px}
.kpi-metric-lbl{font-size:9px;font-weight:700;color:var(--tm);line-height:1.3}
.kpi-metric-unit{font-size:10px;font-weight:600;color:var(--tm)}

/* 프로세스 트래커 미니 */
.kpi-tracker{display:flex;align-items:center;gap:2px;margin-top:10px}
.kpi-tr-step{flex:1;height:5px;border-radius:2px;position:relative}
.kpi-tr-lbl{font-size:8px;font-weight:700;text-align:center;margin-top:3px;white-space:nowrap}
.kpi-tr-wrap{flex:1;display:flex;flex-direction:column}
.kpi-tr-arr{color:#CBD5E1;font-size:9px;flex-shrink:0;margin-bottom:8px}

/* 선적 수단 mini badges */
.kpi-mode-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid #F1F5F9}
.mode-badge{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px}
.mode-ocean{background:var(--sh-ocean);color:var(--sh-ocean-t)}
.mode-air{background:var(--sh-air);color:var(--sh-air-t)}
.mode-courier{background:var(--sh-courier);color:var(--sh-courier-t)}

/* ══ 요약 통계 바 ══ */
.summary-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px}
.sum-card{background:var(--cw);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;text-align:center}
.sum-val{font-size:22px;font-weight:900;line-height:1}
.sum-lbl{font-size:10px;font-weight:700;color:var(--tm);margin-top:4px;line-height:1.3}
.sum-sub{font-size:9px;color:var(--dr);margin-top:2px}

/* ══ 이슈 알림 배너 ══ */
.alert-bar{margin-bottom:16px}
.alert-item{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:8px;margin-bottom:6px;font-size:11px;font-weight:700;cursor:pointer;transition:opacity .15s}
.alert-item:hover{opacity:.85}
.alert-hold{background:#FEE2E2;color:#B91C1C;border:1px solid #FECACA}
.alert-eta{background:#FEF9C3;color:#A16207;border:1px solid #FDE68A}
.alert-doc{background:#E0F2FE;color:#0369A1;border:1px solid #BAE6FD}
.alert-icon{font-size:14px;flex-shrink:0}
.alert-text{flex:1}
.alert-close{width:18px;height:18px;border-radius:4px;background:rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;flex-shrink:0}

/* ══ 월별 선적 섹션 ══ */
.ship-section{margin-bottom:28px}
.ship-sec-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--bd)}
.ship-sec-title{font-size:15px;font-weight:900;color:var(--tx);display:flex;align-items:center;gap:8px}
.ship-sec-cnt{font-size:11px;color:var(--tm);font-weight:600;background:#F1F5F9;padding:2px 10px;border-radius:10px;border:1px solid #CBD5E1}

/* 필터 바 */
.ship-filter{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.ship-search{background:#fff;border:1px solid var(--bd);border-radius:6px;padding:5px 10px;font-size:11px;outline:none;font-family:inherit;width:170px}
.ship-search:focus{border-color:var(--ac);box-shadow:0 0 0 2px rgba(59,130,246,.1)}
.ship-sel{background:#fff;border:1px solid var(--bd);border-radius:6px;padding:5px 8px;font-size:11px;outline:none;font-family:inherit;cursor:pointer}

/* 선적 카드 그리드 */
.ship-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.ship-card{background:var(--cw);border:1px solid var(--bd);border-radius:10px;padding:14px;position:relative;cursor:pointer;transition:box-shadow .15s,transform .1s}
.ship-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-1px)}
.ship-card.hold{border-color:#FECACA;background:#FFF8F8}
.ship-card.hold::before{content:'';position:absolute;left:0;top:0;width:100%;height:3px;background:#EF4444;border-radius:10px 10px 0 0}

.ship-card-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.ship-inv{font-size:13px;font-weight:900;color:var(--pr)}
.ship-bl{font-size:10px;color:var(--tm);font-weight:600;margin-top:2px}
.ship-status-tag{font-size:9px;font-weight:800;padding:3px 9px;border-radius:5px;white-space:nowrap}

.ship-mo{font-size:10px;font-weight:700;color:var(--tx);background:#F1F5F9;padding:2px 7px;border-radius:4px;display:inline-block;margin-bottom:8px}
.ship-style{font-size:10px;color:var(--tm);margin-left:4px;font-weight:500}

.ship-route{display:flex;align-items:center;gap:6px;margin-bottom:10px;font-size:11px;font-weight:700;color:var(--tx)}
.ship-route-from,.ship-route-to{padding:3px 8px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:5px;font-size:10px}
.ship-route-arr{color:#94A3B8;font-size:12px}
.ship-mode-ic{font-size:13px}

.ship-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.ship-metric-box{background:#FAFBFC;border:1px solid #F1F5F9;border-radius:6px;padding:5px;text-align:center}
.ship-metric-val{font-size:12px;font-weight:800;color:var(--tx)}
.ship-metric-lbl{font-size:8px;color:var(--tm);font-weight:700;margin-top:1px}

/* 프로세스 트래커 */
.proc-tracker{display:flex;align-items:center;gap:0}
.proc-step{flex:1;text-align:center;position:relative}
.proc-dot{width:20px;height:20px;border-radius:50%;margin:0 auto 3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:#fff}
.proc-dot.done{background:#34D399}
.proc-dot.curr{background:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.25);animation:pulse 1.5s infinite}
.proc-dot.wait{background:#E2E8F0;color:#94A3B8}
.proc-dot.hold{background:#EF4444;box-shadow:0 0 0 3px rgba(239,68,68,.2);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(59,130,246,.25)}50%{box-shadow:0 0 0 5px rgba(59,130,246,.1)}}
.proc-line{position:absolute;top:10px;left:60%;width:80%;height:2px;z-index:0}
.proc-line.done-line{background:#34D399}
.proc-line.wait-line{background:#E2E8F0}
.proc-lbl{font-size:8px;font-weight:700;color:var(--tm)}
.proc-lbl.curr-lbl{color:#3B82F6}
.proc-lbl.done-lbl{color:#059669}
.proc-lbl.hold-lbl{color:#DC2626}

.ship-dates{display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid #F1F5F9;font-size:9px;color:var(--tm)}
.ship-dates span{font-weight:700;color:var(--tx)}

/* ══ 선적 상세 모달 ══ */
.modal-ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:3000;justify-content:center;align-items:center;backdrop-filter:blur(2px)}
.modal-ov.active{display:flex}
.modal-box{background:#fff;border-radius:12px;width:94%;max-width:900px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .25s ease-out}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.m-hd{padding:18px 22px 14px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:#fff;z-index:10;border-radius:12px 12px 0 0}
.m-title{font-size:16px;font-weight:900;color:var(--pr)}
.m-sub{font-size:11px;color:var(--tm);margin-top:2px}
.m-close{width:30px;height:30px;border-radius:7px;border:1px solid var(--bd);background:#F8FAFC;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--tm)}
.m-close:hover{background:#FEF2F2;color:var(--dg)}
.m-body{padding:18px 22px}
.m-sec{margin-bottom:24px}
.m-sec-t{font-size:12px;font-weight:800;color:var(--pr);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #EFF6FF;display:flex;align-items:center;gap:6px}
.d-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.d-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.d-grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.d-item{display:flex;flex-direction:column;gap:3px;padding:8px 10px;background:#FAFBFC;border-radius:6px;border:1px solid #F1F5F9}
.d-label{font-size:9px;font-weight:700;color:var(--tm)}
.d-val{font-size:12px;font-weight:700;color:var(--tx)}
.d-val.empty{color:#CBD5E1;font-style:italic;font-weight:400}

/* 대형 프로세스 트래커 (모달용) */
.big-tracker{display:flex;align-items:flex-start;gap:0;margin:16px 0;padding:16px;background:#FAFBFC;border-radius:10px;border:1px solid #E2E8F0}
.bt-step{flex:1;text-align:center;position:relative}
.bt-dot{width:32px;height:32px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff}
.bt-dot.done{background:#34D399}
.bt-dot.curr{background:#3B82F6;box-shadow:0 0 0 5px rgba(59,130,246,.2)}
.bt-dot.wait{background:#E2E8F0;color:#94A3B8}
.bt-dot.hold{background:#EF4444;box-shadow:0 0 0 5px rgba(239,68,68,.15)}
.bt-line{position:absolute;top:16px;left:65%;width:70%;height:3px;z-index:0}
.bt-line.done-line{background:#34D399}
.bt-line.wait-line{background:#E2E8F0;background:repeating-linear-gradient(90deg,#E2E8F0 0,#E2E8F0 6px,transparent 6px,transparent 12px)}
.bt-lbl{font-size:10px;font-weight:800;color:var(--tm);margin-top:2px}
.bt-lbl.done-lbl{color:#059669}
.bt-lbl.curr-lbl{color:#2563EB}
.bt-lbl.hold-lbl{color:#DC2626}
.bt-date{font-size:9px;color:#94A3B8;margin-top:2px}

/* 서류 체크리스트 */
.doc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.doc-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;border:1px solid}
.doc-item.ok{background:#F0FDF4;border-color:#A7F3D0}
.doc-item.ng{background:#FEF2F2;border-color:#FECACA}
.doc-item.na{background:#F8FAFC;border-color:#E2E8F0}
.doc-ic{font-size:13px}
.doc-name{font-size:10px;font-weight:700}
.doc-item.ok .doc-name{color:#065F46}
.doc-item.ng .doc-name{color:#B91C1C}
.doc-item.na .doc-name{color:#64748B}

/* 태그 */
.tag{padding:3px 8px;border-radius:4px;font-size:9px;font-weight:700;display:inline-flex;align-items:center;white-space:nowrap}
.t-ok{background:#D1FAE5;color:#065F46;border:1px solid #A7F3D0}
.t-wn{background:#FEF3C7;color:#B45309;border:1px solid #FDE68A}
.t-dg{background:#FEF2F2;color:#B91C1C;border:1px solid #FECACA}
.t-bl{background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE}
.t-pu{background:#F5F3FF;color:#6D28D9;border:1px solid #C4B5FD}
.t-dr{background:#F1F5F9;color:#475569;border:1px solid #CBD5E1}

/* 빈 상태 */
.empty-state{text-align:center;padding:30px;color:var(--tm);font-size:12px}

@media(max-width:900px){.kpi-row{grid-template-columns:1fr}.summary-bar{grid-template-columns:1fr 1fr}.ship-grid{grid-template-columns:1fr}.d-grid{grid-template-columns:1fr 1fr}.d-grid-4{grid-template-columns:1fr 1fr}.doc-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.kpi-metrics{grid-template-columns:1fr 1fr}.summary-bar{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div id="loadingScreen" class="loading"><div class="spinner"></div><span>선적 데이터를 불러오는 중 / 加载出货数据...</span></div>
<!-- errorScreen removed: errors handled gracefully as empty state -->

<div id="mainContent" style="display:none">

<!-- 헤더 -->
<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-icon">🚢</div>
    <div>
      <div class="hdr-title">Shipment View / 컨테이너 선적현황 / 集装箱出货现况</div>
      <div class="hdr-sub" id="hdrSub">데이터 로딩 중...</div>
    </div>
  </div>
  <div class="hdr-btns">
    <button class="btn-new" onclick="window.open('https://creatorapp.zoho.com/jeramoda/eom/#Form:Add_CNTR','_blank')">+ New Container</button>
  </div>
</div>

<!-- 이슈 알림 배너 -->
<div class="alert-bar" id="alertBar"></div>

<!-- KPI 카드 3종 -->
<div class="kpi-row" id="kpiRow"></div>

<!-- 전체 요약 통계 -->
<div class="summary-bar" id="summaryBar"></div>

<!-- 월별 선적 섹션 -->
<div id="monthlyShipContent"></div>

</div><!-- end mainContent -->

<!-- 선적 상세 모달 -->
<div class="modal-ov" id="shipModalOv">
  <div class="modal-box">
    <div class="m-hd">
      <div>
        <div class="m-title" id="smTitle">-</div>
        <div class="m-sub" id="smSub">-</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button onclick="window.open('https://creatorapp.zoho.com/jeramoda/eom/#Page:Shipment_View','_blank')" style="background:#EFF6FF;color:var(--pr);border:1px solid #BFDBFE;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">✏️ Edit</button>
        <div class="m-close" id="smClose">✕</div>
      </div>
    </div>
    <div class="m-body" id="smBody"></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   SHIPMENT VIEW v1 — JS
   Report: All_Shipments (Zoho Creator)
══════════════════════════════════════ */
var APP="eom", SHIP_REP="All_PI";
/* ★★ Report명 변경 안내 ★★
   현재 연결된 Report : All_PI
   나중에 Report 이름이 바뀌면 아래 한 줄만 수정하세요:
     SHIP_REP = "새로운_Report명"
   또는 SHIP_REP_CANDIDATES 배열 첫 번째 값을 변경하면 됩니다.
   ---
   입력 폼  : Add CNTR → https://creatorapp.zoho.com/jeramoda/eom/#Form:Add_CNTR
   Report   : All PI   → https://creatorapp.zoho.com/jeramoda/eom/#Report:All_PI */
var allShip=[];
var today=new Date(), todayStr=today.toISOString().split("T")[0];

/* ── 프로세스 단계 정의 ── */
var PROC_STEPS=["Booking","Boarded","In Transit","Customs","Delivered"];
var PROC_LABELS=["예약/Book","선적/Board","운송/Transit","통관/Clear","완료/Done"];

/* ── 상태 매핑 ── */
var STATUS_STEP={
  "Booking":0,"Booked":0,
  "Boarded":1,"On Board":1,
  "In Transit":2,"Transit":2,
  "Customs":3,"Customs Hold":3,"Customs Cleared":3,
  "Delivered":4,"Done":4,"Completed":4
};

/* ── 유틸 ── */
function g(r,f){var v=r[f];if(v==null||v==="")return"-";if(typeof v==="object"&&v.display_value)return v.display_value;return String(v)}
function escH(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function pd(v){if(!v||v==="-")return null;if(/^\d{4}-\d{2}-\d{2}/.test(v))return v.substring(0,10);var m=v.match(/^(\d{1,2})-([A-Za-z]+)-(\d{4})/);if(m){var mo={Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};return m[3]+"-"+(mo[m[2]]||"01")+"-"+(m[1].length===1?"0"+m[1]:m[1])}return null}
function fmtDate(v){var p=pd(v);if(!p)return"-";var pts=p.split("-");return pts[1]+"-"+pts[2]+"-"+pts[0].slice(2)}
function parseYM(key){var m=key.match(/(\d+)년\s*(\d+)월/);if(!m)return null;var y=parseInt(m[1]);if(y<100)y+=2000;return{y:y,m:parseInt(m[2])}}
function getStepIndex(r){var s=(g(r,"Container_Status")||"").trim();return STATUS_STEP[s]!==undefined?STATUS_STEP[s]:-1}
function isHold(r){return(g(r,"Container_Status")||"").toLowerCase().indexOf("hold")>=0}
function isETADelayed(r){var eta=pd(g(r,"ETA"));if(!eta)return false;var s=(g(r,"Container_Status")||"").toLowerCase();if(s.indexOf("delivered")>=0||s.indexOf("done")>=0||s.indexOf("complet")>=0)return false;return eta<todayStr}

function getModeClass(m){var l=(m||"").toLowerCase();if(l.indexOf("air")>=0)return"mode-air";if(l.indexOf("courier")>=0||l.indexOf("express")>=0)return"mode-courier";return"mode-ocean"}
function getModeIcon(m){var l=(m||"").toLowerCase();if(l.indexOf("air")>=0)return"✈️";if(l.indexOf("courier")>=0||l.indexOf("express")>=0)return"📦";return"🚢"}

function statusTag(s){
  var l=(s||"").toLowerCase();
  if(l.indexOf("delivered")>=0||l.indexOf("done")>=0||l.indexOf("complet")>=0)return'<span class="tag t-ok">'+escH(s)+'</span>';
  if(l.indexOf("transit")>=0)return'<span class="tag t-bl">'+escH(s)+'</span>';
  if(l.indexOf("hold")>=0)return'<span class="tag t-dg">'+escH(s)+'</span>';
  if(l.indexOf("customs")>=0)return'<span class="tag t-wn">'+escH(s)+'</span>';
  if(l.indexOf("board")>=0||l.indexOf("booking")>=0)return'<span class="tag t-pu">'+escH(s)+'</span>';
  return'<span class="tag t-dr">'+escH(s)+'</span>';}

/* ── 데이터 로드 ── */
/* ★ Report명 후보 목록 — Zoho Creator 실제 Report명으로 맞추기 */
var SHIP_REP_CANDIDATES=["All_PI","All_Add_CNTRs","All_PIs","All_CNTRs","All_Shipment_Views","All_Shipments"];

function loadWithFallback(candidates, idx){
  if(idx>=candidates.length){
    // 모든 후보 실패 → 빈 화면으로 정상 표시
    console.warn("모든 Report명 후보 실패. Zoho Creator에서 실제 Report명을 확인해주세요.");
    renderAll();
    document.getElementById("loadingScreen").style.display="none";
    document.getElementById("mainContent").style.display="block";
    return;
  }
  var repName=candidates[idx];
  ZOHO.CREATOR.API.getAllRecords({appName:APP,reportName:repName,page:1,pageSize:200})
  .then(function(res){
    if(res&&res.code===3000&&res.data&&res.data.length>0){
      allShip=res.data;
      SHIP_REP=repName; // 성공한 Report명 저장
      console.log("✅ Shipment Report 연결 성공:", repName, "| 데이터:", allShip.length+"건");
      renderAll();
      document.getElementById("loadingScreen").style.display="none";
      document.getElementById("mainContent").style.display="block";
    } else if(res&&res.code===3000&&res.data&&res.data.length===0){
      // Report는 있지만 데이터 0건 → 성공으로 처리
      SHIP_REP=repName;
      console.log("✅ Shipment Report 연결 성공 (데이터 0건):", repName);
      renderAll();
      document.getElementById("loadingScreen").style.display="none";
      document.getElementById("mainContent").style.display="block";
    } else {
      // 이 Report명 실패 → 다음 후보 시도
      console.warn("Report 없음:", repName, "→ 다음 후보 시도...");
      loadWithFallback(candidates, idx+1);
    }
  }).catch(function(e){
    console.warn("Report 오류:", repName, e, "→ 다음 후보 시도...");
    loadWithFallback(candidates, idx+1);
  });
}

ZOHO.CREATOR.init().then(function(){
  loadWithFallback(SHIP_REP_CANDIDATES, 0);
}).catch(function(e){
  console.warn("ZOHO init 오류:", e);
  renderAll();
  document.getElementById("loadingScreen").style.display="none";
  document.getElementById("mainContent").style.display="block";
});

function showErr(m){console.warn("Shipment err:", m);}

/* ── KPI 카드 3종 ── */
function renderKPI(){
  var groups={};
  allShip.forEach(function(r){
    var etd=pd(g(r,"ETD"));
    var key="미지정";
    if(etd){var pts=etd.split("-");key=pts[0]+"년 "+parseInt(pts[1])+"월";}
    if(!groups[key])groups[key]=[];groups[key].push(r)});

  var sortedKeys=Object.keys(groups).filter(function(k){return k!=="미지정"}).sort().slice(-3);
  var marClasses=["kpi-mar","kpi-apr","kpi-may"];
  var marLabels=["3월 March","4월 April","5월 May"];

  var h="";
  sortedKeys.forEach(function(key,ki){
    var items=groups[key];
    var ym=parseYM(key);
    var mm=ym?(ym.m<10?"0"+ym.m:""+ym.m):"";

    /* 집계 */
    var totalCBM=0,totalKG=0,totalFreight=0,totalCarton=0;
    var cntOcean=0,cntAir=0,cntCourier=0;
    var cntDeliv=0,cntTransit=0,cntHold=0;
    var otifCount=0; /* 납기 준수 건수 */

    items.forEach(function(r){
      totalCBM+=parseFloat(g(r,"Total_CBM"))||0;
      totalKG+=parseFloat(g(r,"Total_Weight_KG"))||0;
      totalFreight+=parseFloat(g(r,"Freight_Cost"))||0;
      totalCarton+=parseInt(g(r,"Total_Cartons"))||0;
      var md=(g(r,"Container_Type")||"").toLowerCase();
      if(md.indexOf("air")>=0)cntAir++;
      else if(md.indexOf("courier")>=0||md.indexOf("express")>=0)cntCourier++;
      else cntOcean++;
      var st=(g(r,"Container_Status")||"").toLowerCase();
      if(st.indexOf("delivered")>=0||st.indexOf("done")>=0)cntDeliv++;
      else if(st.indexOf("transit")>=0)cntTransit++;
      else if(st.indexOf("hold")>=0)cntHold++;
      /* OTIF: ETA 이후 납기 준수 */
      var etaV=pd(g(r,"ETA")),ataV=pd(g(r,"ATA"));
      var delayDays=parseInt(g(r,"Delay_Days"))||0;
      if(etaV&&ataV&&ataV<=etaV)otifCount++;
      else if(etaV&&!ataV&&etaV>=todayStr&&delayDays===0)otifCount++;
    });

    var otif=items.length>0?Math.round((otifCount/items.length)*100):0;
    var mcl=marClasses[ki]||"kpi-mar";

    /* 상태 판별 */
    var allDone=items.every(function(r){var st=(g(r,"Container_Status")||"").toLowerCase();return st.indexOf("delivered")>=0||st.indexOf("done")>=0||st.indexOf("complet")>=0});
    var hasTrans=items.some(function(r){return(g(r,"Container_Status")||"").toLowerCase().indexOf("transit")>=0});
    var statusTxt=allDone?"Closed":hasTrans?"In Transit":"Planned";
    var statusCls=allDone?"st-closed":hasTrans?"st-transit":"st-planned";

    /* 프로세스 트래커 미니 */
    var stepCounts=[0,0,0,0,0];
    items.forEach(function(r){var si=getStepIndex(r);if(si>=0&&si<5)stepCounts[si]++});
    var maxStep=0;for(var i=4;i>=0;i--){if(stepCounts[i]>0){maxStep=i;break}}

    var trackerH='<div style="margin-top:12px;padding-top:10px;border-top:1px solid #F1F5F9">';
    trackerH+='<div style="font-size:9px;font-weight:700;color:var(--tm);margin-bottom:6px">선적 진행 현황 / 出货进度</div>';
    trackerH+='<div style="display:flex;align-items:center;gap:2px">';
    PROC_STEPS.forEach(function(s,i){
      var cnt=stepCounts[i];
      var isCurr=(i===maxStep&&!allDone);
      var isDone=(i<maxStep||allDone&&i<=maxStep);
      var bg=isDone?"#34D399":isCurr?"#3B82F6":"#E2E8F0";
      var tc=isDone||isCurr?"#fff":"#94A3B8";
      if(i>0)trackerH+='<div style="flex:0;width:8px;height:2px;background:'+(isDone?"#34D399":"#E2E8F0")+'"></div>';
      trackerH+='<div style="flex:1;text-align:center"><div style="width:22px;height:22px;border-radius:50%;background:'+bg+';color:'+tc+';font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 2px">'+cnt+'</div><div style="font-size:8px;font-weight:700;color:'+(isDone?"#059669":isCurr?"#2563EB":"#94A3B8")+'">'+PROC_LABELS[i].split("/")[0]+'</div></div>';
    });
    trackerH+='</div></div>';

    h+='<div class="kpi-card '+mcl+'">';
    h+='<div class="kpi-card-hd"><div class="kpi-month"><div class="kpi-month-num">'+(ym?ym.m+"월":"?")+'</div><div class="kpi-month-en">'+(ym?["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][ym.m]:"")+'</div></div><span class="kpi-status '+statusCls+'">'+statusTxt+'</span></div>';
    h+='<div class="kpi-metrics">';
    h+='<div class="kpi-metric"><div class="kpi-metric-val" style="color:#3B82F6">'+totalCBM.toFixed(1)+'</div><div class="kpi-metric-lbl">선적량 / CBM</div></div>';
    h+='<div class="kpi-metric"><div class="kpi-metric-val" style="color:#10B981">$'+(totalFreight>=1000?(totalFreight/1000).toFixed(1)+"k":totalFreight.toFixed(0))+'</div><div class="kpi-metric-lbl">물류비 / Freight</div></div>';
    h+='<div class="kpi-metric"><div class="kpi-metric-val" style="color:'+(otif>=95?"#10B981":otif>=85?"#F59E0B":"#EF4444")+'">'+otif+'%</div><div class="kpi-metric-lbl">납기준수 / OTIF</div></div>';
    h+='</div>';
    h+='<div class="kpi-mode-row">';
    if(cntOcean>0)h+='<span class="mode-badge mode-ocean">🚢 Ocean '+cntOcean+'건</span>';
    if(cntAir>0)h+='<span class="mode-badge mode-air">✈️ Air '+cntAir+'건</span>';
    if(cntCourier>0)h+='<span class="mode-badge mode-courier">📦 Courier '+cntCourier+'건</span>';
    h+='</div>';
    h+=trackerH;
    h+='</div>';
  });

  if(!h)h='<div class="empty-state" style="grid-column:1/-1">선적 데이터가 없습니다</div>';
  document.getElementById("kpiRow").innerHTML=h;}

/* ── 선적 카드 빌드 ── */
function buildShipCard(r,idx){
  var inv=g(r,"Container_Number");
  var from=g(r,"Origin_Port");
  var to=g(r,"Destination_Port");
  var mode=g(r,"Container_Type");
  var status=g(r,"Container_Status");
  var cbm=parseFloat(g(r,"Total_CBM"))||0;
  var kg=parseFloat(g(r,"Total_Weight_KG"))||0;
  var ctn=parseInt(g(r,"Total_Cartons"))||0;
  var pcs=parseInt(g(r,"Total_Quantity"))||0;
  var eta=g(r,"ETA"),ata=g(r,"ATA"),shipDate=g(r,"ETD");
  var hold=isHold(r),delayed=isETADelayed(r);
  var stepIdx=getStepIndex(r);

  var routeStr=(from!=="-"?from:"?")+" → "+(to!=="-"?to:"?");
  var searchStr=(inv+" "+g(r,"Container_ID")+" "+mode+" "+routeStr).toLowerCase();

  var h='<div class="ship-card'+(hold?" hold":"")+'" data-id="'+r["ID"]+'" data-m="'+idx+'" data-md="'+escH(mode)+'" data-st="'+escH(status)+'" data-sr="'+escH(searchStr)+'">';

  /* 헤더 */
  h+='<div class="ship-card-hd">';
  h+='<div><div class="ship-inv">'+escH(inv)+'</div><div class="ship-bl">📦 '+escH(g(r,"Container_ID")!=="-"?g(r,"Container_ID"):"ID 미입력")+'</div></div>';
  h+=statusTag(status);
  h+='</div>';

  /* Container Type */
  if(mode!=="-")h+='<span class="ship-mo" style="background:#EDE9FE;color:#6D28D9">'+escH(mode)+'</span><br>';

  /* 루트 */
  h+='<div class="ship-route"><span class="ship-mode-ic">'+getModeIcon(mode)+'</span><span class="ship-route-from">'+escH(from!=="-"?from:"TBD")+'</span><span class="ship-route-arr">→</span><span class="ship-route-to">'+escH(to!=="-"?to:"TBD")+'</span><span class="mode-badge '+getModeClass(mode)+'" style="margin-left:4px;font-size:9px;padding:2px 6px">'+escH(mode!=="-"?mode:"Sea")+'</span></div>';

  /* 수치 */
  h+='<div class="ship-metrics">';
  h+='<div class="ship-metric-box"><div class="ship-metric-val">'+pcs.toLocaleString()+'</div><div class="ship-metric-lbl">Pcs / 수량</div></div>';
  h+='<div class="ship-metric-box"><div class="ship-metric-val">'+cbm.toFixed(1)+'</div><div class="ship-metric-lbl">CBM</div></div>';
  h+='<div class="ship-metric-box"><div class="ship-metric-val">'+kg.toFixed(0)+'</div><div class="ship-metric-lbl">KG</div></div>';
  h+='<div class="ship-metric-box"><div class="ship-metric-val">'+ctn+'</div><div class="ship-metric-lbl">Cartons</div></div>';
  h+='</div>';

  /* 프로세스 트래커 */
  h+='<div class="proc-tracker">';
  PROC_STEPS.forEach(function(s,i){
    var isDone=(stepIdx>i)||(stepIdx===4);
    var isCurr=(stepIdx===i&&i<4);
    var isHoldStep=(hold&&isCurr);
    var dotCls=isHoldStep?"hold":isDone?"done":isCurr?"curr":"wait";
    var lblCls=isHoldStep?"hold-lbl":isDone?"done-lbl":isCurr?"curr-lbl":"";
    if(i>0)h+='<div style="flex:0;height:2px;width:6px;background:'+(isDone?"#34D399":"#E2E8F0")+'"></div>';
    h+='<div class="proc-step"><div class="proc-dot '+dotCls+'">'+(isDone?"✓":isHoldStep?"!":i+1)+'</div><div class="proc-lbl '+lblCls+'">'+PROC_LABELS[i].split("/")[0]+'</div></div>';
  });
  h+='</div>';

  /* 날짜 */
  h+='<div class="ship-dates">ETD <span>'+escH(fmtDate(shipDate))+'</span> · ETA <span style="color:'+(delayed?"#EF4444":"var(--tx)")+'">'+escH(fmtDate(eta))+'</span>'+(ata!=="-"?' · ATA <span style="color:#10B981">'+escH(fmtDate(ata))+'</span>':"")+(g(r,"Delay_Days")!=="-"?' · <span style="color:#EF4444">지연 '+escH(g(r,"Delay_Days"))+'일</span>':"")+'</div>';
  h+='</div>';
  return h;}

/* ── 필터 ── */
function shipFilter(mi){
  var sec=document.getElementById("ss"+mi);if(!sec)return;
  var q="",md="",st="";
  sec.querySelectorAll(".sf").forEach(function(el){var t=el.getAttribute("data-t"),v=el.value;if(t==="q")q=v.toLowerCase().trim();else if(t==="md")md=v;else if(t==="st")st=v});
  var cards=sec.querySelectorAll('.ship-card[data-m="'+mi+'"]');
  var cnt=0;
  cards.forEach(function(card){
    var ok=true;
    if(q&&card.getAttribute("data-sr").indexOf(q)<0)ok=false;
    if(md&&card.getAttribute("data-md")!==md)ok=false;
    if(st&&card.getAttribute("data-st")!==st)ok=false;
    card.style.display=ok?"":"none";if(ok)cnt++;
  });
  var c=document.getElementById("ssc"+mi);if(c)c.textContent=cnt+" Shipments";}

/* ── 상세 모달 ── */
function openShipModal(r){
  if(!r)return;
  document.getElementById("smTitle").textContent=g(r,"Container_Number");
  document.getElementById("smSub").textContent=
    (g(r,"Origin_Port")!=="-"?g(r,"Origin_Port"):"?")+" → "+
    (g(r,"Destination_Port")!=="-"?g(r,"Destination_Port"):"?")+
    (g(r,"Container_Type")!=="-"?" · "+g(r,"Container_Type"):"");

  var h="";
  function dv(v){return v==="-"?'<span class="d-val empty">미입력</span>':escH(v)}
  function it(l,v){return'<div class="d-item"><span class="d-label">'+l+'</span><span class="d-val">'+v+'</span></div>'}

  /* 1. 기본 정보 */
  h+='<div class="m-sec"><div class="m-sec-t">📌 기본 선적 정보 / 基本出货信息</div><div class="d-grid">';
  h+=it("Container No. / 컨테이너번호 / 集装箱号",dv(g(r,"Container_Number")));
  h+=it("Container Status / 상태 / 状态",statusTag(g(r,"Container_Status")));
  h+=it("Container Type / 컨테이너유형 / 箱型",dv(g(r,"Container_Type")));
  h+=it("Container ID / 컨테이너ID / 箱柜",dv(g(r,"Container_ID")));
  h+=it("Origin Port / 출발항 / 出发港",dv(g(r,"Origin_Port")));
  h+=it("Destination Port / 도착항 / 目的港",dv(g(r,"Destination_Port")));
  h+=it("Delay Days / 지연일수 / 延迟天数",dv(g(r,"Delay_Days")));
  h+='</div></div>';

  /* 2. 대형 프로세스 트래커 */
  var stepIdx=getStepIndex(r);var holdFlg=isHold(r);
  h+='<div class="m-sec"><div class="m-sec-t">🔄 선적 진행 단계 / 出货进度追踪</div>';
  h+='<div class="big-tracker">';
  PROC_STEPS.forEach(function(s,i){
    var isDone=(stepIdx>i)||(stepIdx===4);
    var isCurr=(stepIdx===i&&i<4);
    var isHoldStep=(holdFlg&&isCurr);
    var dotCls=isHoldStep?"hold":isDone?"done":isCurr?"curr":"wait";
    var lblCls=isHoldStep?"hold-lbl":isDone?"done-lbl":isCurr?"curr-lbl":"";
    if(i>0){h+='<div style="flex:0;height:3px;width:20px;background:'+(isDone?"#34D399":"repeating-linear-gradient(90deg,#E2E8F0 0,#E2E8F0 4px,transparent 4px,transparent 8px)")+'"></div>';}
    h+='<div class="bt-step"><div class="bt-dot '+dotCls+'">'+(isDone?"✓":isHoldStep?"!":i+1)+'</div>';
    h+='<div class="bt-lbl '+lblCls+'">'+PROC_LABELS[i].split("/")[0]+'<br><span style="font-size:8px;color:#94A3B8">'+PROC_LABELS[i].split("/")[1]+'</span></div></div>';
  });
  h+='</div></div>';

  /* 3. 루트 & 물류 정보 */
  h+='<div class="m-sec"><div class="m-sec-t">🗺️ 루트 & 물류 정보 / 路线&物流信息</div><div class="d-grid">';
  h+=it("Origin Port / 출발항 / 出发港",dv(g(r,"Origin_Port")));
  h+=it("Destination Port / 도착항 / 目的港",dv(g(r,"Destination_Port")));
  h+=it("Container Type / 컨테이너유형 / 箱型",dv(g(r,"Container_Type")));
  h+=it("Container ID / 컨테이너ID",dv(g(r,"Container_ID")));
  h+=it("Container Number / 컨테이너번호",dv(g(r,"Container_Number")));
  h+='</div></div>';

  /* 4. 수량 & 화물 정보 */
  h+='<div class="m-sec"><div class="m-sec-t">📦 수량 & 화물 정보 / 数量&货物信息</div><div class="d-grid-4">';
  h+=it("Total Quantity / 총수량 / 总数量",dv(g(r,"Total_Quantity")));
  h+=it("Total Cartons / 총박스수 / 总纸箱数",dv(g(r,"Total_Cartons")));
  h+=it("Total CBM / 총부피 / 总体积",dv(g(r,"Total_CBM")));
  h+=it("Total Weight (KG) / 총중량 / 总重量",dv(g(r,"Total_Weight_KG")));
  h+='</div></div>';

  /* 5. 날짜 & 일정 */
  h+='<div class="m-sec"><div class="m-sec-t">📅 선적 일정 / 出货日期</div>';
  h+='<div class="d-grid">';
  var schItems=[
    {l:"ETD / 출항예정일 / 预计出发",k:"ETD"},
    {l:"ATD / 실제출항일 / 实际出发",k:"ATD"},
    {l:"ETA / 도착예정일 / 预计到达",k:"ETA"},
    {l:"ATA / 실제도착일 / 实际到达",k:"ATA"}
  ];
  schItems.forEach(function(t){
    var v=g(r,t.k),p=pd(v);
    var cls="";
    if(p){if(p<=todayStr)cls='color:#059669;font-weight:800';else cls='color:#2563EB;font-weight:700'}
    h+=it(t.l,'<span style="'+cls+'">'+dv(v)+'</span>');
  });
  h+='</div></div>';

  /* 6. 금융 & 결제 */
  h+='<div class="m-sec"><div class="m-sec-t">📊 상태 & 지연 정보 / 状态&延误信息</div><div class="d-grid-2">';
  h+=it("Container Status / 상태 / 状态",statusTag(g(r,"Container_Status")));
  h+=it("Delay Days / 지연일수 / 延迟天数",dv(g(r,"Delay_Days")));
  h+='</div></div>';

  /* 7. 서류 체크리스트 */
  /* 서류 체크리스트 - 필드 추가 시 확장 예정 */

  /* 8. 수취인 & 통관 */
  /* 수취인/통관 섹션 - 필드 추가 시 확장 예정 */

  /* 9. QC & 메모 */
  /* QC/메모 섹션 - 필드 추가 시 확장 예정 */

  document.getElementById("smBody").innerHTML=h;
  document.getElementById("shipModalOv").classList.add("active");}

/* ── 모달 닫기 ── */
document.getElementById("smClose").addEventListener("click",function(){document.getElementById("shipModalOv").classList.remove("active")});
document.getElementById("shipModalOv").addEventListener("click",function(e){if(e.target===this)this.classList.remove("active")});
document.addEventListener("keydown",function(e){if(e.key==="Escape")document.getElementById("shipModalOv").classList.remove("active")});
</script>
