<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overview v13</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://js.zohostatic.com/creator/widgets/version/1.0/widgetsdk-min.js"></script>
<style>
/* ========== Style View v32 CSS (원본 유지) ========== */
:root{--z-primary:#1E3A8A;--z-accent:#3B82F6;--z-bg:#F1F5F9;--z-border:#E2E8F0;--z-text-main:#0F172A;--z-text-muted:#64748B;--z-card-bg:#FFF;--st-appr:#10B981;--st-prog:#F59E0B;--st-danger:#EF4444;--st-draft:#94A3B8}
:root{--pr:#1E3A8A;--ac:#3B82F6;--bg:#F1F5F9;--bd:#E2E8F0;--tx:#0F172A;--tm:#64748B;--cw:#FFF;--ok:#10B981;--wn:#F59E0B;--dg:#EF4444;--dr:#94A3B8}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans KR',-apple-system,sans-serif}
body{background:var(--z-bg);padding:16px;min-height:100vh}

/* 로딩 & 헤더 */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:16px}
.spinner{width:40px;height:40px;border:4px solid var(--z-border);border-top-color:var(--z-accent);border-radius:50%;animation:spin .8s linear infinite}
.spinner-sm{width:18px;height:18px;border:3px solid var(--z-border);border-top-color:var(--z-accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--z-text-muted);font-weight:600}
.error-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:20px;text-align:center;color:#B91C1C}

.ov-page-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.ov-page-hdr h1{font-size:19px;font-weight:900;color:var(--z-text-main);display:flex;align-items:center;gap:8px}
.ov-page-hdr h1 .icon-s{width:30px;height:30px;background:var(--z-primary);border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:900}
.ov-section{margin-bottom:40px}
.ov-sec-divider{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:12px;border-bottom:2px solid var(--z-border)}
.ov-sec-divider .sec-ic{width:26px;height:26px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:900}
.ov-sec-divider span{font-size:16px;font-weight:900;color:var(--z-text-main)}

/* ========== V13 수정: 상단 대시보드 4종 ========== */
.dash-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:30px}
.dash-card{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:20px 16px;display:flex;flex-direction:column;box-shadow:0 4px 6px -1px rgba(0,0,0,.02);min-height:240px}
.dash-title{font-size:14px;font-weight:800;color:var(--tx);margin-bottom:16px;display:block}

/* Chart 1: Waffle (세트/단품 비율) */
.ch-waffle-wrap{display:flex;align-items:center;justify-content:center;flex:1;gap:20px}
.ch-waffle-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;width:140px;height:140px} /* V13: 10% 확대 */
.ch-waffle-cell{background:#F1F5F9;border-radius:2px}
.ch-waffle-cell.s{background:#FDE047} 
.ch-waffle-cell.i{background:#93C5FD} 
.ch-waf-leg{display:flex;flex-direction:column;gap:10px}
.ch-waf-leg-item{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--tm);cursor:pointer}
.ch-waf-leg-item:hover{opacity:.7}
.ch-waf-leg-item b{font-size:13px;color:var(--tx)}
.ch-waf-leg-item i{width:12px;height:12px;border-radius:3px}

/* Chart 2: Heatmap Table (빈도) */
.ch-heat-wrap{display:flex;flex-direction:column;flex:1;justify-content:center}
.ch-heat-tbl{width:100%;border-collapse:separate;border-spacing:3px;font-size:10px}
.ch-heat-tbl th{color:var(--tm);font-weight:700;padding-bottom:6px;font-size:10px}
.ch-heat-tbl td{background:#F1F5F9;border-radius:4px;padding:8px;text-align:center;font-weight:800;color:var(--pr);cursor:pointer;transition:opacity .15s}
.ch-heat-tbl td:hover{opacity:.7}
/* V13: 항목명 호버 시 클릭 가능함 표시 */
.ch-heat-label{text-align:right;font-weight:700;color:var(--tm);padding-right:10px;width:40%;font-size:10px;cursor:pointer;transition:color .15s}
.ch-heat-label:hover{color:var(--pr)}

/* Chart 3: Donut (건전성) */
.ch-donut-wrap{display:flex;align-items:center;justify-content:center;flex:1;gap:20px}
/* V13: 도넛 크기 10% 확대 및 Total 제거 */
.donut-container{position:relative;width:160px;height:160px;display:flex;align-items:center;justify-content:center}
.donut-svg{width:160px;height:160px;transform:rotate(-90deg);position:absolute;top:0;left:0} 
.ch-donut-leg{display:flex;flex-direction:column;gap:8px}
.ch-d-leg-item{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--tm);cursor:pointer}
.ch-d-leg-item:hover{opacity:.7}
.ch-d-leg-item b{font-size:12px;color:var(--tx)}
.ch-d-leg-item i{width:12px;height:12px;border-radius:50%}

/* Chart 4: Bar (3막대) */
.ch-bar-wrap{display:flex;align-items:flex-end;justify-content:space-around;flex:1;padding-top:10px;gap:8px;height:170px} 
.ch-bar-group{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;cursor:pointer}
.ch-bars{display:flex;align-items:flex-end;gap:4px;height:130px;width:100%;justify-content:center}
/* V13: 막대 굵기 확대 (16px -> 18px) */
.ch-b-o{width:18px;background:#E2E8F0;border-radius:3px 3px 0 0;transition:opacity .15s} 
.ch-b-s{width:18px;background:#A7F3D0;border-radius:3px 3px 0 0;transition:opacity .15s} 
.ch-b-w{width:18px;background:#93C5FD;border-radius:3px 3px 0 0;transition:opacity .15s} 
.ch-bar-group:hover .ch-b-o, .ch-bar-group:hover .ch-b-s, .ch-bar-group:hover .ch-b-w{opacity:.8}
.ch-b-lbl{font-size:10px;font-weight:700;color:var(--tm);margin-top:2px}
.ch-legend{display:flex;justify-content:center;gap:12px;font-size:10px;color:var(--tm);margin-top:12px}
.ch-legend span{display:flex;align-items:center;gap:4px}
.ch-legend i{width:10px;height:10px;border-radius:2px;display:inline-block}

/* ========== 대시보드 리스트 모달 ========== */
.dash-modal-ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:2500;justify-content:center;align-items:center;backdrop-filter:blur(2px)}
.dash-modal-ov.active{display:flex}

/* ========== 하위 스타일 요소 (기존) ========== */
.mkpi-row{display:grid;grid-template-columns:1fr 1fr 1fr 420px;gap:12px;margin-bottom:21px}
.mkpi-card{background:var(--z-card-bg);border:1px solid var(--z-border);border-radius:10px;padding:14px;position:relative;overflow:hidden}
.mkpi-card::before{content:'';position:absolute;left:0;top:0;width:100%;height:3px}
.mkpi-card:nth-child(1)::before{background:#A5B4FC}
.mkpi-card:nth-child(2)::before{background:#FDE68A}
.mkpi-card:nth-child(3)::before{background:#A7F3D0}
.mkpi-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mkpi-title{font-size:15px;font-weight:800;color:var(--z-text-main)}
.mkpi-body{display:flex;align-items:center;gap:16px}
.mkpi-ring{position:relative;width:80px;height:80px;flex-shrink:0}
.mkpi-ring svg{transform:rotate(-90deg)}
.mkpi-ring-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:16px;font-weight:900;color:var(--z-text-main)}
.mkpi-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;flex:1}
.mkpi-stat{text-align:center;padding:6px 5px;border-radius:6px;background:#FAFBFC;border:1px solid #F1F5F9;cursor:pointer;transition:background .15s}
.mkpi-stat:hover{background:#EFF6FF;border-color:#BFDBFE}
.mkpi-stat-n{font-size:20px;font-weight:900;line-height:1}
.mkpi-stat-l{font-size:10px;font-weight:700;color:var(--z-text-muted);margin-top:4px;line-height:1.3}
.mkpi-stat .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.s-delay-card{background:#FFF5F5;border:1px solid #FECACA;border-radius:10px;padding:14px;position:relative;overflow:hidden;display:flex;flex-direction:column}
.s-delay-card::before{content:'';position:absolute;left:0;top:0;width:100%;height:3px;background:#FCA5A5}
.s-delay-card-title{font-size:12px;font-weight:800;color:#DC2626;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.s-delay-total{font-size:22px;font-weight:900;color:#DC2626;text-align:center;margin-bottom:8px}
.s-delay-total span{font-size:10px;font-weight:600;color:#EF4444;display:block;margin-top:2px}
.s-delay-list{display:flex;flex-direction:column;gap:5px;flex:1;overflow-y:auto}
.s-delay-item{background:#fff;border:1px solid #FECACA;border-radius:6px;padding:6px 8px;cursor:pointer;transition:background .1s;text-align:center}
.s-delay-item:hover{background:#FEF2F2}
.s-delay-mo{font-size:10px;font-weight:800;color:#DC2626}
.s-delay-style{font-size:8px;color:#64748B;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.filter-bar{display:flex;justify-content:flex-end;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.search-box{background:#fff;border:1px solid var(--z-border);border-radius:6px;padding:5px 10px;font-size:11px;width:200px;outline:none;font-family:inherit}
.search-box:focus{border-color:var(--z-accent);box-shadow:0 0 0 2px rgba(59,130,246,.1)}
.filter-select{background:#fff;border:1px solid var(--z-border);border-radius:6px;padding:5px 8px;font-size:11px;outline:none;font-family:inherit;cursor:pointer}
.month-section{margin-bottom:16px}
.month-card{background:var(--z-card-bg);border:1px solid var(--z-border);border-radius:8px;overflow:hidden}
.month-header{padding:8px 16px;background:#F8FAFC;border-bottom:1px solid var(--z-border);display:flex;justify-content:space-between;align-items:center}
.month-title{font-size:13px;font-weight:800;color:var(--z-text-main)}
.month-count{font-size:11px;color:var(--z-text-muted);font-weight:600;background:#F1F5F9;padding:2px 8px;border-radius:10px;border:1px solid #CBD5E1}
.table-scroll{overflow-x:auto}
.z-table{width:100%;border-collapse:collapse;font-size:11px;text-align:left;table-layout:fixed}
.z-table th{background:#F1F5F9;padding:7px 8px;color:var(--z-text-muted);font-weight:800;font-size:10px;border-bottom:1px solid var(--z-border);white-space:nowrap;text-align:left}
.z-table td{padding:7px 8px;border-bottom:1px solid #F1F5F9;color:var(--z-text-main);vertical-align:middle;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.z-table tr{cursor:pointer;transition:background .1s}
.z-table tbody tr:hover td{background:#EFF6FF}
.z-table tbody tr.not-ordered:hover td{background:#FEE2E2}
.style-info{display:flex;align-items:center;gap:8px}
.style-thumb{width:34px;height:34px;background:#F1F5F9;border:1px solid #E2E8F0;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#94A3B8;flex-shrink:0;overflow:hidden}
.style-thumb img{width:100%;height:100%;object-fit:cover}
.style-code{font-weight:800;color:var(--z-primary);font-size:11px;display:block}
.style-name{font-size:9px;color:var(--z-text-muted);display:block;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag{padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;display:inline-flex;align-items:center;white-space:nowrap}
.tag-draft{background:#F1F5F9;color:#475569;border:1px solid #CBD5E1}
.tag-prog{background:#FEF3C7;color:#B45309;border:1px solid #FDE68A}
.tag-appr{background:#D1FAE5;color:#065F46;border:1px solid #A7F3D0}
.tag-fail{background:#FEF2F2;color:#B91C1C;border:1px solid #FECACA}
.mo-mkpi-row{display:grid;grid-template-columns:1fr 1fr 1fr 420px;gap:12px;margin-bottom:21px}
.mo-mkpi-card{background:var(--cw);border:1px solid var(--bd);border-radius:10px;padding:14px;position:relative;overflow:hidden}
.mo-mkpi-card::before{content:'';position:absolute;left:0;top:0;width:100%;height:3px}
.mo-mkpi-card:nth-child(1)::before{background:#A5B4FC}
.mo-mkpi-card:nth-child(2)::before{background:#FDE68A}
.mo-mkpi-card:nth-child(3)::before{background:#A7F3D0}
.mo-mkpi-footer{margin-top:12px;padding-top:10px;border-top:1px solid #F1F5F9;font-size:11px;color:var(--tm);display:flex;justify-content:center;gap:24px}
.mo-mkpi-footer b{font-size:12px;color:var(--tx);font-weight:800}
.delay-card{background:#FFF5F5;border:1px solid #FECACA;border-radius:10px;padding:14px;position:relative;overflow:hidden;display:flex;flex-direction:column}
.delay-card::before{content:'';position:absolute;left:0;top:0;width:100%;height:3px;background:#FCA5A5}
.delay-card-title{font-size:12px;font-weight:800;color:#DC2626;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.delay-total{font-size:22px;font-weight:900;color:#DC2626;text-align:center;margin-bottom:8px}
.delay-total span{font-size:10px;font-weight:600;color:#EF4444;display:block;margin-top:2px}
.delay-list{display:flex;flex-direction:column;gap:5px;flex:1;overflow-y:auto}
.delay-item{background:#fff;border:1px solid #FECACA;border-radius:6px;padding:6px 8px;cursor:pointer;transition:background .1s;text-align:center}
.delay-item:hover{background:#FEF2F2}
.delay-mo{font-size:10px;font-weight:800;color:#DC2626}
.delay-style{font-size:8px;color:#64748B;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.delay-badge{display:inline-block;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;background:#FEE2E2;color:#DC2626;margin-left:4px}
.pipe-card{background:var(--cw);border:1px solid var(--bd);border-radius:8px;padding:22px 20px;margin-bottom:21px}
.pipe-title-txt{font-size:13px;font-weight:800;color:var(--tm);text-transform:uppercase;margin-bottom:14px;letter-spacing:.5px}
.pipe-row{display:flex;align-items:center;gap:4px;overflow-x:auto}
.pipe-step{flex:1;text-align:center;min-width:90px;padding:14px 6px;border-radius:8px;cursor:pointer;transition:transform .1s,box-shadow .1s}
.pipe-step:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.pipe-n{font-size:26px;font-weight:900;line-height:1}
.pipe-lb{font-size:12px;font-weight:800;margin-top:5px;line-height:1.3;display:flex;align-items:center;justify-content:center}
.pipe-lb2{font-size:10px;color:var(--tm);margin-top:3px}
.pipe-emoji{font-size:1.3em;margin-right:4px}
.pipe-bar{height:5px;border-radius:2px;margin-top:8px}
.pipe-arr{color:#CBD5E1;font-size:12px;flex-shrink:0}
.mo-search-box{background:#fff;border:1px solid var(--bd);border-radius:6px;padding:5px 10px;font-size:11px;outline:none;font-family:inherit}
.mo-search-box:focus{border-color:var(--ac);box-shadow:0 0 0 2px rgba(59,130,246,.1)}
.mo-fsel{background:#fff;border:1px solid var(--bd);border-radius:6px;padding:5px 8px;font-size:11px;outline:none;font-family:inherit;cursor:pointer}
.mt-sec{margin-bottom:83px}
.mt-card{background:var(--cw);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.mt-hd{padding:10px 16px;background:#F8FAFC;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.mt-title-txt{font-size:16px;font-weight:800;color:var(--tx)}
.mt-cnt{font-size:11px;color:var(--tm);font-weight:600;background:#F1F5F9;padding:2px 8px;border-radius:10px;border:1px solid #CBD5E1}
.mf-bar{display:flex;justify-content:flex-end;align-items:center;padding:8px 16px;gap:8px;background:#FAFBFC;border-bottom:1px solid var(--bd);flex-wrap:wrap}
table.zt{width:100%;border-collapse:collapse;font-size:11px;text-align:left;table-layout:fixed}
.zt th{background:#F1F5F9;padding:9px 8px;color:var(--tm);font-weight:800;font-size:10px;border-bottom:1px solid var(--bd);white-space:nowrap;text-align:center}
.zt th:nth-child(1),.zt th:nth-child(2),.zt th:nth-child(3){text-align:left}
.zt td{padding:12px 8px;border-bottom:1px solid #F1F5F9;color:var(--tx);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;height:48px;text-align:center}
.zt td:nth-child(1),.zt td:nth-child(2),.zt td:nth-child(3){text-align:left}
.zt tbody tr{cursor:pointer;transition:background .1s}
.zt tbody tr:hover td{background:#EFF6FF}
.zt .mo-num{font-weight:800;color:var(--pr)}
.t-ok{background:#D1FAE5;color:#065F46;border:1px solid #A7F3D0}
.t-wn{background:#FEF3C7;color:#B45309;border:1px solid #FDE68A}
.t-dg{background:#FEF2F2;color:#B91C1C;border:1px solid #FECACA}
.t-dr{background:#F1F5F9;color:#475569;border:1px solid #CBD5E1}
.t-bl{background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE}
.dly-badge2{display:inline-block;padding:1px 4px;border-radius:3px;font-size:7px;font-weight:700;background:#FEF2F2;color:#DC2626;margin-left:2px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.p-prog{display:flex;flex-direction:column;gap:4px;width:100%;padding:0 2px} 
.p-bars{display:flex;gap:2px;width:100%;height:6px} 
.p-bar{flex:1;border-radius:2px} 
.p-lbls{display:flex;gap:2px;width:100%} 
.p-lbl{flex:1;font-size:8px;text-align:center;letter-spacing:-0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Modals */
.pop-ov, .mo-pop-ov, .dash-modal-ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:2000;justify-content:center;align-items:center;backdrop-filter:blur(2px)}
.pop-ov.active, .mo-pop-ov.active, .dash-modal-ov.active{display:flex}
.pop-box, .mo-pop-box, .dash-modal-box{background:#fff;border-radius:12px;width:92%;max-width:700px;max-height:82vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .2s ease-out}
.pop-hd, .mo-pop-hd, .dash-modal-hd{padding:16px 20px 12px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:10;border-radius:12px 12px 0 0}
.pop-title, .mo-pop-title, .dash-modal-title{font-size:15px;font-weight:800;color:var(--pr)}
.pop-sub, .mo-pop-sub, .dash-modal-sub{font-size:11px;color:var(--tm);margin-top:2px}
.pop-close, .mo-pop-close, .dash-modal-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--bd);background:#F8FAFC;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--tm)}
.pop-close:hover, .mo-pop-close:hover, .dash-modal-close:hover{background:#FEF2F2;color:var(--dg)}
.pop-body, .mo-pop-body, .dash-modal-body{padding:16px 20px}
.pop-item, .mo-pop-item, .dash-list-item{padding:10px 12px;border:1px solid var(--bd);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:background .1s;display:flex;justify-content:space-between;align-items:center}
.pop-item:hover, .mo-pop-item:hover, .dash-list-item:hover{background:#EFF6FF;border-color:#BFDBFE}
.pop-item-left .pi-mo, .mo-pop-item .pi-mo, .dash-list-item .pi-mo{font-size:12px;font-weight:800;color:var(--pr)}
.pop-item-left .pi-name, .mo-pop-item .pi-name, .dash-list-item .pi-name{font-size:10px;color:var(--tm);margin-top:2px}
.pop-item-left .pi-meta, .mo-pop-item .pi-meta, .dash-list-item .pi-meta{font-size:9px;color:#94A3B8;margin-top:2px}
.pop-empty, .mo-pop-empty, .dash-empty{text-align:center;padding:30px;color:var(--tm);font-size:13px}

<script>
/* ── 공통 ── */
var S_APP="eom", S_REP="All_Styles", MO_REP="All_MO";
var allRec=[], s_filtered=[], moSkus=new Set();
var allMO_rec=[], mo_filtered=[];
var today=new Date(), todayStr=today.toISOString().split("T")[0];

/* ══════════════════════════════
   Style View v32 JS (원본 100%)
══════════════════════════════ */
var S_MAP={
  Gender:{"W":"Women / 여성 / 女","M":"Men / 남성 / 男","U":"Unisex / 남녀공용 / 男女通用"},
  Category:{"S":"Set / 세트 / 套装","I":"Individual / 단품 / 单品"},
  Top_Type:{"B":"Bra-top / 브라탑 / 运动内衣","C":"Crop / 크롭 / 露脐装","T":"Tank / 탱크 / 背心"},
  Sleeve:{"L":"Long / 긴팔 / 长袖","S":"Short / 반팔 / 短袖","N":"None / 민소매 / 无袖"},
  Fit:{"O":"Oversize / 루즈핏 / 宽松版","R":"Regular / 레귤러핏 / 标准版","S":"Slim / 슬림핏 / 修身版"},
  Details:{"Z":"Zip-up(Full) / 짚업 / 全开拉链","H":"Half-zip / 반짚업 / 半拉链","N":"Round-neck / 라운드넥 / 圆领","C":"Cami-strap / 끈나시 / 吊带","W":"Wide-strap / 와이드 / 宽肩带","D":"Hood / 후드 / 连帽"},
  Bottom_Type:{"L":"Leggings / 레깅스 / 紧身裤","W":"Wide / 와이드 / 宽腿裤","J":"Jogger / 조거 / 束脚裤","F":"Flare / 나팔 / 喇叭裤","P":"Pleats / 플리츠 / 褶皱","A":"A-line / A라인 / A字版","B":"Shorts / 반바지 / 短裤"},
  Bottom_Length:{"3":"3-Tier(Short) / 3부 / 三分","5":"5-Tier(Mid) / 5부 / 五分","7":"7-Tier(Mid-full) / 7부 / 七分","9":"9-Tier(Full) / 9부 / 九分"},
  Material_Type:{"P":"Polyester / 폴리에스터 / 涤纶","N":"Nylon / 나일론 / 尼龙","D":"Polyamide / 폴리아미드 / 聚酰胺","C":"Cotton / 코튼 / 棉","H":"Mesh / 메쉬 / 网布","M":"Modal / 모달 / 莫代尔","L":"Lycra / 라이크라 / 莱卡"},
  Lining_Type:{"B":"Brushed / 기모 / 磨毛","F":"Fur / 퍼 / 毛皮","N":"None / 없음 / 无"}
};
var S_SHORT={
  Category:{"S":"Set","I":"Individual"},Top_Type:{"B":"Bra-top","C":"Crop","T":"Tank"},
  Sleeve:{"L":"Long","S":"Short","N":"None"},Fit:{"O":"Oversize","R":"Regular","S":"Slim"},
  Details:{"Z":"Zip-up(Full)","H":"Half-zip","N":"Round-neck","C":"Cami-strap","W":"Wide-strap","D":"Hood"},
  Bottom_Type:{"L":"Leggings","W":"Wide","J":"Jogger","F":"Flare","P":"Pleats","A":"A-line","B":"Shorts"},
  Bottom_Length:{"3":"3-Tier(Short)","5":"5-Tier(Mid)","7":"7-Tier(Mid-full)","9":"9-Tier(Full)"},
  Gender:{"W":"Women","M":"Men","U":"Unisex"}
};

// V13 전역에서 사용되는 타입 한국어/중국어 병행 변환 맵
var C_TYPE_MAP = {
  "Bra-top":"브라탑/运动内衣", "Crop":"크롭/露脐装", "Tank":"탱크/背心", 
  "Leggings":"레깅스/紧身裤", "Wide":"와이드/宽腿裤", "Jogger":"조거/束脚裤", 
  "Flare":"나팔/喇叭裤", "Pleats":"플리츠/褶皱", "A-line":"A라인/A字版", 
  "Shorts":"반바지/短裤", "Basic":"기본/基础"
};

function mv(f,v){return(!v||v==="-")?"-":(S_MAP[f]&&S_MAP[f][v])?S_MAP[f][v]:v}
function sv(f,v){return(!v||v==="-")?null:(S_SHORT[f]&&S_SHORT[f][v])?S_SHORT[f][v]:v}

var CAT_MAP={"S":"Set / 세트 / 套装","I":"Individual / 단품 / 单品"};
function catName(v){return(!v||v==="-")?"-":(CAT_MAP[v]||v)}
function cleanFactory(v){if(!v||v==="-")return"-";return v.replace(/^[_\s]*\d+[_\s]*/,"")}
function pd(v){
  if(!v||v==="-")return null;
  if(/^\d{4}-\d{2}-\d{2}/.test(v))return v.substring(0,10);
  var m=v.match(/^(\d{1,2})-([A-Za-z]+)-(\d{4})/);
  if(m){var mo={Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};
  return m[3]+"-"+(mo[m[2]]||"01")+"-"+(m[1].length===1?"0"+m[1]:m[1])}return null}

function g(r,f){var v=r[f];if(v==null||v==="")return"-";if(typeof v==="object"&&v.display_value)return v.display_value;return String(v)}
function escH(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function s_tc(s){s=(s||"").toLowerCase();if(s.indexOf("active")>=0||s.indexOf("approved")>=0)return"tag-appr";if(s.indexOf("progress")>=0||s.indexOf("sampling")>=0)return"tag-prog";if(s.indexOf("rejected")>=0||s.indexOf("cancel")>=0)return"tag-fail";return"tag-draft"}
function mo_tc(s){var l=(s||"").toLowerCase();if(l.indexOf("confirmed")>=0||l.indexOf("delivered")>=0||l.indexOf("complete")>=0||l.indexOf("shipped")>=0||l.indexOf("done")>=0)return"t-ok";if(l.indexOf("progress")>=0||l.indexOf("cutting")>=0||l.indexOf("sewing")>=0||l.indexOf("fabric")>=0||l.indexOf("packing")>=0)return"t-wn";if(l.indexOf("delay")>=0||l.indexOf("cancel")>=0)return"t-dg";if(l.indexOf("pending")>=0)return"t-bl";return"t-dr"}

function getImg1(r){var i=r["Style_Image"];if(!i)return null;if(Array.isArray(i)&&i.length>0)return i[0];if(typeof i==="string"&&i.length>5)return i;if(typeof i==="object"&&i.display_value)return i.display_value;return null}
function getAllImgs(r,field){var i=r[field];if(!i)return[];if(Array.isArray(i))return i.filter(function(x){return x&&typeof x==="string"&&x.length>5});if(typeof i==="object"&&!Array.isArray(i)){var u=[];Object.keys(i).forEach(function(k){var v=i[k];if(v&&typeof v==="string"&&v.length>5)u.push(v)});return u}if(typeof i==="string"&&i.length>5)return[i];return[]}

function isOrderDelayed(r){
  var sku=g(r,"Style_SKU");if(sku==="-")sku=g(r,"SKU");if(moSkus.has(sku))return false;
  var py=parseInt(g(r,"Plan_Year")),pm=parseInt(g(r,"Plan_Month"));if(isNaN(py)||isNaN(pm))return false;
  if(py<100)py+=2000;var deadline=new Date(py,pm-1,20);var todayD=new Date(today.getFullYear(),today.getMonth(),today.getDate());return todayD>deadline}

function isMODelayed(r){
  var os=(g(r,"Order_Status")||"").toLowerCase();
  if(os.indexOf("delivered")>=0||os.indexOf("shipped")>=0||os.indexOf("done")>=0)return false;
  var ds=g(r,"Delivery_Status").toLowerCase();
  return ds.indexOf("delay")>=0||ds.indexOf("지연")>=0||os.indexOf("hold")>=0||os.indexOf("delay")>=0;
}

function getMOProdStage(r){var s=g(r,"Production_Status").toLowerCase();
  if(s.indexOf("shipped")>=0)return"Shipped";if(s.indexOf("complete")>=0||s.indexOf("done")>=0)return"Done";
  if(s.indexOf("packing")>=0)return"Packing";if(s.indexOf("sewing")>=0)return"Sewing";
  if(s.indexOf("cutting")>=0)return"Cutting";if(s.indexOf("fabric")>=0)return"Fabric";return"Not Started"}

function parseYM(key){var m=key.match(/(\d+)년\s*(\d+)월/);if(!m)return null;var y=parseInt(m[1]);if(y<100)y+=2000;return{y:y,m:parseInt(m[2])}}

/* ── 이미지 로드 ── */
var _safeQ=[],_safeBusy=false;
function _runSafeQ(){
  if(_safeQ.length===0){_safeBusy=false;return}_safeBusy=true;
  var task=_safeQ.shift();
  var el=task.id?document.getElementById(task.id):task.el;
  if(!el){setTimeout(_runSafeQ,30);return}
  var img=document.createElement("img");img.style.cssText=task.css||"width:100%;height:100%;object-fit:cover";
  if(task.clk)img.onclick=function(){openLightbox(this.src)};
  var done=false;function next(){if(done)return;done=true;setTimeout(_runSafeQ,50)}
  try{ZOHO.CREATOR.UTIL.setImageData(img,task.url,function(){el.innerHTML="";el.appendChild(img);next()});setTimeout(next,3000)}catch(e){next()}}
function qImg(elOrId,url,css,clk){_safeQ.push({id:typeof elOrId==="string"?elOrId:null,el:typeof elOrId==="object"?elOrId:null,url:url,css:css,clk:clk});if(!_safeBusy)_runSafeQ()}

function loadTableImgs(){
  var els=document.querySelectorAll("[data-img]");if(!els.length)return;
  if("IntersectionObserver" in window){
    var obs=new IntersectionObserver(function(entries,observer){entries.forEach(function(ent){if(ent.isIntersecting){var el=ent.target,u=el.getAttribute("data-img");if(u)qImg(el,u);observer.unobserve(el)}})},{rootMargin:"200px"});
    els.forEach(function(el){obs.observe(el)})}
  else{els.forEach(function(el){var u=el.getAttribute("data-img");if(u)qImg(el,u)})}}

/* ── 데이터 로드 ── */
ZOHO.CREATOR.init().then(function(){
  ZOHO.CREATOR.API.getAllRecords({appName:S_APP,reportName:MO_REP,page:1,pageSize:200}).then(function(r){
    if(r&&r.code===3000&&r.data){allMO_rec=r.data;mo_filtered=allMO_rec.slice();allMO_rec.forEach(function(m){var s=g(m,"Style_SKU");if(s==="-")s=g(m,"SKU");if(s!=="-")moSkus.add(s)})}

/* ══════════════════════════════════════
   ★ V13 대시보드 4종 렌더링 함수
══════════════════════════════════════ */
function renderTopDashboard(){
  let moByM = {};
  allMO_rec.forEach(r=>{
    let py=g(r,"Plan_Year"), pm=g(r,"Plan_Month");
    let k=(py!=="-"&&pm!=="-")?(py+"년 "+pm+"월"):"-";
    if(k!=="-"){
      if(!moByM[k]) moByM[k]={ order:0, shipped:0, warehouse:0, mos:[] };
      let tQty = parseInt(g(r,"Total_Quantity"))||0;
      let sQty = parseInt(g(r,"Shipped_Quantity"))||0;
      let fQty = parseInt(g(r,"Finished_Quantity"))||0;
      
      moByM[k].order += tQty;
      moByM[k].shipped += sQty;
      moByM[k].warehouse += Math.max(0, fQty - sQty); 
      moByM[k].mos.push(r);
    }
  });

  let mKeys = Object.keys(moByM).sort().slice(0,3);
  
  /* ================= 1. 세트/단품 진행 비율 (Waffle) ================= */
  let cS=0, cI=0;
  allRec.forEach(r => { if(g(r,"Category")==="S") cS++; else if(g(r,"Category")==="I") cI++; });
  let totalSt = cS + cI;
  let pS = totalSt ? Math.round(cS/totalSt*100) : 0;
  let pI = 100 - pS;
  let waf = '';
  for(let i=0; i<100; i++){ waf += `<div class="ch-waffle-cell ${i<pS ? 's' : 'i'}"></div>`; }
  
  let h1 = `<div class="dash-card"><div class="dash-title">세트/단품 진행 비율 / 套装/单品进行比例</div><div class="ch-waffle-wrap">
              <div class="ch-waffle-grid" onclick="openDashList('cat','all')">${waf}</div>
              <div class="ch-waf-leg">
                <div class="ch-waf-leg-item" onclick="openDashList('cat','s')"><i style="background:#FDE047"></i>세트/套装 <b>${pS}%</b></div>
                <div class="ch-waf-leg-item" onclick="openDashList('cat','i')"><i style="background:#93C5FD"></i>단품/单品 <b>${pI}%</b></div>
              </div>
            </div></div>`;

  /* ================= 2. 세부 스타일 진행 빈도 (Heatmap) ================= */
  let fMap = {};
  allRec.forEach(r=>{
    let dtRaw = g(r,"Top_Type")!=="-" ? S_SHORT.Top_Type[g(r,"Top_Type")] : (g(r,"Bottom_Type")!=="-" ? S_SHORT.Bottom_Type[g(r,"Bottom_Type")] : "Basic");
    let nameKey = (g(r,"Category")==="S"?"Set":"Ind") + "-" + dtRaw;
    let ym = g(r,"Plan_Year")+"년 "+g(r,"Plan_Month")+"월";
    
    if(!fMap[nameKey]) fMap[nameKey]={ total:0, m:{} };
    fMap[nameKey].total++;
    if(!fMap[nameKey].m[ym]) fMap[nameKey].m[ym]=0;
    fMap[nameKey].m[ym]++;
  });
  
  let topFreq = Object.keys(fMap).sort((a,b)=>fMap[b].total - fMap[a].total).slice(0,5);
  
  let h2 = `<div class="dash-card"><div class="dash-title">세부 스타일 진행 빈도 / 款式频率</div><div class="ch-heat-wrap"><table class="ch-heat-tbl"><tr><th></th>`;
  mKeys.forEach(k => { h2 += `<th>${parseYM(k).m}월/月</th>`; });
  h2 += `</tr>`;
  
  topFreq.forEach(f => {
    let parts = f.split("-");
    let cName = parts[0]==="Set" ? "세트/套装" : "단품/单品";
    let tName = C_TYPE_MAP[parts[1]] || parts[1];
    let nm = cName + " - " + tName; // 완벽한 한/중 병행 표기
    
    // 항목 이름 클릭 시 월 구분 없는 모달 (freq_all)
    h2 += `<tr><td class="ch-heat-label" onclick="openDashList('freq_all','${f}')" title="전체 데이터 보기">${nm}</td>`;
    
    mKeys.forEach(k => {
      let cnt = fMap[f].m[k] || 0;
      let alpha = Math.min(0.8, cnt/10 + 0.1); 
      let bg = cnt>0 ? `rgba(147,197,253,${alpha})` : `#F1F5F9`;
      let kEnc = encodeURIComponent(k);
      // 월별 칸 클릭 시 해당 월 모달 (freq_month)
      h2 += `<td style="background:${bg}" onclick="openDashList('freq_month','${f}|${kEnc}')" title="${k} 데이터 보기">${cnt}</td>`;
    });
    h2 += `</tr>`;
  });
  h2 += `</table></div></div>`;

  /* ================= 3. 오더 건전성 현황 (Donut) ================= */
  let nS=0, oT=0, aR=0, dL=0; 
  allMO_rec.forEach(r => {
    let stage = getMOProdStage(r);
    if(isMODelayed(r)) dL++;
    else if(stage==="Not Started") nS++;
    else if(stage==="Shipped" || stage==="Done") aR++; 
    else oT++; 
  });
  let totalMO = allMO_rec.length;
  let pNS = totalMO ? Math.round(nS/totalMO*100) : 0;
  let pOT = totalMO ? Math.round(oT/totalMO*100) : 0;
  let pAR = totalMO ? Math.round(aR/totalMO*100) : 0;
  let pDL = totalMO ? Math.round(dL/totalMO*100) : 0;
  
  // SVG Donut viewBox="0 0 42 42" & stroke-width="7" 완벽 원형 및 굵기 확대
  let offNS = 25;
  let offOT = 100 - pNS + 25;
  let offAR = 100 - pNS - pOT + 25;
  let offDL = 100 - pNS - pOT - pAR + 25;
  
  let h3 = `<div class="dash-card"><div class="dash-title">오더 건전성 현황 / 订单健康度</div><div class="ch-donut-wrap">
              <div class="donut-container">
                <svg viewBox="0 0 42 42" class="donut-svg">
                  <circle cx="21" cy="21" r="15.915" fill="transparent" stroke="#F1F5F9" stroke-width="7"></circle>
                  ${pNS>0 ? `<circle cx="21" cy="21" r="15.915" fill="transparent" stroke="#CBD5E1" stroke-width="7" stroke-dasharray="${pNS} ${100-pNS}" stroke-dashoffset="${offNS}"></circle>` : ''}
                  ${pOT>0 ? `<circle cx="21" cy="21" r="15.915" fill="transparent" stroke="#93C5FD" stroke-width="7" stroke-dasharray="${pOT} ${100-pOT}" stroke-dashoffset="${offOT}"></circle>` : ''}
                  ${pAR>0 ? `<circle cx="21" cy="21" r="15.915" fill="transparent" stroke="#A7F3D0" stroke-width="7" stroke-dasharray="${pAR} ${100-pAR}" stroke-dashoffset="${offAR}"></circle>` : ''}
                  ${pDL>0 ? `<circle cx="21" cy="21" r="15.915" fill="transparent" stroke="#FCA5A5" stroke-width="7" stroke-dasharray="${pDL} ${100-pDL}" stroke-dashoffset="${offDL}"></circle>` : ''}
                </svg>
              </div>
              <div class="ch-donut-leg">
                <div class="ch-d-leg-item" onclick="openDashList('health','ns')"><i style="background:#CBD5E1"></i>미시작/未开始 <b>${pNS}%</b></div>
                <div class="ch-d-leg-item" onclick="openDashList('health','ot')"><i style="background:#93C5FD"></i>정상진행/正常 <b>${pOT}%</b></div>
                <div class="ch-d-leg-item" onclick="openDashList('health','ar')"><i style="background:#A7F3D0"></i>완료/完成 <b>${pAR}%</b></div>
                <div class="ch-d-leg-item" onclick="openDashList('health','dl')"><i style="background:#FCA5A5"></i>지연/延误 <b>${pDL}%</b></div>
              </div>
            </div></div>`;

  /* ================= 4. 월별 생산 계획 대비 실적 (Bar) ================= */
  let maxQty = 1;
  mKeys.forEach(k => { maxQty = Math.max(maxQty, moByM[k].order, moByM[k].shipped, moByM[k].warehouse); });
  
  let h4 = '<div class="dash-card"><div class="dash-title">월별 생산 계획 대비 실적 / 每月生产计划与实际</div><div class="ch-bar-wrap">';
  mKeys.forEach(k => {
    let mObj = moByM[k];
    let oH = Math.max(5, (mObj.order/maxQty)*100);
    let sH = Math.max(5, (mObj.shipped/maxQty)*100);
    let wH = Math.max(5, (mObj.warehouse/maxQty)*100);
    let lbl = parseYM(k).m+"월/月";
    let kEnc = encodeURIComponent(k);
    
    h4 += `<div class="ch-bar-group" onclick="openDashList('bar','${kEnc}')" title="오더: ${mObj.order}, 출고: ${mObj.shipped}, 창고보유: ${mObj.warehouse}">
             <div class="ch-bars">
               <div class="ch-b-o" style="height:${oH}%"></div>
               <div class="ch-b-s" style="height:${sH}%"></div>
               <div class="ch-b-w" style="height:${wH}%"></div>
             </div>
             <div class="ch-b-lbl">${lbl}</div>
           </div>`;
  });
  h4 += `</div><div class="ch-legend">
          <span><i style="background:#E2E8F0"></i>오더수량/订单数量</span>
          <span><i style="background:#A7F3D0"></i>출고완료/已出货</span>
          <span><i style="background:#93C5FD"></i>중국창고 보유/仓库库存</span>
         </div></div>`;

  // 요청된 순서: 1.카테고리 -> 2.빈도 -> 3.건전성 -> 4.월별실적
  document.getElementById("topDashboard").innerHTML = h1 + h2 + h3 + h4;
}

// 대시보드 리스트 모달 필터링
function openDashList(type, param){
  let items = [], t="", sub="";
  
  if(type==="bar"){
    let k = decodeURIComponent(param);
    items = allMO_rec.filter(r => (g(r,"Plan_Year")+"년 "+g(r,"Plan_Month")+"월") === k);
    t = k + " 생산 실적 / 生产业绩"; sub = "총 "+items.length+"건의 MO";
  }
  else if(type==="health"){
    items = allMO_rec.filter(r => {
      let isDly = isMODelayed(r);
      let stage = getMOProdStage(r);
      let isDone = stage==="Shipped" || stage==="Done";
      let isNS = stage==="Not Started";
      
      if(param==="ns") return isNS && !isDly; 
      if(param==="ot") return !isDly && !isDone && !isNS;
      if(param==="ar") return isDone;
      if(param==="dl") return isDly;
    });
    let nms = {ns:"미시작 / 未开始", ot:"정상 진행 / 正常进行", ar:"완료 / 完成", dl:"지연 / 延误"};
    t = nms[param]; sub = "총 "+items.length+"건의 MO";
  }
  else if(type==="cat"){
    if(param==="all") items = allRec;
    else items = allRec.filter(r => g(r,"Category").toLowerCase() === param);
    t = "카테고리 분류 / 品类分类"; sub = "총 "+items.length+"건의 Style";
  }
  else if(type==="freq_all"){
    items = allRec.filter(r => {
      let dtRaw = g(r,"Top_Type")!=="-" ? S_SHORT.Top_Type[g(r,"Top_Type")] : (g(r,"Bottom_Type")!=="-" ? S_SHORT.Bottom_Type[g(r,"Bottom_Type")] : "Basic");
      let nameKey = (g(r,"Category")==="S"?"Set":"Ind") + "-" + dtRaw;
      return nameKey === param;
    });
    let parts = param.split("-");
    let cName = parts[0]==="Set" ? "세트" : "단품";
    let tName = C_TYPE_MAP[parts[1]] || parts[1];
    t = cName + "-" + tName.split("/")[0] + " 전체 / 全部"; sub = "총 "+items.length+"건의 Style";
  }
  else if(type==="freq_month"){
    let parts = param.split("|");
    let fParam = parts[0];
    let kParam = decodeURIComponent(parts[1]);
    items = allRec.filter(r => {
      let dtRaw = g(r,"Top_Type")!=="-" ? S_SHORT.Top_Type[g(r,"Top_Type")] : (g(r,"Bottom_Type")!=="-" ? S_SHORT.Bottom_Type[g(r,"Bottom_Type")] : "Basic");
      let nameKey = (g(r,"Category")==="S"?"Set":"Ind") + "-" + dtRaw;
      let ym = g(r,"Plan_Year")+"년 "+g(r,"Plan_Month")+"월";
      return nameKey === fParam && ym === kParam;
    });
    let p2 = fParam.split("-");
    let cName = p2[0]==="Set" ? "세트" : "단품";
    let tName = C_TYPE_MAP[p2[1]] || p2[1];
    t = cName + "-" + tName.split("/")[0] + " (" + kParam + ")"; sub = "총 "+items.length+"건의 Style";
  }

  document.getElementById("dashModalTitle").textContent = t;
  document.getElementById("dashModalSub").textContent = sub;
  
  let h="";
  if(!items.length) h='<div class="dash-empty">데이터가 없습니다</div>';
  else {
    let isMO = type==="bar" || type==="health";
    items.forEach(r => {
      if(isMO){
        let dly = isMODelayed(r) ? '<span class="dly-badge2">DELAYED</span>' : '';
        h+=`<div class="dash-list-item" onclick="document.getElementById('dashModalOv').classList.remove('active'); mo_openModal(allMO_rec.find(x=>x['ID']==='${r.ID}'))">
              <div><div class="pi-mo">${escH(g(r,"MO_Number"))}${dly}</div><div class="pi-name">${escH(g(r,"Style_Name"))}</div><div class="pi-meta">수량: ${g(r,"Total_Quantity")} pcs</div></div>
              <span class="tag ${mo_tc(g(r,"Production_Status"))}">${escH(g(r,"Production_Status"))}</span>
            </div>`;
      } else {
        let sku = g(r,"Style_SKU"); if(sku==="-") sku=g(r,"SKU");
        h+=`<div class="dash-list-item" onclick="document.getElementById('dashModalOv').classList.remove('active'); s_openModal(allRec.find(x=>x['ID']==='${r.ID}'))">
              <div><div class="pi-mo">${escH(sku)}</div><div class="pi-name">${escH(g(r,"Style_Name"))}</div><div class="pi-meta">Category: ${escH(mv("Category",g(r,"Category")))}</div></div>
              <span class="tag ${s_tc(g(r,"Style_Status"))}">${escH(g(r,"Style_Status"))}</span>
            </div>`;
      }
    });
  }
  document.getElementById("dashModalBody").innerHTML = h;
  document.getElementById("dashModalOv").classList.add("active");
}

var s_currentRecId=null;

function s_renderMKPI(){
  var groups={};
  s_filtered.forEach(function(r){var py=g(r,"Plan_Year"),pm=g(r,"Plan_Month");var key=(py!=="-"&&pm!=="-")?(py+"년 "+pm+"월"):"미지정";if(!groups[key])groups[key]=[];groups[key].push(r)});
  var colors=["#818CF8","#F59E0B","#34D399"],ci=0,h="";
  Object.keys(groups).sort().forEach(function(key){
    if(key==="미지정")return;
    var items=groups[key],c=colors[ci%colors.length];ci++;
    var tot=items.length,sm=0,ord=0,nord=0;
    items.forEach(function(r){var sku=g(r,"Style_SKU");if(sku==="-")sku=g(r,"SKU");var ss=(g(r,"Sample_Status")+" "+g(r,"Style_Status")).toLowerCase();if(ss.indexOf("sampling")>=0||ss.indexOf("샘플")>=0)sm++;if(moSkus.has(sku))ord++;else nord++});
    var pct=tot>0?Math.round((ord/tot)*100):0;
    var r36=36,circ=2*Math.PI*r36,offset=circ-(pct/100)*circ;
    var ym=parseYM(key);var yy=ym?ym.y.toString().slice(-2):"";var mm2=ym?(ym.m<10?"0"+ym.m:ym.m):"";
    var titleText=ym?(yy+"."+mm2+" 스타일 KPI / "+yy+"年 "+ym.m+"月 款式 KPI"):"스타일 KPI";
    var keyEnc=encodeURIComponent(key);
    h+='<div class="mkpi-card"><div class="mkpi-header"><div class="mkpi-title">📅 '+titleText+'</div></div>';
    h+='<div class="mkpi-body"><div class="mkpi-ring"><svg width="80" height="80" viewBox="0 0 80 80"><circle cx="40" cy="40" r="'+r36+'" fill="none" stroke="#E5E7EB" stroke-width="6"/><circle cx="40" cy="40" r="'+r36+'" fill="none" stroke="'+c+'" stroke-width="6" stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'" stroke-linecap="round"/></svg><div class="mkpi-ring-pct" style="color:'+c+'">'+pct+'%</div></div>';
    h+='<div class="mkpi-stats">';
    h+='<div class="mkpi-stat" onclick="s_openKpiPop(\''+keyEnc+'\',\'all\')"><div class="mkpi-stat-n" style="color:#6366F1">'+tot+'</div><div class="mkpi-stat-l"><span class="dot" style="background:#A5B4FC"></span>총 스타일 / 总款式</div></div>';
    h+='<div class="mkpi-stat" onclick="s_openKpiPop(\''+keyEnc+'\',\'sm\')"><div class="mkpi-stat-n" style="color:#F59E0B">'+sm+'</div><div class="mkpi-stat-l"><span class="dot" style="background:#FDE68A"></span>샘플제작중 / 样品制作中</div></div>';
    h+='<div class="mkpi-stat" onclick="s_openKpiPop(\''+keyEnc+'\',\'ord\')"><div class="mkpi-stat-n" style="color:#34D399">'+ord+'</div><div class="mkpi-stat-l"><span class="dot" style="background:#A7F3D0"></span>오더완료 / 订单完成</div></div>';
    h+='<div class="mkpi-stat" onclick="s_openKpiPop(\''+keyEnc+'\',\'nord\')"><div class="mkpi-stat-n" style="color:#EF4444">'+nord+'</div><div class="mkpi-stat-l"><span class="dot" style="background:#FCA5A5"></span>미오더 / 未下订单</div></div>';
    h+='</div></div></div>'});
  var delayedAll=s_filtered.filter(function(r){return isOrderDelayed(r)});
  h+='<div class="s-delay-card"><div class="s-delay-card-title">⚠️ 오더 지연 현황<br><span style="font-size:10px;color:#EF4444;font-weight:600">订单延误现况</span></div>';
  h+='<div class="s-delay-total">'+delayedAll.length+'<span>건 지연 / 件延误</span></div><div class="s-delay-list">';
  if(delayedAll.length===0){h+='<div style="text-align:center;padding:16px;color:#94A3B8;font-size:11px">지연 없음 / 无延误 ✓</div>'}
  else{delayedAll.forEach(function(r){var sku=g(r,"Style_SKU");if(sku==="-")sku=g(r,"SKU");h+='<div class="s-delay-item" onclick="s_openModal(allRec.find(function(x){return x[\'ID\']==='+"'"+r["ID"]+"'"+'}))""><div class="s-delay-mo">'+escH(sku)+'</div><div class="s-delay-style">'+escH(g(r,"Style_Name"))+'</div></div>'})}
  h+='</div><div style="font-size:10px;font-weight:bold;color:#94A3B8;text-align:center;padding-top:8px;border-top:1px dashed #FECACA;line-height:1.4">당월 20일까지 오더 미진행 시 지연으로 간주<br>若当月20日前未下订单，视为延误</div></div>';
  document.getElementById("s_kpiRow").innerHTML=h}

function s_openKpiPop(keyEnc,type){
  var key=decodeURIComponent(keyEnc);
  var groups={};s_filtered.forEach(function(r){var py=g(r,"Plan_Year"),pm=g(r,"Plan_Month");var k=(py!=="-"&&pm!=="-")?(py+"년 "+pm+"월"):"미지정";if(!groups[k])groups[k]=[];groups[k].push(r)});
  var items=groups[key]||[];
  var typeNames={all:"총 스타일 / 总款式",sm:"샘플 제작 중 / 样品制作中",ord:"오더완료 / 订单完成",nord:"미오더 / 未下订单"};
  var popItems=items.filter(function(r){var sku=g(r,"Style_SKU");if(sku==="-")sku=g(r,"SKU");var ss=(g(r,"Sample_Status")+" "+g(r,"Style_Status")).toLowerCase();
    if(type==="all")return true;if(type==="sm")return ss.indexOf("sampling")>=0||ss.indexOf("샘플")>=0;if(type==="ord")return moSkus.has(sku);if(type==="nord")return !moSkus.has(sku);return true});
  document.getElementById("s_kpiPopTitle").textContent=key+" — "+typeNames[type];

function renderProdProgress(r){
  var st=["원단 / 面料", "재단 / 裁剪", "봉제 / 车缝", "포장 / 包装", "완료 / 完成", "출고 / 出货"];

  var pipeColors = ["#DDD6FE", "#FEF3C7", "#BAE6FD", "#BBF7D0", "#A7F3D0", "#BFDBFE"];
  var textColors = ["#8B5CF6", "#D97706", "#0EA5E9", "#22C55E", "#10B981", "#3B82F6"];
  
  var cIdx=map[getMOProdStage(r)];
  var isDly=isMODelayed(r);
  
  var bh='<div class="p-bars">', lh='<div class="p-lbls">';
  for(var i=0;i<6;i++){
    var s=st[i], bc="#E2E8F0", lc="#94A3B8", lt=s, fw="600";
    if(cIdx===-1){
      if(i===0){ bc="#CBD5E1"; lt="대기 / 等待"; lc="#64748B"; fw="800"; }
    } else {
      if(i < cIdx){
        bc = pipeColors[i]; lc = textColors[i]; fw = "700";
      } else if(i === cIdx){
        if(isDly){
          bc = "#FECACA"; lc = "#DC2626"; fw = "800";
          lt = s.split(" / ")[0]+"_지연 / "+s.split(" / ")[1]+"_延误";
        } else {
          bc = pipeColors[i]; lc = textColors[i]; fw = "800";
        }

    }
    bh+='<div class="p-bar" style="background:'+bc+'"></div>';
    lh+='<div class="p-lbl" style="color:'+lc+';font-weight:'+fw+'">'+lt+'</div>';
  }
  bh+='</div>'; lh+='</div>';
  return '<div class="p-prog">'+bh+lh+'</div>';
}

  var co=["#94A3B8","#A78BFA","#FDBA74","#7DD3FC","#34D399","#10B981","#3B82F6"];
  var lb2=["미시작 / 未开始","원단 / 面料","재단 / 裁剪","봉제 / 车缝","포장 / 包装","완료 / 完成","출고 / 出货"];
  var cn=[0,0,0,0,0,0,0];

    h+='<div class="pipe-lb" style="color:'+co[i]+'"><span class="pipe-emoji">'+emojis[i]+'</span>'+lb2[i]+'</div>';
    h+='<div class="pipe-bar" style="background:'+co[i]+'"></div></div>'});
  document.getElementById("mo_pipeRow").innerHTML=h}

  document.getElementById("mo_pipePopTitle").textContent="🏭 "+stageNames[stage];document.getElementById("mo_pipePopSub").textContent="총 "+items.length+"건의 오더가 이 단계에 있습니다";
  var h="";if(!items.length){h='<div class="mo-pop-empty">해당 단계의 오더가 없습니다</div>'}
  else{items.forEach(function(r){var dl=isMODelayed(r);
    h+='<div class="mo-pop-item" onclick="mo_openModalFromPipe(\''+r["ID"]+'\')">';
    h+='<div><div class="pi-mo">'+escH(g(r,"MO_Number"))+(dl?'<span class="dly-badge2">DELAYED</span>':'')+'</div><div class="pi-name">'+escH(g(r,"Style_Name"))+'  <span style="color:#94A3B8">'+escH(g(r,"Style_SKU"))+'</span></div><div class="pi-meta">공장: '+escH(cleanFactory(g(r,"Factory")))+' · 수량: '+escH(g(r,"Total_Quantity"))+' pcs</div><div class="pi-meta">예상납기: '+escH(g(r,"Expected_Delivery"))+'</div></div>';

function mo_renderMonthly(){
  var groups={};
  allMO_rec.forEach(function(r){var py=g(r,"Plan_Year"),pm=g(r,"Plan_Month");var key=(py!=="-"&&pm!=="-")?(py+"년 "+pm+"월"):"미지정";if(!groups[key])groups[key]=[];groups[key].push(r)});
  var html="",mi=0;
  Object.keys(groups).sort().forEach(function(key){
    var items=groups[key],ym=parseYM(key),idx=mi++;
    if(ym && (ym.y === 2026 || ym.y === 26) && (ym.m === 4 || ym.m === 5)) return;
    var mFac={},mProd={},mCat={};
    items.forEach(function(r){var f=g(r,"Factory");if(f!=="-")mFac[f]=1;var p=g(r,"Production_Status");if(p!=="-")mProd[p]=1;var c=g(r,"Category");if(c!=="-")mCat[c]=catName(c)});
    var yy=ym?ym.y.toString().slice(-2):"",mm2=ym?(ym.m<10?"0"+ym.m:ym.m):"";
    var titleText=ym?(yy+"."+mm2+" 생산 안배표 / "+yy+"年 "+ym.m+"月 生产安排"):"생산 안배표";
    html+='<div class="mt-sec" id="mo_ms'+idx+'"><div class="mt-card">';
    html+='<div class="mt-hd"><div class="mt-title-txt">📅 '+titleText+'</div><span class="mt-cnt" id="mo_mc'+idx+'">'+items.length+' MOs</span></div>';
    html+='<div class="mf-bar">';
    html+='<input type="text" class="mo-search-box mof" data-m="'+idx+'" data-t="q" placeholder="🔍 검색..." style="width:150px">';
    html+='<select class="mo-fsel mof" data-m="'+idx+'" data-t="ca"><option value="">All Category</option>';
    Object.keys(mCat).sort().forEach(function(k){html+='<option value="'+escH(k)+'">'+escH(mCat[k])+'</option>'});html+='</select>';
    html+='<select class="mo-fsel mof" data-m="'+idx+'" data-t="fa"><option value="">All Factory</option>';
    Object.keys(mFac).sort().forEach(function(k){html+='<option value="'+escH(k)+'">'+escH(cleanFactory(k))+'</option>'});html+='</select>';
    html+='<select class="mo-fsel mof" data-m="'+idx+'" data-t="ps"><option value="">All Prod Status</option>';
    Object.keys(mProd).sort().forEach(function(k){html+='<option value="'+escH(k)+'">'+escH(k)+'</option>'});html+='</select></div>';
    html+='<div class="tbl-scroll"><table class="zt"><thead><tr>';
    html+='<th style="width:5%">MO#</th><th style="width:8%">SKU</th><th style="width:9%">Style</th><th style="width:11%">Category</th><th style="width:10%">Factory</th><th style="width:7%">Qty</th><th style="width:20%">Production Progress</th><th style="width:10%">Order</th><th style="width:10%">Exp.Del</th><th style="width:10%">Ship</th>';
    html+='</tr></thead><tbody>';
    items.forEach(function(r){var dl=isMODelayed(r);
      html+='<tr data-id="'+r["ID"]+'" data-m="'+idx+'" data-ca="'+escH(g(r,"Category"))+'" data-fa="'+escH(g(r,"Factory"))+'" data-ps="'+escH(g(r,"Production_Status"))+'" data-st="'+(g(r,"MO_Number")+" "+g(r,"Style_SKU")+" "+g(r,"Style_Name")+" "+g(r,"Factory")).toLowerCase()+'"'+(dl?' style="background:#FEF2F2"':'')+'>';
      html+='<td class="mo-num">'+escH(g(r,"MO_Number"))+'</td>';html+='<td style="font-size:9px;font-weight:600">'+escH(g(r,"Style_SKU"))+'</td>';
      html+='<td>'+escH(g(r,"Style_Name"))+'</td>';html+='<td style="font-size:9px">'+escH(catName(g(r,"Category")))+'</td>';
      html+='<td>'+escH(cleanFactory(g(r,"Factory")))+'</td>';html+='<td style="font-weight:700">'+escH(g(r,"Total_Quantity"))+'</td>';
      html+='<td>'+renderProdProgress(r)+'</td>';
      html+='<td><span class="tag '+mo_tc(g(r,"Order_Status"))+'">'+escH(g(r,"Order_Status"))+'</span></td>';
      var ed=g(r,"Expected_Delivery");html+='<td>'+escH(ed)+(dl?' <span class="dly-badge2">DELAYED</span>':'')+'</td>';
      html+='<td>'+escH(g(r,"Ship_Date"))+'</td></tr>'});
    html+='</tbody></table></div></div></div>'});
  document.getElementById("mo_monthlyContent").innerHTML=html;
  document.querySelectorAll("#mo_monthlyContent tr[data-id]").forEach(function(row){row.addEventListener("click",function(){var id=this.getAttribute("data-id");var r=allMO_rec.find(function(x){return x["ID"]===id});if(r)mo_openModal(r)})});
  document.querySelectorAll(".mof").forEach(function(el){el.addEventListener(el.tagName==="INPUT"?"input":"change",function(){mo_mFilter(this.getAttribute("data-m"))})})}

function mo_mFilter(mi){
  var sec=document.getElementById("mo_ms"+mi);if(!sec)return;
  var q="",ca="",fa="",ps="";
  sec.querySelectorAll(".mof").forEach(function(el){var t=el.getAttribute("data-t"),v=el.value;if(t==="q")q=v.toLowerCase().trim();else if(t==="ca")ca=v;else if(t==="fa")fa=v;else if(t==="ps")ps=v});
  var rows=sec.querySelectorAll('tr[data-m="'+mi+'"]');var cnt=0;
  rows.forEach(function(row){var ok=true;if(q&&row.getAttribute("data-st").indexOf(q)<0)ok=false;if(ca&&row.getAttribute("data-ca")!==ca)ok=false;if(fa&&row.getAttribute("data-fa")!==fa)ok=false;if(ps&&row.getAttribute("data-ps")!==ps)ok=false;row.style.display=ok?"":"none";if(ok)cnt++});
  var c=document.getElementById("mo_mc"+mi);if(c)c.textContent=cnt+" MOs"}

function mo_openModal(r){
  document.getElementById("mo_mTitle").textContent=g(r,"MO_Number");document.getElementById("mo_mSub").textContent=g(r,"Style_Name")+" — "+g(r,"Style_SKU");
  var h="";function dv(v){return v==="-"?'<span class="d-val empty">미입력</span>':escH(v)}function it(l,v){return'<div class="d-item"><span class="d-label">'+l+'</span><span class="d-val">'+v+'</span></div>'}
  h+='<div class="mo-m-sec"><div class="mo-m-sec-t">📌 기본 정보 / 订单信息</div><div class="d-grid">';
  h+=it("MO Number / MO번호",dv(g(r,"MO_Number")));h+=it("Style SKU",dv(g(r,"Style_SKU")));h+=it("Style Name / 스타일명",dv(g(r,"Style_Name")));
  h+=it("Season / 시즌",dv(g(r,"Season")));h+=it("Category / 구분",dv(catName(g(r,"Category"))));h+=it("Factory / 공장",dv(cleanFactory(g(r,"Factory"))));
  h+=it("Order Date / 주문일",dv(g(r,"Order_Date")));h+=it("Order Status / 주문상태",'<span class="tag '+mo_tc(g(r,"Order_Status"))+'">'+escH(g(r,"Order_Status"))+'</span>');
  h+=it("Expected Delivery / 예상납기",dv(g(r,"Expected_Delivery")));h+=it("Delivery Status / 납기상태",isMODelayed(r)?'<span class="tag t-dg">DELAYED / 지연 / 延误</span>':dv(g(r,"Delivery_Status")));
  h+='</div></div>';
  h+='<div class="mo-m-sec"><div class="mo-m-sec-t">📦 수량 & 금액 / 数量&金额</div><div class="d-grid">';
  h+=it("Total Qty / 총수량 / 总数量",dv(g(r,"Total_Quantity")));h+=it("Grand Total / 총금액 / 总金额",dv(g(r,"Grand_Total")));h+=it("Notes / 메모 / 备注",dv(g(r,"Notes")));
  h+='</div></div>';
  h+='<div class="mo-m-sec"><div class="mo-m-sec-t">🏭 생산 추적 / 生产跟踪</div><div class="d-grid">';
  h+=it("Production Status / 생산상태",'<span class="tag '+mo_tc(g(r,"Production_Status"))+'">'+escH(g(r,"Production_Status"))+'</span>');
  h+=it("Fabric Status / 원단상태 / 面料进度",dv(g(r,"Fabric_Status")));h+=it("Progress / 진척률 / 进度",dv(g(r,"Progress")));
  h+=it("Cut Qty / 재단수량 / 裁剪数量",dv(g(r,"Cut_Quantity")));h+=it("Finished Qty / 완제품 / 成衣数量",dv(g(r,"Finished_Quantity")));
  h+='</div></div>';
  h+='<div class="mo-m-sec"><div class="mo-m-sec-t">📅 생산 일정 / 生产日期</div><div class="tl-modal">';
  [{l:"Fabric In / 원단입고 / 面料入库",k:"Fabric_In_house_Date"},{l:"Cutting Start / 재단시작 / 开始裁剪",k:"Cutting_Start_Date"},{l:"Cutting End / 재단완성 / 裁剪完成",k:"Cutting_End_Date"},{l:"Sewing Start / 봉제시작 / 车缝开始",k:"Sewing_Start_Date"},{l:"Sewing End / 봉제완성 / 车缝完成",k:"Sewing_Completion_Date"},{l:"Packing Start / 포장시작 / 包装开始",k:"Packing_Start_Date"},{l:"Packing End / 포장완성 / 包装完成",k:"Packing_End_Date"},{l:"Ship Date / 선적일 / 出货日期",k:"Ship_Date"}].forEach(function(t,i){
    var v=g(r,t.k),p=pd(v),cls="wait";if(p){cls=p<=todayStr?"done":"curr"}
    h+='<div class="tl-item"><div class="tl-dot-m '+cls+'">'+(i+1)+'</div><div class="tl-info-m"><div class="tl-lb-m">'+t.l+'</div><div class="tl-dt-m">'+escH(v)+'</div></div></div>'});
  h+='</div></div>';
  h+='<div class="mo-m-sec"><div class="mo-m-sec-t">🚢 출고 / 出货信息</div><div class="d-grid">';
  h+=it("Ready to Ship / 출고준비 / 待出货",dv(g(r,"Ready_to_Ship")));h+=it("Final QC / 최종QC / 最终QC",dv(g(r,"Final_QC_Passed")));
  h+=it("Shipped Qty / 출고수량 / 出货数量",dv(g(r,"Shipped_Quantity")));h+=it("Ship Date / 선적일 / 出货日期",dv(g(r,"Ship_Date")));
  h+=it("Expected Delivery / 예상납기 / 预计交货",dv(g(r,"Expected_Delivery")));h+=it("Delivery Status / 납기상태 / 交期状态",isMODelayed(r)?'<span class="tag t-dg">DELAYED</span>':dv(g(r,"Delivery_Status")));
  h+='</div></div>';
  document.getElementById("mo_mBody").innerHTML=h;document.getElementById("mo_modalOv").classList.add("active")}
